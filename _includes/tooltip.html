<span class="term-tooltip relative inline cursor-help border-b border-dotted border-blue-600">{{ include.term }}<span class="tooltip-content absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-[300px] max-w-[90vw] bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-sm p-3 border border-gray-300 dark:border-gray-600 rounded-sm shadow-md transition-all duration-200 z-50">{{ include.definition }}{% if include.link %}<a href="{{ include.link }}" target="_blank" rel="noopener" class="tooltip-link block mt-2 pt-2 border-t border-gray-200 dark:border-gray-700 text-xs text-blue-600 dark:text-blue-400 hover:underline">Learn more →</a>{% endif %}<span class="tooltip-arrow"></span></span></span>

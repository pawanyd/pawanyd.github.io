<!-- Structured Data -->
{% if page.layout == "post-detail" or page.layout == "post" %}
<!-- BlogPosting Schema for Blog Posts -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}",
    "image": "{{ site.url }}{{ page.image | default: '/assets/images/default-blog.jpg' }}",
    "author": {
        "@type": "Person",
        "name": "{{ page.author | default: site.author.name }}",
        "url": "{{ site.url }}",
        "jobTitle": "Principal Software Engineer",
        "sameAs": [
            {% for social in site.data.social.social_links %}
            "{{ social.url }}"{% unless forloop.last %},{% endunless %}
            {% endfor %}
        ]
    },
    "publisher": {
        "@type": "Person",
        "name": "{{ site.author.name }}",
        "logo": {
            "@type": "ImageObject",
            "url": "{{ site.url }}/assets/images/pawan-prof.png"
        }
    },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ site.url }}{{ page.url }}"
    },
    "keywords": "{{ page.tags | join: ', ' }}",
    "articleSection": "{{ page.categories | first }}",
    "inLanguage": "en-US"
}
</script>

<!-- BreadcrumbList Schema -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
        {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "{{ site.url }}"
        },
        {
            "@type": "ListItem",
            "position": 2,
            "name": "Blog",
            "item": "{{ site.url }}/blogs/"
        },
        {
            "@type": "ListItem",
            "position": 3,
            "name": "{{ page.title }}",
            "item": "{{ site.url }}{{ page.url }}"
        }
    ]
}
</script>
{% elsif page.url == "/" or page.url == "/index.html" %}
<!-- Person & WebSite Schema for Homepage -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ site.author.name }}",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}",
    "image": "{{ site.url }}/assets/images/pawan-prof.png",
    "jobTitle": "Principal Software Engineer",
    "worksFor": {
        "@type": "Organization",
        "name": "Independent"
    },
    "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "Your University"
    },
    "knowsAbout": [
        "PHP",
        "Laravel",
        "JavaScript",
        "Cloud Computing",
        "System Design",
        "Data Structures",
        "Algorithms",
        "SaaS Development",
        "Full Stack Development"
    ],
    "sameAs": [
        {% for social in site.data.social.social_links %}
        "{{ social.url }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ],
    "address": {
        "@type": "PostalAddress",
        "addressLocality": "Gurgaon",
        "addressRegion": "Haryana",
        "addressCountry": "IN"
    },
    "email": "{{ site.data.social.email }}",
    "telephone": "+91-7737507050"
}
</script>

<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title }}",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}",
    "author": {
        "@type": "Person",
        "name": "{{ site.author.name }}"
    },
    "potentialAction": {
        "@type": "SearchAction",
        "target": {
            "@type": "EntryPoint",
            "urlTemplate": "{{ site.url }}/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
    }
}
</script>

<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "ProfilePage",
    "mainEntity": {
        "@type": "Person",
        "name": "{{ site.author.name }}",
        "description": "{{ site.description }}",
        "image": "{{ site.url }}/assets/images/pawan-prof.png",
        "jobTitle": "Principal Software Engineer"
    }
}
</script>
{% else %}
<!-- Default Person Schema for Other Pages -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ site.author.name }}",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}",
    "image": "{{ site.url }}/assets/images/pawan-prof.png",
    "jobTitle": "Principal Software Engineer",
    "sameAs": [
        {% for social in site.data.social.social_links %}
        "{{ social.url }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ],
    "address": {
        "@type": "PostalAddress",
        "addressLocality": "Gurgaon",
        "addressRegion": "Haryana",
        "addressCountry": "IN"
    },
    "email": "{{ site.data.social.email }}"
}
</script>

<!-- WebPage Schema -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "{{ page.title | default: site.title }}",
    "description": "{{ page.meta_description | default: site.description }}",
    "url": "{{ site.url }}{{ page.url }}",
    "author": {
        "@type": "Person",
        "name": "{{ site.author.name }}"
    },
    "inLanguage": "en-US"
}
</script>
{% endif %}

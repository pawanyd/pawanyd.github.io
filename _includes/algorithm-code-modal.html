<!-- Reusable Algorithm Code Modal -->
<div id="algorithm-code-modal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <!-- Overlay -->
  <div class="fixed inset-0 bg-gray-900 bg-opacity-75 transition-opacity"></div>
  
  <!-- Modal Content -->
  <div class="flex min-h-screen items-center justify-center p-4">
    <div class="relative bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden transform transition-all">
      
      <!-- Header -->
      <div class="bg-gradient-to-r from-blue-600 to-purple-600 px-6 py-4 relative">
        <h3 id="algo-modal-title" class="text-2xl font-bold text-white mb-1"></h3>
        <p id="algo-modal-description" class="text-blue-100 text-sm"></p>
        <button class="algo-modal-close absolute top-4 right-4 text-white hover:text-gray-200 transition-colors" aria-label="Close modal">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      
      <!-- Body -->
      <div class="p-6">
        <!-- Language Tabs -->
        <div class="flex flex-wrap gap-2 mb-4 border-b border-gray-200 pb-2">
          <button class="algo-tab px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-blue-600 text-white" data-lang="python">
            <i class="fab fa-python mr-1"></i> Python
          </button>
          <button class="algo-tab px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-lang="javascript">
            <i class="fab fa-js mr-1"></i> JavaScript
          </button>
          <button class="algo-tab px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-lang="typescript">
            <i class="fab fa-js mr-1"></i> TypeScript
          </button>
          <button class="algo-tab px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-lang="java">
            <i class="fab fa-java mr-1"></i> Java
          </button>
          <button class="algo-tab px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-lang="cpp">
            <i class="fas fa-code mr-1"></i> C++
          </button>
          <button class="algo-tab px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-lang="php">
            <i class="fab fa-php mr-1"></i> PHP
          </button>
        </div>
        
        <!-- Code Container -->
        <div class="relative bg-gray-900 rounded-xl overflow-hidden">
          <button class="algo-copy-btn absolute top-3 right-3 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition-colors duration-200 flex items-center gap-2 z-10" title="Copy code">
            <i class="fas fa-copy"></i> Copy Code
          </button>
          <div class="overflow-x-auto max-h-96">
            <pre class="p-4 pr-32 pt-12"><code id="algo-code-display" class="language-python text-sm"></code></pre>
          </div>
        </div>
      </div>
      
      <!-- Footer -->
      <div class="bg-gray-50 px-6 py-3 border-t border-gray-200">
        <p class="text-sm text-gray-600 flex items-center gap-2">
          <i class="fas fa-lightbulb text-yellow-500"></i> 
          <span>Tip: Code is optimized for readability and learning</span>
        </p>
      </div>
      
    </div>
  </div>
</div>

<!-- Algorithm Data (loaded from YAML) -->
<script>
  window.algorithmSnippets = {{ site.data.algorithm_snippets | jsonify }};
</script>

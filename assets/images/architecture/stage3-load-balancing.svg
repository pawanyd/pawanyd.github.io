<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="1000" height="650">
  <!-- Background -->
  <rect width="1000" height="650" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#2d3748" font-size="24" font-weight="bold">Stage 3: Load Balancing &amp; Horizontal Scaling</text>
  
  <!-- Users -->
  <g transform="translate(80, 150)">
    <circle cx="0" cy="0" r="30" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -15 8 Q 0 15 15 8" fill="white"/>
  </g>
  <g transform="translate(80, 230)">
    <circle cx="0" cy="0" r="30" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -15 8 Q 0 15 15 8" fill="white"/>
  </g>
  <g transform="translate(80, 310)">
    <circle cx="0" cy="0" r="30" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -15 8 Q 0 15 15 8" fill="white"/>
  </g>
  <text x="80" y="370" text-anchor="middle" fill="#2d3748" font-size="14" font-weight="bold">Users</text>
  
  <!-- Arrows to Load Balancer -->
  <line x1="110" y1="150" x2="220" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="110" y1="230" x2="220" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="110" y1="310" x2="220" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Load Balancer -->
  <rect x="220" y="190" width="120" height="80" rx="10" fill="#48bb78" stroke="#38a169" stroke-width="3"/>
  <text x="280" y="220" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Load</text>
  <text x="280" y="240" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Balancer</text>
  <text x="280" y="260" text-anchor="middle" fill="white" font-size="11">(Nginx/HAProxy)</text>
  
  <!-- Arrows to Servers -->
  <line x1="340" y1="210" x2="420" y2="150" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="230" x2="420" y2="230" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="250" x2="420" y2="310" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Server 1 -->
  <rect x="420" y="100" width="150" height="100" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="495" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Web Server 1</text>
  <rect x="440" y="145" width="110" height="15" rx="3" fill="white"/>
  <rect x="440" y="165" width="110" height="15" rx="3" fill="white"/>
  <text x="495" y="195" text-anchor="middle" fill="white" font-size="10">App Instance</text>
  
  <!-- Server 2 -->
  <rect x="420" y="230" width="150" height="100" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="495" y="260" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Web Server 2</text>
  <rect x="440" y="275" width="110" height="15" rx="3" fill="white"/>
  <rect x="440" y="295" width="110" height="15" rx="3" fill="white"/>
  <text x="495" y="325" text-anchor="middle" fill="white" font-size="10">App Instance</text>
  
  <!-- Server 3 -->
  <rect x="420" y="360" width="150" height="100" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="495" y="390" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Web Server 3</text>
  <rect x="440" y="405" width="110" height="15" rx="3" fill="white"/>
  <rect x="440" y="425" width="110" height="15" rx="3" fill="white"/>
  <text x="495" y="455" text-anchor="middle" fill="white" font-size="10">App Instance</text>
  
  <!-- Redis (Session Store) -->
  <rect x="650" y="180" width="140" height="100" rx="8" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <text x="720" y="210" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Redis</text>
  <text x="720" y="230" text-anchor="middle" fill="white" font-size="12">Session Store</text>
  <rect x="670" y="245" width="100" height="8" rx="2" fill="white"/>
  <rect x="670" y="258" width="100" height="8" rx="2" fill="white"/>
  <rect x="670" y="271" width="100" height="8" rx="2" fill="white"/>
  
  <!-- Arrows to Redis -->
  <line x1="570" y1="150" x2="650" y2="220" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="570" y1="280" x2="650" y2="240" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="570" y1="410" x2="650" y2="260" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Database -->
  <g transform="translate(720, 400)">
    <ellipse cx="0" cy="0" rx="90" ry="25" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <rect x="-90" y="0" width="180" height="40" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <ellipse cx="0" cy="40" rx="90" ry="25" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Database</text>
  </g>
  
  <!-- Arrows to Database -->
  <line x1="570" y1="200" x2="630" y2="400" stroke="#3182ce" stroke-width="2"/>
  <line x1="570" y1="330" x2="630" y2="420" stroke="#3182ce" stroke-width="2"/>
  <line x1="570" y1="460" x2="630" y2="440" stroke="#3182ce" stroke-width="2"/>
  
  <!-- Benefits Box -->
  <rect x="50" y="510" width="450" height="120" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
  <text x="275" y="535" text-anchor="middle" fill="#22543d" font-size="14" font-weight="bold">✓ Benefits:</text>
  <text x="275" y="560" text-anchor="middle" fill="#22543d" font-size="12">• Horizontal scalability - add more servers as needed</text>
  <text x="275" y="580" text-anchor="middle" fill="#22543d" font-size="12">• High availability - if one server fails, others continue</text>
  <text x="275" y="600" text-anchor="middle" fill="#22543d" font-size="12">• Zero-downtime deployments - update servers one at a time</text>
  <text x="275" y="620" text-anchor="middle" fill="#22543d" font-size="12">• Supports 10K-100K concurrent users</text>
  
  <!-- Key Features Box -->
  <rect x="550" y="510" width="400" height="120" rx="8" fill="#bee3f8" stroke="#4299e1" stroke-width="2"/>
  <text x="750" y="535" text-anchor="middle" fill="#1a365d" font-size="14" font-weight="bold">🔑 Key Features:</text>
  <text x="750" y="560" text-anchor="middle" fill="#1a365d" font-size="12">• Health checks - remove unhealthy servers automatically</text>
  <text x="750" y="580" text-anchor="middle" fill="#1a365d" font-size="12">• Session persistence via Redis</text>
  <text x="750" y="600" text-anchor="middle" fill="#1a365d" font-size="12">• Round-robin or least-connections routing</text>
  <text x="750" y="620" text-anchor="middle" fill="#1a365d" font-size="12">• SSL termination at load balancer</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
</svg>

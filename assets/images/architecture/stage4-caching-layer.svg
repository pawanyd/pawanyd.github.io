<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700">
  <!-- Background -->
  <rect width="1100" height="700" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#2d3748" font-size="24" font-weight="bold">Stage 4: Caching Layer with Redis</text>
  
  <!-- Users -->
  <g transform="translate(80, 200)">
    <circle cx="0" cy="0" r="35" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-10" r="13" fill="white"/>
    <path d="M -17 10 Q 0 18 17 10" fill="white"/>
    <text x="0" y="60" text-anchor="middle" fill="#2d3748" font-size="14" font-weight="bold">Users</text>
  </g>
  
  <!-- Load Balancer -->
  <rect x="200" y="170" width="120" height="80" rx="10" fill="#48bb78" stroke="#38a169" stroke-width="3"/>
  <text x="260" y="200" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Load</text>
  <text x="260" y="220" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Balancer</text>
  
  <!-- Arrow -->
  <line x1="120" y1="200" x2="200" y2="210" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Web Servers -->
  <rect x="380" y="120" width="140" height="90" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="450" y="150" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Web Server 1</text>
  <rect x="395" y="165" width="110" height="12" rx="2" fill="white"/>
  <rect x="395" y="182" width="110" height="12" rx="2" fill="white"/>
  
  <rect x="380" y="240" width="140" height="90" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="450" y="270" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Web Server 2</text>
  <rect x="395" y="285" width="110" height="12" rx="2" fill="white"/>
  <rect x="395" y="302" width="110" height="12" rx="2" fill="white"/>
  
  <rect x="380" y="360" width="140" height="90" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="450" y="390" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Web Server 3</text>
  <rect x="395" y="405" width="110" height="12" rx="2" fill="white"/>
  <rect x="395" y="422" width="110" height="12" rx="2" fill="white"/>
  
  <!-- Arrows from LB to Servers -->
  <line x1="320" y1="200" x2="380" y2="165" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="320" y1="220" x2="380" y2="285" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="320" y1="240" x2="380" y2="405" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Redis Cache Cluster -->
  <rect x="600" y="140" width="200" height="280" rx="10" fill="#fff5f5" stroke="#e53e3e" stroke-width="3"/>
  <text x="700" y="170" text-anchor="middle" fill="#c53030" font-size="16" font-weight="bold">Redis Cache Cluster</text>
  
  <!-- Cache Node 1 -->
  <rect x="630" y="190" width="140" height="60" rx="6" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <text x="700" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Cache Node 1</text>
  <text x="700" y="235" text-anchor="middle" fill="white" font-size="10">User Sessions</text>
  
  <!-- Cache Node 2 -->
  <rect x="630" y="265" width="140" height="60" rx="6" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <text x="700" y="290" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Cache Node 2</text>
  <text x="700" y="310" text-anchor="middle" fill="white" font-size="10">Query Results</text>
  
  <!-- Cache Node 3 -->
  <rect x="630" y="340" width="140" height="60" rx="6" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <text x="700" y="365" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Cache Node 3</text>
  <text x="700" y="385" text-anchor="middle" fill="white" font-size="10">API Responses</text>
  
  <!-- Arrows to Cache -->
  <line x1="520" y1="165" x2="630" y2="220" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="520" y1="285" x2="630" y2="295" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="520" y1="405" x2="630" y2="370" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <text x="570" y="240" text-anchor="middle" fill="#c53030" font-size="11" font-weight="bold">Cache Hit</text>
  <text x="570" y="255" text-anchor="middle" fill="#c53030" font-size="10">(95% requests)</text>
  
  <!-- Database -->
  <g transform="translate(950, 300)">
    <ellipse cx="0" cy="0" rx="90" ry="25" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <rect x="-90" y="0" width="180" height="40" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <ellipse cx="0" cy="40" rx="90" ry="25" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Database</text>
  </g>
  
  <!-- Arrows to Database -->
  <line x1="800" y1="280" x2="860" y2="300" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="830" y="270" text-anchor="middle" fill="#3182ce" font-size="11" font-weight="bold">Cache Miss</text>
  <text x="830" y="285" text-anchor="middle" fill="#3182ce" font-size="10">(5% requests)</text>
  
  <!-- Cache Flow -->
  <rect x="80" y="500" width="480" height="180" rx="8" fill="#fef5e7" stroke="#f6ad55" stroke-width="2"/>
  <text x="320" y="530" text-anchor="middle" fill="#7c2d12" font-size="16" font-weight="bold">Cache-Aside Pattern Flow:</text>
  <text x="320" y="560" text-anchor="middle" fill="#7c2d12" font-size="13">1. Application checks cache first</text>
  <text x="320" y="585" text-anchor="middle" fill="#7c2d12" font-size="13">2. If found (cache hit) → return immediately</text>
  <text x="320" y="610" text-anchor="middle" fill="#7c2d12" font-size="13">3. If not found (cache miss) → query database</text>
  <text x="320" y="635" text-anchor="middle" fill="#7c2d12" font-size="13">4. Store result in cache with TTL</text>
  <text x="320" y="660" text-anchor="middle" fill="#7c2d12" font-size="13">5. Return data to user</text>
  
  <!-- Benefits Box -->
  <rect x="600" y="500" width="450" height="180" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
  <text x="825" y="530" text-anchor="middle" fill="#22543d" font-size="16" font-weight="bold">✓ Performance Gains:</text>
  <text x="825" y="560" text-anchor="middle" fill="#22543d" font-size="13">• 80% reduction in database load</text>
  <text x="825" y="585" text-anchor="middle" fill="#22543d" font-size="13">• Response time: 200ms → 50ms</text>
  <text x="825" y="610" text-anchor="middle" fill="#22543d" font-size="13">• Cache hit rate: 95%+</text>
  <text x="825" y="635" text-anchor="middle" fill="#22543d" font-size="13">• Supports 100K-500K users</text>
  <text x="825" y="660" text-anchor="middle" fill="#22543d" font-size="13">• 60% cost reduction</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#2d3748" font-size="24" font-weight="bold">Stage 1: Single Server Architecture</text>
  
  <!-- User -->
  <g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="40" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-10" r="15" fill="white"/>
    <path d="M -20 10 Q 0 20 20 10" fill="white"/>
    <text x="0" y="70" text-anchor="middle" fill="#2d3748" font-size="16" font-weight="bold">User</text>
  </g>
  
  <!-- Arrow -->
  <line x1="150" y1="150" x2="280" y2="150" stroke="#4a5568" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="215" y="140" text-anchor="middle" fill="#2d3748" font-size="14">HTTP Request</text>
  
  <!-- DNS -->
  <g transform="translate(400, 80)">
    <circle cx="0" cy="0" r="30" fill="#48bb78" stroke="#38a169" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DNS</text>
    <text x="0" y="50" text-anchor="middle" fill="#2d3748" font-size="14">www.mysite.com</text>
  </g>
  
  <!-- Server Box -->
  <rect x="300" y="120" width="400" height="300" rx="10" fill="white" stroke="#4299e1" stroke-width="3"/>
  <text x="500" y="150" text-anchor="middle" fill="#2d3748" font-size="18" font-weight="bold">Single Server</text>
  
  <!-- Web Server -->
  <rect x="330" y="170" width="150" height="80" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="405" y="200" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Web Server</text>
  <text x="405" y="220" text-anchor="middle" fill="white" font-size="12">(Apache/Nginx)</text>
  
  <!-- Application -->
  <rect x="510" y="170" width="150" height="80" rx="8" fill="#805ad5" stroke="#6b46c1" stroke-width="2"/>
  <text x="585" y="200" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Application</text>
  <text x="585" y="220" text-anchor="middle" fill="white" font-size="12">(Business Logic)</text>
  
  <!-- Database -->
  <g transform="translate(500, 310)">
    <ellipse cx="0" cy="0" rx="120" ry="30" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <rect x="-120" y="0" width="240" height="50" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <ellipse cx="0" cy="50" rx="120" ry="30" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <text x="0" y="30" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Database</text>
    <text x="0" y="48" text-anchor="middle" fill="white" font-size="12">(MySQL/PostgreSQL)</text>
  </g>
  
  <!-- Arrows inside server -->
  <line x1="405" y1="250" x2="500" y2="310" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="585" y1="250" x2="500" y2="310" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Limitations Box -->
  <rect x="50" y="350" width="220" height="120" rx="8" fill="#fed7d7" stroke="#fc8181" stroke-width="2"/>
  <text x="160" y="375" text-anchor="middle" fill="#c53030" font-size="14" font-weight="bold">⚠️ Limitations:</text>
  <text x="160" y="400" text-anchor="middle" fill="#742a2a" font-size="12">• Single point of failure</text>
  <text x="160" y="420" text-anchor="middle" fill="#742a2a" font-size="12">• Limited scalability</text>
  <text x="160" y="440" text-anchor="middle" fill="#742a2a" font-size="12">• Resource competition</text>
  <text x="160" y="460" text-anchor="middle" fill="#742a2a" font-size="12">• Max ~1,000 users</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
</svg>

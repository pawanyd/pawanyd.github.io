<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <!-- Background -->
  <rect width="900" height="550" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#2d3748" font-size="24" font-weight="bold">Stage 2: Separate Database Server</text>
  
  <!-- User -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="0" r="40" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-10" r="15" fill="white"/>
    <path d="M -20 10 Q 0 20 20 10" fill="white"/>
    <text x="0" y="70" text-anchor="middle" fill="#2d3748" font-size="16" font-weight="bold">User</text>
  </g>
  
  <!-- Arrow to Web Server -->
  <line x1="150" y1="200" x2="250" y2="200" stroke="#4a5568" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Web/App Server Box -->
  <rect x="250" y="120" width="250" height="200" rx="10" fill="white" stroke="#4299e1" stroke-width="3"/>
  <text x="375" y="150" text-anchor="middle" fill="#2d3748" font-size="18" font-weight="bold">Application Server</text>
  
  <!-- Web Server -->
  <rect x="280" y="170" width="190" height="60" rx="8" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="375" y="195" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Web Server</text>
  <text x="375" y="215" text-anchor="middle" fill="white" font-size="11">(Nginx/Apache)</text>
  
  <!-- Application -->
  <rect x="280" y="245" width="190" height="60" rx="8" fill="#805ad5" stroke="#6b46c1" stroke-width="2"/>
  <text x="375" y="270" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Application Logic</text>
  <text x="375" y="290" text-anchor="middle" fill="white" font-size="11">(Node.js/Python/PHP)</text>
  
  <!-- Arrow to Database -->
  <line x1="500" y1="220" x2="580" y2="220" stroke="#48bb78" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="540" y="210" text-anchor="middle" fill="#2d3748" font-size="12">SQL Queries</text>
  <text x="540" y="240" text-anchor="middle" fill="#2d3748" font-size="11">(Private Network)</text>
  
  <!-- Database Server Box -->
  <rect x="580" y="120" width="250" height="200" rx="10" fill="white" stroke="#48bb78" stroke-width="3"/>
  <text x="705" y="150" text-anchor="middle" fill="#2d3748" font-size="18" font-weight="bold">Database Server</text>
  
  <!-- Database -->
  <g transform="translate(705, 230)">
    <ellipse cx="0" cy="0" rx="90" ry="25" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <rect x="-90" y="0" width="180" height="40" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <ellipse cx="0" cy="40" rx="90" ry="25" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Database</text>
  </g>
  
  <!-- Benefits Box -->
  <rect x="100" y="380" width="300" height="140" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
  <text x="250" y="405" text-anchor="middle" fill="#22543d" font-size="14" font-weight="bold">✓ Benefits:</text>
  <text x="250" y="430" text-anchor="middle" fill="#22543d" font-size="12">• Independent resource allocation</text>
  <text x="250" y="450" text-anchor="middle" fill="#22543d" font-size="12">• Better performance (40% improvement)</text>
  <text x="250" y="470" text-anchor="middle" fill="#22543d" font-size="12">• Easier to scale each component</text>
  <text x="250" y="490" text-anchor="middle" fill="#22543d" font-size="12">• Supports 1K-10K users</text>
  <text x="250" y="510" text-anchor="middle" fill="#22543d" font-size="12">• Separate backup strategies</text>
  
  <!-- Challenges Box -->
  <rect x="500" y="380" width="300" height="140" rx="8" fill="#fef5e7" stroke="#f6ad55" stroke-width="2"/>
  <text x="650" y="405" text-anchor="middle" fill="#7c2d12" font-size="14" font-weight="bold">⚡ Challenges:</text>
  <text x="650" y="430" text-anchor="middle" fill="#7c2d12" font-size="12">• Network latency added</text>
  <text x="650" y="450" text-anchor="middle" fill="#7c2d12" font-size="12">• Need connection pooling</text>
  <text x="650" y="470" text-anchor="middle" fill="#7c2d12" font-size="12">• Security: VPC &amp; SSL required</text>
  <text x="650" y="490" text-anchor="middle" fill="#7c2d12" font-size="12">• More complex monitoring</text>
  <text x="650" y="510" text-anchor="middle" fill="#7c2d12" font-size="12">• Higher infrastructure cost</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
</svg>

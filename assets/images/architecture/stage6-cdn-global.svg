<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Arrow marker definition - must be before use -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#2d3748" font-size="24" font-weight="bold">Stage 6: CDN &amp; Multi-Region Global Distribution</text>
  
  <!-- Global Users -->
  <text x="600" y="80" text-anchor="middle" fill="#4a5568" font-size="16" font-weight="bold">Global Users (1M-5M+)</text>
  
  <!-- User in US -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="30" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -15 8 Q 0 15 15 8" fill="white"/>
    <text x="0" y="50" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="bold">US User</text>
  </g>
  
  <!-- User in EU -->
  <g transform="translate(600, 150)">
    <circle cx="0" cy="0" r="30" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -15 8 Q 0 15 15 8" fill="white"/>
    <text x="0" y="50" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="bold">EU User</text>
  </g>
  
  <!-- User in Asia -->
  <g transform="translate(1050, 150)">
    <circle cx="0" cy="0" r="30" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <circle cx="0" cy="-8" r="12" fill="white"/>
    <path d="M -15 8 Q 0 15 15 8" fill="white"/>
    <text x="0" y="50" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="bold">Asia User</text>
  </g>
  
  <!-- CDN Layer -->
  <rect x="50" y="240" width="1100" height="120" rx="10" fill="#e6f7ff" stroke="#4299e1" stroke-width="3"/>
  <text x="600" y="270" text-anchor="middle" fill="#2c5282" font-size="18" font-weight="bold">CDN (Content Delivery Network)</text>
  <text x="600" y="295" text-anchor="middle" fill="#2c5282" font-size="13">Global Edge Locations - Cache static &amp; dynamic content</text>
  
  <!-- CDN Edge Locations -->
  <ellipse cx="150" cy="330" rx="60" ry="20" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="150" y="335" text-anchor="middle" fill="white" font-size="11" font-weight="bold">US Edge</text>
  
  <ellipse cx="600" cy="330" rx="60" ry="20" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="600" y="335" text-anchor="middle" fill="white" font-size="11" font-weight="bold">EU Edge</text>
  
  <ellipse cx="1050" cy="330" rx="60" ry="20" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="1050" y="335" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Asia Edge</text>
  
  <!-- Arrows from users to CDN -->
  <line x1="150" y1="180" x2="150" y2="240" stroke="#48bb78" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="170" y="210" text-anchor="start" fill="#48bb78" font-size="10" font-weight="bold">50ms</text>
  
  <line x1="600" y1="180" x2="600" y2="240" stroke="#48bb78" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="620" y="210" text-anchor="start" fill="#48bb78" font-size="10" font-weight="bold">50ms</text>
  
  <line x1="1050" y1="180" x2="1050" y2="240" stroke="#48bb78" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="1070" y="210" text-anchor="start" fill="#48bb78" font-size="10" font-weight="bold">50ms</text>
  
  <!-- Multi-Region Section -->
  <text x="600" y="410" text-anchor="middle" fill="#2d3748" font-size="18" font-weight="bold">Multi-Region Application Deployment</text>
  
  <!-- US-East Region (Primary) -->
  <rect x="50" y="440" width="320" height="280" rx="10" fill="#c6f6d5" stroke="#48bb78" stroke-width="3"/>
  <text x="210" y="470" text-anchor="middle" fill="#22543d" font-size="16" font-weight="bold">🟢 US-East (Primary)</text>
  <text x="210" y="490" text-anchor="middle" fill="#22543d" font-size="11">Active - Handles Writes</text>
  
  <!-- Load Balancer US -->
  <rect x="80" y="510" width="80" height="50" rx="6" fill="#48bb78" stroke="#38a169" stroke-width="2"/>
  <text x="120" y="540" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Load Bal.</text>
  
  <!-- Web Servers US -->
  <rect x="190" y="510" width="60" height="50" rx="6" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="220" y="540" text-anchor="middle" fill="white" font-size="10">Web</text>
  
  <rect x="270" y="510" width="60" height="50" rx="6" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="300" y="540" text-anchor="middle" fill="white" font-size="10">Web</text>
  
  <!-- Cache US -->
  <rect x="80" y="580" width="100" height="50" rx="6" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <text x="130" y="610" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Redis</text>
  
  <!-- Database US -->
  <g transform="translate(270, 620)">
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <rect x="-50" y="0" width="100" height="25" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <ellipse cx="0" cy="25" rx="50" ry="15" fill="#3182ce" stroke="#2c5282" stroke-width="2"/>
    <text x="0" y="18" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Primary DB</text>
  </g>
  
  <!-- EU-West Region (Secondary) -->
  <rect x="420" y="440" width="320" height="280" rx="10" fill="#bee3f8" stroke="#4299e1" stroke-width="3"/>
  <text x="580" y="470" text-anchor="middle" fill="#1a365d" font-size="16" font-weight="bold">🔵 EU-West (Secondary)</text>
  <text x="580" y="490" text-anchor="middle" fill="#1a365d" font-size="11">Read-Only + Failover</text>
  
  <!-- Load Balancer EU -->
  <rect x="450" y="510" width="80" height="50" rx="6" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="490" y="540" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Load Bal.</text>
  
  <!-- Web Servers EU -->
  <rect x="560" y="510" width="60" height="50" rx="6" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="590" y="540" text-anchor="middle" fill="white" font-size="10">Web</text>
  
  <rect x="640" y="510" width="60" height="50" rx="6" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="670" y="540" text-anchor="middle" fill="white" font-size="10">Web</text>
  
  <!-- Cache EU -->
  <rect x="450" y="580" width="100" height="50" rx="6" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <text x="500" y="610" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Redis</text>
  
  <!-- Database EU -->
  <g transform="translate(640, 620)">
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <rect x="-50" y="0" width="100" height="25" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <ellipse cx="0" cy="25" rx="50" ry="15" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
    <text x="0" y="18" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Replica DB</text>
  </g>
  
  <!-- Asia-Pacific Region (Tertiary) -->
  <rect x="790" y="440" width="360" height="280" rx="10" fill="#fef5e7" stroke="#f6ad55" stroke-width="3"/>
  <text x="970" y="470" text-anchor="middle" fill="#7c2d12" font-size="16" font-weight="bold">🟡 Asia-Pacific (Tertiary)</text>
  <text x="970" y="490" text-anchor="middle" fill="#7c2d12" font-size="11">Read-Only + Failover</text>
  
  <!-- Load Balancer Asia -->
  <rect x="820" y="510" width="80" height="50" rx="6" fill="#f6ad55" stroke="#dd6b20" stroke-width="2"/>
  <text x="860" y="540" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Load Bal.</text>
  
  <!-- Web Servers Asia -->
  <rect x="930" y="510" width="60" height="50" rx="6" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="960" y="540" text-anchor="middle" fill="white" font-size="10">Web</text>
  
  <rect x="1010" y="510" width="60" height="50" rx="6" fill="#4299e1" stroke="#2c5282" stroke-width="2"/>
  <text x="1040" y="540" text-anchor="middle" fill="white" font-size="10">Web</text>
  
  <!-- Cache Asia -->
  <rect x="820" y="580" width="100" height="50" rx="6" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <text x="870" y="610" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Redis</text>
  
  <!-- Database Asia -->
  <g transform="translate(1010, 620)">
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="#f6ad55" stroke="#dd6b20" stroke-width="2"/>
    <rect x="-50" y="0" width="100" height="25" fill="#f6ad55" stroke="#dd6b20" stroke-width="2"/>
    <ellipse cx="0" cy="25" rx="50" ry="15" fill="#f6ad55" stroke="#dd6b20" stroke-width="2"/>
    <text x="0" y="18" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Replica DB</text>
  </g>
  
  <!-- Replication Arrows -->
  <line x1="320" y1="640" x2="590" y2="640" stroke="#805ad5" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="455" y="630" text-anchor="middle" fill="#805ad5" font-size="10">Replication</text>
  
  <line x1="690" y1="640" x2="960" y2="640" stroke="#805ad5" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="825" y="630" text-anchor="middle" fill="#805ad5" font-size="10">Replication</text>
  
  <!-- Benefits Box -->
  <rect x="50" y="740" width="550" height="50" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
  <text x="325" y="770" text-anchor="middle" fill="#22543d" font-size="13" font-weight="bold">✓ Global latency: 300ms → 50ms | 99.99% uptime | 5M+ users</text>
  
  <!-- CDN Benefits -->
  <rect x="620" y="740" width="550" height="50" rx="8" fill="#bee3f8" stroke="#4299e1" stroke-width="2"/>
  <text x="895" y="770" text-anchor="middle" fill="#1a365d" font-size="13" font-weight="bold">✓ CDN handles 90% of requests | Automatic failover</text>
  
</svg>

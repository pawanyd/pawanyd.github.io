<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.95" />
    </linearGradient>
    
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow Marker -->
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 L4,6 Z" fill="#3b82f6" />
    </marker>
    
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 L4,6 Z" fill="#8b5cf6" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)" />
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="150" fill="#3b82f6" opacity="0.05" />
  <circle cx="1100" cy="500" r="200" fill="#8b5cf6" opacity="0.05" />
  
  <!-- Title Section -->
  <g transform="translate(600, 40)">
    <rect x="-300" y="-20" width="600" height="60" rx="10" fill="url(#heroGradient)" filter="url(#glow)" />
    <text x="0" y="10" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold">
      Real-Time Emotion Recognition System
    </text>
    <text x="0" y="35" text-anchor="middle" fill="#e0e7ff" font-family="Arial, sans-serif" font-size="16">
      AI-Powered Facial Expression Analysis for Entertainment Studios
    </text>
  </g>
  
  <!-- Main Content Area -->
  <g transform="translate(60, 140)">
    
    <!-- SECTION 1: User &amp; Capture -->
    <g transform="translate(0, 0)">
      <!-- Card Background -->
      <rect x="0" y="0" width="280" height="380" rx="15" fill="url(#cardGradient)" filter="url(#shadow)" />
      <rect x="0" y="0" width="280" height="50" rx="15" fill="#3b82f6" opacity="0.2" />
      
      <!-- Section Title -->
      <text x="140" y="32" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        1. Video Capture
      </text>
      
      <!-- Monitor/Screen -->
      <g transform="translate(40, 70)">
        <rect x="0" y="0" width="200" height="140" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
        <rect x="8" y="8" width="184" height="124" rx="4" fill="#0f172a" />
        
        <!-- Video Content -->
        <rect x="20" y="20" width="160" height="100" rx="4" fill="#334155" />
        
        <!-- Play Button -->
        <circle cx="100" cy="70" r="20" fill="#3b82f6" opacity="0.8" />
        <polygon points="95,60 95,80 110,70" fill="white" />
        
        <!-- Video Progress Bar -->
        <rect x="25" y="105" width="150" height="4" rx="2" fill="#475569" />
        <rect x="25" y="105" width="90" height="4" rx="2" fill="#3b82f6" />
      </g>
      
      <!-- User Face -->
      <g transform="translate(140, 240)">
        <!-- Head -->
        <ellipse cx="0" cy="0" rx="45" ry="50" fill="#fbbf24" filter="url(#softShadow)" />
        
        <!-- Hair -->
        <ellipse cx="0" cy="-30" rx="45" ry="25" fill="#92400e" />
        
        <!-- Eyes -->
        <circle cx="-15" cy="-5" r="6" fill="white" />
        <circle cx="15" cy="-5" r="6" fill="white" />
        <circle cx="-15" cy="-5" r="3" fill="#1e293b" />
        <circle cx="15" cy="-5" r="3" fill="#1e293b" />
        
        <!-- Nose -->
        <line x1="0" y1="0" x2="0" y2="10" stroke="#d97706" stroke-width="2" stroke-linecap="round" />
        
        <!-- Mouth (Smiling) -->
        <path d="M-15,15 Q0,25 15,15" stroke="#d97706" stroke-width="2.5" fill="none" stroke-linecap="round" />
      </g>
      
      <!-- WebRTC Camera -->
      <g transform="translate(140, 320)">
        <circle r="30" fill="#3b82f6" filter="url(#glow)" />
        <circle r="20" fill="#1e40af" />
        <circle r="10" fill="#60a5fa" />
        <circle r="4" fill="white" />
        
        <!-- Recording Indicator -->
        <circle cx="20" cy="-20" r="5" fill="#ef4444">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />
        </circle>
      </g>
      
      <!-- Label -->
      <text x="140" y="365" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">
        WebRTC Real-Time Capture
      </text>
    </g>
    
    <!-- Arrow 1 -->
    <g transform="translate(280, 230)">
      <path d="M0,0 L80,0" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowBlue)" stroke-dasharray="5,5">
        <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite" />
      </path>
      <text x="40" y="-10" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
        Stream
      </text>
    </g>
    
    <!-- SECTION 2: AI Processing -->
    <g transform="translate(360, 0)">
      <!-- Card Background -->
      <rect x="0" y="0" width="280" height="380" rx="15" fill="url(#cardGradient)" filter="url(#shadow)" />
      <rect x="0" y="0" width="280" height="50" rx="15" fill="#8b5cf6" opacity="0.2" />
      
      <!-- Section Title -->
      <text x="140" y="32" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        2. AI Analysis
      </text>
      
      <!-- Deep Learning Brain -->
      <g transform="translate(140, 100)">
        <!-- Brain Shape -->
        <ellipse cx="0" cy="0" rx="60" ry="50" fill="#8b5cf6" opacity="0.3" filter="url(#glow)" />
        <ellipse cx="0" cy="0" rx="50" ry="40" fill="#7c3aed" opacity="0.5" />
        
        <!-- Neural Network Nodes -->
        <circle cx="-30" cy="-20" r="5" fill="#a78bfa" />
        <circle cx="-30" cy="0" r="5" fill="#a78bfa" />
        <circle cx="-30" cy="20" r="5" fill="#a78bfa" />
        
        <circle cx="0" cy="-25" r="6" fill="#c4b5fd" />
        <circle cx="0" cy="-8" r="6" fill="#c4b5fd" />
        <circle cx="0" cy="8" r="6" fill="#c4b5fd" />
        <circle cx="0" cy="25" r="6" fill="#c4b5fd" />
        
        <circle cx="30" cy="-20" r="5" fill="#ddd6fe" />
        <circle cx="30" cy="0" r="5" fill="#ddd6fe" />
        <circle cx="30" cy="20" r="5" fill="#ddd6fe" />
        
        <!-- Connections -->
        <line x1="-30" y1="-20" x2="0" y2="-25" stroke="#8b5cf6" stroke-width="1" opacity="0.5" />
        <line x1="-30" y1="0" x2="0" y2="-8" stroke="#8b5cf6" stroke-width="1" opacity="0.5" />
        <line x1="-30" y1="20" x2="0" y2="25" stroke="#8b5cf6" stroke-width="1" opacity="0.5" />
        <line x1="0" y1="-25" x2="30" y2="-20" stroke="#8b5cf6" stroke-width="1" opacity="0.5" />
        <line x1="0" y1="8" x2="30" y2="0" stroke="#8b5cf6" stroke-width="1" opacity="0.5" />
        
        <!-- AI Icon -->
        <text x="0" y="10" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
          AI
        </text>
      </g>
      
      <!-- Processing Info -->
      <text x="140" y="170" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        Deep Learning Model
      </text>
      <text x="140" y="190" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">
        Frame-by-Frame Analysis
      </text>
      
      <!-- 6 Emotions Grid -->
      <g transform="translate(50, 210)">
        <text x="90" y="0" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
          6 Emotion Types Detected
        </text>
        
        <!-- Emotion Icons -->
        <g transform="translate(0, 15)">
          <!-- Happy -->
          <g transform="translate(30, 20)">
            <circle r="18" fill="#10b981" filter="url(#softShadow)" />
            <circle cx="-6" cy="-3" r="2" fill="white" />
            <circle cx="6" cy="-3" r="2" fill="white" />
            <path d="M-8,3 Q0,10 8,3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
            <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-size="10">Happy</text>
          </g>
          
          <!-- Sad -->
          <g transform="translate(90, 20)">
            <circle r="18" fill="#3b82f6" filter="url(#softShadow)" />
            <circle cx="-6" cy="-3" r="2" fill="white" />
            <circle cx="6" cy="-3" r="2" fill="white" />
            <path d="M-8,8 Q0,2 8,8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
            <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-size="10">Sad</text>
          </g>
          
          <!-- Angry -->
          <g transform="translate(150, 20)">
            <circle r="18" fill="#ef4444" filter="url(#softShadow)" />
            <line x1="-10" y1="-6" x2="-3" y2="-3" stroke="white" stroke-width="2" stroke-linecap="round" />
            <line x1="3" y1="-3" x2="10" y2="-6" stroke="white" stroke-width="2" stroke-linecap="round" />
            <path d="M-6,6 L6,6" stroke="white" stroke-width="2" stroke-linecap="round" />
            <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-size="10">Angry</text>
          </g>
          
          <!-- Surprised -->
          <g transform="translate(30, 80)">
            <circle r="18" fill="#f59e0b" filter="url(#softShadow)" />
            <circle cx="-6" cy="-3" r="3" fill="white" />
            <circle cx="6" cy="-3" r="3" fill="white" />
            <circle cx="0" cy="6" r="4" fill="white" />
            <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-size="10">Surprised</text>
          </g>
          
          <!-- Fear -->
          <g transform="translate(90, 80)">
            <circle r="18" fill="#8b5cf6" filter="url(#softShadow)" />
            <circle cx="-6" cy="-3" r="2.5" fill="white" />
            <circle cx="6" cy="-3" r="2.5" fill="white" />
            <ellipse cx="0" cy="6" rx="5" ry="7" fill="white" />
            <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-size="10">Fear</text>
          </g>
          
          <!-- Neutral -->
          <g transform="translate(150, 80)">
            <circle r="18" fill="#64748b" filter="url(#softShadow)" />
            <circle cx="-6" cy="-3" r="2" fill="white" />
            <circle cx="6" cy="-3" r="2" fill="white" />
            <line x1="-6" y1="6" x2="6" y2="6" stroke="white" stroke-width="2" stroke-linecap="round" />
            <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-size="10">Neutral</text>
          </g>
        </g>
      </g>
    </g>
    
    <!-- Arrow 2 -->
    <g transform="translate(640, 230)">
      <path d="M0,0 L80,0" stroke="#8b5cf6" stroke-width="3" fill="none" marker-end="url(#arrowPurple)" stroke-dasharray="5,5">
        <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite" />
      </path>
      <text x="40" y="-10" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
        Analyze
      </text>
    </g>
    
    <!-- SECTION 3: Results &amp; Insights -->
    <g transform="translate(720, 0)">
      <!-- Card Background -->
      <rect x="0" y="0" width="340" height="380" rx="15" fill="url(#cardGradient)" filter="url(#shadow)" />
      <rect x="0" y="0" width="340" height="50" rx="15" fill="#10b981" opacity="0.2" />
      
      <!-- Section Title -->
      <text x="170" y="32" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        3. Insights &amp; Analytics
      </text>
      
      <!-- Timeline Visualization -->
      <g transform="translate(30, 70)">
        <rect x="0" y="0" width="280" height="120" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2" />
        
        <!-- Timeline -->
        <line x1="20" y1="60" x2="260" y2="60" stroke="#475569" stroke-width="2" />
        
        <!-- Emotion Wave -->
        <path d="M20,60 Q40,30 60,60 Q80,90 100,60 Q120,30 140,60 Q160,80 180,60 Q200,40 220,60 Q240,70 260,60" 
              stroke="#10b981" stroke-width="3" fill="none" filter="url(#glow)" />
        
        <path d="M20,70 Q40,90 60,70 Q80,50 100,70 Q120,90 140,70 Q160,60 180,70 Q200,80 220,70 Q240,65 260,70" 
              stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6" />
        
        <path d="M20,80 Q40,100 60,80 Q80,60 100,80 Q120,100 140,80 Q160,70 180,80 Q200,90 220,80 Q240,75 260,80" 
              stroke="#ef4444" stroke-width="2" fill="none" opacity="0.6" />
        
        <!-- Key Moments -->
        <circle cx="60" cy="60" r="5" fill="#fbbf24" filter="url(#glow)">
          <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite" />
        </circle>
        <circle cx="140" cy="60" r="5" fill="#fbbf24" filter="url(#glow)">
          <animate attributeName="r" values="5;7;5" dur="2s" begin="0.5s" repeatCount="indefinite" />
        </circle>
        <circle cx="220" cy="60" r="5" fill="#fbbf24" filter="url(#glow)">
          <animate attributeName="r" values="5;7;5" dur="2s" begin="1s" repeatCount="indefinite" />
        </circle>
        
        <!-- Labels -->
        <text x="140" y="15" text-anchor="middle" fill="#94a3b8" font-size="11">Emotional Response Timeline</text>
        <text x="20" y="110" fill="#10b981" font-size="10">Happy</text>
        <text x="100" y="110" fill="#3b82f6" font-size="10">Engaged</text>
        <text x="200" y="110" fill="#ef4444" font-size="10">Tense</text>
      </g>
      
      <!-- Stats Dashboard -->
      <g transform="translate(30, 210)">
        <!-- Stat 1 -->
        <g transform="translate(0, 0)">
          <rect x="0" y="0" width="130" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1" />
          <text x="65" y="25" text-anchor="middle" fill="#3b82f6" font-size="24" font-weight="bold">100K+</text>
          <text x="65" y="45" text-anchor="middle" fill="#94a3b8" font-size="11">Sessions</text>
          <text x="65" y="60" text-anchor="middle" fill="#64748b" font-size="10">Processed</text>
        </g>
        
        <!-- Stat 2 -->
        <g transform="translate(150, 0)">
          <rect x="0" y="0" width="130" height="70" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1" />
          <text x="65" y="25" text-anchor="middle" fill="#10b981" font-size="24" font-weight="bold">98%</text>
          <text x="65" y="45" text-anchor="middle" fill="#94a3b8" font-size="11">Accuracy</text>
          <text x="65" y="60" text-anchor="middle" fill="#64748b" font-size="10">Rate</text>
        </g>
        
        <!-- Stat 3 -->
        <g transform="translate(0, 85)">
          <rect x="0" y="0" width="130" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" />
          <text x="65" y="25" text-anchor="middle" fill="#8b5cf6" font-size="24" font-weight="bold">6</text>
          <text x="65" y="45" text-anchor="middle" fill="#94a3b8" font-size="11">Emotions</text>
          <text x="65" y="60" text-anchor="middle" fill="#64748b" font-size="10">Detected</text>
        </g>
        
        <!-- Stat 4 -->
        <g transform="translate(150, 85)">
          <rect x="0" y="0" width="130" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" />
          <text x="65" y="25" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">Real-Time</text>
          <text x="65" y="45" text-anchor="middle" fill="#94a3b8" font-size="11">Processing</text>
          <text x="65" y="60" text-anchor="middle" fill="#64748b" font-size="10">WebRTC</text>
        </g>
      </g>
    </g>
    
  </g>
  
  <!-- Bottom Banner -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="50" rx="10" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="1" />
    
    <text x="540" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      🎬 Trusted by Major Entertainment Studios
    </text>
    <text x="540" y="38" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">
      Marvel Studios • Big Brother • 100,000+ Sessions • 98% Accuracy • Diverse Demographics
    </text>
  </g>
  
</svg>
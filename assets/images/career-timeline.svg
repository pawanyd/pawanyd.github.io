      <text x="50" y="7" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">3</text>
      
      <g transform="translate(100, -80)">
        <rect x="0" y="0" width="500" height="160" rx="12" fill="rgba(159, 18, 57, 0.9)" filter="url(#shadow)" stroke="#ec4899" stroke-width="2" />
        <rect x="0" y="0" width="500" height="45" rx="12" fill="#ec4899" opacity="0.3" />
        <text x="20" y="28" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">

          99% Onboarding Reduction
        </text>
        <text x="20" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">
          From 2 months to 2 hours with no-code builder
        </text>
      </g>
      
      <g transform="translate(30, 140)">
        <circle cx="0" cy="0" r="8" fill="#3b82f6" filter="url(#glow)" />
        <text x="20" y="5" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">
          70% Development Speed Increase
        </text>
        <text x="20" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">
          AI-powered component generation
        </text>
      </g>
      
      <g transform="translate(30, 200)">
        <circle cx="0" cy="0" r="8" fill="#8b5cf6" filter="url(#glow)" />
        <text x="20" y="5" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">
          Millions of Concurrent Users
        </text>
        <text x="20" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">
          Stock trading and SaaS platforms at scale
        </text>
      </g>
      
      <g transform="translate(30, 260)">
        <circle cx="0" cy="0" r="8" fill="#ec4899" filter="url(#glow)" />
        <text x="20" y="5" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">
          100,000+ Emotion Analysis Sessions
        </text>
        <text x="20" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">
          98% accuracy for Marvel and entertainment studios
        </text>
      </g>
      
      <g transform="translate(30, 320)">
        <circle cx="0" cy="0" r="8" fill="#f59e0b" filter="url(#glow)" />
        <text x="20" y="5" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">
          Zero Developer Dependency
        </text>
        <text x="20" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">
          Custom validation module empowering teams
        </text>
      </g>
      
      <g transform="translate(0, 380)">
        <line x1="30" y1="0" x2="520" y2="0" stroke="#475569" stroke-width="1" />
        <text x="275" y="30" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
          Skills Evolution
        </text>
        <text x="30" y="55" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">
          <tspan x="30" dy="0">2016: PHP, MySQL, CakePHP</tspan>
          <tspan x="30" dy="20">2017: WebRTC, Face Detection, Real-time Processing</tspan>
          <tspan x="30" dy="20">2018: System Design, AWS, Microservices</tspan>
          <tspan x="30" dy="20">2019: Architecture, Leadership, Mentoring</tspan>
          <tspan x="30" dy="20">2020+: AI/ML, No-Code Platforms, Innovation</tspan>
        </text>
      </g>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="timelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect width="1400" height="900" fill="url(#bgGradient)" />
  
  <g transform="translate(700, 60)">
    <text x="0" y="0" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold">
      Career Journey Timeline
    </text>
    <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">
      10+ Years of Innovation and Growth • 2016 - Present
    </text>
  </g>
  
  <g transform="translate(100, 150)">
    <line x1="50" y1="100" x2="50" y2="650" stroke="url(#timelineGradient)" stroke-width="4" filter="url(#glow)" />
    
    <circle cx="50" cy="100" r="6" fill="#3b82f6" filter="url(#glow)">
      <animate attributeName="cy" values="100;650;100" dur="8s" repeatCount="indefinite" />
    </circle>
    
    <g transform="translate(0, 550)">
      <circle cx="50" cy="0" r="20" fill="#3b82f6" filter="url(#glow)" stroke="#1e40af" stroke-width="3" />
      <text x="50" y="7" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">1</text>
      
      <g transform="translate(100, -80)">
        <rect x="0" y="0" width="500" height="160" rx="12" fill="rgba(30, 58, 138, 0.9)" filter="url(#shadow)" stroke="#3b82f6" stroke-width="2" />
        <rect x="0" y="0" width="500" height="45" rx="12" fill="#3b82f6" opacity="0.3" />
        <text x="20" y="28" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
          Grepix Infotech Pvt. Ltd.
        </text>
        <text x="480" y="28" text-anchor="end" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14">
          Mar 2016 - Oct 2017
        </text>
        <text x="20" y="65" fill="#60a5fa" font-family="Arial, sans-serif" font-size="15" font-weight="bold">
          Associate Software Developer to Software Engineer
        </text>
        <text x="20" y="88" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="13">
          <tspan x="20" dy="0">Started career learning PHP, CakePHP, MySQL fundamentals</tspan>
          <tspan x="20" dy="18">Promoted to Software Engineer</tspan>
          <tspan x="20" dy="18">Built Taxi Booking Platform with real-time ride management</tspan>
        </text>
      </g>
      <text x="-30" y="7" text-anchor="end" fill="#3b82f6" font-family="Arial, sans-serif" font-size="20" font-weight="bold">2016</text>
    </g>
    
    <g transform="translate(0, 400)">
      <circle cx="50" cy="0" r="20" fill="#8b5cf6" filter="url(#glow)" stroke="#6d28d9" stroke-width="3" />
      <text x="50" y="7" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">2</text>
      

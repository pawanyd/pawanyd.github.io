      <rect x="0" y="0" width="550" height="50" rx="15" fill="rgba(59, 130, 246, 0.2)" />
      <text x="275" y="33" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold">

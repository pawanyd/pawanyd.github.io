        <rect x="0" y="0" width="500" height="160" rx="12" fill="rgba(91, 33, 182, 0.9)" filter="url(#shadow)" stroke="#8b5cf6" stroke-width="2" />
        <rect x="0" y="0" width="500" height="45" rx="12" fill="#8b5cf6" opacity="0.3" />
        <text x="20" y="28" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">

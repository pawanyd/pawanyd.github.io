  <g transform="translate(100, 820)">
    <rect x="0" y="0" width="1200" height="60" rx="10" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="2" />
    <g transform="translate(100, 30)">
      <text x="0" y="0" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">10+ Years</text>
      <text x="0" y="18" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Experience</text>
    </g>
    <g transform="translate(350, 30)">
      <text x="0" y="0" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">4 Companies</text>
      <text x="0" y="18" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Career Growth</text>
    </g>
    <g transform="translate(600, 30)">
      <text x="0" y="0" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">6 Promotions</text>
      <text x="0" y="18" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Career Progression</text>
    </g>
    <g transform="translate(850, 30)">
      <text x="0" y="0" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Millions of Users</text>
      <text x="0" y="18" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Impact at Scale</text>
    </g>

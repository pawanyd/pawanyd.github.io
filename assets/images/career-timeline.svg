        </text>
        <text x="20" y="65" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="15" font-weight="bold">
          Software Engineer to Senior Software Engineer
        </text>
        <text x="20" y="88" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="13">
          <tspan x="20" dy="0">Built Emotion Detection Platform for Marvel and Big Brother</tspan>
          <tspan x="20" dy="18">Implemented WebRTC video capture and real-time processing</tspan>
          <tspan x="20" dy="18">100,000+ sessions processed with 98% accuracy</tspan>
        </text>
      </g>
      <text x="-30" y="7" text-anchor="end" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="20" font-weight="bold">2017</text>
    </g>
    
    <g transform="translate(0, 250)">

<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="64" font-weight="bold">
    DSA
  </text>
  <text x="600" y="250" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="32">
    Data Structures &amp; Algorithms
  </text>
  
  <!-- Visual elements representing different data structures -->
  
  <!-- Array representation -->
  <g transform="translate(150, 350)">
    <text x="0" y="-10" fill="#a78bfa" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Array</text>
    <rect x="0" y="0" width="40" height="30" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2" rx="4"/>
    <rect x="45" y="0" width="40" height="30" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2" rx="4"/>
    <rect x="90" y="0" width="40" height="30" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2" rx="4"/>
    <rect x="135" y="0" width="40" height="30" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2" rx="4"/>
    <text x="20" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">1</text>
    <text x="65" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">2</text>
    <text x="110" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">3</text>
    <text x="155" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">4</text>
  </g>
  
  <!-- Linked List representation -->
  <g transform="translate(400, 350)">
    <text x="0" y="-10" fill="#60a5fa" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Linked List</text>
    <circle cx="20" cy="15" r="15" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
    <text x="20" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">A</text>
    <line x1="35" y1="15" x2="55" y2="15" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
    
    <circle cx="70" cy="15" r="15" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
    <text x="70" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">B</text>
    <line x1="85" y1="15" x2="105" y2="15" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
    
    <circle cx="120" cy="15" r="15" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
    <text x="120" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">C</text>
    
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa" />
      </marker>
    </defs>
  </g>
  
  <!-- Tree representation -->
  <g transform="translate(650, 320)">
    <text x="40" y="-10" fill="#34d399" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Binary Tree</text>
    <!-- Root -->
    <circle cx="40" cy="20" r="12" fill="#10b981" stroke="#34d399" stroke-width="2"/>
    <text x="40" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">1</text>
    
    <!-- Level 2 -->
    <line x1="40" y1="32" x2="20" y2="48" stroke="#34d399" stroke-width="2"/>
    <line x1="40" y1="32" x2="60" y2="48" stroke="#34d399" stroke-width="2"/>
    
    <circle cx="20" cy="55" r="12" fill="#10b981" stroke="#34d399" stroke-width="2"/>
    <text x="20" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">2</text>
    
    <circle cx="60" cy="55" r="12" fill="#10b981" stroke="#34d399" stroke-width="2"/>
    <text x="60" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">3</text>
  </g>
  
  <!-- Graph representation -->
  <g transform="translate(850, 340)">
    <text x="40" y="-10" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Graph</text>
    
    <!-- Nodes -->
    <circle cx="20" cy="20" r="10" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
    <text x="20" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">A</text>
    
    <circle cx="60" cy="20" r="10" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
    <text x="60" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">B</text>
    
    <circle cx="40" cy="50" r="10" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="55" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">C</text>
    
    <!-- Edges -->
    <line x1="30" y1="20" x2="50" y2="20" stroke="#fbbf24" stroke-width="2"/>
    <line x1="25" y1="28" x2="35" y2="42" stroke="#fbbf24" stroke-width="2"/>
    <line x1="55" y1="28" x2="45" y2="42" stroke="#fbbf24" stroke-width="2"/>
  </g>
  
  <!-- Hash Table representation -->
  <g transform="translate(150, 480)">
    <text x="0" y="-10" fill="#ef4444" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Hash Table</text>
    
    <!-- Buckets -->
    <rect x="0" y="0" width="30" height="20" fill="#ef4444" stroke="#f87171" stroke-width="1" rx="2"/>
    <text x="15" y="13" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">0</text>
    
    <rect x="0" y="25" width="30" height="20" fill="#ef4444" stroke="#f87171" stroke-width="1" rx="2"/>
    <text x="15" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">1</text>
    
    <rect x="0" y="50" width="30" height="20" fill="#ef4444" stroke="#f87171" stroke-width="1" rx="2"/>
    <text x="15" y="63" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">2</text>
    
    <!-- Values -->
    <line x1="30" y1="35" x2="50" y2="35" stroke="#f87171" stroke-width="1"/>
    <circle cx="60" cy="35" r="8" fill="#f87171" stroke="#ef4444" stroke-width="1"/>
    <text x="60" y="39" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="7">X</text>
  </g>
  
  <!-- Stack representation -->
  <g transform="translate(400, 480)">
    <text x="20" y="-10" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Stack</text>
    
    <rect x="0" y="0" width="40" height="20" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2" rx="2"/>
    <text x="20" y="13" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Top</text>
    
    <rect x="0" y="25" width="40" height="20" fill="#7c3aed" stroke="#a78bfa" stroke-width="2" rx="2"/>
    <text x="20" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Mid</text>
    
    <rect x="0" y="50" width="40" height="20" fill="#6d28d9" stroke="#a78bfa" stroke-width="2" rx="2"/>
    <text x="20" y="63" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Bot</text>
    
    <!-- Arrow pointing to top -->
    <path d="M 50 10 L 45 5 L 45 8 L 42 8 L 42 12 L 45 12 L 45 15 Z" fill="#a78bfa"/>
  </g>
  
  <!-- Queue representation -->
  <g transform="translate(650, 480)">
    <text x="40" y="-10" fill="#06b6d4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Queue</text>
    
    <rect x="0" y="20" width="25" height="20" fill="#06b6d4" stroke="#67e8f9" stroke-width="2" rx="2"/>
    <text x="12" y="33" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">1</text>
    
    <rect x="30" y="20" width="25" height="20" fill="#0891b2" stroke="#67e8f9" stroke-width="2" rx="2"/>
    <text x="42" y="33" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">2</text>
    
    <rect x="60" y="20" width="25" height="20" fill="#0e7490" stroke="#67e8f9" stroke-width="2" rx="2"/>
    <text x="72" y="33" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">3</text>
    
    <!-- Front and Rear labels -->
    <text x="12" y="10" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="8">Front</text>
    <text x="72" y="10" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="8">Rear</text>
  </g>
  
  <!-- Subtitle -->
  <text x="600" y="580" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="18">
    Master the fundamentals that power every great software system
  </text>
</svg>
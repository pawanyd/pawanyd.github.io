<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="420" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="35" font-family="Arial" font-size="17" font-weight="bold" fill="white" text-anchor="middle">Arrays — The Foundation of Everything</text>

  <!-- Array visualization -->
  <text x="40" y="70" font-family="Arial" font-size="12" font-weight="bold" fill="#a78bfa">Array in Memory (Contiguous Blocks)</text>

  <!-- Index labels -->
  <text x="62" y="95" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">[0]</text>
  <text x="122" y="95" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">[1]</text>
  <text x="182" y="95" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">[2]</text>
  <text x="242" y="95" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">[3]</text>
  <text x="302" y="95" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">[4]</text>
  <text x="362" y="95" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">[5]</text>
  <text x="422" y="95" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">[6]</text>

  <!-- Array cells -->
  <rect x="32" y="100" width="60" height="50" rx="4" fill="#2e1065" stroke="#7c3aed" stroke-width="2"/>
  <text x="62" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">5</text>

  <rect x="92" y="100" width="60" height="50" rx="4" fill="#2e1065" stroke="#7c3aed" stroke-width="2"/>
  <text x="122" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">12</text>

  <rect x="152" y="100" width="60" height="50" rx="4" fill="#2e1065" stroke="#7c3aed" stroke-width="2"/>
  <text x="182" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">8</text>

  <rect x="212" y="100" width="60" height="50" rx="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="2"/>
  <text x="242" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">3</text>

  <rect x="272" y="100" width="60" height="50" rx="4" fill="#2e1065" stroke="#7c3aed" stroke-width="2"/>
  <text x="302" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">19</text>

  <rect x="332" y="100" width="60" height="50" rx="4" fill="#2e1065" stroke="#7c3aed" stroke-width="2"/>
  <text x="362" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">7</text>

  <rect x="392" y="100" width="60" height="50" rx="4" fill="#2e1065" stroke="#7c3aed" stroke-width="2"/>
  <text x="422" y="130" font-family="Arial" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">4</text>

  <!-- Memory addresses -->
  <text x="62" y="168" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">0x1000</text>
  <text x="122" y="168" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">0x1004</text>
  <text x="182" y="168" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">0x1008</text>
  <text x="242" y="168" font-family="Arial" font-size="8" fill="#7c3aed" text-anchor="middle">0x100C ←</text>
  <text x="302" y="168" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">0x1010</text>
  <text x="362" y="168" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">0x1014</text>
  <text x="422" y="168" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">0x1018</text>

  <!-- O(1) access arrow -->
  <line x1="242" y1="58" x2="242" y2="98" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <text x="310" y="55" font-family="Arial" font-size="11" fill="#7c3aed">O(1) Random Access — arr[3]</text>

  <!-- Key operations -->
  <text x="40" y="200" font-family="Arial" font-size="12" font-weight="bold" fill="#a78bfa">Time Complexity</text>

  <rect x="32" y="213" width="195" height="100" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
  <text x="130" y="233" font-family="Arial" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Fast Operations ✓</text>
  <text x="45" y="252" font-family="Arial" font-size="10" fill="#6ee7b7">• Access by index: O(1)</text>
  <text x="45" y="269" font-family="Arial" font-size="10" fill="#6ee7b7">• Append to end: O(1) amortized</text>
  <text x="45" y="286" font-family="Arial" font-size="10" fill="#6ee7b7">• Search (sorted): O(log n)</text>
  <text x="45" y="303" font-family="Arial" font-size="10" fill="#6ee7b7">• Space: O(n)</text>

  <rect x="237" y="213" width="195" height="100" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="1.5"/>
  <text x="335" y="233" font-family="Arial" font-size="11" font-weight="bold" fill="#ef4444" text-anchor="middle">Slow Operations ✗</text>
  <text x="250" y="252" font-family="Arial" font-size="10" fill="#fca5a5">• Insert at start: O(n)</text>
  <text x="250" y="269" font-family="Arial" font-size="10" fill="#fca5a5">• Delete from middle: O(n)</text>
  <text x="250" y="286" font-family="Arial" font-size="10" fill="#fca5a5">• Search (unsorted): O(n)</text>
  <text x="250" y="303" font-family="Arial" font-size="10" fill="#fca5a5">• Resize: O(n)</text>

  <!-- Patterns box -->
  <rect x="442" y="60" width="440" height="260" rx="10" fill="#1f2937" stroke="#334155" stroke-width="1.5"/>
  <text x="662" y="85" font-family="Arial" font-size="13" font-weight="bold" fill="#94a3b8" text-anchor="middle">Must-Know Array Patterns</text>

  <!-- Two pointer -->
  <rect x="455" y="96" width="195" height="90" rx="8" fill="#2e1065"/>
  <text x="553" y="115" font-family="Arial" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">Two Pointers</text>
  <!-- Mini visualization -->
  <rect x="462" y="122" width="30" height="24" rx="3" fill="#7c3aed30" stroke="#7c3aed" stroke-width="1"/>
  <text x="477" y="138" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">L</text>
  <rect x="494" y="122" width="30" height="24" rx="3" fill="#ffffff10" stroke="#334155" stroke-width="1"/>
  <text x="509" y="138" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">→</text>
  <rect x="526" y="122" width="30" height="24" rx="3" fill="#ffffff10" stroke="#334155" stroke-width="1"/>
  <text x="541" y="138" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">→</text>
  <rect x="558" y="122" width="30" height="24" rx="3" fill="#7c3aed30" stroke="#7c3aed" stroke-width="1"/>
  <text x="573" y="138" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">R</text>
  <text x="553" y="162" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Use for: sorted arrays, pairs</text>
  <text x="553" y="177" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">eg: Two Sum II, 3Sum</text>

  <!-- Sliding window -->
  <rect x="460" y="196" width="195" height="90" rx="8" fill="#1e3a5f"/>
  <text x="558" y="215" font-family="Arial" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">Sliding Window</text>
  <rect x="468" y="222" width="30" height="24" rx="3" fill="#2563eb40" stroke="#2563eb" stroke-width="1"/>
  <rect x="500" y="222" width="30" height="24" rx="3" fill="#2563eb40" stroke="#2563eb" stroke-width="1"/>
  <rect x="532" y="222" width="30" height="24" rx="3" fill="#2563eb40" stroke="#2563eb" stroke-width="1"/>
  <rect x="564" y="222" width="30" height="24" rx="3" fill="#1f2937" stroke="#334155" stroke-width="1"/>
  <rect x="596" y="222" width="30" height="24" rx="3" fill="#1f2937" stroke="#334155" stroke-width="1"/>
  <text x="558" y="262" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Use for: subarray/substring</text>
  <text x="558" y="277" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">eg: Max Sum Subarray</text>

  <!-- Binary search -->
  <rect x="662" y="96" width="205" height="90" rx="8" fill="#14532d"/>
  <text x="765" y="115" font-family="Arial" font-size="11" font-weight="bold" fill="#34d399" text-anchor="middle">Binary Search</text>
  <text x="670" y="135" font-family="Arial" font-size="9" fill="#6ee7b7">1. Start: lo=0, hi=n-1</text>
  <text x="670" y="150" font-family="Arial" font-size="9" fill="#6ee7b7">2. mid = lo + (hi-lo)/2</text>
  <text x="670" y="165" font-family="Arial" font-size="9" fill="#6ee7b7">3. Compare arr[mid] with target</text>
  <text x="670" y="180" font-family="Arial" font-size="9" fill="#fcd34d">Time: O(log n) — powerful!</text>

  <!-- Prefix sum -->
  <rect x="662" y="196" width="205" height="90" rx="8" fill="#451a03"/>
  <text x="765" y="215" font-family="Arial" font-size="11" font-weight="bold" fill="#fbbf24" text-anchor="middle">Prefix Sum</text>
  <text x="670" y="233" font-family="Arial" font-size="9" fill="#fcd34d">arr:  [1, 3, 2, 5, 4]</text>
  <text x="670" y="249" font-family="Arial" font-size="9" fill="#fcd34d">pre:  [1, 4, 6, 11, 15]</text>
  <text x="670" y="265" font-family="Arial" font-size="9" fill="#fcd34d">Range sum [i..j]: pre[j]-pre[i-1]</text>
  <text x="670" y="277" font-family="Arial" font-size="9" fill="#64748b">Makes range queries O(1)</text>

  <!-- Problems list -->
  <rect x="32" y="330" width="840" height="75" rx="8" fill="#1f2937" stroke="#334155" stroke-width="1"/>
  <text x="452" y="352" font-family="Arial" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">Must-Solve Array Problems (in order)</text>

  <text x="50" y="372" font-family="Arial" font-size="10" fill="#a78bfa">Easy:</text>
  <text x="85" y="372" font-family="Arial" font-size="10" fill="#64748b">Two Sum, Best Time to Buy Stock, Maximum Subarray, Contains Duplicate</text>

  <text x="50" y="390" font-family="Arial" font-size="10" fill="#60a5fa">Medium:</text>
  <text x="95" y="390" font-family="Arial" font-size="10" fill="#64748b">Product Except Self, 3Sum, Maximum Product Subarray, Rotate Array, Merge Intervals</text>
</svg>

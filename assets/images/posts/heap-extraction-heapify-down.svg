<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" role="img" aria-labelledby="extraction-title extraction-desc">
  <title id="extraction-title">Heap Extraction Heapify Down Process</title>
  <desc id="extraction-desc">Step-by-step visualization of extracting the maximum from a max heap and heapifying down</desc>
  
  <!-- Background -->
  <rect width="1000" height="350" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Extract-Max: Heapify Down Process
  </text>
  
  <!-- Step 1: Initial heap -->
  <g transform="translate(0, 50)">
    <text x="125" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">
      Step 1: Initial
    </text>
    
    <circle cx="125" cy="40" r="22" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="125" y="46" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">95</text>
    
    <line x1="125" y1="62" x2="90" y2="92" stroke="#9ca3af" stroke-width="2"/>
    <line x1="125" y1="62" x2="160" y2="92" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="90" cy="105" r="18" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">70</text>
    
    <circle cx="160" cy="105" r="18" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">90</text>
    
    <line x1="90" y1="123" x2="70" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="90" y1="123" x2="110" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    
    <circle cx="70" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="70" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">50</text>
    
    <circle cx="110" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="110" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">60</text>
    
    <circle cx="140" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="140" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">80</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(230, 140)">
    <path d="M 0 0 L 30 0 L 26 -4 M 30 0 L 26 4" stroke="#3b82f6" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Step 2: Move last to root -->
  <g transform="translate(270, 50)">
    <text x="125" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">
      Step 2: Move Last
    </text>
    
    <circle cx="125" cy="40" r="22" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="125" y="46" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">80</text>
    
    <line x1="125" y1="62" x2="90" y2="92" stroke="#9ca3af" stroke-width="2"/>
    <line x1="125" y1="62" x2="160" y2="92" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="90" cy="105" r="18" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">70</text>
    
    <circle cx="160" cy="105" r="18" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">90</text>
    
    <line x1="90" y1="123" x2="70" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="90" y1="123" x2="110" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    
    <circle cx="70" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="70" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">50</text>
    
    <circle cx="110" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="110" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">60</text>
    
    <text x="125" y="200" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">
      80 &lt; 90, violates!
    </text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(480, 140)">
    <path d="M 0 0 L 30 0 L 26 -4 M 30 0 L 26 4" stroke="#3b82f6" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Step 3: Swap with larger child -->
  <g transform="translate(520, 50)">
    <text x="125" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">
      Step 3: Swap
    </text>
    
    <circle cx="125" cy="40" r="22" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="125" y="46" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">90</text>
    
    <line x1="125" y1="62" x2="90" y2="92" stroke="#9ca3af" stroke-width="2"/>
    <line x1="125" y1="62" x2="160" y2="92" stroke="#f59e0b" stroke-width="2"/>
    
    <circle cx="90" cy="105" r="18" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">70</text>
    
    <circle cx="160" cy="105" r="18" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="160" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">80</text>
    
    <line x1="90" y1="123" x2="70" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="90" y1="123" x2="110" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    
    <circle cx="70" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="70" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">50</text>
    
    <circle cx="110" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="110" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">60</text>
    
    <text x="125" y="200" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">
      80 is leaf, done!
    </text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(730, 140)">
    <path d="M 0 0 L 30 0 L 26 -4 M 30 0 L 26 4" stroke="#3b82f6" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Step 4: Final heap -->
  <g transform="translate(770, 50)">
    <text x="125" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">
      Step 4: Done!
    </text>
    
    <circle cx="125" cy="40" r="22" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="125" y="46" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">90</text>
    
    <line x1="125" y1="62" x2="90" y2="92" stroke="#9ca3af" stroke-width="2"/>
    <line x1="125" y1="62" x2="160" y2="92" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="90" cy="105" r="18" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">70</text>
    
    <circle cx="160" cy="105" r="18" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">80</text>
    
    <line x1="90" y1="123" x2="70" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="90" y1="123" x2="110" y2="153" stroke="#9ca3af" stroke-width="1.5"/>
    
    <circle cx="70" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="70" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">50</text>
    
    <circle cx="110" cy="165" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="110" y="169" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="middle">60</text>
    
    <text x="125" y="200" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">
      Heap restored!
    </text>
  </g>
  
  <!-- Bottom note -->
  <rect x="200" y="300" width="600" height="35" rx="6" fill="#3b82f6" opacity="0.9"/>
  <text x="500" y="322" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Time: O(log n) — At most log n swaps • Returned: 95
  </text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 850 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Hash Function: Converting Keys to Array Indices</text>
  
  <!-- Example 1: "john_doe" -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="750" height="110" rx="10" fill="url(#processGradient)" stroke="#e2e8f0" stroke-width="2"/>
    
    <text x="20" y="25" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Example 1: hash("john_doe")</text>
    
    <!-- Step 1: Character breakdown -->
    <text x="20" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="14">1. Convert to ASCII values:</text>
    <text x="20" y="70" fill="#3b82f6" font-family="monospace, Arial, sans-serif" font-size="12">j=106, o=111, h=104, n=110, _=95, d=100, o=111, e=101</text>
    
    <!-- Step 2: Sum -->
    <text x="20" y="90" fill="#475569" font-family="Arial, sans-serif" font-size="14">2. Sum: 106+111+104+110+95+100+111+101 = <tspan fill="#8b5cf6" font-weight="bold">938</tspan></text>
    
    <!-- Step 3: Modulo -->
    <text x="20" y="105" fill="#475569" font-family="Arial, sans-serif" font-size="14">3. Modulo table size: 938 % 10 = <tspan fill="#10b981" font-weight="bold">8</tspan> ← Final index</text>
  </g>
  
  <!-- Example 2: "admin" -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="750" height="90" rx="10" fill="url(#processGradient)" stroke="#e2e8f0" stroke-width="2"/>
    
    <text x="20" y="25" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Example 2: hash("admin")</text>
    
    <text x="20" y="45" fill="#475569" font-family="Arial, sans-serif" font-size="14">1. ASCII: a=97, d=100, m=109, i=105, n=110</text>
    <text x="20" y="65" fill="#475569" font-family="Arial, sans-serif" font-size="14">2. Sum: 97+100+109+105+110 = <tspan fill="#8b5cf6" font-weight="bold">521</tspan></text>
    <text x="20" y="80" fill="#475569" font-family="Arial, sans-serif" font-size="14">3. Modulo: 521 % 10 = <tspan fill="#10b981" font-weight="bold">1</tspan> ← Final index</text>
  </g>
  
  <!-- Hash Function Properties -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="750" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    
    <text x="20" y="25" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Good Hash Function Properties:</text>
    
    <g transform="translate(20, 45)">
      <!-- Property 1 -->
      <circle cx="8" cy="8" r="4" fill="#10b981"/>
      <text x="25" y="13" fill="#475569" font-family="Arial, sans-serif" font-size="14"><tspan font-weight="bold">Deterministic:</tspan> Same input always gives same output</text>
      
      <!-- Property 2 -->
      <circle cx="8" cy="28" r="4" fill="#10b981"/>
      <text x="25" y="33" fill="#475569" font-family="Arial, sans-serif" font-size="14"><tspan font-weight="bold">Fast:</tspan> Quick to compute (O(1) or O(k) where k is key length)</text>
      
      <!-- Property 3 -->
      <circle cx="8" cy="48" r="4" fill="#10b981"/>
      <text x="25" y="53" fill="#475569" font-family="Arial, sans-serif" font-size="14"><tspan font-weight="bold">Uniform Distribution:</tspan> Spreads keys evenly across buckets</text>
      
      <!-- Property 4 -->
      <circle cx="8" cy="68" r="4" fill="#10b981"/>
      <text x="25" y="73" fill="#475569" font-family="Arial, sans-serif" font-size="14"><tspan font-weight="bold">Avalanche Effect:</tspan> Small input changes → big output changes</text>
    </g>
    
    <!-- Visual representation -->
    <g transform="translate(480, 45)">
      <rect x="0" y="0" width="240" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
      <text x="120" y="20" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Distribution Example</text>
      
      <!-- Buckets with different fill levels -->
      <rect x="25" y="35" width="18" height="12" fill="#10b981"/>
      <text x="34" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">0</text>
      
      <rect x="48" y="30" width="18" height="17" fill="#10b981"/>
      <text x="57" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">1</text>
      
      <rect x="71" y="35" width="18" height="12" fill="#10b981"/>
      <text x="80" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">2</text>
      
      <rect x="94" y="32" width="18" height="15" fill="#10b981"/>
      <text x="103" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">3</text>
      
      <rect x="117" y="37" width="18" height="10" fill="#10b981"/>
      <text x="126" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">4</text>
      
      <rect x="140" y="29" width="18" height="18" fill="#10b981"/>
      <text x="149" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">5</text>
      
      <rect x="163" y="33" width="18" height="14" fill="#10b981"/>
      <text x="172" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">6</text>
      
      <rect x="186" y="36" width="18" height="11" fill="#10b981"/>
      <text x="195" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">7</text>
      
      <rect x="209" y="31" width="18" height="16" fill="#f59e0b"/>
      <text x="218" y="60" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">8</text>
      
      <text x="120" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11">Even distribution = good performance</text>
    </g>
  </g>
</svg>
<svg role="img" aria-labelledby="hero-title hero-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="hero-title">System Design Terminology Guide</title>
  <desc id="hero-desc">Comprehensive visual map of system design concepts including scalability, databases, caching, load balancing, and distributed systems</desc>
  
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="600" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">System Design Terminology</text>
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)" text-anchor="middle">Complete Guide for Beginners</text>
  
  <!-- Central Concept Cloud -->
  <g transform="translate(600, 320)">
    <!-- Core circle -->
    <circle cx="0" cy="0" r="90" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="3"/>
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">System</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Design</text>
    
    <!-- Scalability -->
    <g transform="translate(-250, -120)">
      <circle cx="0" cy="0" r="55" fill="#10b981" opacity="0.9"/>
      <text x="0" y="-8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Scalability</text>
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Vertical</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Horizontal</text>
      <line x1="55" y1="0" x2="155" y2="60" stroke="white" stroke-width="2" opacity="0.5"/>
    </g>
    
    <!-- Load Balancing -->
    <g transform="translate(0, -150)">
      <circle cx="0" cy="0" r="55" fill="#3b82f6" opacity="0.9"/>
      <text x="0" y="-8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Load</text>
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Balancing</text>
      <text x="0" y="28" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Distribution</text>
      <line x1="0" y1="55" x2="0" y2="135" stroke="white" stroke-width="2" opacity="0.5"/>
    </g>
    
    <!-- Databases -->
    <g transform="translate(250, -120)">
      <circle cx="0" cy="0" r="55" fill="#f59e0b" opacity="0.9"/>
      <text x="0" y="-8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Databases</text>
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">SQL/NoSQL</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Sharding</text>
      <line x1="-55" y1="0" x2="-155" y2="60" stroke="white" stroke-width="2" opacity="0.5"/>
    </g>
    
    <!-- Caching -->
    <g transform="translate(-250, 120)">
      <circle cx="0" cy="0" r="55" fill="#ef4444" opacity="0.9"/>
      <text x="0" y="-8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Caching</text>
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Redis</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Memcached</text>
      <line x1="55" y1="0" x2="155" y2="-60" stroke="white" stroke-width="2" opacity="0.5"/>
    </g>
    
    <!-- Message Queues -->
    <g transform="translate(0, 150)">
      <circle cx="0" cy="0" r="55" fill="#7c3aed" opacity="0.9"/>
      <text x="0" y="-8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Message</text>
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Queues</text>
      <text x="0" y="28" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Async</text>
      <line x1="0" y1="-55" x2="0" y2="-135" stroke="white" stroke-width="2" opacity="0.5"/>
    </g>
    
    <!-- CDN -->
    <g transform="translate(250, 120)">
      <circle cx="0" cy="0" r="55" fill="#06b6d4" opacity="0.9"/>
      <text x="0" y="-8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">CDN</text>
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Content</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Delivery</text>
      <line x1="-55" y1="0" x2="-155" y2="-60" stroke="white" stroke-width="2" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Bottom Concepts -->
  <g transform="translate(150, 540)">
    <circle cx="0" cy="0" r="4" fill="#10b981"/>
    <text x="12" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Scalability</text>
  </g>
  
  <g transform="translate(300, 540)">
    <circle cx="0" cy="0" r="4" fill="#3b82f6"/>
    <text x="12" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Load Balancing</text>
  </g>
  
  <g transform="translate(480, 540)">
    <circle cx="0" cy="0" r="4" fill="#f59e0b"/>
    <text x="12" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Databases</text>
  </g>
  
  <g transform="translate(620, 540)">
    <circle cx="0" cy="0" r="4" fill="#ef4444"/>
    <text x="12" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Caching</text>
  </g>
  
  <g transform="translate(740, 540)">
    <circle cx="0" cy="0" r="4" fill="#7c3aed"/>
    <text x="12" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Message Queues</text>
  </g>
  
  <g transform="translate(920, 540)">
    <circle cx="0" cy="0" r="4" fill="#06b6d4"/>
    <text x="12" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">CDN</text>
  </g>
  
  <g transform="translate(1000, 540)">
    <circle cx="0" cy="0" r="4" fill="#ec4899"/>
    <text x="12" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Security</text>
  </g>
</svg>

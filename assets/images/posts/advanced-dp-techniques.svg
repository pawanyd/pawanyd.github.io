<svg role="img" aria-labelledby="advanced-dp-title advanced-dp-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="advanced-dp-title">Advanced Dynamic Programming Techniques</title>
  <desc id="advanced-dp-desc">Diagram showing space optimization, state compression, and multi-dimensional DP techniques for advanced applications</desc>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Advanced DP Techniques
  </text>
  
  <!-- Space Optimization -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="350" height="200" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    
    <text x="175" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">
      Space Optimization
    </text>
    
    <!-- Before: 2D Array -->
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Before: O(n²) Space</text>
    
    <g transform="translate(20, 65)">
      <!-- 2D Grid -->
      <rect x="0" y="0" width="15" height="15" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="15" y="0" width="15" height="15" fill="#60a5fa" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="30" y="0" width="15" height="15" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="45" y="0" width="15" height="15" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
      
      <rect x="0" y="15" width="15" height="15" fill="#60a5fa" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="15" y="15" width="15" height="15" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="30" y="15" width="15" height="15" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="45" y="15" width="15" height="15" fill="#f1f5f9" stroke="#1d4ed8" stroke-width="1"/>
      
      <rect x="0" y="30" width="15" height="15" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="15" y="30" width="15" height="15" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="30" y="30" width="15" height="15" fill="#f1f5f9" stroke="#1d4ed8" stroke-width="1"/>
      <rect x="45" y="30" width="15" height="15" fill="white" stroke="#1d4ed8" stroke-width="1"/>
      
      <text x="80" y="25" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">Full DP table</text>
    </g>
    
    <!-- After: 1D Array -->
    <text x="20" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669">After: O(n) Space</text>
    
    <g transform="translate(20, 135)">
      <!-- 1D Array -->
      <rect x="0" y="0" width="15" height="15" fill="#10b981" stroke="#047857" stroke-width="1"/>
      <rect x="15" y="0" width="15" height="15" fill="#34d399" stroke="#047857" stroke-width="1"/>
      <rect x="30" y="0" width="15" height="15" fill="#6ee7b7" stroke="#047857" stroke-width="1"/>
      <rect x="45" y="0" width="15" height="15" fill="#a7f3d0" stroke="#047857" stroke-width="1"/>
      
      <text x="80" y="12" font-family="Arial, sans-serif" font-size="12" fill="#059669">Previous row</text>
      
      <rect x="0" y="25" width="15" height="15" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
      <rect x="15" y="25" width="15" height="15" fill="#f87171" stroke="#dc2626" stroke-width="1"/>
      <rect x="30" y="25" width="15" height="15" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
      <rect x="45" y="25" width="15" height="15" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
      
      <text x="80" y="37" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">Current row</text>
    </g>
    
    <text x="175" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">
      Only keep what you need for next computation
    </text>
  </g>
  
  <!-- State Compression -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="300" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#92400e">
      State Compression
    </text>
    
    <!-- Bitmask example -->
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Bitmask DP</text>
    
    <g transform="translate(20, 65)">
      <!-- State representation -->
      <rect x="0" y="0" width="200" height="25" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
      <text x="100" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">
        State: 1011 (visited cities 0,1,3)
      </text>
      
      <!-- Bit positions -->
      <g transform="translate(0, 35)">
        <circle cx="20" cy="10" r="8" fill="#10b981" stroke="#047857" stroke-width="2"/>
        <text x="20" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">1</text>
        <text x="20" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#047857">City 0</text>
        
        <circle cx="60" cy="10" r="8" fill="#f87171" stroke="#dc2626" stroke-width="2"/>
        <text x="60" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">0</text>
        <text x="60" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">City 1</text>
        
        <circle cx="100" cy="10" r="8" fill="#10b981" stroke="#047857" stroke-width="2"/>
        <text x="100" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">1</text>
        <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#047857">City 2</text>
        
        <circle cx="140" cy="10" r="8" fill="#10b981" stroke="#047857" stroke-width="2"/>
        <text x="140" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">1</text>
        <text x="140" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#047857">City 3</text>
      </g>
    </g>
    
    <text x="20" y="125" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Compress complex states</text>
    <text x="20" y="145" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Use bit manipulation</text>
    <text x="20" y="165" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Reduce memory usage</text>
    <text x="20" y="185" font-family="Arial, sans-serif" font-size="12" fill="#374151">• TSP, subset problems</text>
  </g>
  
  <!-- Multi-Dimensional DP -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="350" height="200" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    
    <text x="175" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#be185d">
      Multi-Dimensional DP
    </text>
    
    <!-- 3D cube representation -->
    <g transform="translate(50, 50)">
      <!-- Back face -->
      <rect x="30" y="0" width="60" height="60" fill="#f9a8d4" stroke="#db2777" stroke-width="2" opacity="0.7"/>
      
      <!-- Front face -->
      <rect x="0" y="30" width="60" height="60" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
      
      <!-- Connecting lines -->
      <path d="M 0 30 L 30 0" stroke="#be185d" stroke-width="2"/>
      <path d="M 60 30 L 90 0" stroke="#be185d" stroke-width="2"/>
      <path d="M 60 90 L 90 60" stroke="#be185d" stroke-width="2"/>
      <path d="M 0 90 L 30 60" stroke="#be185d" stroke-width="2"/>
      
      <!-- Labels -->
      <text x="30" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#be185d">dp[i][j][k]</text>
    </g>
    
    <!-- Example -->
    <text x="20" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#be185d">
      Example: Edit Distance (3 strings)
    </text>
    
    <text x="20" y="150" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Multiple constraints</text>
    <text x="20" y="170" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Complex state space</text>
    <text x="20" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Real-world applications</text>
  </g>
  
  <!-- Bottom Section: Performance Comparison -->
  <g transform="translate(100, 320)">
    <rect x="0" y="0" width="1000" height="220" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    
    <text x="500" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#334155">
      Performance Impact of Advanced Techniques
    </text>
    
    <!-- Performance bars -->
    <g transform="translate(50, 50)">
      <!-- Naive DP -->
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Naive DP</text>
      <rect x="120" y="5" width="200" height="20" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
      <text x="230" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O(n²) space</text>
      <text x="340" y="18" font-family="Arial, sans-serif" font-size="12" fill="#374151">High memory usage</text>
      
      <!-- Space Optimized -->
      <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Space Optimized</text>
      <rect x="120" y="40" width="100" height="20" fill="#10b981" stroke="#047857" stroke-width="1"/>
      <text x="170" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O(n) space</text>
      <text x="240" y="53" font-family="Arial, sans-serif" font-size="12" fill="#374151">50-90% memory reduction</text>
      
      <!-- State Compressed -->
      <text x="0" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">State Compressed</text>
      <rect x="120" y="75" width="80" height="20" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
      <text x="160" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O(2ⁿ)</text>
      <text x="220" y="88" font-family="Arial, sans-serif" font-size="12" fill="#374151">Exponential problems solvable</text>
      
      <!-- Multi-dimensional -->
      <text x="0" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Multi-dimensional</text>
      <rect x="120" y="110" width="300" height="20" fill="#8b5cf6" stroke="#7c3aed" stroke-width="1"/>
      <text x="270" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O(n×m×k×...)</text>
      <text x="440" y="123" font-family="Arial, sans-serif" font-size="12" fill="#374151">Complex constraints handled</text>
    </g>
    
    <!-- Real-world applications -->
    <g transform="translate(550, 50)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#334155">Real-World Applications</text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2563eb">PayPal Fraud Detection</text>
      <text x="0" y="60" font-family="Arial, sans-serif" font-size="12" fill="#374151">Space-optimized DP for real-time analysis</text>
      
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Riot Games Matchmaking</text>
      <text x="0" y="100" font-family="Arial, sans-serif" font-size="12" fill="#374151">State compression for player skill states</text>
      
      <text x="0" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Tesla Battery Optimization</text>
      <text x="0" y="140" font-family="Arial, sans-serif" font-size="12" fill="#374151">Multi-dimensional DP for complex constraints</text>
    </g>
  </g>
</svg>
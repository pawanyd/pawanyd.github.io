<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <!-- Background -->
  <rect width="1000" height="700" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Distributed Key-Value Store Architecture
  </text>
  
  <!-- Clients -->
  <g id="clients">
    <rect x="50" y="100" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Client 1</text>
    
    <rect x="50" y="200" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="100" y="235" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Client 2</text>
    
    <rect x="50" y="300" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="100" y="335" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Client 3</text>
  </g>
  
  <!-- Load Balancer / Any Node Entry -->
  <rect x="250" y="180" width="120" height="80" rx="8" fill="#8b5cf6"/>
  <text x="310" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Any Node</text>
  <text x="310" y="235" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">(Coordinator)</text>
  
  <!-- Arrows from clients to coordinator -->
  <path d="M 150 130 L 250 210" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 150 230 L 250 220" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 150 330 L 250 240" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Storage Nodes (Ring) -->
  <g id="storage-ring">
    <text x="650" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Storage Nodes (Hash Ring)
    </text>
    
    <!-- Ring -->
    <circle cx="650" cy="320" r="150" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="10,5"/>
    
    <!-- Node 1 -->
    <g id="node1">
      <rect x="600" y="140" width="100" height="70" rx="8" fill="#10b981"/>
      <text x="650" y="165" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Node 1</text>
      <text x="650" y="185" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Keys: 0-250</text>
      <text x="650" y="200" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Replicas: ...</text>
    </g>
    
    <!-- Node 2 -->
    <g id="node2">
      <rect x="800" y="270" width="100" height="70" rx="8" fill="#10b981"/>
      <text x="850" y="295" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Node 2</text>
      <text x="850" y="315" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Keys: 251-500</text>
      <text x="850" y="330" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Replicas: ...</text>
    </g>
    
    <!-- Node 3 -->
    <g id="node3">
      <rect x="600" y="450" width="100" height="70" rx="8" fill="#10b981"/>
      <text x="650" y="475" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Node 3</text>
      <text x="650" y="495" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Keys: 501-750</text>
      <text x="650" y="510" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Replicas: ...</text>
    </g>
    
    <!-- Node 4 -->
    <g id="node4">
      <rect x="400" y="270" width="100" height="70" rx="8" fill="#10b981"/>
      <text x="450" y="295" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Node 4</text>
      <text x="450" y="315" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Keys: 751-1000</text>
      <text x="450" y="330" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Replicas: ...</text>
    </g>
  </g>
  
  <!-- Arrows from coordinator to nodes -->
  <path d="M 370 220 L 600 175" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 370 220 L 800 305" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 370 240 L 600 485" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Gossip Protocol -->
  <path d="M 650 210 L 800 305" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 850 340 L 700 450" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 600 485 L 500 305" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 450 270 L 600 175" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
  
  <text x="650" y="330" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">
    Gossip
  </text>
  
  <!-- Features boxes -->
  <g id="features">
    <rect x="50" y="450" width="280" height="200" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="190" y="480" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Key Features
    </text>
    
    <text x="70" y="510" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="start">
      ✓ Consistent Hashing
    </text>
    <text x="70" y="535" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="start">
      ✓ Replication (N=3)
    </text>
    <text x="70" y="560" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="start">
      ✓ Quorum Consensus (W, R)
    </text>
    <text x="70" y="585" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="start">
      ✓ Gossip Protocol
    </text>
    <text x="70" y="610" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="start">
      ✓ Vector Clocks
    </text>
    <text x="70" y="635" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="start">
      ✓ Merkle Trees
    </text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937" />
    </marker>
  </defs>
  
  <!-- Labels -->
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Clients
  </text>
  
  <text x="190" y="430" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">
    Decentralized • No Single Point of Failure • Auto-Scaling
  </text>
</svg>

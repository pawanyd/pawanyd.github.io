<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="oop-hero-title oop-hero-desc">
  <title id="oop-hero-title">Object-Oriented Programming Hero Image</title>
  <desc id="oop-hero-desc">Visual representation of OOP concepts showing the four pillars: Encapsulation, Inheritance, Polymorphism, and Abstraction with interconnected class structures</desc>
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="classGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="classGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="classGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="classGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="rgba(255,255,255,0.6)" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="500" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="200" cy="500" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1000" cy="100" r="50" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-size="48" font-weight="bold" fill="white">
    Object-Oriented Programming
  </text>
  <text x="600" y="120" text-anchor="middle" font-size="20" fill="rgba(255,255,255,0.9)">
    Master the Four Pillars of OOP
  </text>
  
  <!-- Central Parent Class -->
  <g transform="translate(450, 180)">
    <rect x="0" y="0" width="300" height="100" rx="8" fill="rgba(255,255,255,0.95)" stroke="white" stroke-width="2"/>
    <text x="150" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#667eea">
      Parent Class
    </text>
    <line x1="20" y1="45" x2="280" y2="45" stroke="#667eea" stroke-width="1"/>
    <text x="30" y="65" font-size="14" fill="#4c51bf">+ properties</text>
    <text x="30" y="85" font-size="14" fill="#4c51bf">+ methods()</text>
  </g>
  
  <!-- Connection lines to child classes -->
  <path d="M 600 280 L 600 320" stroke="rgba(255,255,255,0.6)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M 600 320 L 300 380" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 600 320 L 600 380" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 600 320 L 900 380" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Child Class 1: Encapsulation -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="220" height="140" rx="8" fill="url(#classGradient1)" stroke="white" stroke-width="2"/>
    <circle cx="30" cy="30" r="15" fill="rgba(255,255,255,0.3)"/>
    <path d="M 25 30 L 30 35 L 38 25" stroke="white" stroke-width="2" fill="none"/>
    <text x="110" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      Encapsulation
    </text>
    <line x1="15" y1="50" x2="205" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="20" y="75" font-size="13" fill="rgba(255,255,255,0.9)">🔒 Private Data</text>
    <text x="20" y="95" font-size="13" fill="rgba(255,255,255,0.9)">🔓 Public Methods</text>
    <text x="20" y="115" font-size="13" fill="rgba(255,255,255,0.9)">✓ Data Protection</text>
  </g>
  
  <!-- Child Class 2: Inheritance -->
  <g transform="translate(320, 380)">
    <rect x="0" y="0" width="220" height="140" rx="8" fill="url(#classGradient2)" stroke="white" stroke-width="2"/>
    <path d="M 30 20 L 30 45" stroke="white" stroke-width="2"/>
    <path d="M 20 35 L 30 45 L 40 35" stroke="white" stroke-width="2" fill="none"/>
    <text x="110" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      Inheritance
    </text>
    <line x1="15" y1="50" x2="205" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="20" y="75" font-size="13" fill="rgba(255,255,255,0.9)">🧬 Code Reuse</text>
    <text x="20" y="95" font-size="13" fill="rgba(255,255,255,0.9)">📦 Extend Features</text>
    <text x="20" y="115" font-size="13" fill="rgba(255,255,255,0.9)">✓ Hierarchy</text>
  </g>
  
  <!-- Child Class 3: Polymorphism -->
  <g transform="translate(590, 380)">
    <rect x="0" y="0" width="220" height="140" rx="8" fill="url(#classGradient3)" stroke="white" stroke-width="2"/>
    <circle cx="25" cy="28" r="8" fill="rgba(255,255,255,0.8)"/>
    <rect x="38" y="20" width="16" height="16" fill="rgba(255,255,255,0.8)"/>
    <polygon points="68,20 76,36 60,36" fill="rgba(255,255,255,0.8)"/>
    <text x="110" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      Polymorphism
    </text>
    <line x1="15" y1="50" x2="205" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="20" y="75" font-size="13" fill="rgba(255,255,255,0.9)">🎭 Many Forms</text>
    <text x="20" y="95" font-size="13" fill="rgba(255,255,255,0.9)">🔄 Same Interface</text>
    <text x="20" y="115" font-size="13" fill="rgba(255,255,255,0.9)">✓ Flexibility</text>
  </g>
  
  <!-- Child Class 4: Abstraction -->
  <g transform="translate(860, 380)">
    <rect x="0" y="0" width="220" height="140" rx="8" fill="url(#classGradient4)" stroke="white" stroke-width="2"/>
    <circle cx="30" cy="28" r="18" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
    <circle cx="30" cy="28" r="10" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
    <circle cx="30" cy="28" r="3" fill="rgba(255,255,255,0.8)"/>
    <text x="110" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      Abstraction
    </text>
    <line x1="15" y1="50" x2="205" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="20" y="75" font-size="13" fill="rgba(255,255,255,0.9)">🎨 Hide Details</text>
    <text x="20" y="95" font-size="13" fill="rgba(255,255,255,0.9)">📋 Simple Interface</text>
    <text x="20" y="115" font-size="13" fill="rgba(255,255,255,0.9)">✓ Simplicity</text>
  </g>
  
  <!-- Bottom tagline -->
  <text x="600" y="560" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.8)" font-style="italic">
    Build Scalable, Maintainable Software with OOP Principles
  </text>
</svg>

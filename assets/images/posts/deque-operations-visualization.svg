<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="deque-title deque-desc">
  <title id="deque-title">Deque Operations Visualization</title>
  <desc id="deque-desc">Animated diagram showing all four operations (addFront, addRear, removeFront, removeRear) on a double-ended queue</desc>
  
  <!-- Background -->
  <rect width="1000" height="650" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Deque (Double-Ended Queue): All Operations
  </text>
  
  <!-- Initial State -->
  <g transform="translate(250, 80)">
    <text x="250" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
      Initial State
    </text>
    
    <g transform="translate(0, 30)">
      <rect x="100" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="140" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">B</text>
      
      <rect x="190" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="230" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">C</text>
      
      <rect x="280" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="320" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">D</text>
      
      <rect x="370" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="410" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">E</text>
      
      <!-- Front and Rear labels -->
      <text x="140" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="13" font-weight="bold">FRONT</text>
      <text x="410" y="-15" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">REAR</text>
    </g>
  </g>
  
  <!-- Operation 1: addFront(A) -->
  <g transform="translate(50, 200)">
    <text x="200" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      1. addFront(A)
    </text>
    
    <g transform="translate(0, 30)">
      <!-- New element -->
      <rect x="0" y="0" width="80" height="60" fill="#10b981" rx="5" stroke="#059669" stroke-width="3"/>
      <text x="40" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">A</text>
      
      <rect x="90" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="130" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">B</text>
      
      <rect x="180" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="220" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">C</text>
      
      <rect x="270" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="310" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">D</text>
      
      <rect x="360" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="400" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">E</text>
      
      <!-- Arrow showing addition -->
      <path d="M -20 30 L -5 30" stroke="#10b981" stroke-width="3" marker-end="url(#arrowgreen)"/>
      <text x="-80" y="25" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Add to</text>
      <text x="-80" y="40" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">FRONT</text>
      
      <text x="40" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="13" font-weight="bold">FRONT</text>
      <text x="400" y="-15" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">REAR</text>
    </g>
  </g>
  
  <!-- Operation 2: addRear(F) -->
  <g transform="translate(550, 200)">
    <text x="200" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      2. addRear(F)
    </text>
    
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">A</text>
      
      <rect x="90" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="130" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">B</text>
      
      <rect x="180" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="220" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">C</text>
      
      <rect x="270" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="310" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">D</text>
      
      <rect x="360" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="400" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">E</text>
      
      <!-- New element -->
      <rect x="450" y="0" width="80" height="60" fill="#10b981" rx="5" stroke="#059669" stroke-width="3"/>
      <text x="490" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">F</text>
      
      <!-- Arrow showing addition -->
      <path d="M 535 30 L 550 30" stroke="#10b981" stroke-width="3" marker-end="url(#arrowgreen)"/>
      <text x="560" y="25" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Add to</text>
      <text x="560" y="40" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">REAR</text>
      
      <text x="40" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="13" font-weight="bold">FRONT</text>
      <text x="490" y="-15" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">REAR</text>
    </g>
  </g>
  
  <!-- Operation 3: removeFront() -->
  <g transform="translate(50, 360)">
    <text x="200" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      3. removeFront() → returns A
    </text>
    
    <g transform="translate(0, 30)">
      <!-- Removed element -->
      <rect x="0" y="0" width="80" height="60" fill="#fecaca" rx="5" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
      <text x="40" y="35" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="18" opacity="0.5">A</text>
      
      <rect x="90" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="130" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">B</text>
      
      <rect x="180" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="220" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">C</text>
      
      <rect x="270" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="310" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">D</text>
      
      <rect x="360" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="400" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">E</text>
      
      <rect x="450" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="490" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">F</text>
      
      <!-- Arrow showing removal -->
      <path d="M -5 30 L -20 30" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowred)"/>
      <text x="-90" y="25" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Remove</text>
      <text x="-90" y="40" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">from FRONT</text>
      
      <text x="130" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="13" font-weight="bold">FRONT</text>
      <text x="490" y="-15" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">REAR</text>
    </g>
  </g>
  
  <!-- Operation 4: removeRear() -->
  <g transform="translate(550, 360)">
    <text x="200" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      4. removeRear() → returns F
    </text>
    
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">B</text>
      
      <rect x="90" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="130" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">C</text>
      
      <rect x="180" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="220" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">D</text>
      
      <rect x="270" y="0" width="80" height="60" fill="#8b5cf6" rx="5" stroke="#6b21a8" stroke-width="2"/>
      <text x="310" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">E</text>
      
      <!-- Removed element -->
      <rect x="360" y="0" width="80" height="60" fill="#fecaca" rx="5" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
      <text x="400" y="35" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="18" opacity="0.5">F</text>
      
      <!-- Arrow showing removal -->
      <path d="M 445 30 L 460 30" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowred)"/>
      <text x="470" y="25" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Remove</text>
      <text x="470" y="40" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">from REAR</text>
      
      <text x="40" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="13" font-weight="bold">FRONT</text>
      <text x="310" y="-15" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">REAR</text>
    </g>
  </g>
  
  <!-- Summary box -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="800" height="130" fill="#f3e8ff" rx="10" stroke="#8b5cf6" stroke-width="3"/>
    
    <text x="400" y="30" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
      Deque: The Most Flexible Linear Data Structure
    </text>
    
    <g transform="translate(30, 50)">
      <text x="0" y="0" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        All Operations in O(1) Time:
      </text>
      
      <text x="20" y="22" fill="#6b7280" font-family="Arial, sans-serif" font-size="13">
        • <tspan fill="#10b981" font-weight="bold">addFront(x)</tspan> - Insert element at the front
      </text>
      
      <text x="20" y="40" fill="#6b7280" font-family="Arial, sans-serif" font-size="13">
        • <tspan fill="#10b981" font-weight="bold">addRear(x)</tspan> - Insert element at the rear
      </text>
      
      <text x="400" y="22" fill="#6b7280" font-family="Arial, sans-serif" font-size="13">
        • <tspan fill="#ef4444" font-weight="bold">removeFront()</tspan> - Remove and return front element
      </text>
      
      <text x="400" y="40" fill="#6b7280" font-family="Arial, sans-serif" font-size="13">
        • <tspan fill="#ef4444" font-weight="bold">removeRear()</tspan> - Remove and return rear element
      </text>
      
      <text x="0" y="70" fill="#5b21b6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
        Can act as both Stack AND Queue!
      </text>
      <text x="20" y="88" fill="#6b7280" font-family="Arial, sans-serif" font-size="12">
        Stack behavior: Use addFront() and removeFront() | Queue behavior: Use addRear() and removeFront()
      </text>
    </g>
  </g>
  
  <!-- Use cases -->
  <g transform="translate(100, 640)">
    <text x="0" y="0" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      Perfect for: Sliding window problems, palindrome checking, browser history (back/forward), undo/redo with navigation
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
<svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">Virtual Nodes: Better Load Distribution</text>
  
  <!-- Without virtual nodes -->
  <g transform="translate(200, 150)">
    <text x="0" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">Without Virtual Nodes</text>
    <text x="0" y="20" font-size="13" text-anchor="middle" fill="#ef4444">Uneven Distribution</text>
    
    <!-- Ring -->
    <circle cx="0" cy="150" r="100" fill="none" stroke="#3b82f6" stroke-width="4"/>
    
    <!-- Servers clustered together -->
    <circle cx="20" cy="50" r="16" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="20" y="55" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">A</text>
    
    <circle cx="50" cy="60" r="16" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="50" y="65" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">B</text>
    
    <circle cx="70" cy="80" r="16" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="70" y="85" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">C</text>
    
    <!-- Many keys on one side -->
    <g fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5">
      <circle cx="-70" cy="80" r="6"/>
      <circle cx="-80" cy="110" r="6"/>
      <circle cx="-85" cy="140" r="6"/>
      <circle cx="-80" cy="170" r="6"/>
      <circle cx="-60" cy="190" r="6"/>
      <circle cx="-30" cy="200" r="6"/>
      <circle cx="10" cy="205" r="6"/>
      <circle cx="50" cy="200" r="6"/>
      <circle cx="80" cy="180" r="6"/>
      <circle cx="95" cy="150" r="6"/>
    </g>
    
    <!-- Load distribution -->
    <g transform="translate(-80, 280)">
      <rect x="0" y="0" width="160" height="60" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="4"/>
      <text x="80" y="20" font-size="12" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Load Distribution</text>
      <text x="80" y="38" font-size="11" text-anchor="middle" fill="#991b1b">A: 10%</text>
      <text x="80" y="52" font-size="11" text-anchor="middle" fill="#991b1b">B: 15% C: 75%</text>
    </g>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(400, 300)">
    <path d="M 0 0 L 100 0" stroke="#10b981" stroke-width="4" marker-end="url(#arrowGreen)"/>
    <text x="50" y="-10" font-size="13" font-weight="bold" text-anchor="middle" fill="#10b981">Add Virtual</text>
    <text x="50" y="5" font-size="13" font-weight="bold" text-anchor="middle" fill="#10b981">Nodes</text>
  </g>
  
  <!-- With virtual nodes -->
  <g transform="translate(750, 150)">
    <text x="0" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">With Virtual Nodes</text>
    <text x="0" y="20" font-size="13" text-anchor="middle" fill="#10b981">Even Distribution</text>
    
    <!-- Ring -->
    <circle cx="0" cy="150" r="100" fill="none" stroke="#3b82f6" stroke-width="4"/>
    
    <!-- Virtual nodes spread around -->
    <!-- Server A virtual nodes -->
    <circle cx="0" cy="50" r="14" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="0" y="54" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">A1</text>
    
    <circle cx="-70" cy="80" r="14" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="-70" y="84" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">A2</text>
    
    <circle cx="50" cy="200" r="14" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="50" y="204" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">A3</text>
    
    <!-- Server B virtual nodes -->
    <circle cx="87" cy="120" r="14" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <text x="87" y="124" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">B1</text>
    
    <circle cx="-87" cy="180" r="14" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <text x="-87" y="184" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">B2</text>
    
    <circle cx="30" cy="70" r="14" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <text x="30" y="74" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">B3</text>
    
    <!-- Server C virtual nodes -->
    <circle cx="87" cy="180" r="14" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="87" y="184" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">C1</text>
    
    <circle cx="-30" cy="70" r="14" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="-30" y="74" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">C2</text>
    
    <circle cx="-30" cy="220" r="14" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="-30" y="224" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">C3</text>
    
    <!-- Keys evenly distributed -->
    <g fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5">
      <circle cx="15" cy="60" r="5"/>
      <circle cx="60" cy="90" r="5"/>
      <circle cx="90" cy="150" r="5"/>
      <circle cx="70" cy="190" r="5"/>
      <circle cx="10" cy="210" r="5"/>
      <circle cx="-50" cy="210" r="5"/>
      <circle cx="-90" cy="150" r="5"/>
      <circle cx="-80" cy="100" r="5"/>
      <circle cx="-50" cy="65" r="5"/>
      <circle cx="0" cy="250" r="5"/>
    </g>
    
    <!-- Load distribution -->
    <g transform="translate(-80, 280)">
      <rect x="0" y="0" width="160" height="60" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="4"/>
      <text x="80" y="20" font-size="12" font-weight="bold" text-anchor="middle" fill="#065f46">Load Distribution</text>
      <text x="80" y="38" font-size="11" text-anchor="middle" fill="#059669">A: 33%</text>
      <text x="80" y="52" font-size="11" text-anchor="middle" fill="#059669">B: 34% C: 33%</text>
    </g>
  </g>
  
  <!-- Explanation -->
  <g transform="translate(100, 520)">
    <rect x="0" y="0" width="800" height="100" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" rx="8"/>
    <text x="400" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">How Virtual Nodes Work</text>
    
    <g transform="translate(30, 50)">
      <text x="0" y="0" font-size="13" fill="#1f2937">Each physical server is placed multiple times on the ring with different hash values:</text>
      <text x="0" y="22" font-size="12" fill="#4b5563">• Server A → hash("A-1"), hash("A-2"), hash("A-3") creates A1, A2, A3 positions</text>
      <text x="0" y="40" font-size="12" fill="#4b5563">• More virtual nodes = better distribution (typical: 100-200 vnodes per server)</text>
    </g>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>
</svg>

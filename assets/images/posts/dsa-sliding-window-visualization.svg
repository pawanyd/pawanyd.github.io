<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sliding-title sliding-desc">
  <title id="sliding-title">Sliding Window Pattern Visualization</title>
  <desc id="sliding-desc">Step-by-step visualization of the sliding window technique for finding maximum sum subarray of size K</desc>
  
  <!-- Background -->
  <rect width="1000" height="650" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Sliding Window Pattern: Maximum Sum Subarray of Size K
  </text>
  
  <!-- Problem statement -->
  <g transform="translate(100, 70)">
    <rect x="0" y="0" width="800" height="60" fill="#eff6ff" rx="8" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Problem: Given array [2, 1, 5, 1, 3, 2], find maximum sum of any subarray of size K=3
    </text>
    <text x="400" y="45" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="12">
      Naive approach: O(n*k) recalculating each window | Sliding Window: O(n) by reusing calculations
    </text>
  </g>
  
  <!-- Step 1: Initial Window -->
  <g transform="translate(150, 160)">
    <text x="250" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Step 1: Calculate first window sum
    </text>
    
    <g transform="translate(0, 25)">
      <!-- Window highlight -->
      <rect x="-5" y="-5" width="230" height="70" fill="#dbeafe" rx="8" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5"/>
      
      <rect x="0" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="35" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">2</text>
      
      <rect x="80" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="115" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">1</text>
      
      <rect x="160" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="195" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">5</text>
      
      <rect x="240" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="275" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">1</text>
      
      <rect x="320" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="355" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">3</text>
      
      <rect x="400" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="435" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">2</text>
      
      <text x="110" y="-15" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
        Window (K=3)
      </text>
    </g>
    
    <text x="250" y="110" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Sum = 2 + 1 + 5 = 8 | Max = 8
    </text>
  </g>
  
  <!-- Step 2: Slide Window Right -->
  <g transform="translate(150, 290)">
    <text x="250" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Step 2: Slide window right (remove 2, add 1)
    </text>
    
    <g transform="translate(0, 25)">
      <!-- Old element removed -->
      <rect x="0" y="0" width="70" height="60" fill="#fecaca" rx="5" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
      <text x="35" y="38" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="20" opacity="0.5">2</text>
      <text x="35" y="-10" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Remove</text>
      
      <!-- Window highlight -->
      <rect x="75" y="-5" width="230" height="70" fill="#dbeafe" rx="8" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5"/>
      
      <rect x="80" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="115" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">1</text>
      
      <rect x="160" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="195" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">5</text>
      
      <rect x="240" y="0" width="70" height="60" fill="#10b981" rx="5" stroke="#059669" stroke-width="3"/>
      <text x="275" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">1</text>
      <text x="275" y="-10" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Add</text>
      
      <rect x="320" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="355" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">3</text>
      
      <rect x="400" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="435" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">2</text>
    </g>
    
    <text x="250" y="110" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Sum = 8 - 2 + 1 = 7 | Max = 8 (unchanged)
    </text>
  </g>
  
  <!-- Step 3: Continue Sliding -->
  <g transform="translate(150, 420)">
    <text x="250" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Step 3: Slide again (remove 1, add 3)
    </text>
    
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2" opacity="0.3"/>
      <text x="35" y="38" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="20">2</text>
      
      <rect x="80" y="0" width="70" height="60" fill="#fecaca" rx="5" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
      <text x="115" y="38" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="20" opacity="0.5">1</text>
      
      <!-- Window highlight -->
      <rect x="155" y="-5" width="230" height="70" fill="#dbeafe" rx="8" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5"/>
      
      <rect x="160" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="195" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">5</text>
      
      <rect x="240" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="275" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">1</text>
      
      <rect x="320" y="0" width="70" height="60" fill="#10b981" rx="5" stroke="#059669" stroke-width="3"/>
      <text x="355" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">3</text>
      
      <rect x="400" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="435" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">2</text>
    </g>
    
    <text x="250" y="110" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Sum = 7 - 1 + 3 = 9 | Max = 9 (NEW MAXIMUM!) ✓
    </text>
  </g>
  
  <!-- Algorithm box -->
  <g transform="translate(100, 560)">
    <rect x="0" y="0" width="800" height="80" fill="#fef3c7" rx="10" stroke="#f59e0b" stroke-width="2"/>
    
    <text x="400" y="25" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Sliding Window Algorithm
    </text>
    
    <text x="30" y="48" fill="#374151" font-family="Arial, sans-serif" font-size="13">
      1. Calculate sum of first K elements (initial window)
    </text>
    
    <text x="30" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
      2. Slide window: Remove leftmost element, add new rightmost element
    </text>
    
    <text x="450" y="48" fill="#374151" font-family="Arial, sans-serif" font-size="13">
      3. Update max if current sum is larger
    </text>
    
    <text x="450" y="68" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
      Time: O(n) | Space: O(1) | Key: Reuse previous calculation
    </text>
  </g>
</svg>
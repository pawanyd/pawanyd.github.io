<svg role="img" aria-labelledby="backtracking-patterns-title backtracking-patterns-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="backtracking-patterns-title">Backtracking Problem Patterns</title>
  <desc id="backtracking-patterns-desc">Visual guide showing common backtracking problem patterns: N-Queens, Sudoku, and Subset Sum with their characteristics</desc>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Classic Backtracking Problem Patterns
  </text>
  
  <!-- N-Queens Pattern -->
  <g transform="translate(50, 80)">
    <!-- Pattern Box -->
    <rect x="0" y="0" width="320" height="220" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    
    <!-- Title -->
    <text x="160" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">
      N-Queens Pattern
    </text>
    
    <!-- Chess board visualization -->
    <g transform="translate(60, 50)">
      <!-- 4x4 board -->
      <rect x="0" y="0" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      <rect x="20" y="0" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      <rect x="40" y="0" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      <rect x="60" y="0" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      
      <rect x="0" y="20" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      <rect x="20" y="20" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      <rect x="40" y="20" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      <rect x="60" y="20" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      
      <rect x="0" y="40" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      <rect x="20" y="40" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      <rect x="40" y="40" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      <rect x="60" y="40" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      
      <rect x="0" y="60" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      <rect x="20" y="60" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      <rect x="40" y="60" width="20" height="20" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
      <rect x="60" y="60" width="20" height="20" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
      
      <!-- Queens -->
      <text x="10" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">♛</text>
      <text x="50" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">♛</text>
      <text x="70" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">♛</text>
      <text x="30" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7c3aed">♛</text>
      
      <!-- Attack lines (faded) -->
      <path d="M 10 10 L 70 70" stroke="#ef4444" stroke-width="1" opacity="0.3" stroke-dasharray="2,2"/>
      <path d="M 50 30 L 10 70" stroke="#ef4444" stroke-width="1" opacity="0.3" stroke-dasharray="2,2"/>
    </g>
    
    <!-- Solution indicator -->
    <text x="240" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">✓ Valid Solution</text>
    <text x="240" y="95" font-family="Arial, sans-serif" font-size="10" fill="#047857">No queens attack</text>
    <text x="240" y="107" font-family="Arial, sans-serif" font-size="10" fill="#047857">each other</text>
    
    <!-- Problem description -->
    <text x="160" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">
      Constraint Satisfaction
    </text>
    
    <!-- Characteristics -->
    <text x="20" y="165" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Place items with constraints</text>
    <text x="20" y="180" font-family="Arial, sans-serif" font-size="12" fill="#374151">• No conflicts allowed</text>
    <text x="20" y="195" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Systematic placement</text>
  </g>
  
  <!-- Sudoku Pattern -->
  <g transform="translate(440, 80)">
    <!-- Pattern Box -->
    <rect x="0" y="0" width="320" height="220" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    
    <!-- Title -->
    <text x="160" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#15803d">
      Sudoku Pattern
    </text>
    
    <!-- Mini Sudoku grid -->
    <g transform="translate(80, 50)">
      <!-- 4x4 grid -->
      <rect x="0" y="0" width="80" height="80" fill="white" stroke="#16a34a" stroke-width="2"/>
      
      <!-- Grid lines -->
      <path d="M 20 0 L 20 80" stroke="#94a3b8" stroke-width="1"/>
      <path d="M 40 0 L 40 80" stroke="#16a34a" stroke-width="2"/>
      <path d="M 60 0 L 60 80" stroke="#94a3b8" stroke-width="1"/>
      
      <path d="M 0 20 L 80 20" stroke="#94a3b8" stroke-width="1"/>
      <path d="M 0 40 L 80 40" stroke="#16a34a" stroke-width="2"/>
      <path d="M 0 60 L 80 60" stroke="#94a3b8" stroke-width="1"/>
      
      <!-- Numbers -->
      <text x="10" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">1</text>
      <text x="30" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">2</text>
      <text x="50" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">3</text>
      <text x="70" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">4</text>
      
      <text x="10" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">3</text>
      <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">4</text>
      <text x="50" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">1</text>
      <text x="70" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">2</text>
      
      <text x="10" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">2</text>
      <text x="30" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">1</text>
      <text x="50" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">4</text>
      <text x="70" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">3</text>
      
      <text x="10" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">4</text>
      <text x="30" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">3</text>
      <text x="50" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">2</text>
      <text x="70" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">1</text>
    </g>
    
    <!-- Constraint indicators -->
    <text x="200" y="80" font-family="Arial, sans-serif" font-size="10" fill="#047857">Row: 1,2,3,4</text>
    <text x="200" y="95" font-family="Arial, sans-serif" font-size="10" fill="#047857">Col: 1,2,3,4</text>
    <text x="200" y="110" font-family="Arial, sans-serif" font-size="10" fill="#047857">Box: 1,2,3,4</text>
    
    <!-- Problem description -->
    <text x="160" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">
      Multi-Constraint Puzzle
    </text>
    
    <!-- Characteristics -->
    <text x="20" y="165" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Multiple constraint types</text>
    <text x="20" y="180" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Logical deduction</text>
    <text x="20" y="195" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Fill empty cells</text>
  </g>
  
  <!-- Subset Sum Pattern -->
  <g transform="translate(830, 80)">
    <!-- Pattern Box -->
    <rect x="0" y="0" width="320" height="220" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    
    <!-- Title -->
    <text x="160" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#92400e">
      Subset Sum Pattern
    </text>
    
    <!-- Visual representation -->
    <g transform="translate(40, 50)">
      <!-- Available numbers -->
      <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">
        Numbers: [3, 5, 2, 8, 1]
      </text>
      
      <!-- Target -->
      <text x="120" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">
        Target: 10
      </text>
      
      <!-- Selected subset -->
      <g transform="translate(20, 60)">
        <circle cx="20" cy="15" r="12" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
        <text x="20" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">3</text>
        
        <circle cx="60" cy="15" r="12" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
        <text x="60" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">5</text>
        
        <circle cx="100" cy="15" r="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
        <text x="100" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">2</text>
        
        <circle cx="140" cy="15" r="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
        <text x="140" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">8</text>
        
        <circle cx="180" cy="15" r="12" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
        <text x="180" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">1</text>
        
        <!-- Sum calculation -->
        <text x="100" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">
          3 + 5 + 2 = 10 ✓
        </text>
      </g>
    </g>
    
    <!-- Problem description -->
    <text x="160" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">
      Combinatorial Selection
    </text>
    
    <!-- Characteristics -->
    <text x="20" y="165" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Include/exclude decisions</text>
    <text x="20" y="180" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Target-based goals</text>
    <text x="20" y="195" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Optimization problems</text>
  </g>
  
  <!-- Bottom Section: Pattern Recognition -->
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="1000" height="200" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    
    <text x="500" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#334155">
      How to Recognize Backtracking Patterns
    </text>
    
    <!-- Pattern indicators -->
    <g transform="translate(50, 55)">
      <rect x="0" y="0" width="280" height="115" rx="8" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"/>
      <text x="140" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0e7490">
        Constraint Keywords
      </text>
      <text x="20" y="45" font-family="Arial, sans-serif" font-size="13" fill="#155e75">• "Place N items"</text>
      <text x="20" y="65" font-family="Arial, sans-serif" font-size="13" fill="#155e75">• "No conflicts"</text>
      <text x="20" y="85" font-family="Arial, sans-serif" font-size="13" fill="#155e75">• "Satisfy rules"</text>
      <text x="20" y="105" font-family="Arial, sans-serif" font-size="13" fill="#155e75">• "Valid arrangement"</text>
    </g>
    
    <g transform="translate(360, 55)">
      <rect x="0" y="0" width="280" height="115" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="140" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#92400e">
        Generation Keywords
      </text>
      <text x="20" y="45" font-family="Arial, sans-serif" font-size="13" fill="#92400e">• "Find all solutions"</text>
      <text x="20" y="65" font-family="Arial, sans-serif" font-size="13" fill="#92400e">• "Generate combinations"</text>
      <text x="20" y="85" font-family="Arial, sans-serif" font-size="13" fill="#92400e">• "All permutations"</text>
      <text x="20" y="105" font-family="Arial, sans-serif" font-size="13" fill="#92400e">• "Enumerate possibilities"</text>
    </g>
    
    <g transform="translate(670, 55)">
      <rect x="0" y="0" width="280" height="115" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
      <text x="140" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#be185d">
        Structure Clues
      </text>
      <text x="20" y="45" font-family="Arial, sans-serif" font-size="13" fill="#be185d">• Incremental building</text>
      <text x="20" y="65" font-family="Arial, sans-serif" font-size="13" fill="#be185d">• Undo/retry needed</text>
      <text x="20" y="85" font-family="Arial, sans-serif" font-size="13" fill="#be185d">• Multiple choices</text>
      <text x="20" y="105" font-family="Arial, sans-serif" font-size="13" fill="#be185d">• Early termination</text>
    </g>
  </g>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="url(#headerGrad)"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    Data Structure Performance Comparison
  </text>
  
  <!-- Comparison Table -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="1100" height="450" rx="8" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Table Headers -->
    <rect x="0" y="0" width="1100" height="50" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="140" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Operation</text>
    <text x="320" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Array</text>
    <text x="500" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Hash Table</text>
    <text x="680" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">BST (Balanced)</text>
    <text x="860" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Heap</text>
    <text x="1000" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Best Choice</text>
    
    <!-- Search Row -->
    <rect x="0" y="50" width="1100" height="60" fill="#fefefe" stroke="#e5e7eb" stroke-width="1"/>
    <text x="140" y="85" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Search</text>
    <text x="320" y="75" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="320" y="95" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Linear scan</text>
    <text x="500" y="75" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="13" font-weight="bold">O(1)</text>
    <text x="500" y="95" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Hash lookup</text>
    <text x="680" y="75" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">O(log n)</text>
    <text x="680" y="95" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Tree traversal</text>
    <text x="860" y="75" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="860" y="95" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Not optimized</text>
    <text x="1000" y="80" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Hash Table</text>
    
    <!-- Insert Row -->
    <rect x="0" y="110" width="1100" height="60" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="140" y="145" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Insert</text>
    <text x="320" y="135" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="320" y="155" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Shift elements</text>
    <text x="500" y="135" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="13" font-weight="bold">O(1)</text>
    <text x="500" y="155" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Direct insert</text>
    <text x="680" y="135" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">O(log n)</text>
    <text x="680" y="155" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Find position</text>
    <text x="860" y="135" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">O(log n)</text>
    <text x="860" y="155" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Bubble up</text>
    <text x="1000" y="140" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Hash Table</text>
    
    <!-- Delete Row -->
    <rect x="0" y="170" width="1100" height="60" fill="#fefefe" stroke="#e5e7eb" stroke-width="1"/>
    <text x="140" y="205" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Delete</text>
    <text x="320" y="195" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="320" y="215" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Shift elements</text>
    <text x="500" y="195" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="13" font-weight="bold">O(1)</text>
    <text x="500" y="215" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Direct delete</text>
    <text x="680" y="195" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">O(log n)</text>
    <text x="680" y="215" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Restructure</text>
    <text x="860" y="195" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">O(log n)</text>
    <text x="860" y="215" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Bubble down</text>
    <text x="1000" y="200" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Hash Table</text>
    
    <!-- Ordered Traversal Row -->
    <rect x="0" y="230" width="1100" height="60" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="140" y="265" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Ordered Access</text>
    <text x="320" y="255" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="13" font-weight="bold">O(1)</text>
    <text x="320" y="275" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Index access</text>
    <text x="500" y="255" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n log n)</text>
    <text x="500" y="275" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Sort first</text>
    <text x="680" y="255" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="680" y="275" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Inorder walk</text>
    <text x="860" y="255" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n log n)</text>
    <text x="860" y="275" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Extract all</text>
    <text x="1000" y="260" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="12" font-weight="bold">BST</text>
    
    <!-- Range Query Row -->
    <rect x="0" y="290" width="1100" height="60" fill="#fefefe" stroke="#e5e7eb" stroke-width="1"/>
    <text x="140" y="325" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Range Query</text>
    <text x="320" y="315" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="320" y="335" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Linear scan</text>
    <text x="500" y="315" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="500" y="335" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Check all keys</text>
    <text x="680" y="315" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="13" font-weight="bold">O(log n + k)</text>
    <text x="680" y="335" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Prune search</text>
    <text x="860" y="315" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">O(n)</text>
    <text x="860" y="335" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Not supported</text>
    <text x="1000" y="320" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">BST</text>
    
    <!-- Memory Usage Row -->
    <rect x="0" y="350" width="1100" height="60" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="140" y="385" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Memory Usage</text>
    <text x="320" y="375" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Excellent</text>
    <text x="320" y="395" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Contiguous</text>
    <text x="500" y="375" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">Good</text>
    <text x="500" y="395" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Some overhead</text>
    <text x="680" y="375" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="13">Fair</text>
    <text x="680" y="395" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Pointer overhead</text>
    <text x="860" y="375" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="13">Good</text>
    <text x="860" y="395" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Array-based</text>
    <text x="1000" y="380" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Array</text>
  </g>
  
  <!-- Legend -->
  <text x="100" y="580" fill="#6b7280" font-family="Arial, sans-serif" font-size="12">
    Legend: k = number of results in range query
  </text>
</svg>
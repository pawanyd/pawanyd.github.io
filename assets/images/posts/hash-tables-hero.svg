<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">Hash Tables</text>
  <text x="600" y="120" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="24">The Secret Weapon Every Developer Should Master</text>
  
  <!-- Main Hash Table Visualization -->
  <g transform="translate(100, 180)">
    <!-- Hash Function Box -->
    <rect x="0" y="0" width="200" height="100" rx="10" fill="url(#cardGradient)" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Hash Function</text>
    <text x="100" y="50" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">hash("key") = index</text>
    <text x="100" y="75" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(1) Magic!</text>
    
    <!-- Arrow from Hash Function to Table -->
    <path d="M 220 50 L 280 50" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Hash Table Array -->
    <g transform="translate(300, 0)">
      <!-- Table buckets -->
      <rect x="0" y="0" width="60" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="30" y="25" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="12">0</text>
      
      <rect x="0" y="45" width="60" height="40" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
      <text x="30" y="70" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="12">1</text>
      <text x="80" y="70" text-anchor="start" fill="#059669" font-family="Arial, sans-serif" font-size="11">← "user123"</text>
      
      <rect x="0" y="90" width="60" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="30" y="115" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="12">2</text>
      
      <rect x="0" y="135" width="60" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="30" y="160" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="12">3</text>
      <text x="80" y="160" text-anchor="start" fill="#d97706" font-family="Arial, sans-serif" font-size="11">← "admin"</text>
      
      <rect x="0" y="180" width="60" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="30" y="205" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="12">4</text>
      
      <text x="30" y="240" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">...</text>
    </g>
  </g>
  
  <!-- Key Examples -->
  <g transform="translate(500, 180)">
    <rect x="0" y="0" width="180" height="120" rx="10" fill="url(#cardGradient)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Key Examples</text>
    
    <text x="20" y="50" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">"user123" → 1</text>
    <text x="20" y="70" fill="#d97706" font-family="Arial, sans-serif" font-size="12" font-weight="bold">"admin" → 3</text>
    <text x="20" y="90" fill="#64748b" font-family="Arial, sans-serif" font-size="12">"john_doe" → ?</text>
    <text x="20" y="110" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Instant lookup!</text>
  </g>
  
  <!-- Performance Comparison -->
  <g transform="translate(720, 180)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="url(#cardGradient)" stroke="#ef4444" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Performance</text>
    
    <text x="20" y="50" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Hash Table: O(1)</text>
    <text x="20" y="70" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14">Array Search: O(n)</text>
    <text x="20" y="90" fill="#3b82f6" font-family="Arial, sans-serif" font-size="14">Binary Search: O(log n)</text>
    <text x="20" y="110" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Winner: Hash Table!</text>
  </g>
  
  <!-- Bottom Stats -->
  <g transform="translate(200, 450)">
    <rect x="0" y="0" width="800" height="100" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <g transform="translate(50, 30)">
      <text x="0" y="0" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Real-World Usage:</text>
      <text x="0" y="25" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">• Database Indexing • Caching Systems • Programming Language Objects</text>
      <text x="0" y="45" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">• User Authentication • Frequency Counting • Distributed Systems</text>
    </g>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
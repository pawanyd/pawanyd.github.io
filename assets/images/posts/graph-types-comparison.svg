<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Graph Types Comparison
  </text>
  
  <!-- Undirected Graph -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="200" height="220" fill="white" stroke="#e5e7eb" stroke-width="2" rx="12"/>
    <text x="100" y="25" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Undirected Graph
    </text>
    
    <!-- Nodes -->
    <circle cx="60" cy="70" r="20" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">A</text>
    
    <circle cx="140" cy="70" r="20" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="140" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">B</text>
    
    <circle cx="100" cy="140" r="20" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="100" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">C</text>
    
    <!-- Edges -->
    <line x1="80" y1="70" x2="120" y2="70" stroke="#6b7280" stroke-width="3"/>
    <line x1="75" y1="85" x2="85" y2="125" stroke="#6b7280" stroke-width="3"/>
    <line x1="125" y1="85" x2="115" y2="125" stroke="#6b7280" stroke-width="3"/>
    
    <text x="100" y="175" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      Relationships go both ways
    </text>
    <text x="100" y="195" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">
      Example: Facebook friends
    </text>
  </g>
  
  <!-- Directed Graph -->
  <g transform="translate(280, 80)">
    <rect x="0" y="0" width="200" height="220" fill="white" stroke="#e5e7eb" stroke-width="2" rx="12"/>
    <text x="100" y="25" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Directed Graph
    </text>
    
    <!-- Nodes -->
    <circle cx="60" cy="70" r="20" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="60" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">A</text>
    
    <circle cx="140" cy="70" r="20" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="140" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">B</text>
    
    <circle cx="100" cy="140" r="20" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="100" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">C</text>
    
    <!-- Directed edges -->
    <line x1="80" y1="70" x2="120" y2="70" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="75" y1="85" x2="85" y2="125" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="115" y1="125" x2="125" y2="85" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    
    <text x="100" y="175" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      Relationships have direction
    </text>
    <text x="100" y="195" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">
      Example: Twitter follows
    </text>
  </g>
  
  <!-- Weighted Graph -->
  <g transform="translate(510, 80)">
    <rect x="0" y="0" width="200" height="220" fill="white" stroke="#e5e7eb" stroke-width="2" rx="12"/>
    <text x="100" y="25" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Weighted Graph
    </text>
    
    <!-- Nodes -->
    <circle cx="60" cy="70" r="20" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="60" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">A</text>
    
    <circle cx="140" cy="70" r="20" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="140" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">B</text>
    
    <circle cx="100" cy="140" r="20" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="100" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">C</text>
    
    <!-- Weighted edges -->
    <line x1="80" y1="70" x2="120" y2="70" stroke="#6b7280" stroke-width="3"/>
    <rect x="95" y="60" width="20" height="16" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="105" y="71" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">5</text>
    
    <line x1="75" y1="85" x2="85" y2="125" stroke="#6b7280" stroke-width="3"/>
    <rect x="70" y="100" width="20" height="16" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="80" y="111" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">3</text>
    
    <line x1="125" y1="85" x2="115" y2="125" stroke="#6b7280" stroke-width="3"/>
    <rect x="110" y="100" width="20" height="16" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="120" y="111" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">8</text>
    
    <text x="100" y="175" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      Edges have weights/costs
    </text>
    <text x="100" y="195" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">
      Example: GPS distances
    </text>
  </g>
  
  <!-- Cyclic Graph -->
  <g transform="translate(150, 330)">
    <rect x="0" y="0" width="200" height="220" fill="white" stroke="#e5e7eb" stroke-width="2" rx="12"/>
    <text x="100" y="25" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Cyclic Graph
    </text>
    
    <!-- Nodes -->
    <circle cx="60" cy="70" r="20" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="60" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">A</text>
    
    <circle cx="140" cy="70" r="20" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="140" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">B</text>
    
    <circle cx="100" cy="140" r="20" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="100" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">C</text>
    
    <!-- Cyclic edges -->
    <line x1="80" y1="70" x2="120" y2="70" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="125" y1="85" x2="115" y2="125" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="85" y1="125" x2="75" y2="85" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- Cycle indicator -->
    <path d="M 100 100 A 15 15 0 1 1 100 101" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    <text x="130" y="105" fill="#ef4444" font-family="Arial, sans-serif" font-size="10">cycle</text>
    
    <text x="100" y="175" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      Contains cycles (loops)
    </text>
    <text x="100" y="195" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">
      Example: Social networks
    </text>
  </g>
  
  <!-- Acyclic Graph (DAG) -->
  <g transform="translate(380, 330)">
    <rect x="0" y="0" width="200" height="220" fill="white" stroke="#e5e7eb" stroke-width="2" rx="12"/>
    <text x="100" y="25" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Acyclic Graph (DAG)
    </text>
    
    <!-- Nodes -->
    <circle cx="60" cy="70" r="20" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="60" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">A</text>
    
    <circle cx="140" cy="70" r="20" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="140" y="77" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">B</text>
    
    <circle cx="100" cy="140" r="20" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="100" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">C</text>
    
    <!-- Acyclic edges -->
    <line x1="80" y1="70" x2="120" y2="70" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="75" y1="85" x2="85" y2="125" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="125" y1="85" x2="115" y2="125" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- No cycle indicator -->
    <text x="100" y="105" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10">✓ no cycles</text>
    
    <text x="100" y="175" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      No cycles allowed
    </text>
    <text x="100" y="195" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">
      Example: Task dependencies
    </text>
  </g>
  
  <!-- Summary -->
  <text x="450" y="580" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="14">
    Choose the right graph type based on your relationships and constraints
  </text>
</svg>
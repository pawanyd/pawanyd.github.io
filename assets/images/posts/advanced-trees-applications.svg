<svg role="img" aria-labelledby="advanced-trees-apps-title advanced-trees-apps-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="advanced-trees-apps-title">Advanced Trees Real-World Applications</title>
  <desc id="advanced-trees-apps-desc">Diagram showing how different companies use advanced tree structures in production systems</desc>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Advanced Trees in Production Systems
  </text>
  
  <!-- MySQL / B-Trees -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="520" height="140" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="80" height="80" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">MySQL</text>
      <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e0e7ff">InnoDB</text>
    </g>
    
    <g transform="translate(120, 20)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4338ca">
        B+ Trees for Database Indexes
      </text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Every table index uses B+ tree structure
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Optimized for disk block reads (16KB pages)
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Handles billions of rows with 3-4 disk reads
      </text>
      
      <rect x="280" y="30" width="90" height="60" rx="6" fill="#c7d2fe" stroke="#6366f1" stroke-width="1"/>
      <text x="325" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4338ca">
        Performance
      </text>
      <text x="325" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4338ca">
        3-4 disk reads
      </text>
      <text x="325" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4338ca">
        for any query
      </text>
    </g>
  </g>
  
  <!-- Linux Kernel / Red-Black Trees -->
  <g transform="translate(640, 80)">
    <rect x="0" y="0" width="480" height="140" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="80" height="80" rx="8" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="40" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Linux</text>
      <text x="40" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fee2e2">Kernel</text>
    </g>
    
    <g transform="translate(120, 20)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#991b1b">
        Red-Black Trees Everywhere
      </text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Process scheduler (CFS)
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Virtual memory management
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • File system operations
      </text>
    </g>
  </g>
  
  <!-- Google / Tries -->
  <g transform="translate(80, 250)">
    <rect x="0" y="0" width="520" height="140" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="80" height="80" rx="8" fill="#10b981" stroke="#047857" stroke-width="2"/>
      <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Google</text>
    </g>
    
    <g transform="translate(120, 20)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#065f46">
        Tries for Autocomplete &amp; Search
      </text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Instant search suggestions as you type
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Prefix matching across billions of queries
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Compressed tries for memory efficiency
      </text>
      
      <rect x="280" y="30" width="90" height="60" rx="6" fill="#a7f3d0" stroke="#10b981" stroke-width="1"/>
      <text x="325" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065f46">
        Speed
      </text>
      <text x="325" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#065f46">
        &lt;50ms
      </text>
      <text x="325" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#065f46">
        suggestions
      </text>
    </g>
  </g>
  
  <!-- Netflix / Segment Trees -->
  <g transform="translate(640, 250)">
    <rect x="0" y="0" width="480" height="140" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="80" height="80" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
      <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Netflix</text>
    </g>
    
    <g transform="translate(120, 20)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#92400e">
        Segment Trees for Streaming
      </text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Adaptive bitrate streaming
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Network quality range queries
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Real-time quality adjustments
      </text>
    </g>
  </g>
  
  <!-- Redis / Skip Lists -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="520" height="140" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="80" height="80" rx="8" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
      <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Redis</text>
    </g>
    
    <g transform="translate(120, 20)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#9f1239">
        Skip Lists for Sorted Sets
      </text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Probabilistic alternative to balanced trees
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Simpler implementation, similar performance
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Millions of operations per second
      </text>
      
      <rect x="280" y="30" width="90" height="60" rx="6" fill="#fbcfe8" stroke="#ec4899" stroke-width="1"/>
      <text x="325" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9f1239">
        Throughput
      </text>
      <text x="325" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9f1239">
        1M+ ops/sec
      </text>
      <text x="325" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9f1239">
        per core
      </text>
    </g>
  </g>
  
  <!-- MongoDB / B-Trees -->
  <g transform="translate(640, 420)">
    <rect x="0" y="0" width="480" height="140" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="80" height="80" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
      <text x="40" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">MongoDB</text>
    </g>
    
    <g transform="translate(120, 20)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#15803d">
        B-Trees for Document Storage
      </text>
      
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • WiredTiger storage engine
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Efficient range scans
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        • Compression-friendly structure
      </text>
    </g>
  </g>
</svg>

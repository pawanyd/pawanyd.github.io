<svg role="img" aria-labelledby="hero-title hero-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="hero-title">System Design Fundamentals</title>
  <desc id="hero-desc">Visual representation of system design concepts including scalability, databases, load balancing, caching, and distributed systems architecture</desc>
  
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cacheGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">System Design Fundamentals</text>
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)" text-anchor="middle">Essential Terminology &amp; Concepts</text>
  
  <!-- Client/User -->
  <g transform="translate(100, 250)">
    <circle cx="0" cy="0" r="35" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-10" r="12" fill="#2563eb"/>
    <path d="M -15 10 Q 0 0 15 10 L 15 25 L -15 25 Z" fill="#2563eb"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Client</text>
  </g>
  
  <!-- Load Balancer -->
  <g transform="translate(300, 250)">
    <rect x="-40" y="-40" width="80" height="80" rx="8" fill="url(#serverGradient)"/>
    <circle cx="0" cy="-15" r="8" fill="white"/>
    <circle cx="-15" cy="10" r="8" fill="white"/>
    <circle cx="15" cy="10" r="8" fill="white"/>
    <line x1="0" y1="-7" x2="-15" y2="2" stroke="white" stroke-width="2"/>
    <line x1="0" y1="-7" x2="15" y2="2" stroke="white" stroke-width="2"/>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Load</text>
    <text x="0" y="82" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Balancer</text>
  </g>
  
  <!-- Arrow: Client to Load Balancer -->
  <path d="M 145 250 L 250 250" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Servers (3 instances) -->
  <g transform="translate(500, 180)">
    <rect x="-35" y="-35" width="70" height="70" rx="6" fill="url(#serverGradient)"/>
    <rect x="-20" y="-15" width="40" height="8" rx="2" fill="white"/>
    <rect x="-20" y="-2" width="40" height="8" rx="2" fill="white"/>
    <rect x="-20" y="11" width="40" height="8" rx="2" fill="white"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Server 1</text>
  </g>
  
  <g transform="translate(500, 280)">
    <rect x="-35" y="-35" width="70" height="70" rx="6" fill="url(#serverGradient)"/>
    <rect x="-20" y="-15" width="40" height="8" rx="2" fill="white"/>
    <rect x="-20" y="-2" width="40" height="8" rx="2" fill="white"/>
    <rect x="-20" y="11" width="40" height="8" rx="2" fill="white"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Server 2</text>
  </g>
  
  <g transform="translate(500, 380)">
    <rect x="-35" y="-35" width="70" height="70" rx="6" fill="url(#serverGradient)"/>
    <rect x="-20" y="-15" width="40" height="8" rx="2" fill="white"/>
    <rect x="-20" y="-2" width="40" height="8" rx="2" fill="white"/>
    <rect x="-20" y="11" width="40" height="8" rx="2" fill="white"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Server 3</text>
  </g>
  
  <!-- Arrows: Load Balancer to Servers -->
  <path d="M 350 230 L 455 180" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 350 250 L 455 280" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 350 270 L 455 380" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Cache -->
  <g transform="translate(720, 200)">
    <rect x="-45" y="-30" width="90" height="60" rx="8" fill="url(#cacheGradient)"/>
    <circle cx="-15" cy="-5" r="8" fill="white"/>
    <circle cx="15" cy="-5" r="8" fill="white"/>
    <circle cx="-15" cy="15" r="8" fill="white"/>
    <circle cx="15" cy="15" r="8" fill="white"/>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Cache</text>
    <text x="0" y="72" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">(Redis)</text>
  </g>
  
  <!-- Database -->
  <g transform="translate(720, 360)">
    <ellipse cx="0" cy="-25" rx="50" ry="15" fill="url(#dbGradient)"/>
    <rect x="-50" y="-25" width="100" height="50" fill="url(#dbGradient)"/>
    <ellipse cx="0" cy="25" rx="50" ry="15" fill="#d97706"/>
    <ellipse cx="0" cy="-10" rx="50" ry="15" fill="#f59e0b" opacity="0.5"/>
    <ellipse cx="0" cy="5" rx="50" ry="15" fill="#f59e0b" opacity="0.5"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Database</text>
    <text x="0" y="77" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">(PostgreSQL)</text>
  </g>
  
  <!-- Arrows: Servers to Cache and Database -->
  <path d="M 545 180 L 665 200" stroke="white" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 545 280 L 665 360" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- CDN -->
  <g transform="translate(950, 250)">
    <circle cx="0" cy="0" r="45" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="3"/>
    <path d="M -20 -10 L -20 10 L 0 20 L 20 10 L 20 -10 L 0 -20 Z" fill="white"/>
    <circle cx="0" cy="0" r="8" fill="#2563eb"/>
    <text x="0" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">CDN</text>
    <text x="0" y="87" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">(CloudFront)</text>
  </g>
  
  <!-- Arrow: Database to CDN -->
  <path d="M 770 340 L 900 270" stroke="white" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Message Queue -->
  <g transform="translate(950, 420)">
    <rect x="-50" y="-25" width="100" height="50" rx="8" fill="#7c3aed"/>
    <rect x="-35" y="-10" width="15" height="20" fill="white" opacity="0.8"/>
    <rect x="-15" y="-10" width="15" height="20" fill="white" opacity="0.8"/>
    <rect x="5" y="-10" width="15" height="20" fill="white" opacity="0.8"/>
    <rect x="25" y="-10" width="15" height="20" fill="white" opacity="0.8"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Message Queue</text>
    <text x="0" y="62" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">(Kafka)</text>
  </g>
  
  <!-- Arrow: Server to Message Queue -->
  <path d="M 545 380 L 890 420" stroke="white" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Key Concepts Labels -->
  <g transform="translate(100, 500)">
    <circle cx="0" cy="0" r="6" fill="#10b981"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Scalability</text>
  </g>
  
  <g transform="translate(250, 500)">
    <circle cx="0" cy="0" r="6" fill="#f59e0b"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Data Storage</text>
  </g>
  
  <g transform="translate(420, 500)">
    <circle cx="0" cy="0" r="6" fill="#ef4444"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Performance</text>
  </g>
  
  <g transform="translate(590, 500)">
    <circle cx="0" cy="0" r="6" fill="#7c3aed"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="13" fill="white">Communication</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="white" />
    </marker>
  </defs>
</svg>

<svg role="img" aria-labelledby="advanced-backtracking-title advanced-backtracking-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="advanced-backtracking-title">Advanced Backtracking Techniques</title>
  <desc id="advanced-backtracking-desc">Diagram showing constraint propagation, heuristic ordering, and iterative deepening techniques for optimized backtracking</desc>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Advanced Backtracking Optimization Techniques
  </text>
  
  <!-- Constraint Propagation -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="350" height="200" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    
    <text x="175" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">
      Constraint Propagation
    </text>
    
    <!-- Before: Basic constraint checking -->
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Before: Check constraints when needed</text>
    
    <g transform="translate(20, 65)">
      <!-- Nodes with delayed checking -->
      <circle cx="50" cy="20" r="15" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">A</text>
      
      <circle cx="100" cy="20" r="15" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
      <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">B</text>
      
      <circle cx="150" cy="20" r="15" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="150" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✗</text>
      
      <text x="200" y="25" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">Conflict found late</text>
    </g>
    
    <!-- After: Constraint propagation -->
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669">After: Propagate constraints immediately</text>
    
    <g transform="translate(20, 115)">
      <!-- Nodes with immediate propagation -->
      <circle cx="50" cy="20" r="15" fill="#10b981" stroke="#047857" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">A</text>
      
      <!-- Propagation waves -->
      <circle cx="100" cy="20" r="15" fill="#6ee7b7" stroke="#10b981" stroke-width="2" opacity="0.7"/>
      <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#047857">✓</text>
      
      <circle cx="150" cy="20" r="15" fill="#fca5a5" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
      <text x="150" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">✗</text>
      
      <!-- Propagation arrows -->
      <path d="M 65 20 L 85 20" stroke="#10b981" stroke-width="2" marker-end="url(#greenArrow)"/>
      <path d="M 115 20 L 135 20" stroke="#ef4444" stroke-width="2" marker-end="url(#redArrow)"/>
      
      <text x="200" y="25" font-family="Arial, sans-serif" font-size="10" fill="#10b981">Pruned early</text>
    </g>
    
    <text x="175" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">
      Reduce search space by propagating constraint implications
    </text>
  </g>
  
  <!-- Heuristic Ordering -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="300" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#92400e">
      Heuristic Ordering
    </text>
    
    <!-- Most Constrained First -->
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Most Constrained First</text>
    
    <g transform="translate(20, 65)">
      <!-- Variables with different constraint levels -->
      <rect x="0" y="0" width="40" height="20" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
      <text x="20" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">X₁: 2</text>
      
      <rect x="50" y="0" width="40" height="20" rx="4" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="70" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e">X₂: 5</text>
      
      <rect x="100" y="0" width="40" height="20" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
      <text x="120" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e">X₃: 8</text>
      
      <!-- Priority arrow -->
      <path d="M 20 30 L 20 45" stroke="#dc2626" stroke-width="3" marker-end="url(#redArrow)"/>
      <text x="20" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">Priority</text>
    </g>
    
    <!-- Least Constraining Value -->
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Least Constraining Value</text>
    
    <g transform="translate(20, 115)">
      <!-- Values with different impact -->
      <circle cx="30" cy="15" r="12" fill="#10b981" stroke="#047857" stroke-width="2"/>
      <text x="30" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">A</text>
      <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#047857">Low impact</text>
      
      <circle cx="80" cy="15" r="12" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
      <text x="80" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">B</text>
      <text x="80" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d97706">Med impact</text>
      
      <circle cx="130" cy="15" r="12" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="130" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">C</text>
      <text x="130" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">High impact</text>
      
      <!-- Selection arrow -->
      <path d="M 30 45 L 30 60" stroke="#10b981" stroke-width="3" marker-end="url(#greenArrow)"/>
      <text x="30" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Choose first</text>
    </g>
    
    <text x="150" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">
      Smart ordering reduces search time exponentially
    </text>
  </g>
  
  <!-- Iterative Deepening -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="350" height="200" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    
    <text x="175" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#be185d">
      Iterative Deepening
    </text>
    
    <!-- Depth levels -->
    <g transform="translate(50, 50)">
      <!-- Depth 1 -->
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#be185d">Depth 1:</text>
      <circle cx="50" cy="10" r="8" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
      <text x="50" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">A</text>
      
      <!-- Depth 2 -->
      <text x="0" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#be185d">Depth 2:</text>
      <circle cx="50" cy="35" r="8" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
      <text x="50" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">A</text>
      
      <circle cx="80" cy="35" r="8" fill="#f9a8d4" stroke="#ec4899" stroke-width="2"/>
      <text x="80" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">B</text>
      
      <circle cx="110" cy="35" r="8" fill="#f9a8d4" stroke="#ec4899" stroke-width="2"/>
      <text x="110" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">C</text>
      
      <!-- Depth 3 -->
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#be185d">Depth 3:</text>
      <circle cx="50" cy="60" r="8" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
      <text x="50" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">A</text>
      
      <circle cx="80" cy="60" r="8" fill="#f9a8d4" stroke="#ec4899" stroke-width="2"/>
      <text x="80" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">B</text>
      
      <circle cx="110" cy="60" r="8" fill="#f9a8d4" stroke="#ec4899" stroke-width="2"/>
      <text x="110" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">C</text>
      
      <circle cx="140" cy="60" r="8" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="140" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">★</text>
      
      <!-- Connection lines -->
      <path d="M 50 18 L 50 27" stroke="#be185d" stroke-width="1"/>
      <path d="M 50 43 L 50 52" stroke="#be185d" stroke-width="1"/>
      <path d="M 80 43 L 80 52" stroke="#be185d" stroke-width="1"/>
      <path d="M 110 43 L 110 52" stroke="#be185d" stroke-width="1"/>
      <path d="M 110 43 L 140 52" stroke="#be185d" stroke-width="1"/>
      
      <text x="170" y="64" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">Found!</text>
    </g>
    
    <text x="175" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">
      Gradually increase search depth until solution found
    </text>
    
    <text x="175" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">
      Memory efficient for unknown solution depths
    </text>
  </g>
  
  <!-- Bottom Section: Performance Comparison -->
  <g transform="translate(100, 310)">
    <rect x="0" y="0" width="1000" height="250" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    
    <text x="500" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#334155">
      Performance Impact of Advanced Techniques
    </text>
    
    <!-- Performance bars -->
    <g transform="translate(30, 60)">
      <!-- Basic Backtracking -->
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">Basic Backtracking</text>
      <rect x="180" y="0" width="280" height="22" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
      <text x="320" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">High search space</text>
      
      <!-- With Constraint Propagation -->
      <text x="0" y="50" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">+ Constraint Propagation</text>
      <rect x="180" y="35" width="190" height="22" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
      <text x="275" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Reduced</text>
      
      <!-- With Heuristics -->
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">+ Smart Heuristics</text>
      <rect x="180" y="70" width="110" height="22" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1"/>
      <text x="235" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Smaller</text>
      
      <!-- All Optimizations -->
      <text x="0" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">All Optimizations</text>
      <rect x="180" y="105" width="70" height="22" fill="#10b981" stroke="#047857" stroke-width="1"/>
      <text x="215" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Minimal</text>
      
      <!-- Reduction percentages -->
      <text x="480" y="15" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Explores many dead ends</text>
      <text x="380" y="50" font-family="Arial, sans-serif" font-size="11" fill="#64748b">30-50% reduction</text>
      <text x="300" y="85" font-family="Arial, sans-serif" font-size="11" fill="#64748b">60-80% reduction</text>
      <text x="260" y="120" font-family="Arial, sans-serif" font-size="11" fill="#64748b">90%+ reduction</text>
    </g>
    
    <!-- Real-world applications -->
    <g transform="translate(550, 60)">
      <text x="0" y="15" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#334155">Real-World Applications</text>
      
      <text x="0" y="40" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2563eb">Google Resource Allocation</text>
      <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Constraint propagation for</text>
      <text x="0" y="68" font-family="Arial, sans-serif" font-size="11" fill="#64748b">data center optimization</text>
      
      <text x="0" y="93" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#16a34a">Airbnb Pricing</text>
      <text x="0" y="108" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Heuristic ordering for</text>
      <text x="0" y="121" font-family="Arial, sans-serif" font-size="11" fill="#64748b">dynamic pricing algorithms</text>
      
      <text x="0" y="146" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc2626">Netflix Content Acquisition</text>
      <text x="0" y="161" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Iterative deepening for</text>
      <text x="0" y="174" font-family="Arial, sans-serif" font-size="11" fill="#64748b">budget optimization</text>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">Rate Limiter High-Level Architecture</text>
  
  <!-- Clients -->
  <g transform="translate(50, 80)">
    <text x="100" y="0" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">Clients</text>
    
    <rect x="20" y="20" width="70" height="60" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="6"/>
    <text x="55" y="45" font-size="11" text-anchor="middle" fill="#fff">Web</text>
    <text x="55" y="60" font-size="11" text-anchor="middle" fill="#fff">Browser</text>
    
    <rect x="110" y="20" width="70" height="60" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="6"/>
    <text x="145" y="45" font-size="11" text-anchor="middle" fill="#fff">Mobile</text>
    <text x="145" y="60" font-size="11" text-anchor="middle" fill="#fff">App</text>
    
    <!-- Requests -->
    <path d="M 55 80 L 55 140" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 145 80 L 145 140" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="100" y="115" font-size="10" text-anchor="middle" fill="#1f2937">API Requests</text>
  </g>
  
  <!-- Load Balancer -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="200" height="70" fill="#a78bfa" stroke="#7c3aed" stroke-width="3" rx="8"/>
    <text x="100" y="30" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Load Balancer</text>
    <text x="100" y="48" font-size="11" text-anchor="middle" fill="#fff">Distributes Traffic</text>
    <text x="100" y="63" font-size="10" text-anchor="middle" fill="#ddd6fe">nginx / AWS ALB</text>
  </g>
  
  <!-- Arrow to API Gateway -->
  <path d="M 150 290 L 150 340" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- API Gateway Cluster -->
  <g transform="translate(30, 340)">
    <rect x="0" y="0" width="240" height="200" fill="#d1fae5" stroke="#10b981" stroke-width="3" rx="8"/>
    <text x="120" y="25" font-size="15" font-weight="bold" text-anchor="middle" fill="#065f46">API Gateway Cluster</text>
    <text x="120" y="43" font-size="11" text-anchor="middle" fill="#065f46">(Rate Limiter Middleware)</text>
    
    <!-- Gateway instances -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="60" height="50" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
      <text x="30" y="28" font-size="10" text-anchor="middle" fill="#065f46">Gateway</text>
      <text x="30" y="42" font-size="10" text-anchor="middle" fill="#065f46">1</text>
      
      <rect x="70" y="0" width="60" height="50" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
      <text x="100" y="28" font-size="10" text-anchor="middle" fill="#065f46">Gateway</text>
      <text x="100" y="42" font-size="10" text-anchor="middle" fill="#065f46">2</text>
      
      <rect x="140" y="0" width="60" height="50" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
      <text x="170" y="28" font-size="10" text-anchor="middle" fill="#065f46">Gateway</text>
      <text x="170" y="42" font-size="10" text-anchor="middle" fill="#065f46">3</text>
    </g>
    
    <!-- Functions -->
    <g transform="translate(20, 120)">
      <text x="0" y="0" font-size="10" fill="#065f46">• Extract user ID / API key</text>
      <text x="0" y="16" font-size="10" fill="#065f46">• Check rate limit (Redis)</text>
      <text x="0" y="32" font-size="10" fill="#065f46">• Allow or reject request</text>
      <text x="0" y="48" font-size="10" fill="#065f46">• Add rate limit headers</text>
      <text x="0" y="64" font-size="10" fill="#065f46">• Forward to backend</text>
    </g>
  </g>
  
  <!-- Redis Cluster -->
  <g transform="translate(350, 340)">
    <rect x="0" y="0" width="240" height="200" fill="#fee2e2" stroke="#dc2626" stroke-width="3" rx="8"/>
    <text x="120" y="25" font-size="15" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Redis Cluster</text>
    <text x="120" y="43" font-size="11" text-anchor="middle" fill="#7f1d1d">(Counter Storage)</text>
    
    <!-- Redis instances -->
    <g transform="translate(20, 60)">
      <ellipse cx="30" cy="30" rx="28" ry="25" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
      <text x="30" y="28" font-size="10" text-anchor="middle" fill="#7f1d1d">Redis</text>
      <text x="30" y="40" font-size="10" text-anchor="middle" fill="#7f1d1d">Master</text>
      
      <ellipse cx="100" cy="30" rx="28" ry="25" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
      <text x="100" y="28" font-size="10" text-anchor="middle" fill="#7f1d1d">Redis</text>
      <text x="100" y="40" font-size="10" text-anchor="middle" fill="#7f1d1d">Replica</text>
      
      <ellipse cx="170" cy="30" rx="28" ry="25" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
      <text x="170" y="28" font-size="10" text-anchor="middle" fill="#7f1d1d">Redis</text>
      <text x="170" y="40" font-size="10" text-anchor="middle" fill="#7f1d1d">Replica</text>
    </g>
    
    <!-- Data stored -->
    <g transform="translate(20, 110)">
      <text x="0" y="0" font-size="10" fill="#7f1d1d">Stores:</text>
      <text x="0" y="16" font-size="10" fill="#7f1d1d">• User request counters</text>
      <text x="0" y="32" font-size="10" fill="#7f1d1d">• Window timestamps</text>
      <text x="0" y="48" font-size="10" fill="#7f1d1d">• Rate limit rules cache</text>
      <text x="0" y="64" font-size="10" fill="#7f1d1d">• Sub-millisecond latency</text>
    </g>
  </g>
  
  <!-- Connection between Gateway and Redis -->
  <path d="M 270 440 L 350 440" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="310" y="430" font-size="10" text-anchor="middle" fill="#1f2937">Check/Update</text>
  <text x="310" y="445" font-size="10" text-anchor="middle" fill="#1f2937">Counters</text>
  
  <!-- Rules Database -->
  <g transform="translate(670, 340)">
    <rect x="0" y="0" width="200" height="120" fill="#dbeafe" stroke="#3b82f6" stroke-width="3" rx="8"/>
    <text x="100" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Rules Database</text>
    <text x="100" y="43" font-size="11" text-anchor="middle" fill="#1e40af">(PostgreSQL / MySQL)</text>
    
    <g transform="translate(15, 60)">
      <text x="0" y="0" font-size="10" fill="#1e40af">Stores:</text>
      <text x="0" y="16" font-size="10" fill="#1e40af">• Rate limit rules</text>
      <text x="0" y="32" font-size="10" fill="#1e40af">• User tier limits</text>
      <text x="0" y="48" font-size="10" fill="#1e40af">• Whitelist / Blacklist</text>
    </g>
  </g>
  
  <!-- Connection Gateway to Rules DB -->
  <path d="M 270 380 L 320 380 L 320 400 L 670 400" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
  <text x="470" y="390" font-size="10" text-anchor="middle" fill="#1f2937">Load Rules (cached)</text>
  
  <!-- Backend Services -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="220" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" rx="8"/>
    <text x="110" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#92400e">Backend Services</text>
    
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="55" height="40" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="4"/>
      <text x="27" y="24" font-size="10" text-anchor="middle" fill="#92400e">User</text>
      <text x="27" y="36" font-size="10" text-anchor="middle" fill="#92400e">Service</text>
      
      <rect x="65" y="0" width="55" height="40" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="4"/>
      <text x="92" y="24" font-size="10" text-anchor="middle" fill="#92400e">Order</text>
      <text x="92" y="36" font-size="10" text-anchor="middle" fill="#92400e">Service</text>
      
      <rect x="130" y="0" width="55" height="40" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="4"/>
      <text x="157" y="24" font-size="10" text-anchor="middle" fill="#92400e">Payment</text>
      <text x="157" y="36" font-size="10" text-anchor="middle" fill="#92400e">Service</text>
    </g>
  </g>
  
  <!-- Arrow from Gateway to Backend -->
  <path d="M 150 540 L 150 600" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="170" y="570" font-size="11" fill="#10b981">Allowed Requests</text>
  
  <!-- Monitoring & Metrics -->
  <g transform="translate(670, 500)">
    <rect x="0" y="0" width="200" height="100" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" rx="8"/>
    <text x="100" y="25" font-size="13" font-weight="bold" text-anchor="middle" fill="#1f2937">Monitoring</text>
    <text x="100" y="42" font-size="11" text-anchor="middle" fill="#6b7280">(Prometheus / Grafana)</text>
    
    <g transform="translate(15, 55)">
      <text x="0" y="0" font-size="10" fill="#1f2937">• Request rates</text>
      <text x="0" y="15" font-size="10" fill="#1f2937">• Rejection rates</text>
      <text x="0" y="30" font-size="10" fill="#1f2937">• Latency metrics</text>
    </g>
  </g>
  
  <!-- Metrics flow -->
  <path d="M 270 480 L 320 480 L 320 550 L 670 550" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
  <text x="470" y="540" font-size="10" text-anchor="middle" fill="#6b7280">Metrics</text>
  
  <!-- Rejected requests path -->
  <g transform="translate(50, 560)">
    <path d="M 100 -20 L 20 -20 L 20 -180 L 100 -180" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="5,5"/>
    <text x="10" y="-100" font-size="10" fill="#dc2626" transform="rotate(-90, 10, -100)">429 Too Many Requests</text>
  </g>
  
  <!-- Key Features Box -->
  <g transform="translate(350, 620)">
    <rect x="0" y="0" width="520" height="140" fill="#f0fdf4" stroke="#10b981" stroke-width="2" rx="8"/>
    <text x="260" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#065f46">Key Architecture Features</text>
    
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-size="11" fill="#1f2937">✓ Stateless API Gateway - Easy to scale horizontally</text>
      <text x="0" y="20" font-size="11" fill="#1f2937">✓ Centralized Redis - Single source of truth for counters</text>
      <text x="0" y="40" font-size="11" fill="#1f2937">✓ Rules Database - Dynamic configuration without deployment</text>
      <text x="0" y="60" font-size="11" fill="#1f2937">✓ High Availability - Redis replication, Gateway clustering</text>
      <text x="0" y="80" font-size="11" fill="#1f2937">✓ Low Latency - Redis in-memory storage (~1ms overhead)</text>
      <text x="0" y="100" font-size="11" fill="#1f2937">✓ Observable - Comprehensive metrics and monitoring</text>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="900" height="450" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="35" font-family="Arial" font-size="17" font-weight="bold" fill="white" text-anchor="middle">Trees — The Most Interview-Heavy Data Structure</text>

  <!-- Binary Tree visualization -->
  <text x="40" y="62" font-family="Arial" font-size="12" font-weight="bold" fill="#60a5fa">Binary Tree Structure</text>

  <!-- Root -->
  <circle cx="200" cy="90" r="22" fill="#2563eb" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="96" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">10</text>
  <text x="200" y="68" font-family="Arial" font-size="9" fill="#60a5fa" text-anchor="middle">root</text>

  <!-- Level 2 -->
  <line x1="182" y1="108" x2="140" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowHead)"/>
  <line x1="218" y1="108" x2="260" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowHead)"/>

  <circle cx="120" cy="170" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="176" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">5</text>

  <circle cx="280" cy="170" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="176" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">15</text>

  <!-- Level 3 -->
  <line x1="105" y1="187" x2="75" y2="225" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <line x1="135" y1="187" x2="165" y2="225" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <line x1="265" y1="187" x2="235" y2="225" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <line x1="295" y1="187" x2="325" y2="225" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <circle cx="60" cy="240" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="246" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">3</text>

  <circle cx="180" cy="240" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="246" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">7</text>

  <circle cx="220" cy="240" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="246" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">12</text>

  <circle cx="340" cy="240" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="246" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">20</text>

  <!-- Labels -->
  <text x="38" y="280" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Leaf</text>
  <text x="180" y="280" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Leaf</text>
  <text x="220" y="280" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Leaf</text>
  <text x="340" y="280" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Leaf</text>

  <!-- Traversals -->
  <rect x="32" y="295" width="360" height="130" rx="8" fill="#1f2937" stroke="#334155" stroke-width="1"/>
  <text x="212" y="315" font-family="Arial" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">The 3 Traversals (MUST memorize)</text>

  <rect x="42" y="322" width="105" height="95" rx="6" fill="#2e1065"/>
  <text x="95" y="340" font-family="Arial" font-size="10" font-weight="bold" fill="#a78bfa" text-anchor="middle">Inorder</text>
  <text x="95" y="356" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">Left→Root→Right</text>
  <text x="95" y="374" font-family="Arial" font-size="11" fill="#fcd34d" text-anchor="middle">3,5,7,10,12,15,20</text>
  <text x="95" y="392" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">BST gives sorted order!</text>
  <text x="95" y="407" font-family="Arial" font-size="8" fill="#7c3aed" text-anchor="middle">⭐ Most used in BST</text>

  <rect x="153" y="322" width="105" height="95" rx="6" fill="#14532d"/>
  <text x="206" y="340" font-family="Arial" font-size="10" font-weight="bold" fill="#34d399" text-anchor="middle">Preorder</text>
  <text x="206" y="356" font-family="Arial" font-size="9" fill="#6ee7b7" text-anchor="middle">Root→Left→Right</text>
  <text x="206" y="374" font-family="Arial" font-size="11" fill="#fcd34d" text-anchor="middle">10,5,3,7,15,12,20</text>
  <text x="206" y="392" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Copies tree structure</text>
  <text x="206" y="407" font-family="Arial" font-size="8" fill="#10b981" text-anchor="middle">Used for tree cloning</text>

  <rect x="264" y="322" width="120" height="95" rx="6" fill="#451a03"/>
  <text x="324" y="340" font-family="Arial" font-size="10" font-weight="bold" fill="#fbbf24" text-anchor="middle">Postorder</text>
  <text x="324" y="356" font-family="Arial" font-size="9" fill="#fcd34d" text-anchor="middle">Left→Right→Root</text>
  <text x="324" y="374" font-family="Arial" font-size="11" fill="#fcd34d" text-anchor="middle">3,7,5,12,20,15,10</text>
  <text x="324" y="392" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Delete nodes safely</text>
  <text x="324" y="407" font-family="Arial" font-size="8" fill="#f59e0b" text-anchor="middle">Used for deletion</text>

  <!-- Right side: BST + Complexity -->
  <rect x="420" y="55" width="462" height="160" rx="10" fill="#1f2937" stroke="#334155" stroke-width="1.5"/>
  <text x="651" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#94a3b8" text-anchor="middle">BST vs. Balanced BST</text>

  <rect x="430" y="88" width="205" height="115" rx="8" fill="#0f172a"/>
  <text x="533" y="108" font-family="Arial" font-size="11" font-weight="bold" fill="#ef4444" text-anchor="middle">Unbalanced BST ✗</text>
  <text x="440" y="126" font-family="Arial" font-size="9" fill="#64748b">Insert: 1, 2, 3, 4, 5 →</text>
  <text x="440" y="141" font-family="Arial" font-size="9" fill="#64748b">Degenerates to a linked list</text>
  <text x="440" y="156" font-family="Arial" font-size="9" fill="#fca5a5">Search: O(n) — worst case</text>
  <text x="440" y="171" font-family="Arial" font-size="9" fill="#64748b">Height can be n</text>
  <text x="440" y="186" font-family="Arial" font-size="9" fill="#64748b">Example: Regular BST</text>

  <rect x="644" y="88" width="228" height="115" rx="8" fill="#0f172a"/>
  <text x="758" y="108" font-family="Arial" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Balanced BST ✓</text>
  <text x="654" y="126" font-family="Arial" font-size="9" fill="#64748b">Height always: O(log n)</text>
  <text x="654" y="141" font-family="Arial" font-size="9" fill="#6ee7b7">Search: O(log n) guaranteed</text>
  <text x="654" y="156" font-family="Arial" font-size="9" fill="#6ee7b7">Insert: O(log n)</text>
  <text x="654" y="171" font-family="Arial" font-size="9" fill="#6ee7b7">Delete: O(log n)</text>
  <text x="654" y="186" font-family="Arial" font-size="9" fill="#64748b">Examples: AVL, Red-Black</text>

  <!-- Tree patterns -->
  <rect x="420" y="228" width="462" height="200" rx="10" fill="#1f2937" stroke="#334155" stroke-width="1.5"/>
  <text x="651" y="250" font-family="Arial" font-size="13" font-weight="bold" fill="#94a3b8" text-anchor="middle">Key Tree Patterns (Interview Favorites)</text>

  <rect x="430" y="260" width="210" height="155" rx="8" fill="#0f172a"/>
  <text x="535" y="280" font-family="Arial" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">DFS Patterns</text>
  <text x="440" y="298" font-family="Arial" font-size="9" fill="#93c5fd">• Max depth / Height</text>
  <text x="440" y="314" font-family="Arial" font-size="9" fill="#93c5fd">• Path sum problems</text>
  <text x="440" y="330" font-family="Arial" font-size="9" fill="#93c5fd">• Lowest Common Ancestor</text>
  <text x="440" y="346" font-family="Arial" font-size="9" fill="#93c5fd">• Validate BST</text>
  <text x="440" y="362" font-family="Arial" font-size="9" fill="#93c5fd">• Serialize / Deserialize</text>
  <text x="440" y="378" font-family="Arial" font-size="9" fill="#93c5fd">• Check balance</text>
  <text x="440" y="394" font-family="Arial" font-size="9" fill="#fcd34d">Trick: Think recursively!</text>

  <rect x="650" y="260" width="222" height="155" rx="8" fill="#0f172a"/>
  <text x="761" y="280" font-family="Arial" font-size="11" font-weight="bold" fill="#34d399" text-anchor="middle">BFS / Level Order</text>
  <text x="660" y="298" font-family="Arial" font-size="9" fill="#6ee7b7">• Print level by level</text>
  <text x="660" y="314" font-family="Arial" font-size="9" fill="#6ee7b7">• Right/Left side view</text>
  <text x="660" y="330" font-family="Arial" font-size="9" fill="#6ee7b7">• Zigzag level order</text>
  <text x="660" y="346" font-family="Arial" font-size="9" fill="#6ee7b7">• Average of each level</text>
  <text x="660" y="362" font-family="Arial" font-size="9" fill="#6ee7b7">• Minimum depth</text>
  <text x="660" y="378" font-family="Arial" font-size="9" fill="#6ee7b7">• Connect next right</text>
  <text x="660" y="394" font-family="Arial" font-size="9" fill="#fcd34d">Trick: Use a queue (deque)!</text>

  <!-- Problems bar -->
  <rect x="32" y="438" width="840" height="0" rx="4" fill="#334155"/>
</svg>

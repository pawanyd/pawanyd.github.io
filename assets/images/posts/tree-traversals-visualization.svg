<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Tree Traversal Methods</text>
  
  <!-- Sample Tree -->
  <g transform="translate(350, 80)">
    <!-- Tree structure -->
    <circle cx="100" cy="40" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="100" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">4</text>
    
    <line x1="85" y1="55" x2="50" y2="85" stroke="#64748b" stroke-width="2"/>
    <circle cx="50" cy="90" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="50" y="97" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">2</text>
    
    <line x1="115" y1="55" x2="150" y2="85" stroke="#64748b" stroke-width="2"/>
    <circle cx="150" cy="90" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="150" y="97" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">6</text>
    
    <line x1="35" y1="105" x2="15" y2="135" stroke="#64748b" stroke-width="2"/>
    <circle cx="15" cy="140" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="15" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">1</text>
    
    <line x1="65" y1="105" x2="85" y2="135" stroke="#64748b" stroke-width="2"/>
    <circle cx="85" cy="140" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="85" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">3</text>
    
    <line x1="135" y1="105" x2="115" y2="135" stroke="#64748b" stroke-width="2"/>
    <circle cx="115" cy="140" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="115" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">5</text>
    
    <line x1="165" y1="105" x2="185" y2="135" stroke="#64748b" stroke-width="2"/>
    <circle cx="185" cy="140" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="185" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">7</text>
  </g>
  
  <!-- Traversal Results -->
  <g transform="translate(50, 280)">
    <!-- Inorder -->
    <rect x="0" y="0" width="380" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="20" y="25" fill="#15803d" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Inorder (Left → Root → Right):</text>
    <text x="20" y="45" fill="#166534" font-family="Arial, sans-serif" font-size="14">Result: 1, 2, 3, 4, 5, 6, 7 (sorted order!)</text>
    
    <!-- Preorder -->
    <rect x="0" y="80" width="380" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="20" y="105" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Preorder (Root → Left → Right):</text>
    <text x="20" y="125" fill="#1e40af" font-family="Arial, sans-serif" font-size="14">Result: 4, 2, 1, 3, 6, 5, 7 (structure preserved)</text>
    
    <!-- Postorder -->
    <rect x="0" y="160" width="380" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="20" y="185" fill="#d97706" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Postorder (Left → Right → Root):</text>
    <text x="20" y="205" fill="#92400e" font-family="Arial, sans-serif" font-size="14">Result: 1, 3, 2, 5, 7, 6, 4 (children before parent)</text>
    
    <!-- Level Order -->
    <rect x="0" y="240" width="380" height="60" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="20" y="265" fill="#7c3aed" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Level Order (BFS):</text>
    <text x="20" y="285" fill="#6d28d9" font-family="Arial, sans-serif" font-size="14">Result: 4, 2, 6, 1, 3, 5, 7 (level by level)</text>
  </g>
  
  <!-- Use Cases -->
  <g transform="translate(470, 280)">
    <rect x="0" y="0" width="380" height="300" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="190" y="25" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">When to Use Each Traversal</text>
    
    <g transform="translate(20, 45)">
      <text x="0" y="20" fill="#15803d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Inorder - For BSTs:</text>
      <text x="0" y="35" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Get sorted data from BST</text>
      <text x="0" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Validate BST property</text>
      <text x="0" y="65" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Range queries in order</text>
      
      <text x="0" y="95" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Preorder - For Structure:</text>
      <text x="0" y="110" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Copy/clone trees</text>
      <text x="0" y="125" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Serialize trees</text>
      <text x="0" y="140" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Expression evaluation</text>
      
      <text x="0" y="170" fill="#d97706" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Postorder - For Cleanup:</text>
      <text x="0" y="185" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Delete trees safely</text>
      <text x="0" y="200" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Calculate tree size/height</text>
      <text x="0" y="215" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Bottom-up processing</text>
      
      <text x="0" y="245" fill="#7c3aed" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Level Order - For Levels:</text>
      <text x="0" y="260" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Print tree by levels</text>
      <text x="0" y="275" fill="#475569" font-family="Arial, sans-serif" font-size="12">• Find tree width</text>
    </g>
  </g>
</svg>
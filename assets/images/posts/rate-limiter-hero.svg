<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern overlay -->
  <g opacity="0.1">
    <path d="M 0 0 L 1200 0 L 1200 630 L 0 630 Z" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="157.5" x2="1200" y2="157.5" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="472.5" x2="1200" y2="472.5" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="100" font-size="56" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif">
    Rate Limiter Design
  </text>
  <text x="600" y="145" font-size="24" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif">
    System Design Guide
  </text>
  
  <!-- Decorative line -->
  <rect x="450" y="165" width="300" height="3" fill="url(#accentGradient)" rx="1.5"/>
  
  <!-- Visual representation -->
  <g transform="translate(150, 220)">
    <!-- Incoming traffic (left side) -->
    <g>
      <text x="80" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#ef4444">High Traffic</text>
      
      <!-- Multiple request arrows -->
      <path d="M 30 30 L 30 100" stroke="#ef4444" stroke-width="6" marker-end="url(#arrowhead-red)" opacity="0.8"/>
      <path d="M 60 20 L 60 100" stroke="#ef4444" stroke-width="6" marker-end="url(#arrowhead-red)" opacity="0.8"/>
      <path d="M 90 35 L 90 100" stroke="#ef4444" stroke-width="6" marker-end="url(#arrowhead-red)" opacity="0.8"/>
      <path d="M 120 25 L 120 100" stroke="#ef4444" stroke-width="6" marker-end="url(#arrowhead-red)" opacity="0.8"/>
      <path d="M 150 40 L 150 100" stroke="#ef4444" stroke-width="6" marker-end="url(#arrowhead-red)" opacity="0.8"/>
      
      <text x="90" y="130" font-size="14" text-anchor="middle" fill="#fca5a5">1000+ req/sec</text>
    </g>
    
    <!-- Rate Limiter Box (center) -->
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="160" height="120" fill="#10b981" stroke="#059669" stroke-width="3" rx="12" filter="url(#glow)"/>
      
      <!-- Icon -->
      <circle cx="80" cy="40" r="20" fill="#ffffff" opacity="0.2"/>
      <path d="M 70 40 L 80 30 L 90 40 L 80 50 Z" fill="#ffffff"/>
      
      <text x="80" y="75" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Rate Limiter</text>
      <text x="80" y="95" font-size="13" text-anchor="middle" fill="#d1fae5">100 req/min</text>
      <text x="80" y="112" font-size="11" text-anchor="middle" fill="#d1fae5">Sliding Window</text>
    </g>
    
    <!-- Allowed traffic (right side) -->
    <g transform="translate(0, 150)">
      <path d="M 200 60 L 280 60" stroke="#10b981" stroke-width="6" marker-end="url(#arrowhead)"/>
      <path d="M 200 60 L 280 60" stroke="#10b981" stroke-width="6" marker-end="url(#arrowhead)" opacity="0.6" transform="translate(0, 20)"/>
      <path d="M 200 60 L 280 60" stroke="#10b981" stroke-width="6" marker-end="url(#arrowhead)" opacity="0.4" transform="translate(0, 40)"/>
      
      <text x="320" y="65" font-size="16" font-weight="bold" fill="#10b981">Allowed</text>
      <text x="320" y="90" font-size="14" fill="#6ee7b7">100 req/min</text>
    </g>
    
    <!-- Rejected traffic (bottom) -->
    <g transform="translate(90, 280)">
      <path d="M 0 0 L 0 50" stroke="#ef4444" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrowhead-red)"/>
      <text x="20" y="30" font-size="14" font-weight="bold" fill="#ef4444">429 Rejected</text>
    </g>
  </g>
  
  <!-- Algorithm badges -->
  <g transform="translate(550, 240)">
    <text x="0" y="0" font-size="18" font-weight="bold" fill="#ffffff">Algorithms Covered:</text>
    
    <!-- Badge 1 -->
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="180" height="35" fill="#3b82f6" rx="6" opacity="0.8"/>
      <text x="90" y="23" font-size="14" text-anchor="middle" fill="#ffffff">Token Bucket</text>
    </g>
    
    <!-- Badge 2 -->
    <g transform="translate(190, 25)">
      <rect x="0" y="0" width="180" height="35" fill="#8b5cf6" rx="6" opacity="0.8"/>
      <text x="90" y="23" font-size="14" text-anchor="middle" fill="#ffffff">Leaky Bucket</text>
    </g>
    
    <!-- Badge 3 -->
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="180" height="35" fill="#ec4899" rx="6" opacity="0.8"/>
      <text x="90" y="23" font-size="14" text-anchor="middle" fill="#ffffff">Fixed Window</text>
    </g>
    
    <!-- Badge 4 -->
    <g transform="translate(190, 70)">
      <rect x="0" y="0" width="180" height="35" fill="#f59e0b" rx="6" opacity="0.8"/>
      <text x="90" y="23" font-size="14" text-anchor="middle" fill="#ffffff">Sliding Window</text>
    </g>
    
    <!-- Recommended badge -->
    <g transform="translate(380, 47.5)">
      <rect x="0" y="0" width="120" height="35" fill="#10b981" rx="6" filter="url(#glow)"/>
      <text x="60" y="23" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">⭐ Best</text>
    </g>
  </g>
  
  <!-- Key features -->
  <g transform="translate(550, 380)">
    <text x="0" y="0" font-size="18" font-weight="bold" fill="#ffffff">What You'll Learn:</text>
    
    <g transform="translate(0, 25)">
      <circle cx="8" cy="0" r="4" fill="#10b981"/>
      <text x="25" y="5" font-size="15" fill="#cbd5e1">Algorithm comparison &amp; trade-offs</text>
    </g>
    
    <g transform="translate(0, 50)">
      <circle cx="8" cy="0" r="4" fill="#10b981"/>
      <text x="25" y="5" font-size="15" fill="#cbd5e1">Production-ready architecture</text>
    </g>
    
    <g transform="translate(0, 75)">
      <circle cx="8" cy="0" r="4" fill="#10b981"/>
      <text x="25" y="5" font-size="15" fill="#cbd5e1">Distributed system challenges</text>
    </g>
    
    <g transform="translate(0, 100)">
      <circle cx="8" cy="0" r="4" fill="#10b981"/>
      <text x="25" y="5" font-size="15" fill="#cbd5e1">Redis implementation with code</text>
    </g>
  </g>
  
  <!-- Tech stack icons -->
  <g transform="translate(150, 480)">
    <!-- Redis -->
    <g>
      <rect x="0" y="0" width="80" height="80" fill="#dc2626" rx="8" opacity="0.9"/>
      <text x="40" y="50" font-size="32" text-anchor="middle" fill="#ffffff">R</text>
      <text x="40" y="70" font-size="11" text-anchor="middle" fill="#fecaca">Redis</text>
    </g>
    
    <!-- Python -->
    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="80" height="80" fill="#3b82f6" rx="8" opacity="0.9"/>
      <text x="40" y="50" font-size="32" text-anchor="middle" fill="#ffffff">Py</text>
      <text x="40" y="70" font-size="11" text-anchor="middle" fill="#bfdbfe">Python</text>
    </g>
    
    <!-- API -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="80" height="80" fill="#8b5cf6" rx="8" opacity="0.9"/>
      <text x="40" y="50" font-size="28" text-anchor="middle" fill="#ffffff">API</text>
      <text x="40" y="70" font-size="11" text-anchor="middle" fill="#ddd6fe">Gateway</text>
    </g>
    
    <!-- Distributed -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="80" height="80" fill="#10b981" rx="8" opacity="0.9"/>
      <text x="40" y="50" font-size="32" text-anchor="middle" fill="#ffffff">⚡</text>
      <text x="40" y="70" font-size="11" text-anchor="middle" fill="#d1fae5">Scale</text>
    </g>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="40" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="60" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="1050" cy="150" r="30" fill="#10b981" opacity="0.15"/>
</svg>

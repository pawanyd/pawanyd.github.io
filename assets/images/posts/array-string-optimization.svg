<svg role="img" aria-labelledby="title desc" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <title id="title">Array and String Optimization Strategies</title>
  <desc id="desc">Performance optimization techniques including array pooling and string interning</desc>
  
  <rect width="1000" height="400" fill="#f8fafc"/>
  
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">
    Performance Optimization Strategies
  </text>
  
  <!-- Array Pooling -->
  <g transform="translate(50, 60)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb" text-anchor="middle">
      Array Pooling: Reduce GC Pressure
    </text>
    
    <!-- Without Pooling -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">❌ Without Pooling:</text>
      
      <!-- Timeline -->
      <line x1="0" y1="30" x2="350" y2="30" stroke="#e2e8f0" stroke-width="2"/>
      
      <!-- Allocations -->
      <rect x="20" y="15" width="40" height="30" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="40" y="35" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">new[]</text>
      
      <rect x="80" y="15" width="40" height="30" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="100" y="35" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">new[]</text>
      
      <rect x="140" y="15" width="40" height="30" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="160" y="35" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">new[]</text>
      
      <!-- GC Events -->
      <path d="M200 45 L200 55" stroke="#ef4444" stroke-width="3"/>
      <text x="200" y="70" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">GC</text>
      
      <path d="M280 45 L280 55" stroke="#ef4444" stroke-width="3"/>
      <text x="280" y="70" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">GC</text>
      
      <text x="175" y="90" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">
        Frequent allocation → GC pressure → Latency spikes
      </text>
    </g>
    
    <!-- With Pooling -->
    <g transform="translate(0, 130)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">✅ With Pooling:</text>
      
      <!-- Pool -->
      <rect x="20" y="15" width="200" height="50" fill="#f0fdf4" stroke="#10b981" stroke-width="2" rx="5"/>
      <text x="120" y="25" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#059669" text-anchor="middle">
        Array Pool
      </text>
      
      <!-- Available arrays -->
      <rect x="30" y="30" width="25" height="20" fill="white" stroke="#10b981" stroke-width="1"/>
      <rect x="60" y="30" width="25" height="20" fill="white" stroke="#10b981" stroke-width="1"/>
      <rect x="90" y="30" width="25" height="20" fill="white" stroke="#10b981" stroke-width="1"/>
      <rect x="120" y="30" width="25" height="20" fill="white" stroke="#10b981" stroke-width="1"/>
      <rect x="150" y="30" width="25" height="20" fill="white" stroke="#10b981" stroke-width="1"/>
      <rect x="180" y="30" width="25" height="20" fill="white" stroke="#10b981" stroke-width="1"/>
      
      <!-- Borrow/Return arrows -->
      <path d="M240 25 Q270 25 270 40" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
      <text x="280" y="20" font-family="Arial, sans-serif" font-size="10" fill="#10b981">Borrow</text>
      
      <path d="M270 55 Q270 70 240 70" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
      <text x="280" y="75" font-family="Arial, sans-serif" font-size="10" fill="#10b981">Return</text>
      
      <text x="120" y="90" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">
        Reuse pre-allocated arrays → No GC → Predictable performance
      </text>
    </g>
  </g>
  
  <!-- String Interning -->
  <g transform="translate(550, 60)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7c3aed" text-anchor="middle">
      String Interning: Memory Deduplication
    </text>
    
    <!-- Without Interning -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">❌ Without Interning:</text>
      
      <!-- Multiple string instances -->
      <rect x="20" y="15" width="60" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="50" y="32" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">"user123"</text>
      <text x="50" y="50" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">0x1000</text>
      
      <rect x="100" y="15" width="60" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="130" y="32" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">"user123"</text>
      <text x="130" y="50" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">0x2000</text>
      
      <rect x="180" y="15" width="60" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="210" y="32" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">"user123"</text>
      <text x="210" y="50" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">0x3000</text>
      
      <rect x="260" y="15" width="60" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="290" y="32" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">"user123"</text>
      <text x="290" y="50" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">0x4000</text>
      
      <text x="170" y="75" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">
        Same string, multiple memory locations → Waste
      </text>
    </g>
    
    <!-- With Interning -->
    <g transform="translate(0, 130)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">✅ With Interning:</text>
      
      <!-- String pool -->
      <rect x="20" y="15" width="100" height="40" fill="#f0fdf4" stroke="#10b981" stroke-width="2" rx="5"/>
      <text x="70" y="25" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#059669" text-anchor="middle">
        String Pool
      </text>
      <rect x="30" y="30" width="80" height="20" fill="white" stroke="#10b981" stroke-width="1"/>
      <text x="70" y="43" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">"user123"</text>
      <text x="70" y="70" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">0x1000</text>
      
      <!-- References -->
      <rect x="150" y="15" width="40" height="20" fill="#e0e7ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="170" y="28" font-family="Arial, sans-serif" font-size="8" fill="#1e293b" text-anchor="middle">ref1</text>
      
      <rect x="200" y="15" width="40" height="20" fill="#e0e7ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="220" y="28" font-family="Arial, sans-serif" font-size="8" fill="#1e293b" text-anchor="middle">ref2</text>
      
      <rect x="250" y="15" width="40" height="20" fill="#e0e7ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="270" y="28" font-family="Arial, sans-serif" font-size="8" fill="#1e293b" text-anchor="middle">ref3</text>
      
      <rect x="300" y="15" width="40" height="20" fill="#e0e7ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="320" y="28" font-family="Arial, sans-serif" font-size="8" fill="#1e293b" text-anchor="middle">ref4</text>
      
      <!-- Arrows pointing to pool -->
      <path d="M150 25 L130 35" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowhead2)"/>
      <path d="M200 25 L130 35" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowhead2)"/>
      <path d="M250 25 L130 35" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowhead2)"/>
      <path d="M300 25 L130 35" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowhead2)"/>
      
      <text x="220" y="60" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">
        One string instance, multiple references → Memory efficient
      </text>
    </g>
  </g>
  
  <!-- Performance Impact -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="900" height="80" fill="white" stroke="#e2e8f0" stroke-width="2" rx="8"/>
    <text x="450" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
      Real-World Performance Impact
    </text>
    
    <text x="30" y="50" font-family="Arial, sans-serif" font-size="12" fill="#64748b">
      • Discord: Array pooling reduced GC pauses from 50ms to &lt;5ms for message processing
    </text>
    <text x="30" y="70" font-family="Arial, sans-serif" font-size="12" fill="#64748b">
      • Slack: String interning saved 40% memory usage for channel names and user handles
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
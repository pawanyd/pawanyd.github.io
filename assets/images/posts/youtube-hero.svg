<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.3">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="url(#blueGrad)" opacity="0.6"/>
  <circle cx="200" cy="500" r="150" fill="url(#blueGrad)" opacity="0.4"/>

  <!-- Architecture mini diagram - right side -->
  <!-- Nodes -->
  <rect x="680" y="140" width="120" height="40" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="740" y="165" font-family="Arial" font-size="11" fill="#93c5fd" text-anchor="middle">CDN Edge</text>

  <rect x="840" y="140" width="120" height="40" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
  <text x="900" y="165" font-family="Arial" font-size="11" fill="#6ee7b7" text-anchor="middle">Load Balancer</text>

  <rect x="680" y="230" width="120" height="40" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="255" font-family="Arial" font-size="11" fill="#c4b5fd" text-anchor="middle">API Gateway</text>

  <rect x="840" y="230" width="120" height="40" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="900" y="255" font-family="Arial" font-size="11" fill="#fcd34d" text-anchor="middle">Video Service</text>

  <rect x="760" y="320" width="120" height="40" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="1.5"/>
  <text x="820" y="345" font-family="Arial" font-size="11" fill="#fca5a5" text-anchor="middle">Object Storage</text>

  <!-- Connections -->
  <line x1="800" y1="160" x2="840" y2="160" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="900" y1="180" x2="900" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="740" y1="180" x2="740" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="820" y1="270" x2="820" y2="320" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Stats pills -->
  <rect x="680" y="400" width="145" height="32" rx="16" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="753" y="421" font-family="Arial" font-size="11" fill="#93c5fd" text-anchor="middle">2B+ Users Daily</text>

  <rect x="840" y="400" width="145" height="32" rx="16" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
  <text x="913" y="421" font-family="Arial" font-size="11" fill="#6ee7b7" text-anchor="middle">500 Hours/Min</text>

  <rect x="680" y="450" width="145" height="32" rx="16" fill="#1f2937" stroke="#8b5cf6" stroke-width="1"/>
  <text x="753" y="471" font-family="Arial" font-size="11" fill="#c4b5fd" text-anchor="middle">1B Hours Watch/Day</text>

  <rect x="840" y="450" width="145" height="32" rx="16" fill="#1f2937" stroke="#f59e0b" stroke-width="1"/>
  <text x="913" y="471" font-family="Arial" font-size="11" fill="#fcd34d" text-anchor="middle">Exabytes Storage</text>

  <!-- YouTube Play Icon -->
  <rect x="60" y="150" width="160" height="110" rx="20" fill="url(#redGrad)" filter="url(#glow)"/>
  <polygon points="115,175 115,235 175,205" fill="white"/>

  <!-- Main Title -->
  <text x="80" y="310" font-family="Arial" font-size="56" font-weight="bold" fill="white">Design</text>
  <text x="80" y="375" font-family="Arial" font-size="56" font-weight="bold" fill="url(#redGrad)">YouTube</text>

  <!-- Subtitle -->
  <text x="80" y="425" font-family="Arial" font-size="22" fill="#94a3b8">A Complete System Design Deep Dive</text>

  <!-- Tags -->
  <rect x="80" y="460" width="130" height="28" rx="14" fill="#ef444420" stroke="#ef4444" stroke-width="1"/>
  <text x="145" y="479" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle">System Design</text>

  <rect x="225" y="460" width="140" height="28" rx="14" fill="#3b82f620" stroke="#3b82f6" stroke-width="1"/>
  <text x="295" y="479" font-family="Arial" font-size="12" fill="#3b82f6" text-anchor="middle">Distributed Systems</text>

  <rect x="380" y="460" width="120" height="28" rx="14" fill="#10b98120" stroke="#10b981" stroke-width="1"/>
  <text x="440" y="479" font-family="Arial" font-size="12" fill="#10b981" text-anchor="middle">Scalability</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0f172a" opacity="0.8"/>
  <text x="600" y="615" font-family="Arial" font-size="13" fill="#475569" text-anchor="middle">pawanyd.github.io · System Design &amp; Architecture Series</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hashGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Hash Table: Key → Hash Function → Bucket</text>
  
  <!-- Step 1: Key Input -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="120" height="60" rx="10" fill="url(#keyGradient)" stroke="#1d4ed8" stroke-width="2"/>
    <text x="60" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Key</text>
    <text x="60" y="45" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif" font-size="12">"john_doe"</text>
    
    <text x="60" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">1. Input Key</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 190 110 L 240 110" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="215" y="105" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">hash()</text>
  
  <!-- Step 2: Hash Function -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="140" height="60" rx="10" fill="url(#hashGradient)" stroke="#7c3aed" stroke-width="2"/>
    <text x="70" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Hash Function</text>
    <text x="70" y="35" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="10">ASCII sum % size</text>
    <text x="70" y="50" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="10">938 % 10 = 8</text>
    
    <text x="70" y="80" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">2. Compute Hash</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 420 110 L 470 110" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="445" y="105" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">index 8</text>
  
  <!-- Step 3: Hash Table -->
  <g transform="translate(490, 60)">
    <text x="60" y="15" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Hash Table</text>
    
    <!-- Table buckets -->
    <rect x="20" y="20" width="80" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="25" y="37" fill="#64748b" font-family="Arial, sans-serif" font-size="10">0:</text>
    <text x="45" y="37" fill="#64748b" font-family="Arial, sans-serif" font-size="10">empty</text>
    
    <rect x="20" y="45" width="80" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="25" y="62" fill="#64748b" font-family="Arial, sans-serif" font-size="10">1:</text>
    <text x="45" y="62" fill="#64748b" font-family="Arial, sans-serif" font-size="10">empty</text>
    
    <text x="60" y="85" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">...</text>
    
    <!-- Highlighted bucket 8 -->
    <rect x="20" y="95" width="80" height="25" fill="url(#tableGradient)" stroke="#059669" stroke-width="2"/>
    <text x="25" y="112" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">8:</text>
    <text x="45" y="112" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">john_doe</text>
    
    <rect x="20" y="120" width="80" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="25" y="137" fill="#64748b" font-family="Arial, sans-serif" font-size="10">9:</text>
    <text x="45" y="137" fill="#64748b" font-family="Arial, sans-serif" font-size="10">empty</text>
    
    <text x="60" y="170" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">3. Store/Retrieve</text>
  </g>
  
  <!-- Process Flow Description -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="700" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <text x="20" y="30" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">How It Works:</text>
    
    <text x="40" y="55" fill="#475569" font-family="Arial, sans-serif" font-size="14">1. <tspan font-weight="bold">Input:</tspan> Give the hash table a key (like "john_doe")</text>
    <text x="40" y="75" fill="#475569" font-family="Arial, sans-serif" font-size="14">2. <tspan font-weight="bold">Hash:</tspan> Function converts key to array index (john_doe → 8)</text>
    <text x="40" y="95" fill="#475569" font-family="Arial, sans-serif" font-size="14">3. <tspan font-weight="bold">Access:</tspan> Go directly to bucket 8 to store/retrieve data</text>
    
    <rect x="500" y="15" width="180" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="590" y="35" text-anchor="middle" fill="#15803d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Time Complexity</text>
    <text x="590" y="55" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="bold">O(1)</text>
    <text x="590" y="75" text-anchor="middle" fill="#15803d" font-family="Arial, sans-serif" font-size="12">Constant time!</text>
    <text x="590" y="90" text-anchor="middle" fill="#15803d" font-family="Arial, sans-serif" font-size="12">Same speed for 10 or 10M items</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
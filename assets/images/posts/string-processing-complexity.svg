<svg role="img" aria-labelledby="title desc" viewBox="0 0 1000 450" xmlns="http://www.w3.org/2000/svg">
  <title id="title">String Processing Complexity</title>
  <desc id="desc">Demonstrates string immutability issues and Unicode complexity</desc>
  
  <rect width="1000" height="450" fill="#f8fafc"/>
  
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">
    String Processing: Hidden Complexity
  </text>
  
  <!-- String Concatenation Problem -->
  <g transform="translate(50, 60)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">
      ❌ Inefficient String Concatenation O(n²)
    </text>
    
    <!-- Step 1 -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Step 1:</text>
      <rect x="50" y="-15" width="40" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="3"/>
      <text x="70" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"A"</text>
      <text x="100" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">+</text>
      <rect x="110" y="-15" width="40" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="3"/>
      <text x="130" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"B"</text>
      <text x="160" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">=</text>
      <rect x="170" y="-15" width="50" height="25" fill="#dcfce7" stroke="#10b981" stroke-width="1" rx="3"/>
      <text x="195" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"AB"</text>
    </g>
    
    <!-- Step 2 -->
    <g transform="translate(0, 70)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Step 2:</text>
      <rect x="50" y="-15" width="50" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="3"/>
      <text x="75" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"AB"</text>
      <text x="110" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">+</text>
      <rect x="120" y="-15" width="40" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="3"/>
      <text x="140" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"C"</text>
      <text x="170" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">=</text>
      <rect x="180" y="-15" width="60" height="25" fill="#dcfce7" stroke="#10b981" stroke-width="1" rx="3"/>
      <text x="210" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"ABC"</text>
    </g>
    
    <!-- Step 3 -->
    <g transform="translate(0, 110)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Step 3:</text>
      <rect x="50" y="-15" width="60" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="3"/>
      <text x="80" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"ABC"</text>
      <text x="120" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">+</text>
      <rect x="130" y="-15" width="40" height="25" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="3"/>
      <text x="150" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"D"</text>
      <text x="180" y="0" font-family="Arial, sans-serif" font-size="12" fill="#64748b">=</text>
      <rect x="190" y="-15" width="70" height="25" fill="#dcfce7" stroke="#10b981" stroke-width="1" rx="3"/>
      <text x="225" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">"ABCD"</text>
    </g>
    
    <text x="200" y="160" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">
      Each concatenation creates new string, copies all characters
    </text>
    <text x="200" y="180" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">
      Total operations: 1 + 2 + 3 + ... + n = O(n²)
    </text>
  </g>
  
  <!-- Efficient String Building -->
  <g transform="translate(550, 60)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">
      ✅ Efficient String Building O(n)
    </text>
    
    <!-- StringBuilder approach -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="400" height="120" fill="#f0fdf4" stroke="#10b981" stroke-width="2" rx="8"/>
      <text x="200" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">
        StringBuilder / Array Approach
      </text>
      
      <!-- Dynamic array -->
      <rect x="50" y="40" width="40" height="25" fill="white" stroke="#10b981" stroke-width="1"/>
      <text x="70" y="57" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">A</text>
      
      <rect x="90" y="40" width="40" height="25" fill="white" stroke="#10b981" stroke-width="1"/>
      <text x="110" y="57" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">B</text>
      
      <rect x="130" y="40" width="40" height="25" fill="white" stroke="#10b981" stroke-width="1"/>
      <text x="150" y="57" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">C</text>
      
      <rect x="170" y="40" width="40" height="25" fill="white" stroke="#10b981" stroke-width="1"/>
      <text x="190" y="57" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">D</text>
      
      <rect x="210" y="40" width="40" height="25" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
      <rect x="250" y="40" width="40" height="25" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
      
      <text x="200" y="85" font-family="Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle">
        Append to array: O(1) per character
      </text>
      <text x="200" y="105" font-family="Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle">
        Final join: O(n) total
      </text>
    </g>
  </g>
  
  <!-- Unicode Complexity -->
  <g transform="translate(50, 280)">
    <text x="450" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7c3aed" text-anchor="middle">
      Unicode Complexity: Not All Characters Are Equal
    </text>
    
    <!-- Simple ASCII -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">ASCII (1 byte):</text>
      <rect x="120" y="-15" width="30" height="25" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
      <text x="135" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">A</text>
      <text x="160" y="0" font-family="Arial, sans-serif" font-size="10" fill="#64748b">1 byte</text>
    </g>
    
    <!-- UTF-8 Multi-byte -->
    <g transform="translate(0, 70)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">UTF-8 (2-4 bytes):</text>
      <rect x="120" y="-15" width="30" height="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="135" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">ñ</text>
      <text x="160" y="0" font-family="Arial, sans-serif" font-size="10" fill="#64748b">2 bytes</text>
      
      <rect x="200" y="-15" width="30" height="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="215" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">中</text>
      <text x="240" y="0" font-family="Arial, sans-serif" font-size="10" fill="#64748b">3 bytes</text>
      
      <rect x="280" y="-15" width="30" height="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="295" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">🚀</text>
      <text x="320" y="0" font-family="Arial, sans-serif" font-size="10" fill="#64748b">4 bytes</text>
    </g>
    
    <!-- Complex Emoji -->
    <g transform="translate(0, 110)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Complex Emoji:</text>
      <rect x="120" y="-15" width="200" height="25" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
      <text x="220" y="0" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">👨‍👩‍👧‍👦</text>
      <text x="330" y="0" font-family="Arial, sans-serif" font-size="10" fill="#64748b">11 code points, 25 bytes</text>
    </g>
    
    <!-- Warning box -->
    <rect x="450" y="30" width="450" height="100" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="675" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">
      ⚠️ Common Mistakes
    </text>
    <text x="470" y="80" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      • Counting bytes instead of characters
    </text>
    <text x="470" y="100" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      • Assuming 1 character = 1 byte
    </text>
    <text x="470" y="120" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      • Splitting multi-byte sequences incorrectly
    </text>
  </g>
</svg>
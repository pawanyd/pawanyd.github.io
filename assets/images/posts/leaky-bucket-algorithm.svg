<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#1f2937">Leaky Bucket Algorithm</text>
  
  <!-- Visual Representation -->
  <g transform="translate(100, 80)">
    <text x="150" y="0" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">Requests Flow at Constant Rate</text>
    
    <!-- Incoming requests (top) -->
    <g transform="translate(0, 30)">
      <text x="150" y="0" font-size="12" text-anchor="middle" fill="#dc2626">Incoming Requests (Variable Rate)</text>
      
      <!-- Request arrows coming in -->
      <path d="M 80 20 L 80 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 120 15 L 120 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 160 25 L 160 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 200 18 L 200 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 240 22 L 240 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      
      <text x="30" y="40" font-size="10" fill="#dc2626">Fast</text>
    </g>
    
    <!-- The Bucket -->
    <g transform="translate(50, 100)">
      <!-- Bucket shape -->
      <path d="M 40 0 L 20 150 Q 20 170 40 170 L 160 170 Q 180 170 180 150 L 160 0 Z" 
            fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
      
      <!-- Queue label -->
      <text x="100" y="-10" font-size="12" font-weight="bold" text-anchor="middle" fill="#1f2937">Queue (Bucket)</text>
      
      <!-- Requests in queue -->
      <rect x="50" y="30" width="100" height="20" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
      <text x="100" y="45" font-size="10" text-anchor="middle" fill="#fff">Request 1</text>
      
      <rect x="50" y="60" width="100" height="20" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
      <text x="100" y="75" font-size="10" text-anchor="middle" fill="#fff">Request 2</text>
      
      <rect x="50" y="90" width="100" height="20" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
      <text x="100" y="105" font-size="10" text-anchor="middle" fill="#fff">Request 3</text>
      
      <rect x="50" y="120" width="100" height="20" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
      <text x="100" y="135" font-size="10" text-anchor="middle" fill="#fff">Request 4</text>
      
      <!-- Capacity indicator -->
      <text x="100" y="195" font-size="11" text-anchor="middle" fill="#1f2937">Capacity: 10 requests</text>
      <text x="100" y="210" font-size="11" text-anchor="middle" fill="#f59e0b">Current: 4 requests</text>
    </g>
    
    <!-- The Leak (hole at bottom) -->
    <g transform="translate(140, 270)">
      <!-- Hole -->
      <ellipse cx="10" cy="0" rx="15" ry="8" fill="#374151"/>
      
      <!-- Dripping requests -->
      <circle cx="10" cy="20" r="4" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <circle cx="10" cy="40" r="4" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <circle cx="10" cy="60" r="4" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      
      <path d="M 10 70 L 10 100" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="3,3"/>
    </g>
    
    <!-- Outgoing requests -->
    <g transform="translate(50, 380)">
      <text x="100" y="0" font-size="12" text-anchor="middle" fill="#10b981">Processed Requests (Constant Rate)</text>
      
      <!-- Even spacing showing constant rate -->
      <circle cx="50" cy="20" r="6" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <circle cx="90" cy="20" r="6" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <circle cx="130" cy="20" r="6" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <circle cx="170" cy="20" r="6" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      
      <text x="220" y="25" font-size="10" fill="#10b981">Constant</text>
      
      <text x="100" y="50" font-size="11" text-anchor="middle" fill="#1f2937">Outflow Rate: 2 requests/second</text>
    </g>
  </g>
  
  <!-- Overflow scenario -->
  <g transform="translate(500, 80)">
    <text x="150" y="0" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">When Bucket is Full</text>
    
    <!-- Incoming requests -->
    <g transform="translate(0, 30)">
      <text x="150" y="0" font-size="12" text-anchor="middle" fill="#dc2626">Too Many Requests!</text>
      
      <path d="M 100 20 L 100 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 130 15 L 130 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 160 18 L 160 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 190 22 L 190 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path d="M 220 20 L 220 60" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
    </g>
    
    <!-- Full Bucket -->
    <g transform="translate(50, 100)">
      <path d="M 40 0 L 20 150 Q 20 170 40 170 L 160 170 Q 180 170 180 150 L 160 0 Z" 
            fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
      
      <text x="100" y="-10" font-size="12" font-weight="bold" text-anchor="middle" fill="#dc2626">Queue FULL!</text>
      
      <!-- Full queue -->
      <rect x="50" y="20" width="100" height="18" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="3"/>
      <rect x="50" y="42" width="100" height="18" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="3"/>
      <rect x="50" y="64" width="100" height="18" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="3"/>
      <rect x="50" y="86" width="100" height="18" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="3"/>
      <rect x="50" y="108" width="100" height="18" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="3"/>
      <rect x="50" y="130" width="100" height="18" fill="#ef4444" stroke="#dc2626" stroke-width="2" rx="3"/>
      
      <text x="100" y="195" font-size="11" font-weight="bold" text-anchor="middle" fill="#dc2626">10/10 FULL</text>
    </g>
    
    <!-- Rejected requests -->
    <g transform="translate(0, 100)">
      <path d="M 30 50 L -30 50" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)" stroke-dasharray="5,5"/>
      <text x="-50" y="45" font-size="10" fill="#dc2626">Rejected</text>
      <text x="-50" y="60" font-size="10" fill="#dc2626">429 Error</text>
    </g>
  </g>
  
  <!-- Algorithm comparison -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="800" height="150" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" rx="8"/>
    <text x="400" y="25" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">Key Characteristics</text>
    
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-size="13" font-weight="bold" fill="#1f2937">Pros:</text>
      <text x="0" y="20" font-size="11" fill="#059669">✓ Smooth, constant output rate</text>
      <text x="0" y="38" font-size="11" fill="#059669">✓ Prevents traffic spikes to downstream services</text>
      <text x="0" y="56" font-size="11" fill="#059669">✓ Simple to implement with a queue</text>
      <text x="0" y="74" font-size="11" fill="#059669">✓ Memory efficient</text>
      <text x="0" y="92" font-size="11" fill="#059669">✓ Predictable resource usage</text>
    </g>
    
    <g transform="translate(420, 45)">
      <text x="0" y="0" font-size="13" font-weight="bold" fill="#1f2937">Cons:</text>
      <text x="0" y="20" font-size="11" fill="#dc2626">✗ No burst allowance (strict rate)</text>
      <text x="0" y="38" font-size="11" fill="#dc2626">✗ Recent requests can be delayed</text>
      <text x="0" y="56" font-size="11" fill="#dc2626">✗ Queue can fill up during spikes</text>
      <text x="0" y="74" font-size="11" fill="#dc2626">✗ Adds latency (queuing delay)</text>
      <text x="0" y="92" font-size="11" fill="#dc2626">✗ Not ideal for bursty traffic patterns</text>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>
</svg>

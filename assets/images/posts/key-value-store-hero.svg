<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#1f2937"/>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Key-Value Store Design
  </text>
  
  <!-- Central concept: Hash ring with servers -->
  <circle cx="600" cy="350" r="180" fill="none" stroke="url(#heroGrad)" stroke-width="4" opacity="0.3"/>
  
  <!-- Servers on the ring -->
  <g id="server1">
    <circle cx="600" cy="170" r="40" fill="#3b82f6"/>
    <text x="600" y="180" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">S1</text>
  </g>
  
  <g id="server2">
    <circle cx="780" cy="350" r="40" fill="#10b981"/>
    <text x="780" y="360" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">S2</text>
  </g>
  
  <g id="server3">
    <circle cx="600" cy="530" r="40" fill="#f59e0b"/>
    <text x="600" y="540" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">S3</text>
  </g>
  
  <g id="server4">
    <circle cx="420" cy="350" r="40" fill="#8b5cf6"/>
    <text x="420" y="360" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">S4</text>
  </g>
  
  <!-- Key-value pairs -->
  <g id="kv1">
    <rect x="150" y="200" width="180" height="60" rx="8" fill="#3b82f6" opacity="0.8"/>
    <text x="240" y="225" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">key: "user:123"</text>
    <text x="240" y="245" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">value: {...}</text>
  </g>
  
  <g id="kv2">
    <rect x="870" y="200" width="180" height="60" rx="8" fill="#10b981" opacity="0.8"/>
    <text x="960" y="225" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">key: "session:abc"</text>
    <text x="960" y="245" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">value: {...}</text>
  </g>
  
  <g id="kv3">
    <rect x="870" y="450" width="180" height="60" rx="8" fill="#f59e0b" opacity="0.8"/>
    <text x="960" y="475" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">key: "cache:xyz"</text>
    <text x="960" y="495" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">value: {...}</text>
  </g>
  
  <!-- Arrows showing distribution -->
  <path d="M 330 230 L 380 230" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 870 230 L 820 280" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 870 480 L 640 520" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
  
  <!-- Subtitle -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">
    Distributed • Scalable • Highly Available
  </text>
</svg>

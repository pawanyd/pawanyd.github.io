<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f2937">Rate Limiter Placement Options</text>
  
  <!-- Option 1: Client-Side -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="200" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
    <text x="100" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#92400e">Client-Side</text>
    
    <rect x="40" y="45" width="120" height="35" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="4"/>
    <text x="100" y="67" font-size="12" text-anchor="middle" fill="#1f2937">Client App</text>
    
    <rect x="40" y="90" width="120" height="35" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
    <text x="100" y="107" font-size="11" text-anchor="middle" fill="#fff">Rate Limiter</text>
    
    <text x="100" y="150" font-size="10" text-anchor="middle" fill="#dc2626">❌ Not Secure</text>
  </g>
  
  <!-- Option 2: Server-Side -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="200" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
    <text x="100" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Server-Side</text>
    
    <rect x="40" y="45" width="120" height="35" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
    <text x="100" y="67" font-size="12" text-anchor="middle" fill="#fff">App Server</text>
    
    <rect x="40" y="90" width="120" height="35" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="100" y="107" font-size="11" text-anchor="middle" fill="#fff">Rate Limiter</text>
    
    <text x="100" y="150" font-size="10" text-anchor="middle" fill="#f59e0b">⚠️ Coupled Logic</text>
  </g>
  
  <!-- Option 3: API Gateway (Recommended) -->
  <g transform="translate(550, 80)">
    <rect x="0" y="0" width="200" height="140" fill="#d1fae5" stroke="#10b981" stroke-width="3" rx="8"/>
    <text x="100" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#065f46">API Gateway ✓</text>
    
    <rect x="40" y="45" width="120" height="35" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="100" y="67" font-size="12" text-anchor="middle" fill="#fff">Rate Limiter</text>
    
    <rect x="40" y="90" width="120" height="35" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
    <text x="100" y="107" font-size="11" text-anchor="middle" fill="#fff">App Server</text>
    
    <text x="100" y="150" font-size="10" text-anchor="middle" fill="#10b981">✓ Best Practice</text>
  </g>
  
  <!-- Flow Diagram -->
  <text x="400" y="260" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">Recommended Architecture Flow</text>
  
  <!-- Client -->
  <rect x="50" y="300" width="100" height="60" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="100" y="325" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">Client</text>
  <text x="100" y="343" font-size="11" text-anchor="middle" fill="#fff">Browser/</text>
  <text x="100" y="357" font-size="11" text-anchor="middle" fill="#fff">Mobile App</text>
  
  <!-- Arrow 1 -->
  <path d="M 150 330 L 230 330" stroke="#1f2937" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="190" y="320" font-size="10" text-anchor="middle" fill="#1f2937">Request</text>
  
  <!-- API Gateway with Rate Limiter -->
  <rect x="230" y="280" width="140" height="100" fill="#d1fae5" stroke="#10b981" stroke-width="3" rx="6"/>
  <text x="300" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="#065f46">API Gateway</text>
  <rect x="250" y="315" width="100" height="30" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="300" y="333" font-size="11" text-anchor="middle" fill="#fff">Rate Limiter</text>
  <text x="300" y="365" font-size="10" text-anchor="middle" fill="#065f46">Check Limit</text>
  
  <!-- Arrow 2 -->
  <path d="M 370 330 L 450 330" stroke="#1f2937" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="410" y="320" font-size="10" text-anchor="middle" fill="#10b981">Allowed</text>
  
  <!-- Application Servers -->
  <rect x="450" y="300" width="120" height="60" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="510" y="325" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">App Servers</text>
  <text x="510" y="345" font-size="11" text-anchor="middle" fill="#fff">Backend</text>
  
  <!-- Arrow 3 -->
  <path d="M 570 330 L 630 330" stroke="#1f2937" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Database -->
  <ellipse cx="680" cy="330" rx="50" ry="40" fill="#a78bfa" stroke="#7c3aed" stroke-width="2"/>
  <text x="680" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Database</text>
  
  <!-- Rejected Path -->
  <path d="M 300 280 L 300 240 L 100 240 L 100 300" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)" stroke-dasharray="5,5"/>
  <text x="200" y="230" font-size="10" text-anchor="middle" fill="#dc2626">429 Too Many Requests</text>
  
  <!-- Redis Cache -->
  <rect x="230" y="420" width="140" height="60" fill="#fca5a5" stroke="#dc2626" stroke-width="2" rx="6"/>
  <text x="300" y="445" font-size="13" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Redis Cache</text>
  <text x="300" y="463" font-size="10" text-anchor="middle" fill="#7f1d1d">Rate Limit Counters</text>
  
  <!-- Connection to Redis -->
  <path d="M 300 380 L 300 420" stroke="#1f2937" stroke-width="2" fill="none" marker-end="url(#arrowhead)" marker-start="url(#arrowhead)"/>
  <text x="320" y="405" font-size="10" fill="#1f2937">Read/Write</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1f2937"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <text x="50" y="540" font-size="12" font-weight="bold" fill="#1f2937">Key Benefits:</text>
  <text x="50" y="560" font-size="10" fill="#1f2937">• Centralized control</text>
  <text x="50" y="575" font-size="10" fill="#1f2937">• Protects all backend services</text>
  
  <text x="250" y="560" font-size="10" fill="#1f2937">• Independent scaling</text>
  <text x="250" y="575" font-size="10" fill="#1f2937">• Easy rule updates</text>
  
  <text x="450" y="560" font-size="10" fill="#1f2937">• Low latency with Redis</text>
  <text x="450" y="575" font-size="10" fill="#1f2937">• High availability</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="asymmetricGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="symmetricGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">SSL Encryption: Asymmetric vs Symmetric</text>
  
  <!-- Asymmetric Encryption Section -->
  <rect x="50" y="60" width="700" height="180" rx="8" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="2"/>
  <text x="70" y="85" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6">Asymmetric Encryption (Handshake Phase)</text>
  
  <!-- Public Key -->
  <rect x="80" y="110" width="80" height="50" rx="4" fill="url(#asymmetricGradient)"/>
  <text x="120" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Public</text>
  <text x="120" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Key</text>
  
  <!-- Arrow -->
  <path d="M 170 135 L 220 135" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="195" y="125" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle">Encrypt</text>
  
  <!-- Encrypted Data -->
  <rect x="230" y="110" width="100" height="50" rx="4" fill="#374151"/>
  <text x="280" y="130" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">🔒 Encrypted</text>
  <text x="280" y="145" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Data</text>
  
  <!-- Arrow -->
  <path d="M 340 135 L 390 135" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="365" y="125" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle">Decrypt</text>
  
  <!-- Private Key -->
  <rect x="400" y="110" width="80" height="50" rx="4" fill="url(#asymmetricGradient)"/>
  <text x="440" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Private</text>
  <text x="440" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Key</text>
  
  <!-- Characteristics -->
  <text x="520" y="125" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6">✓ Secure key exchange</text>
  <text x="520" y="140" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6">✓ No shared secret needed</text>
  <text x="520" y="155" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">✗ Computationally expensive</text>
  
  <!-- Use Case -->
  <rect x="80" y="180" width="400" height="40" rx="4" fill="#8b5cf6" opacity="0.2"/>
  <text x="90" y="195" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">Used for:</text>
  <text x="90" y="210" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6">Handshake, key exchange, digital signatures, certificate verification</text>
  
  <!-- Symmetric Encryption Section -->
  <rect x="50" y="260" width="700" height="180" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="70" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981">Symmetric Encryption (Data Transfer Phase)</text>
  
  <!-- Shared Key -->
  <rect x="80" y="310" width="80" height="50" rx="4" fill="url(#symmetricGradient)"/>
  <text x="120" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Shared</text>
  <text x="120" y="345" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Key</text>
  
  <!-- Arrow -->
  <path d="M 170 335 L 220 335" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="195" y="325" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Encrypt</text>
  
  <!-- Encrypted Data -->
  <rect x="230" y="310" width="100" height="50" rx="4" fill="#374151"/>
  <text x="280" y="330" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">🔒 Encrypted</text>
  <text x="280" y="345" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Data</text>
  
  <!-- Arrow -->
  <path d="M 340 335 L 390 335" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="365" y="325" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Decrypt</text>
  
  <!-- Same Shared Key -->
  <rect x="400" y="310" width="80" height="50" rx="4" fill="url(#symmetricGradient)"/>
  <text x="440" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Same</text>
  <text x="440" y="345" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Key</text>
  
  <!-- Characteristics -->
  <text x="520" y="325" font-family="Arial, sans-serif" font-size="12" fill="#10b981">✓ Very fast</text>
  <text x="520" y="340" font-family="Arial, sans-serif" font-size="12" fill="#10b981">✓ Low CPU usage</text>
  <text x="520" y="355" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">✗ Key distribution problem</text>
  
  <!-- Use Case -->
  <rect x="80" y="380" width="400" height="40" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="90" y="395" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Used for:</text>
  <text x="90" y="410" font-family="Arial, sans-serif" font-size="10" fill="#10b981">Bulk data encryption (web pages, files, API responses)</text>
  
  <!-- Bottom Summary -->
  <rect x="50" y="460" width="700" height="30" rx="4" fill="#374151"/>
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SSL uses BOTH: Asymmetric for secure key exchange, Symmetric for fast data transfer</text>
</svg>
<svg role="img" aria-labelledby="title desc" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <title id="title">Arrays Fundamentals</title>
  <desc id="desc">Comparison of array vs linked list memory layout and access patterns</desc>
  
  <rect width="1000" height="400" fill="#f8fafc"/>
  
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">
    Array vs Linked List: Memory Layout &amp; Access
  </text>
  
  <!-- Array Section -->
  <g transform="translate(50, 70)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb" text-anchor="middle">
      Array: Contiguous Memory
    </text>
    
    <!-- Memory blocks -->
    <rect x="0" y="20" width="60" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="30" y="45" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">A</text>
    
    <rect x="60" y="20" width="60" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="90" y="45" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">B</text>
    
    <rect x="120" y="20" width="60" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="45" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">C</text>
    
    <rect x="180" y="20" width="60" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="210" y="45" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">D</text>
    
    <rect x="240" y="20" width="60" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="270" y="45" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">E</text>
    
    <!-- Memory addresses -->
    <text x="30" y="80" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">1000</text>
    <text x="90" y="80" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">1004</text>
    <text x="150" y="80" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">1008</text>
    <text x="210" y="80" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">1012</text>
    <text x="270" y="80" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">1016</text>
    
    <!-- Access arrow -->
    <path d="M150 100 L150 70" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="150" y="120" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle">
      arr[2] = Direct O(1) access
    </text>
    
    <!-- Cache benefit -->
    <rect x="60" y="140" width="180" height="30" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4"/>
    <text x="150" y="160" font-family="Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle">
      CPU Cache: Adjacent elements loaded together
    </text>
  </g>
  
  <!-- Linked List Section -->
  <g transform="translate(50, 250)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7c3aed" text-anchor="middle">
      Linked List: Scattered Memory
    </text>
    
    <!-- Nodes scattered -->
    <g transform="translate(0, 20)">
      <!-- Node 1 -->
      <rect x="0" y="0" width="50" height="30" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="25" y="20" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">A</text>
      <text x="25" y="50" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">2048</text>
      
      <!-- Arrow to Node 2 -->
      <path d="M50 15 Q100 15 140 35" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
      
      <!-- Node 2 -->
      <rect x="140" y="20" width="50" height="30" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="165" y="40" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">B</text>
      <text x="165" y="70" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">3072</text>
      
      <!-- Arrow to Node 3 -->
      <path d="M190 35 Q220 35 250 15" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
      
      <!-- Node 3 -->
      <rect x="250" y="0" width="50" height="30" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <text x="275" y="20" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle">C</text>
      <text x="275" y="50" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">1536</text>
    </g>
    
    <!-- Access path -->
    <text x="150" y="100" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle">
      Access C: A → B → C = O(n) traversal
    </text>
    
    <!-- Cache miss -->
    <rect x="60" y="110" width="180" height="30" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="4"/>
    <text x="150" y="130" font-family="Arial, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle">
      Cache Miss: Random memory locations
    </text>
  </g>
  
  <!-- Performance comparison -->
  <g transform="translate(550, 100)">
    <rect x="0" y="0" width="400" height="200" fill="white" stroke="#e2e8f0" stroke-width="2" rx="8"/>
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
      Performance Comparison
    </text>
    
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">
      Operation
    </text>
    <text x="150" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2563eb">
      Array
    </text>
    <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">
      Linked List
    </text>
    
    <line x1="20" y1="65" x2="360" y2="65" stroke="#e2e8f0" stroke-width="1"/>
    
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Access by index</text>
    <text x="150" y="85" font-family="Arial, sans-serif" font-size="12" fill="#10b981">O(1)</text>
    <text x="250" y="85" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">O(n)</text>
    
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Insert at beginning</text>
    <text x="150" y="105" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">O(n)</text>
    <text x="250" y="105" font-family="Arial, sans-serif" font-size="12" fill="#10b981">O(1)</text>
    
    <text x="20" y="125" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Insert at end</text>
    <text x="150" y="125" font-family="Arial, sans-serif" font-size="12" fill="#10b981">O(1)*</text>
    <text x="250" y="125" font-family="Arial, sans-serif" font-size="12" fill="#10b981">O(1)</text>
    
    <text x="20" y="145" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Memory usage</text>
    <text x="150" y="145" font-family="Arial, sans-serif" font-size="12" fill="#10b981">Lower</text>
    <text x="250" y="145" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b">Higher</text>
    
    <text x="20" y="165" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Cache performance</text>
    <text x="150" y="165" font-family="Arial, sans-serif" font-size="12" fill="#10b981">Excellent</text>
    <text x="250" y="165" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">Poor</text>
    
    <text x="20" y="185" font-family="Arial, sans-serif" font-size="10" fill="#64748b">*Amortized for dynamic arrays</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
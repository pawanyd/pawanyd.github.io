<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f3f4f6" rx="8"/>
  
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">Hashing Approach: The Collision Problem</text>

  <!-- Input URL -->
  <rect x="50" y="150" width="160" height="60" rx="8" fill="#3b82f6"/>
  <text x="130" y="185" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Long URL</text>

  <!-- Hash Function -->
  <rect x="290" y="130" width="120" height="100" rx="50" fill="#8b5cf6"/>
  <text x="350" y="175" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">MD5 / SHA-1</text>
  <text x="350" y="195" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Hash Function</text>

  <!-- Output Hash -->
  <rect x="490" y="150" width="220" height="60" rx="8" fill="#f59e0b"/>
  <text x="600" y="185" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">5d41402abc4b2a76b971...</text>

  <!-- Truncated Hash -->
  <rect x="490" y="270" width="120" height="60" rx="8" fill="#10b981"/>
  <text x="550" y="305" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">5d41402</text>
  <text x="550" y="345" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">Take First 7 Chars</text>

  <!-- Arrows -->
  <path d="M 210 180 L 280 180" stroke="#1f2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="280,180 270,175 270,185" fill="#1f2937"/>

  <path d="M 410 180 L 480 180" stroke="#1f2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="480,180 470,175 470,185" fill="#1f2937"/>

  <path d="M 600 210 L 600 240 L 550 240 L 550 260" stroke="#1f2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="550,260 545,250 555,250" fill="#1f2937"/>

  <!-- Collision Warning -->
  <g transform="translate(630, 270)">
    <circle cx="30" cy="30" r="25" fill="#ef4444"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">!</text>
    <text x="30" y="70" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">Collision Risk</text>
  </g>
</svg>

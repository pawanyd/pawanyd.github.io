<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="comparison-title comparison-desc">
  <title id="comparison-title">Max Heap vs Min Heap Comparison</title>
  <desc id="comparison-desc">Side-by-side comparison showing the structural difference between max heap and min heap</desc>
  
  <!-- Background -->
  <rect width="1000" height="500" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Max Heap vs Min Heap
  </text>
  
  <!-- Max Heap Section -->
  <g transform="translate(0, 80)">
    <text x="250" y="0" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ef4444" text-anchor="middle">
      Max Heap
    </text>
    <text x="250" y="25" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
      (Parent ≥ Children)
    </text>
    
    <!-- Root -->
    <circle cx="250" cy="80" r="32" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="250" y="88" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">90</text>
    
    <!-- Level 2 -->
    <line x1="250" y1="112" x2="180" y2="158" stroke="#9ca3af" stroke-width="2"/>
    <line x1="250" y1="112" x2="320" y2="158" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="180" cy="180" r="28" fill="#f87171" stroke="#ef4444" stroke-width="2"/>
    <text x="180" y="187" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">70</text>
    
    <circle cx="320" cy="180" r="28" fill="#f87171" stroke="#ef4444" stroke-width="2"/>
    <text x="320" y="187" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">80</text>
    
    <!-- Level 3 -->
    <line x1="180" y1="208" x2="130" y2="254" stroke="#9ca3af" stroke-width="2"/>
    <line x1="180" y1="208" x2="230" y2="254" stroke="#9ca3af" stroke-width="2"/>
    <line x1="320" y1="208" x2="270" y2="254" stroke="#9ca3af" stroke-width="2"/>
    <line x1="320" y1="208" x2="370" y2="254" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="130" cy="276" r="24" fill="#fca5a5" stroke="#f87171" stroke-width="2"/>
    <text x="130" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">40</text>
    
    <circle cx="230" cy="276" r="24" fill="#fca5a5" stroke="#f87171" stroke-width="2"/>
    <text x="230" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">50</text>
    
    <circle cx="270" cy="276" r="24" fill="#fca5a5" stroke="#f87171" stroke-width="2"/>
    <text x="270" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">60</text>
    
    <circle cx="370" cy="276" r="24" fill="#fca5a5" stroke="#f87171" stroke-width="2"/>
    <text x="370" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">75</text>
    
    <!-- Use cases -->
    <rect x="50" y="320" width="400" height="60" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <text x="250" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Use Cases:
    </text>
    <text x="250" y="365" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
      • Find K largest elements • Priority scheduling
    </text>
  </g>
  
  <!-- Min Heap Section -->
  <g transform="translate(500, 80)">
    <text x="250" y="0" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981" text-anchor="middle">
      Min Heap
    </text>
    <text x="250" y="25" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
      (Parent ≤ Children)
    </text>
    
    <!-- Root -->
    <circle cx="250" cy="80" r="32" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="250" y="88" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">10</text>
    
    <!-- Level 2 -->
    <line x1="250" y1="112" x2="180" y2="158" stroke="#9ca3af" stroke-width="2"/>
    <line x1="250" y1="112" x2="320" y2="158" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="180" cy="180" r="28" fill="#34d399" stroke="#10b981" stroke-width="2"/>
    <text x="180" y="187" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">30</text>
    
    <circle cx="320" cy="180" r="28" fill="#34d399" stroke="#10b981" stroke-width="2"/>
    <text x="320" y="187" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">20</text>
    
    <!-- Level 3 -->
    <line x1="180" y1="208" x2="130" y2="254" stroke="#9ca3af" stroke-width="2"/>
    <line x1="180" y1="208" x2="230" y2="254" stroke="#9ca3af" stroke-width="2"/>
    <line x1="320" y1="208" x2="270" y2="254" stroke="#9ca3af" stroke-width="2"/>
    <line x1="320" y1="208" x2="370" y2="254" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="130" cy="276" r="24" fill="#6ee7b7" stroke="#34d399" stroke-width="2"/>
    <text x="130" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">60</text>
    
    <circle cx="230" cy="276" r="24" fill="#6ee7b7" stroke="#34d399" stroke-width="2"/>
    <text x="230" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">50</text>
    
    <circle cx="270" cy="276" r="24" fill="#6ee7b7" stroke="#34d399" stroke-width="2"/>
    <text x="270" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">40</text>
    
    <circle cx="370" cy="276" r="24" fill="#6ee7b7" stroke="#34d399" stroke-width="2"/>
    <text x="370" y="282" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">25</text>
    
    <!-- Use cases -->
    <rect x="50" y="320" width="400" height="60" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <text x="250" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Use Cases:
    </text>
    <text x="250" y="365" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
      • Dijkstra's algorithm • Find K smallest elements
    </text>
  </g>
  
  <!-- Key difference note -->
  <rect x="200" y="450" width="600" height="40" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="500" y="475" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Same operations, opposite ordering — just flip the comparison!
  </text>
</svg>

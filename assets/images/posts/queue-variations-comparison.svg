<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="variations-title variations-desc">
  <title id="variations-title">Queue Variations Comparison</title>
  <desc id="variations-desc">Comparison of different queue types: simple queue, circular queue, deque, and priority queue</desc>
  
  <!-- Background -->
  <rect width="900" height="650" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Queue Variations &amp; When to Use Them
  </text>
  
  <!-- Simple Queue -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="380" height="250" fill="#eff6ff" rx="10" stroke="#3b82f6" stroke-width="2"/>
    
    <text x="190" y="30" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
      Simple Queue (Linear)
    </text>
    
    <!-- Visual -->
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="60" height="40" fill="#3b82f6" rx="5"/>
      <text x="30" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">A</text>
      
      <rect x="70" y="0" width="60" height="40" fill="#3b82f6" rx="5"/>
      <text x="100" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">B</text>
      
      <rect x="140" y="0" width="60" height="40" fill="#3b82f6" rx="5"/>
      <text x="170" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">C</text>
      
      <rect x="210" y="0" width="60" height="40" fill="#3b82f6" rx="5"/>
      <text x="240" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">D</text>
      
      <text x="30" y="-10" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="11" font-weight="bold">FRONT</text>
      <text x="240" y="-10" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold">REAR</text>
    </g>
    
    <text x="20" y="120" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      Characteristics:
    </text>
    <text x="20" y="140" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Fixed size or dynamic array
    </text>
    <text x="20" y="158" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Wastes space when front moves
    </text>
    <text x="20" y="176" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Simple implementation
    </text>
    
    <text x="20" y="205" fill="#065f46" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      ✓ Best for: Basic FIFO needs, small queues
    </text>
    <text x="20" y="225" fill="#991b1b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      ✗ Avoid: Memory-constrained systems
    </text>
  </g>
  
  <!-- Circular Queue -->
  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="380" height="250" fill="#fef3c7" rx="10" stroke="#f59e0b" stroke-width="2"/>
    
    <text x="190" y="30" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
      Circular Queue
    </text>
    
    <!-- Visual -->
    <g transform="translate(110, 50)">
      <circle cx="80" cy="40" r="70" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="5,5"/>
      
      <rect x="60" y="-10" width="40" height="30" fill="#f59e0b" rx="5"/>
      <text x="80" y="10" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">A</text>
      
      <rect x="110" y="10" width="40" height="30" fill="#f59e0b" rx="5"/>
      <text x="130" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">B</text>
      
      <rect x="110" y="50" width="40" height="30" fill="#f59e0b" rx="5"/>
      <text x="130" y="70" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">C</text>
      
      <rect x="60" y="70" width="40" height="30" fill="#f59e0b" rx="5"/>
      <text x="80" y="90" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">D</text>
      
      <path d="M 80 -15 L 80 -25" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
      <text x="80" y="-30" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">FRONT</text>
      
      <path d="M 80 105 L 80 115" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
      <text x="80" y="125" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">REAR</text>
    </g>
    
    <text x="20" y="140" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      Characteristics:
    </text>
    <text x="20" y="160" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Wraps around when reaching end
    </text>
    <text x="20" y="178" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Efficient memory usage
    </text>
    <text x="20" y="196" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Fixed size, no wasted space
    </text>
    
    <text x="20" y="220" fill="#065f46" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      ✓ Best for: Embedded systems, buffers
    </text>
  </g>
  
  <!-- Deque (Double-Ended Queue) -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="380" height="250" fill="#f3e8ff" rx="10" stroke="#8b5cf6" stroke-width="2"/>
    
    <text x="190" y="30" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
      Deque (Double-Ended)
    </text>
    
    <!-- Visual -->
    <g transform="translate(40, 50)">
      <rect x="70" y="0" width="60" height="40" fill="#8b5cf6" rx="5"/>
      <text x="100" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">A</text>
      
      <rect x="140" y="0" width="60" height="40" fill="#8b5cf6" rx="5"/>
      <text x="170" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">B</text>
      
      <rect x="210" y="0" width="60" height="40" fill="#8b5cf6" rx="5"/>
      <text x="240" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">C</text>
      
      <!-- Left arrows -->
      <path d="M 60 10 L 40 10" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
      <path d="M 40 30 L 60 30" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
      <text x="10" y="15" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">ADD</text>
      <text x="5" y="35" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">REMOVE</text>
      
      <!-- Right arrows -->
      <path d="M 280 10 L 300 10" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
      <path d="M 300 30 L 280 30" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
      <text x="310" y="15" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">ADD</text>
      <text x="305" y="35" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">REMOVE</text>
      
      <text x="170" y="60" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Operations allowed at both ends
      </text>
    </g>
    
    <text x="20" y="140" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      Characteristics:
    </text>
    <text x="20" y="160" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Add/remove from both ends
    </text>
    <text x="20" y="178" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Can act as stack OR queue
    </text>
    <text x="20" y="196" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Perfect for sliding window problems
    </text>
    
    <text x="20" y="220" fill="#065f46" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      ✓ Best for: Sliding windows, palindromes
    </text>
  </g>
  
  <!-- Priority Queue -->
  <g transform="translate(470, 360)">
    <rect x="0" y="0" width="380" height="250" fill="#fce7f3" rx="10" stroke="#ec4899" stroke-width="2"/>
    
    <text x="190" y="30" text-anchor="middle" fill="#9f1239" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
      Priority Queue
    </text>
    
    <!-- Visual -->
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="80" height="35" fill="#dc2626" rx="5"/>
      <text x="40" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">High (1)</text>
      
      <rect x="90" y="0" width="80" height="35" fill="#f59e0b" rx="5"/>
      <text x="130" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Med (5)</text>
      
      <rect x="180" y="0" width="80" height="35" fill="#3b82f6" rx="5"/>
      <text x="220" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Low (9)</text>
      
      <text x="135" y="55" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Ordered by priority, not arrival time
      </text>
      
      <path d="M 40 -10 L 40 -5" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
      <text x="40" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">DEQUEUE</text>
    </g>
    
    <text x="20" y="130" fill="#374151" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      Characteristics:
    </text>
    <text x="20" y="150" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Elements ordered by priority
    </text>
    <text x="20" y="168" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • High priority dequeued first
    </text>
    <text x="20" y="186" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • Often implemented with heaps
    </text>
    
    <text x="20" y="210" fill="#065f46" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      ✓ Best for: Dijkstra, task scheduling
    </text>
    <text x="20" y="230" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
      Used by: OS schedulers, graph algorithms
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
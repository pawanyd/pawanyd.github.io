<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="structure-title structure-desc">
  <title id="structure-title">Heap Structure Visualization</title>
  <desc id="structure-desc">Shows both tree and array representation of a max heap with parent-child index relationships</desc>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Heap Structure: Tree &amp; Array Representation
  </text>
  
  <!-- Tree Representation -->
  <text x="250" y="90" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle">
    Tree View
  </text>
  
  <!-- Root -->
  <circle cx="250" cy="140" r="30" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="250" y="148" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">50</text>
  <text x="250" y="110" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">i=0</text>
  
  <!-- Level 2 -->
  <line x1="250" y1="170" x2="180" y2="220" stroke="#6b7280" stroke-width="2"/>
  <line x1="250" y1="170" x2="320" y2="220" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="180" cy="240" r="28" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="247" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">30</text>
  <text x="180" y="210" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">i=1</text>
  
  <circle cx="320" cy="240" r="28" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="247" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">40</text>
  <text x="320" y="210" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">i=2</text>
  
  <!-- Level 3 -->
  <line x1="180" y1="268" x2="130" y2="318" stroke="#6b7280" stroke-width="2"/>
  <line x1="180" y1="268" x2="230" y2="318" stroke="#6b7280" stroke-width="2"/>
  <line x1="320" y1="268" x2="270" y2="318" stroke="#6b7280" stroke-width="2"/>
  <line x1="320" y1="268" x2="370" y2="318" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="130" cy="340" r="25" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
  <text x="130" y="346" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">10</text>
  <text x="130" y="310" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">i=3</text>
  
  <circle cx="230" cy="340" r="25" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
  <text x="230" y="346" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">20</text>
  <text x="230" y="310" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">i=4</text>
  
  <circle cx="270" cy="340" r="25" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
  <text x="270" y="346" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">15</text>
  <text x="270" y="310" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">i=5</text>
  
  <circle cx="370" cy="340" r="25" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
  <text x="370" y="346" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">25</text>
  <text x="370" y="310" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">i=6</text>
  
  <!-- Array Representation -->
  <text x="700" y="90" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle">
    Array View
  </text>
  
  <!-- Array boxes -->
  <g transform="translate(520, 110)">
    <rect x="0" y="0" width="50" height="50" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="25" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">50</text>
    <text x="25" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">0</text>
    
    <rect x="60" y="0" width="50" height="50" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="85" y="32" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">30</text>
    <text x="85" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">1</text>
    
    <rect x="120" y="0" width="50" height="50" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="145" y="32" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">40</text>
    <text x="145" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">2</text>
    
    <rect x="180" y="0" width="50" height="50" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
    <text x="205" y="32" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">10</text>
    <text x="205" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">3</text>
    
    <rect x="240" y="0" width="50" height="50" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
    <text x="265" y="32" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">20</text>
    <text x="265" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">4</text>
    
    <rect x="300" y="0" width="50" height="50" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
    <text x="325" y="32" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">15</text>
    <text x="325" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">5</text>
    
    <rect x="360" y="0" width="50" height="50" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
    <text x="385" y="32" font-family="Arial, sans-serif" font-size="18" fill="#1f2937" text-anchor="middle">25</text>
    <text x="385" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">6</text>
  </g>
  
  <!-- Index Formulas -->
  <g transform="translate(100, 420)">
    <rect x="0" y="0" width="800" height="140" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Parent-Child Index Relationships
    </text>
    
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="16" fill="#3b82f6" font-weight="bold">
      For element at index i:
    </text>
    
    <text x="70" y="95" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">
      • Left child: 2i + 1
    </text>
    <text x="70" y="120" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">
      • Right child: 2i + 2
    </text>
    
    <text x="420" y="95" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">
      • Parent: (i - 1) / 2
    </text>
    <text x="420" y="120" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">
      • Root is always at index 0
    </text>
  </g>
</svg>

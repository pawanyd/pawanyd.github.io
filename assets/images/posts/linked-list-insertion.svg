<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="newNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a24;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Linked List Insertion Process
  </text>
  
  <!-- Step 1: Original List -->
  <g transform="translate(0, 80)">
    <text x="50" y="20" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Step 1: Original List
    </text>
    
    <g transform="translate(50, 40)">
      <!-- Node A -->
      <rect x="0" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="20" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">A</text>
      <rect x="40" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="47" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">→</text>
      
      <!-- Arrow -->
      <path d="M 65 20 L 95 20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
      
      <!-- Node B -->
      <rect x="100" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="120" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">B</text>
      <rect x="140" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="147" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">→</text>
      
      <!-- Arrow -->
      <path d="M 165 20 L 195 20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
      
      <!-- Node C -->
      <rect x="200" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="220" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">C</text>
      <rect x="240" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="247" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">∅</text>
    </g>
  </g>
  
  <!-- Step 2: Create New Node -->
  <g transform="translate(0, 180)">
    <text x="50" y="20" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Step 2: Create New Node (X) to insert between A and B
    </text>
    
    <g transform="translate(50, 40)">
      <!-- Node A -->
      <rect x="0" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="20" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">A</text>
      <rect x="40" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="47" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">→</text>
      
      <!-- Arrow -->
      <path d="M 65 20 L 95 20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
      
      <!-- Node B -->
      <rect x="100" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="120" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">B</text>
      <rect x="140" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="147" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">→</text>
      
      <!-- Arrow -->
      <path d="M 165 20 L 195 20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
      
      <!-- Node C -->
      <rect x="200" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="220" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">C</text>
      <rect x="240" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="247" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">∅</text>
      
      <!-- New Node X (floating) -->
      <rect x="50" y="70" width="60" height="40" rx="5" fill="url(#newNodeGrad)" stroke="#e74c3c" stroke-width="2"/>
      <text x="70" y="95" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
      <rect x="90" y="80" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="97" y="93" fill="white" font-family="Arial, sans-serif" font-size="10">?</text>
    </g>
  </g>
  
  <!-- Step 3: Update Pointers -->
  <g transform="translate(0, 300)">
    <text x="50" y="20" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Step 3: Update Pointers (X.next = B, A.next = X)
    </text>
    
    <g transform="translate(50, 40)">
      <!-- Node A -->
      <rect x="0" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="20" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">A</text>
      <rect x="40" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="47" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">→</text>
      
      <!-- New Node X -->
      <rect x="100" y="0" width="60" height="40" rx="5" fill="url(#newNodeGrad)" stroke="#e74c3c" stroke-width="2"/>
      <text x="120" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
      <rect x="140" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="147" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">→</text>
      
      <!-- Node B -->
      <rect x="200" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="220" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">B</text>
      <rect x="240" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="247" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">→</text>
      
      <!-- Node C -->
      <rect x="300" y="0" width="60" height="40" rx="5" fill="url(#nodeGrad)" stroke="#333" stroke-width="1"/>
      <text x="320" y="25" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">C</text>
      <rect x="340" y="10" width="15" height="20" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
      <text x="347" y="23" fill="white" font-family="Arial, sans-serif" font-size="10">∅</text>
      
      <!-- Arrows -->
      <path d="M 65 20 L 95 20" stroke="#e74c3c" stroke-width="3" marker-end="url(#redArrow)"/>
      <path d="M 165 20 L 195 20" stroke="#e74c3c" stroke-width="3" marker-end="url(#redArrow)"/>
      <path d="M 265 20 L 295 20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
  </g>
  
  <!-- Algorithm Steps -->
  <g transform="translate(450, 120)">
    <rect x="0" y="0" width="320" height="320" rx="10" fill="rgba(255,255,255,0.9)" stroke="#ddd" stroke-width="1"/>
    
    <text x="160" y="30" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
      Insertion Algorithm
    </text>
    
    <text x="20" y="60" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      To insert node X between A and B:
    </text>
    
    <!-- Step 1 -->
    <circle cx="30" cy="85" r="12" fill="#4facfe" stroke="#333" stroke-width="1"/>
    <text x="30" y="90" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
    <text x="50" y="90" fill="#333" font-family="Arial, sans-serif" font-size="14">
      Create new node X
    </text>
    
    <!-- Step 2 -->
    <circle cx="30" cy="115" r="12" fill="#4facfe" stroke="#333" stroke-width="1"/>
    <text x="30" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2</text>
    <text x="50" y="120" fill="#333" font-family="Arial, sans-serif" font-size="14">
      Set X.next = A.next (point to B)
    </text>
    
    <!-- Step 3 -->
    <circle cx="30" cy="145" r="12" fill="#4facfe" stroke="#333" stroke-width="1"/>
    <text x="30" y="150" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
    <text x="50" y="150" fill="#333" font-family="Arial, sans-serif" font-size="14">
      Set A.next = X (point to new node)
    </text>
    
    <text x="20" y="180" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Time Complexity:
    </text>
    <text x="20" y="200" fill="#666" font-family="Arial, sans-serif" font-size="14">
      • At beginning: O(1)
    </text>
    <text x="20" y="215" fill="#666" font-family="Arial, sans-serif" font-size="14">
      • At position n: O(n) to find + O(1) to insert
    </text>
    <text x="20" y="230" fill="#666" font-family="Arial, sans-serif" font-size="14">
      • At end: O(n) without tail pointer
    </text>
    
    <text x="20" y="260" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Key Benefits:
    </text>
    <text x="20" y="280" fill="#666" font-family="Arial, sans-serif" font-size="14">
      • No need to shift existing elements
    </text>
    <text x="20" y="295" fill="#666" font-family="Arial, sans-serif" font-size="14">
      • Dynamic memory allocation
    </text>
    <text x="20" y="310" fill="#666" font-family="Arial, sans-serif" font-size="14">
      • Constant time insertion once position found
    </text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <!-- Background -->
  <rect width="1000" height="700" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">
    URL Shortener Architecture
  </text>
  
  <!-- Users -->
  <g id="users">
    <rect x="50" y="100" width="120" height="60" rx="8" fill="#3b82f6"/>
    <text x="110" y="135" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Users</text>
  </g>
  
  <!-- CDN -->
  <g id="cdn">
    <rect x="250" y="100" width="150" height="60" rx="8" fill="#10b981"/>
    <text x="325" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">CDN</text>
    <text x="325" y="145" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Edge Caching</text>
  </g>
  
  <!-- Load Balancer -->
  <g id="lb">
    <rect x="480" y="100" width="150" height="60" rx="8" fill="#8b5cf6"/>
    <text x="555" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Load Balancer</text>
    <text x="555" y="145" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Traffic Distribution</text>
  </g>
  
  <!-- API Servers -->
  <g id="api-servers">
    <text x="555" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">
      API Servers (Stateless)
    </text>
    <rect x="420" y="220" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="470" y="255" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Server 1</text>
    
    <rect x="540" y="220" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="590" y="255" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Server 2</text>
    
    <rect x="660" y="220" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="710" y="255" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Server N</text>
  </g>
  
  <!-- Redis Cluster -->
  <g id="redis">
    <rect x="200" y="350" width="200" height="100" rx="8" fill="#ef4444"/>
    <text x="300" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Redis Cluster
    </text>
    <text x="300" y="410" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">
      URL Mappings Cache
    </text>
    <text x="300" y="430" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
      95% hit rate
    </text>
  </g>
  
  <!-- Database -->
  <g id="database">
    <rect x="450" y="350" width="200" height="100" rx="8" fill="#f59e0b"/>
    <text x="550" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Database Shards
    </text>
    <text x="550" y="410" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">
      URL Mappings
    </text>
    <text x="550" y="430" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
      Sharded by short_code
    </text>
  </g>
  
  <!-- Message Queue -->
  <g id="queue">
    <rect x="700" y="350" width="200" height="100" rx="8" fill="#8b5cf6"/>
    <text x="800" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Message Queue
    </text>
    <text x="800" y="410" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">
      Kafka / RabbitMQ
    </text>
    <text x="800" y="430" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
      Analytics Events
    </text>
  </g>
  
  <!-- Analytics Workers -->
  <g id="workers">
    <rect x="700" y="500" width="200" height="80" rx="8" fill="#10b981"/>
    <text x="800" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Analytics Workers
    </text>
    <text x="800" y="555" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
      Process Events
    </text>
  </g>
  
  <!-- Analytics DB -->
  <g id="analytics-db">
    <rect x="450" y="500" width="200" height="80" rx="8" fill="#6366f1"/>
    <text x="550" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Analytics DB
    </text>
    <text x="550" y="555" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
      ClickHouse / BigQuery
    </text>
  </g>
  
  <!-- Arrows -->
  <path d="M 170 130 L 250 130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 400 130 L 480 130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 555 160 L 555 220" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  
  <path d="M 470 280 L 300 350" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  <path d="M 590 280 L 550 350" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  <path d="M 710 280 L 800 350" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  
  <path d="M 800 450 L 800 500" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 700 540 L 650 540" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Labels -->
  <text x="210" y="125" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">
    HTTP
  </text>
  <text x="440" y="125" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">
    HTTP
  </text>
  <text x="380" y="320" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">
    Cache
  </text>
  <text x="520" y="320" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">
    Store
  </text>
  <text x="750" y="320" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">
    Events
  </text>
  
  <!-- Key Features Box -->
  <rect x="50" y="350" width="120" height="230" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="110" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Key Features
  </text>
  <text x="60" y="410" font-family="Arial, sans-serif" font-size="11" fill="#1f2937" text-anchor="start">
    ✓ Horizontal
  </text>
  <text x="70" y="425" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="start">
    Scaling
  </text>
  <text x="60" y="450" font-family="Arial, sans-serif" font-size="11" fill="#1f2937" text-anchor="start">
    ✓ High
  </text>
  <text x="70" y="465" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="start">
    Availability
  </text>
  <text x="60" y="490" font-family="Arial, sans-serif" font-size="11" fill="#1f2937" text-anchor="start">
    ✓ Fast
  </text>
  <text x="70" y="505" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="start">
    Redirects
  </text>
  <text x="60" y="530" font-family="Arial, sans-serif" font-size="11" fill="#1f2937" text-anchor="start">
    ✓ Async
  </text>
  <text x="70" y="545" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="start">
    Analytics
  </text>
  <text x="60" y="570" font-family="Arial, sans-serif" font-size="11" fill="#1f2937" text-anchor="start">
    ✓ Global
  </text>
  <text x="70" y="585" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="start">
    CDN
  </text>
  
  <!-- Performance Stats -->
  <rect x="200" y="620" width="700" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="550" y="645" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Performance: 20K requests/sec • Sub-100ms latency • 99.99% uptime
  </text>
  <text x="550" y="665" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
    Scales horizontally • Each component independent • No single point of failure
  </text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937" />
    </marker>
  </defs>
</svg>

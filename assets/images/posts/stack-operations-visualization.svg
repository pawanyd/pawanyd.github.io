<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="stack-ops-title stack-ops-desc">
  <title id="stack-ops-title">Stack Operations Visualization</title>
  <desc id="stack-ops-desc">Step-by-step visualization of push, pop, and peek operations on a stack</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Stack Operations in Action
  </text>
  
  <!-- Initial State -->
  <g transform="translate(80, 100)">
    <text x="60" y="-10" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Initial State
    </text>
    
    <!-- Stack base -->
    <rect x="0" y="240" width="120" height="15" fill="#6b7280" rx="3"/>
    
    <!-- Elements -->
    <rect x="10" y="200" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="225" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">30</text>
    
    <rect x="10" y="160" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="185" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">20</text>
    
    <rect x="10" y="120" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="145" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">10</text>
    
    <!-- Top pointer -->
    <path d="M 130 130 L 150 130" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="160" y="135" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">TOP</text>
  </g>
  
  <!-- After Push(40) -->
  <g transform="translate(280, 100)">
    <text x="60" y="-10" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      After Push(40)
    </text>
    
    <!-- Stack base -->
    <rect x="0" y="240" width="120" height="15" fill="#6b7280" rx="3"/>
    
    <!-- Elements -->
    <rect x="10" y="200" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="225" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">30</text>
    
    <rect x="10" y="160" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="185" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">20</text>
    
    <rect x="10" y="120" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="145" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">10</text>
    
    <!-- New element -->
    <rect x="10" y="80" width="100" height="40" fill="#10b981" rx="5" stroke="#059669" stroke-width="3"/>
    <text x="60" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">40</text>
    
    <!-- Top pointer -->
    <path d="M 130 90 L 150 90" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="160" y="95" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">TOP</text>
    
    <!-- Push arrow -->
    <path d="M 60 50 L 60 70" stroke="#10b981" stroke-width="3" marker-end="url(#arrowgreen)"/>
    <text x="70" y="55" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">PUSH</text>
  </g>
  
  <!-- After Pop() -->
  <g transform="translate(480, 100)">
    <text x="60" y="-10" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      After Pop()
    </text>
    
    <!-- Stack base -->
    <rect x="0" y="240" width="120" height="15" fill="#6b7280" rx="3"/>
    
    <!-- Elements -->
    <rect x="10" y="200" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="225" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">30</text>
    
    <rect x="10" y="160" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="185" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">20</text>
    
    <rect x="10" y="120" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="145" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">10</text>
    
    <!-- Removed element (faded) -->
    <rect x="10" y="80" width="100" height="40" fill="#ef4444" rx="5" stroke="#dc2626" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
    <text x="60" y="105" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="14" font-weight="bold" opacity="0.5">40</text>
    
    <!-- Top pointer -->
    <path d="M 130 130 L 150 130" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="160" y="135" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">TOP</text>
    
    <!-- Pop arrow -->
    <path d="M 60 70 L 60 50" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowred2)"/>
    <text x="70" y="55" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">POP</text>
    
    <!-- Return value -->
    <text x="60" y="30" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Returns: 40</text>
  </g>
  
  <!-- Peek Operation -->
  <g transform="translate(680, 100)">
    <text x="60" y="-10" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Peek()
    </text>
    
    <!-- Stack base -->
    <rect x="0" y="240" width="120" height="15" fill="#6b7280" rx="3"/>
    
    <!-- Elements -->
    <rect x="10" y="200" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="225" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">30</text>
    
    <rect x="10" y="160" width="100" height="40" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="185" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">20</text>
    
    <!-- Top element highlighted -->
    <rect x="10" y="120" width="100" height="40" fill="#f59e0b" rx="5" stroke="#d97706" stroke-width="3"/>
    <text x="60" y="145" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">10</text>
    
    <!-- Top pointer -->
    <path d="M 130 130 L 150 130" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="160" y="135" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">TOP</text>
    
    <!-- Peek indicator -->
    <circle cx="60" cy="140" r="35" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Return value -->
    <text x="60" y="90" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Returns: 10</text>
    <text x="60" y="105" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">(No removal)</text>
  </g>
  
  <!-- Operation descriptions -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="700" height="90" fill="#eff6ff" rx="8" stroke="#3b82f6" stroke-width="2"/>
    
    <text x="20" y="25" fill="#1e40af" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Key Operations:
    </text>
    
    <text x="20" y="45" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • <tspan font-weight="bold" fill="#10b981">Push(x)</tspan>: Add element x to the top of the stack - O(1) time complexity
    </text>
    
    <text x="20" y="63" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • <tspan font-weight="bold" fill="#ef4444">Pop()</tspan>: Remove and return the top element - O(1) time complexity
    </text>
    
    <text x="20" y="81" fill="#374151" font-family="Arial, sans-serif" font-size="12">
      • <tspan font-weight="bold" fill="#f59e0b">Peek()</tspan>: Return the top element without removing it - O(1) time complexity
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrowred2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
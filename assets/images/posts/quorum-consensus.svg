<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700">
  <!-- Background -->
  <rect width="800" height="700" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Quorum Consensus (N=3, W=2, R=2)
  </text>
  
  <!-- Write operation -->
  <g id="write-section">
    <text x="200" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Write Operation
    </text>
    
    <!-- Client -->
    <rect x="150" y="110" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="200" y="145" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Client</text>
    
    <!-- Coordinator -->
    <rect x="150" y="210" width="100" height="60" rx="8" fill="#8b5cf6"/>
    <text x="200" y="245" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Coordinator</text>
    
    <!-- Arrow from client to coordinator -->
    <path d="M 200 170 L 200 210" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="220" y="195" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="start">write(key, value)</text>
    
    <!-- Replicas -->
    <rect x="50" y="320" width="80" height="60" rx="8" fill="#10b981"/>
    <text x="90" y="345" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Replica 1</text>
    <text x="90" y="365" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">✓ ACK</text>
    
    <rect x="160" y="320" width="80" height="60" rx="8" fill="#10b981"/>
    <text x="200" y="345" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Replica 2</text>
    <text x="200" y="365" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">✓ ACK</text>
    
    <rect x="270" y="320" width="80" height="60" rx="8" fill="#6b7280"/>
    <text x="310" y="345" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Replica 3</text>
    <text x="310" y="365" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">slow...</text>
    
    <!-- Arrows to replicas -->
    <path d="M 180 270 L 90 320" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 200 270 L 200 320" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 220 270 L 310 320" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- Success message -->
    <rect x="120" y="420" width="160" height="40" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
    <text x="200" y="445" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">
      Success! (W=2 ACKs)
    </text>
  </g>
  
  <!-- Read operation -->
  <g id="read-section">
    <text x="600" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Read Operation
    </text>
    
    <!-- Client -->
    <rect x="550" y="110" width="100" height="60" rx="8" fill="#3b82f6"/>
    <text x="600" y="145" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Client</text>
    
    <!-- Coordinator -->
    <rect x="550" y="210" width="100" height="60" rx="8" fill="#8b5cf6"/>
    <text x="600" y="245" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Coordinator</text>
    
    <!-- Arrow from client to coordinator -->
    <path d="M 600 170 L 600 210" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="620" y="195" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="start">get(key)</text>
    
    <!-- Replicas -->
    <rect x="450" y="320" width="80" height="60" rx="8" fill="#10b981"/>
    <text x="490" y="345" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Replica 1</text>
    <text x="490" y="365" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">v2</text>
    
    <rect x="560" y="320" width="80" height="60" rx="8" fill="#10b981"/>
    <text x="600" y="345" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Replica 2</text>
    <text x="600" y="365" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">v2</text>
    
    <rect x="670" y="320" width="80" height="60" rx="8" fill="#6b7280"/>
    <text x="710" y="345" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Replica 3</text>
    <text x="710" y="365" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">v1 (stale)</text>
    
    <!-- Arrows to replicas -->
    <path d="M 580 270 L 490 320" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 600 270 L 600 320" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 620 270 L 710 320" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- Success message -->
    <rect x="520" y="420" width="160" height="40" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
    <text x="600" y="445" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">
      Return v2 (R=2)
    </text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937" />
    </marker>
  </defs>
  
  <!-- Explanation -->
  <g id="explanation">
    <rect x="50" y="520" width="700" height="140" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="400" y="550" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Strong Consistency: W + R &gt; N
    </text>
    <text x="400" y="580" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="middle">
      With W=2 and R=2, at least one replica overlaps between write and read
    </text>
    <text x="400" y="605" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="middle">
      This guarantees you'll always read the latest value
    </text>
    <text x="400" y="635" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      Trade-off: Lower W or R for better performance, but lose strong consistency
    </text>
  </g>
</svg>

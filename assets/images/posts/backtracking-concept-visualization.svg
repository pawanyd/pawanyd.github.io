<svg role="img" aria-labelledby="backtracking-concept-title backtracking-concept-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="backtracking-concept-title">Backtracking Core Concepts</title>
  <desc id="backtracking-concept-desc">Diagram showing the three pillars of backtracking: Choice, Constraint, and Goal with systematic exploration and pruning</desc>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    The Three Pillars of Backtracking
  </text>
  
  <!-- Left Section: Choice -->
  <g transform="translate(50, 80)">
    <!-- Pillar Box -->
    <rect x="0" y="0" width="300" height="200" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    
    <!-- Title -->
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e40af">
      1. Choice
    </text>
    
    <!-- Visual representation -->
    <g transform="translate(50, 50)">
      <!-- Decision node -->
      <circle cx="100" cy="40" r="20" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
      <text x="100" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">?</text>
      
      <!-- Choice options -->
      <circle cx="50" cy="100" r="15" fill="#60a5fa" stroke="#2563eb" stroke-width="2"/>
      <text x="50" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">A</text>
      
      <circle cx="100" cy="100" r="15" fill="#60a5fa" stroke="#2563eb" stroke-width="2"/>
      <text x="100" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">B</text>
      
      <circle cx="150" cy="100" r="15" fill="#60a5fa" stroke="#2563eb" stroke-width="2"/>
      <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">C</text>
      
      <!-- Arrows -->
      <path d="M 85 55 L 60 85" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M 100 60 L 100 85" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M 115 55 L 140 85" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Description -->
    <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">
      Multiple Options Available
    </text>
    <text x="20" y="175" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Select from valid moves</text>
    <text x="20" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Explore systematically</text>
  </g>
  
  <!-- Center Section: Constraint -->
  <g transform="translate(450, 80)">
    <!-- Pillar Box -->
    <rect x="0" y="0" width="300" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    
    <!-- Title -->
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#92400e">
      2. Constraint
    </text>
    
    <!-- Visual representation -->
    <g transform="translate(50, 50)">
      <!-- Valid choice -->
      <circle cx="70" cy="40" r="15" fill="#10b981" stroke="#047857" stroke-width="2"/>
      <text x="70" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✓</text>
      <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#047857">Valid</text>
      
      <!-- Invalid choice -->
      <circle cx="130" cy="40" r="15" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="130" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✗</text>
      <text x="130" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">Invalid</text>
      
      <!-- Constraint rules -->
      <rect x="20" y="80" width="160" height="40" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
      <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9a3412">
        Constraint Rules
      </text>
      <text x="100" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">
        No conflicts allowed
      </text>
    </g>
    
    <!-- Description -->
    <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">
      Validate Each Choice
    </text>
    <text x="20" y="175" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Check rules and limits</text>
    <text x="20" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Prune invalid branches</text>
  </g>
  
  <!-- Right Section: Goal -->
  <g transform="translate(850, 80)">
    <!-- Pillar Box -->
    <rect x="0" y="0" width="300" height="200" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    
    <!-- Title -->
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#15803d">
      3. Goal
    </text>
    
    <!-- Visual representation -->
    <g transform="translate(50, 50)">
      <!-- Target -->
      <circle cx="100" cy="60" r="25" fill="#22c55e" stroke="#16a34a" stroke-width="3"/>
      <text x="100" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🎯</text>
      <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">TARGET</text>
      
      <!-- Path to goal -->
      <path d="M 50 100 Q 75 80 100 85" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#greenArrow)"/>
      <text x="50" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Solution Path</text>
    </g>
    
    <!-- Description -->
    <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">
      Target State to Reach
    </text>
    <text x="20" y="175" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Complete solution</text>
    <text x="20" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151">• Satisfies all constraints</text>
  </g>
  
  <!-- Bottom Section: Backtracking Process -->
  <g transform="translate(100, 320)">
    <rect x="0" y="0" width="1000" height="220" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    
    <text x="500" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#334155">
      The Backtracking Process
    </text>
    
    <!-- Step 1 -->
    <g transform="translate(50, 60)">
      <rect x="0" y="0" width="180" height="120" rx="8" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"/>
      <text x="90" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0e7490">
        1. Make Choice
      </text>
      
      <!-- Visual -->
      <circle cx="90" cy="60" r="20" fill="#0891b2" stroke="#0e7490" stroke-width="2"/>
      <text x="90" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">A</text>
      
      <text x="90" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0e7490">
        Select option A
      </text>
    </g>
    
    <!-- Arrow -->
    <path d="M 240 120 L 270 120" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Step 2 -->
    <g transform="translate(280, 60)">
      <rect x="0" y="0" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="90" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">
        2. Check Valid?
      </text>
      
      <!-- Visual -->
      <circle cx="60" cy="60" r="15" fill="#10b981" stroke="#047857" stroke-width="2"/>
      <text x="60" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✓</text>
      
      <circle cx="120" cy="60" r="15" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="120" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✗</text>
      
      <text x="90" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">
        Validate constraints
      </text>
    </g>
    
    <!-- Arrow -->
    <path d="M 470 120 L 500 120" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Step 3 -->
    <g transform="translate(510, 60)">
      <rect x="0" y="0" width="180" height="120" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="90" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#15803d">
        3. Goal Reached?
      </text>
      
      <!-- Visual -->
      <circle cx="90" cy="60" r="20" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
      <text x="90" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">?</text>
      
      <text x="90" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#15803d">
        Complete solution?
      </text>
    </g>
    
    <!-- Arrow -->
    <path d="M 700 120 L 730 120" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Step 4 -->
    <g transform="translate(740, 60)">
      <rect x="0" y="0" width="180" height="120" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
      <text x="90" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#be185d">
        4. Recurse/Backtrack
      </text>
      
      <!-- Visual -->
      <path d="M 60 50 Q 90 30 120 50" stroke="#ec4899" stroke-width="3" fill="none" marker-end="url(#pinkArrow)"/>
      <path d="M 120 70 Q 90 90 60 70" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#orangeArrow)" stroke-dasharray="5,5"/>
      
      <text x="90" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#be185d">
        Continue or undo
      </text>
    </g>
    
    <!-- Backtrack arrow -->
    <path d="M 740 180 Q 400 220 240 180" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#orangeArrow)" stroke-dasharray="8,4"/>
    <text x="490" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">
      Backtrack when dead end reached
    </text>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ec4899"/>
    </marker>
    <marker id="orangeArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
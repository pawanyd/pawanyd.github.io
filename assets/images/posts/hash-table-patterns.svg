<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Common Hash Table Patterns in Interviews</text>
  
  <!-- Pattern 1: Frequency Counting -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="320" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="160" y="25" text-anchor="middle" fill="#15803d" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Pattern 1: Frequency Counting</text>
    
    <text x="20" y="50" fill="#166534" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Problem:</text>
    <text x="80" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="12">Count occurrences of each element</text>
    
    <text x="20" y="70" fill="#166534" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Example:</text>
    <text x="80" y="70" fill="#374151" font-family="Arial, sans-serif" font-size="11">[1,2,2,3,3,3] → {1:1, 2:2, 3:3}</text>
    
    <text x="20" y="90" fill="#166534" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Use Cases:</text>
    <text x="90" y="90" fill="#374151" font-family="Arial, sans-serif" font-size="11">Analytics, spam detection, recommendations</text>
    
    <text x="20" y="110" fill="#059669" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Time: O(n), Space: O(k)</text>
  </g>
  
  <!-- Pattern 2: Two Sum -->
  <g transform="translate(430, 60)">
    <rect x="0" y="0" width="320" height="120" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="25" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Pattern 2: Two Sum &amp; Variants</text>
    
    <text x="20" y="50" fill="#1e40af" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Problem:</text>
    <text x="80" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="12">Find pairs that sum to target</text>
    
    <text x="20" y="70" fill="#1e40af" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Approach:</text>
    <text x="80" y="70" fill="#374151" font-family="Arial, sans-serif" font-size="11">Store seen numbers, check if (target - num) exists</text>
    
    <text x="20" y="90" fill="#1e40af" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Use Cases:</text>
    <text x="90" y="90" fill="#374151" font-family="Arial, sans-serif" font-size="11">Financial reconciliation, pair trading</text>
    
    <text x="20" y="110" fill="#2563eb" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Time: O(n), Space: O(n)</text>
  </g>
  
  <!-- Pattern 3: Caching -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="320" height="120" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="160" y="25" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Pattern 3: Caching/Memoization</text>
    
    <text x="20" y="50" fill="#b45309" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Problem:</text>
    <text x="80" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="12">Avoid recomputing expensive results</text>
    
    <text x="20" y="70" fill="#b45309" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Approach:</text>
    <text x="80" y="70" fill="#374151" font-family="Arial, sans-serif" font-size="11">Use parameters as key, result as value</text>
    
    <text x="20" y="90" fill="#b45309" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Use Cases:</text>
    <text x="90" y="90" fill="#374151" font-family="Arial, sans-serif" font-size="11">Web caching, API responses, DB queries</text>
    
    <text x="20" y="110" fill="#d97706" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Time: O(1) lookup, Space: O(results)</text>
  </g>
  
  <!-- Pattern 4: Grouping -->
  <g transform="translate(430, 200)">
    <rect x="0" y="0" width="320" height="120" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="160" y="25" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Pattern 4: Grouping &amp; Categorization</text>
    
    <text x="20" y="50" fill="#be0a5b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Problem:</text>
    <text x="80" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="12">Group items by some property</text>
    
    <text x="20" y="70" fill="#be0a5b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Example:</text>
    <text x="80" y="70" fill="#374151" font-family="Arial, sans-serif" font-size="11">Group anagrams: "eat","tea","tan","nat"</text>
    
    <text x="20" y="90" fill="#be0a5b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Use Cases:</text>
    <text x="90" y="90" fill="#374151" font-family="Arial, sans-serif" font-size="11">Data processing, user segmentation</text>
    
    <text x="20" y="110" fill="#ec4899" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Time: O(n×k), Space: O(n)</text>
  </g>
  
  <!-- Code Example -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="700" height="180" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="350" y="25" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Two Sum Pattern Example</text>
    
    <text x="20" y="50" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Problem:</text>
    <text x="80" y="50" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">Given array [2,7,11,15] and target 9, return indices of two numbers that sum to target</text>
    
    <text x="20" y="75" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Approach:</text>
    <g transform="translate(20, 85)">
      <text x="0" y="0" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">1. Create empty hash table: seen = {}</text>
      <text x="0" y="15" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">2. For each number at index i:</text>
      <text x="20" y="30" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">   • Calculate complement = target - number</text>
      <text x="20" y="45" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">   • If complement exists in seen: return [seen[complement], i]</text>
      <text x="20" y="60" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">   • Otherwise: seen[number] = i</text>
    </g>
    
    <text x="20" y="160" fill="#f59e0b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Result:</text>
    <text x="70" y="160" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">seen[2]=0, then 9-7=2 found at index 0, return [0,1]</text>
  </g>
  
  <!-- Key Insight -->
  <g transform="translate(50, 540)">
    <rect x="0" y="0" width="700" height="40" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
    <text x="20" y="20" fill="#0c4a6e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Key Insight:</text>
    <text x="110" y="20" fill="#0f172a" font-family="Arial, sans-serif" font-size="14">Hash tables turn "find the thing" problems into O(1) operations</text>
    <text x="20" y="35" fill="#0369a1" font-family="Arial, sans-serif" font-size="12">When you see nested loops for searching, ask: "Could a hash table eliminate the inner loop?"</text>
  </g>
</svg>
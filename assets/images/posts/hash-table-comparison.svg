<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Hash Tables vs Other Data Structures</text>
  
  <!-- Comparison Table Header -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="700" height="40" fill="#1e293b" stroke="#374151" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Data Structure</text>
    <text x="250" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Search</text>
    <text x="350" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Insert</text>
    <text x="450" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Delete</text>
    <text x="575" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Best Use Case</text>
  </g>
  
  <!-- Hash Table Row -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="700" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="20" y="20" fill="#15803d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Hash Table</text>
    <text x="20" y="35" fill="#166534" font-family="Arial, sans-serif" font-size="11">(HashMap, dict, object)</text>
    
    <text x="250" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(1)*</text>
    <text x="250" y="40" text-anchor="middle" fill="#16a34a" font-family="Arial, sans-serif" font-size="10">avg case</text>
    
    <text x="350" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(1)*</text>
    <text x="350" y="40" text-anchor="middle" fill="#16a34a" font-family="Arial, sans-serif" font-size="10">avg case</text>
    
    <text x="450" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(1)*</text>
    <text x="450" y="40" text-anchor="middle" fill="#16a34a" font-family="Arial, sans-serif" font-size="10">avg case</text>
    
    <text x="520" y="20" fill="#15803d" font-family="Arial, sans-serif" font-size="11">Fast key-value lookups</text>
    <text x="520" y="35" fill="#15803d" font-family="Arial, sans-serif" font-size="11">Caching, counting, indexing</text>
  </g>
  
  <!-- Array Row -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="700" height="50" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="20" y="20" fill="#475569" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Array</text>
    <text x="20" y="35" fill="#64748b" font-family="Arial, sans-serif" font-size="11">(list, vector)</text>
    
    <text x="250" y="25" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(n)</text>
    <text x="250" y="40" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="10">linear scan</text>
    
    <text x="350" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(1)</text>
    <text x="350" y="40" text-anchor="middle" fill="#16a34a" font-family="Arial, sans-serif" font-size="10">at end</text>
    
    <text x="450" y="25" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(n)</text>
    <text x="450" y="40" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="10">shift elements</text>
    
    <text x="520" y="20" fill="#475569" font-family="Arial, sans-serif" font-size="11">Ordered data, iteration</text>
    <text x="520" y="35" fill="#475569" font-family="Arial, sans-serif" font-size="11">Mathematical operations</text>
  </g>
  
  <!-- Binary Search Tree Row -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="700" height="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="20" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Binary Search Tree</text>
    <text x="20" y="35" fill="#2563eb" font-family="Arial, sans-serif" font-size="11">(BST, TreeMap)</text>
    
    <text x="250" y="25" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(log n)</text>
    <text x="250" y="40" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10">balanced</text>
    
    <text x="350" y="25" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(log n)</text>
    <text x="350" y="40" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10">balanced</text>
    
    <text x="450" y="25" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(log n)</text>
    <text x="450" y="40" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10">balanced</text>
    
    <text x="520" y="20" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="11">Ordered iteration</text>
    <text x="520" y="35" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="11">Range queries</text>
  </g>
  
  <!-- Trie Row -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="700" height="50" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
    <text x="20" y="20" fill="#be185d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Trie</text>
    <text x="20" y="35" fill="#be0a5b" font-family="Arial, sans-serif" font-size="11">(Prefix Tree)</text>
    
    <text x="250" y="25" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(m)</text>
    <text x="250" y="40" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10">m = key length</text>
    
    <text x="350" y="25" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(m)</text>
    <text x="350" y="40" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10">m = key length</text>
    
    <text x="450" y="25" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O(m)</text>
    <text x="450" y="40" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10">m = key length</text>
    
    <text x="520" y="20" fill="#be185d" font-family="Arial, sans-serif" font-size="11">Prefix matching</text>
    <text x="520" y="35" fill="#be185d" font-family="Arial, sans-serif" font-size="11">Autocomplete, spell check</text>
  </g>
  
  <!-- When to Use Each -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="700" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <text x="20" y="25" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">When to Use Each Data Structure:</text>
    
    <!-- Hash Tables -->
    <g transform="translate(20, 40)">
      <circle cx="5" cy="5" r="3" fill="#10b981"/>
      <text x="15" y="10" fill="#1e293b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Hash Tables:</text>
      <text x="110" y="10" fill="#475569" font-family="Arial, sans-serif" font-size="12">Fast key-value lookups, caching, counting, user authentication</text>
    </g>
    
    <!-- Arrays -->
    <g transform="translate(20, 60)">
      <circle cx="5" cy="5" r="3" fill="#64748b"/>
      <text x="15" y="10" fill="#1e293b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Arrays:</text>
      <text x="70" y="10" fill="#475569" font-family="Arial, sans-serif" font-size="12">Ordered data, mathematical operations, when memory is tight, simple iteration</text>
    </g>
    
    <!-- BSTs -->
    <g transform="translate(20, 80)">
      <circle cx="5" cy="5" r="3" fill="#3b82f6"/>
      <text x="15" y="10" fill="#1e293b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">BSTs:</text>
      <text x="60" y="10" fill="#475569" font-family="Arial, sans-serif" font-size="12">Ordered iteration, range queries, when you need guaranteed O(log n) performance</text>
    </g>
    
    <!-- Tries -->
    <g transform="translate(20, 100)">
      <circle cx="5" cy="5" r="3" fill="#ec4899"/>
      <text x="15" y="10" fill="#1e293b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Tries:</text>
      <text x="55" y="10" fill="#475569" font-family="Arial, sans-serif" font-size="12">Autocomplete, spell checkers, IP routing, prefix-based operations</text>
    </g>
    
    <!-- Decision Framework -->
    <g transform="translate(350, 40)">
      <rect x="0" y="0" width="320" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="160" y="20" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Quick Decision Framework</text>
      
      <text x="10" y="40" fill="#1e40af" font-family="Arial, sans-serif" font-size="11">• Need fast lookups by key? → Hash Table</text>
      <text x="10" y="55" fill="#1e40af" font-family="Arial, sans-serif" font-size="11">• Need ordered data? → Array or BST</text>
      <text x="10" y="70" fill="#1e40af" font-family="Arial, sans-serif" font-size="11">• Need prefix matching? → Trie</text>
      <text x="10" y="85" fill="#1e40af" font-family="Arial, sans-serif" font-size="11">• Need guaranteed performance? → BST</text>
    </g>
  </g>
  
  <!-- Note -->
  <g transform="translate(50, 480)">
    <text x="0" y="0" fill="#64748b" font-family="Arial, sans-serif" font-size="11">* Hash table O(1) is average case. Worst case is O(n) if all keys collide.</text>
  </g>
</svg>
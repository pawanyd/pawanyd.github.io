<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="48" font-weight="bold">
    Graph Data Structures
  </text>
  <text x="600" y="130" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="24">
    The Complete Guide to Modeling Complex Relationships
  </text>
  
  <!-- Network visualization -->
  <!-- Central hub -->
  <circle cx="600" cy="350" r="25" fill="#3b82f6" filter="url(#glow)"/>
  <text x="600" y="358" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">YOU</text>
  
  <!-- Connected nodes -->
  <!-- Social network cluster -->
  <circle cx="450" cy="250" r="20" fill="#10b981"/>
  <text x="450" y="256" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Alice</text>
  <line x1="600" y1="350" x2="450" y2="250" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="380" cy="320" r="20" fill="#10b981"/>
  <text x="380" y="326" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Bob</text>
  <line x1="600" y1="350" x2="380" y2="320" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="420" cy="420" r="20" fill="#10b981"/>
  <text x="420" y="426" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Carol</text>
  <line x1="600" y1="350" x2="420" y2="420" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Cross connections -->
  <line x1="450" y1="250" x2="380" y2="320" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="380" y1="320" x2="420" y2="420" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Tech network cluster -->
  <circle cx="750" cy="280" r="20" fill="#8b5cf6"/>
  <text x="750" y="286" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">GitHub</text>
  <line x1="600" y1="350" x2="750" y2="280" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="820" cy="350" r="20" fill="#8b5cf6"/>
  <text x="820" y="356" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">LinkedIn</text>
  <line x1="600" y1="350" x2="820" y2="350" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="780" cy="420" r="20" fill="#8b5cf6"/>
  <text x="780" y="426" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Twitter</text>
  <line x1="600" y1="350" x2="780" y2="420" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Cross connections -->
  <line x1="750" y1="280" x2="820" y2="350" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="820" y1="350" x2="780" y2="420" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Work network cluster -->
  <circle cx="600" cy="180" r="20" fill="#f59e0b"/>
  <text x="600" y="186" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Boss</text>
  <line x1="600" y1="350" x2="600" y2="180" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="520" cy="200" r="20" fill="#f59e0b"/>
  <text x="520" y="206" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Team A</text>
  <line x1="600" y1="350" x2="520" y2="200" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="680" cy="200" r="20" fill="#f59e0b"/>
  <text x="680" y="206" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Team B</text>
  <line x1="600" y1="350" x2="680" y2="200" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Cross connections -->
  <line x1="600" y1="180" x2="520" y2="200" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="600" y1="180" x2="680" y2="200" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Location cluster -->
  <circle cx="600" cy="520" r="20" fill="#ef4444"/>
  <text x="600" y="526" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Home</text>
  <line x1="600" y1="350" x2="600" y2="520" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="500" cy="480" r="20" fill="#ef4444"/>
  <text x="500" y="486" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Coffee</text>
  <line x1="600" y1="350" x2="500" y2="480" stroke="#6b7280" stroke-width="2"/>
  
  <circle cx="700" cy="480" r="20" fill="#ef4444"/>
  <text x="700" y="486" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Gym</text>
  <line x1="600" y1="350" x2="700" y2="480" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Legend -->
  <rect x="50" y="450" width="200" height="150" fill="#374151" stroke="#6b7280" stroke-width="1" rx="8"/>
  <text x="150" y="475" text-anchor="middle" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Your Network Graph</text>
  
  <circle cx="70" cy="500" r="8" fill="#10b981"/>
  <text x="90" y="506" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="12">Friends</text>
  
  <circle cx="70" cy="525" r="8" fill="#8b5cf6"/>
  <text x="90" y="531" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="12">Tech Platforms</text>
  
  <circle cx="70" cy="550" r="8" fill="#f59e0b"/>
  <text x="90" y="556" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="12">Work</text>
  
  <circle cx="70" cy="575" r="8" fill="#ef4444"/>
  <text x="90" y="581" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="12">Places</text>
  
  <!-- Subtitle -->
  <text x="600" y="590" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="18">
    Everything is connected. Graphs help you understand how.
  </text>
</svg>
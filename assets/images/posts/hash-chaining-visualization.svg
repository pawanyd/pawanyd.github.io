<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Collision Resolution: Chaining (Linked Lists)</text>
  
  <!-- Hash Table Array -->
  <g transform="translate(50, 60)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Hash Table</text>
    
    <!-- Bucket 0 - Empty -->
    <rect x="0" y="20" width="80" height="30" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="10" y="40" fill="#64748b" font-family="Arial, sans-serif" font-size="12">0: null</text>
    
    <!-- Bucket 1 - Single item -->
    <rect x="0" y="55" width="80" height="30" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="10" y="75" fill="#15803d" font-family="Arial, sans-serif" font-size="12">1: →</text>
    
    <!-- Chain for bucket 1 -->
    <rect x="100" y="55" width="80" height="30" fill="url(#chainGradient)" stroke="#059669" stroke-width="1"/>
    <text x="110" y="75" fill="white" font-family="Arial, sans-serif" font-size="10">"user123"</text>
    <text x="170" y="75" fill="white" font-family="Arial, sans-serif" font-size="10">→ null</text>
    
    <!-- Bucket 2 - Empty -->
    <rect x="0" y="90" width="80" height="30" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="10" y="110" fill="#64748b" font-family="Arial, sans-serif" font-size="12">2: null</text>
    
    <!-- Bucket 3 - Multiple items (collision) -->
    <rect x="0" y="125" width="80" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="10" y="145" fill="#d97706" font-family="Arial, sans-serif" font-size="12">3: →</text>
    
    <!-- Chain for bucket 3 - First node -->
    <rect x="100" y="125" width="80" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <text x="110" y="145" fill="#92400e" font-family="Arial, sans-serif" font-size="10">"admin"</text>
    <text x="170" y="145" fill="#92400e" font-family="Arial, sans-serif" font-size="10">→</text>
    
    <!-- Chain for bucket 3 - Second node -->
    <rect x="200" y="125" width="80" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <text x="210" y="145" fill="#92400e" font-family="Arial, sans-serif" font-size="10">"guest"</text>
    <text x="270" y="145" fill="#92400e" font-family="Arial, sans-serif" font-size="10">→</text>
    
    <!-- Chain for bucket 3 - Third node -->
    <rect x="300" y="125" width="80" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <text x="310" y="145" fill="#92400e" font-family="Arial, sans-serif" font-size="10">"test"</text>
    <text x="370" y="145" fill="#92400e" font-family="Arial, sans-serif" font-size="10">→ null</text>
    
    <!-- Bucket 4 - Empty -->
    <rect x="0" y="160" width="80" height="30" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="10" y="180" fill="#64748b" font-family="Arial, sans-serif" font-size="12">4: null</text>
    
    <text x="40" y="210" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">...</text>
  </g>
  
  <!-- Collision Example -->
  <g transform="translate(450, 60)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <text x="150" y="25" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Collision Example</text>
    
    <text x="20" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="12">hash("admin") = 3</text>
    <text x="20" y="70" fill="#475569" font-family="Arial, sans-serif" font-size="12">hash("guest") = 3  ← Collision!</text>
    <text x="20" y="90" fill="#475569" font-family="Arial, sans-serif" font-size="12">hash("test") = 3   ← Another collision!</text>
    
    <text x="20" y="120" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Solution: Chain them together</text>
    <text x="20" y="140" fill="#059669" font-family="Arial, sans-serif" font-size="12">✓ All items stored in bucket 3</text>
    <text x="20" y="155" fill="#059669" font-family="Arial, sans-serif" font-size="12">✓ Search through linked list</text>
    <text x="20" y="170" fill="#059669" font-family="Arial, sans-serif" font-size="12">✓ No data lost</text>
  </g>
  
  <!-- Pros and Cons -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="700" height="120" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <text x="20" y="25" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Chaining: Pros &amp; Cons</text>
    
    <!-- Pros -->
    <g transform="translate(20, 40)">
      <text x="0" y="0" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Pros:</text>
      <text x="0" y="20" fill="#475569" font-family="Arial, sans-serif" font-size="12">✓ Simple to implement</text>
      <text x="0" y="35" fill="#475569" font-family="Arial, sans-serif" font-size="12">✓ Never runs out of space</text>
      <text x="0" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="12">✓ Performance degrades gracefully</text>
      <text x="0" y="65" fill="#475569" font-family="Arial, sans-serif" font-size="12">✓ Easy deletion</text>
    </g>
    
    <!-- Cons -->
    <g transform="translate(350, 40)">
      <text x="0" y="0" fill="#dc2626" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Cons:</text>
      <text x="0" y="20" fill="#475569" font-family="Arial, sans-serif" font-size="12">✗ Extra memory for pointers</text>
      <text x="0" y="35" fill="#475569" font-family="Arial, sans-serif" font-size="12">✗ Poor cache performance</text>
      <text x="0" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="12">✗ Worst case: O(n) if all collide</text>
      <text x="0" y="65" fill="#475569" font-family="Arial, sans-serif" font-size="12">✗ Memory fragmentation</text>
    </g>
  </g>
</svg>
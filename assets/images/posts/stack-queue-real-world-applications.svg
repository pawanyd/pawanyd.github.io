<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="apps-title apps-desc">
  <title id="apps-title">Real-World Applications of Stacks and Queues</title>
  <desc id="apps-desc">Visual representation of practical applications where stacks and queues are used in software systems</desc>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="32" font-weight="bold">
    Real-World Applications
  </text>
  
  <!-- Stack Applications Section -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="420" height="560" fill="#fef2f2" rx="10" stroke="#ef4444" stroke-width="3"/>
    
    <text x="210" y="35" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
      Stack (LIFO) Applications
    </text>
    
    <!-- Browser History -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#fca5a5" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        🌐 Browser Navigation
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Each page visit is pushed onto the stack.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Back button pops the current page to reveal previous.
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Example: Google → YouTube → Twitter → [Back] → YouTube
      </text>
    </g>
    
    <!-- Undo/Redo -->
    <g transform="translate(20, 175)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#fca5a5" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        ↩️ Undo/Redo Operations
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Text editors push each change onto a stack.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Undo pops the last change; Redo uses a second stack.
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Used by: VS Code, Photoshop, Google Docs, Git
      </text>
    </g>
    
    <!-- Function Calls -->
    <g transform="translate(20, 290)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#fca5a5" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        📞 Function Call Stack
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Every function call pushes context onto call stack.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Function return pops context. Enables recursion.
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Stack overflow = too many nested function calls
      </text>
    </g>
    
    <!-- Expression Evaluation -->
    <g transform="translate(20, 405)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#fca5a5" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        🧮 Expression Evaluation
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Calculators use stacks for operator precedence.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Handles parentheses and complex expressions.
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Example: (3 + 4) * 2 → Stack ensures correct order
      </text>
    </g>
  </g>
  
  <!-- Queue Applications Section -->
  <g transform="translate(530, 80)">
    <rect x="0" y="0" width="420" height="560" fill="#f0fdf4" rx="10" stroke="#10b981" stroke-width="3"/>
    
    <text x="210" y="35" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
      Queue (FIFO) Applications
    </text>
    
    <!-- Print Queue -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#86efac" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        🖨️ Print Queue
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Documents wait in queue for printer availability.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        First submitted document prints first (fair processing).
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Prevents chaos when multiple users print simultaneously
      </text>
    </g>
    
    <!-- Task Scheduling -->
    <g transform="translate(20, 175)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#86efac" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        ⚙️ CPU Task Scheduling
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Operating systems queue processes for CPU time.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Round-robin scheduling ensures fair resource allocation.
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Used by: Linux, Windows, macOS process schedulers
      </text>
    </g>
    
    <!-- BFS Algorithm -->
    <g transform="translate(20, 290)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#86efac" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        🔍 Breadth-First Search
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Queue ensures level-by-level graph/tree exploration.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Finds shortest path in unweighted graphs.
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Used by: Social networks, GPS navigation, web crawlers
      </text>
    </g>
    
    <!-- Streaming/Buffering -->
    <g transform="translate(20, 405)">
      <rect x="0" y="0" width="380" height="100" fill="white" rx="8" stroke="#86efac" stroke-width="2"/>
      
      <text x="190" y="25" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
        📺 Streaming &amp; Buffering
      </text>
      
      <text x="20" y="50" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Video/audio data queued for smooth playback.
      </text>
      <text x="20" y="68" fill="#374151" font-family="Arial, sans-serif" font-size="13">
        Handles network hiccups without interruption.
      </text>
      <text x="20" y="86" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
        Used by: Netflix, YouTube, Spotify, Twitch
      </text>
    </g>
  </g>
  
  <!-- Bottom comparison -->
  <g transform="translate(100, 655)">
    <text x="0" y="0" fill="#ef4444" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Stack = "Undo" pattern
    </text>
    <text x="200" y="0" fill="#6b7280" font-family="Arial, sans-serif" font-size="14">
      (Last action matters most)
    </text>
    
    <text x="500" y="0" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Queue = "Fair processing" pattern
    </text>
    <text x="730" y="0" fill="#6b7280" font-family="Arial, sans-serif" font-size="14">
      (First come, first served)
    </text>
  </g>
</svg>
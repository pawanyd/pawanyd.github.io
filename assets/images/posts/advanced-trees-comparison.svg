<svg role="img" aria-labelledby="advanced-trees-comparison-title advanced-trees-comparison-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="advanced-trees-comparison-title">Advanced Trees Comparison</title>
  <desc id="advanced-trees-comparison-desc">Side-by-side comparison of AVL trees vs Red-Black trees showing balance strictness and operation performance</desc>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    AVL vs Red-Black Trees: The Trade-off
  </text>
  
  <!-- Left: AVL Tree -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="450" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    
    <text x="225" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e40af">
      AVL Trees: Strict Balance
    </text>
    
    <!-- AVL Tree visualization -->
    <g transform="translate(180, 70)">
      <circle cx="45" cy="20" r="18" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
      <text x="45" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">50</text>
      <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" fill="#1e40af">h=2</text>
      
      <circle cx="15" cy="70" r="15" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
      <text x="15" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">30</text>
      <text x="35" y="70" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">h=1</text>
      
      <circle cx="75" cy="70" r="15" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
      <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">70</text>
      <text x="95" y="70" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">h=1</text>
      
      <circle cx="0" cy="110" r="12" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
      <text x="0" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">20</text>
      <text x="17" y="110" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">h=0</text>
      
      <circle cx="30" cy="110" r="12" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
      <text x="30" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">40</text>
      <text x="47" y="110" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">h=0</text>
      
      <circle cx="60" cy="110" r="12" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
      <text x="60" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">60</text>
      <text x="77" y="110" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">h=0</text>
      
      <circle cx="90" cy="110" r="12" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>
      <text x="90" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">80</text>
      <text x="107" y="110" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">h=0</text>
      
      <!-- Connections -->
      <path d="M 35 35 L 22 55" stroke="#3b82f6" stroke-width="2"/>
      <path d="M 55 35 L 68 55" stroke="#3b82f6" stroke-width="2"/>
      <path d="M 10 83 L 5 98" stroke="#60a5fa" stroke-width="2"/>
      <path d="M 20 83 L 25 98" stroke="#60a5fa" stroke-width="2"/>
      <path d="M 70 83 L 65 98" stroke="#60a5fa" stroke-width="2"/>
      <path d="M 80 83 L 85 98" stroke="#60a5fa" stroke-width="2"/>
      
      <!-- Balance factors -->
      <text x="-20" y="75" font-family="Arial, sans-serif" font-size="9" fill="#10b981">BF: 0</text>
      <text x="100" y="75" font-family="Arial, sans-serif" font-size="9" fill="#10b981">BF: 0</text>
      <text x="25" y="25" font-family="Arial, sans-serif" font-size="9" fill="#10b981">BF: 0</text>
    </g>
    
    <!-- Properties -->
    <g transform="translate(30, 220)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">
        Properties:
      </text>
      
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✓ Height difference ≤ 1 at every node
      </text>
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✓ Perfectly balanced for reads
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✓ Height = 1.44 * log(n)
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✗ More rotations on insert/delete
      </text>
    </g>
    
    <!-- Performance -->
    <g transform="translate(30, 330)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">
        Performance:
      </text>
      
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        Search: O(log n) - Fastest
      </text>
      <rect x="150" y="12" width="120" height="15" fill="#10b981" stroke="#047857" stroke-width="1"/>
      
      <text x="0" y="50" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        Insert: O(log n) - Slower
      </text>
      <rect x="150" y="37" width="90" height="15" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
      
      <text x="0" y="75" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        Delete: O(log n) - Slower
      </text>
      <rect x="150" y="62" width="90" height="15" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Right: Red-Black Tree -->
  <g transform="translate(650, 80)">
    <rect x="0" y="0" width="450" height="450" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    
    <text x="225" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#dc2626">
      Red-Black Trees: Relaxed Balance
    </text>
    
    <!-- Red-Black Tree visualization -->
    <g transform="translate(180, 70)">
      <circle cx="45" cy="20" r="18" fill="#1f2937" stroke="#374151" stroke-width="2"/>
      <text x="45" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">50</text>
      <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">B</text>
      
      <circle cx="15" cy="70" r="15" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="15" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">30</text>
      <text x="35" y="70" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">R</text>
      
      <circle cx="75" cy="70" r="15" fill="#1f2937" stroke="#374151" stroke-width="2"/>
      <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">70</text>
      <text x="95" y="70" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">B</text>
      
      <circle cx="0" cy="110" r="12" fill="#1f2937" stroke="#374151" stroke-width="2"/>
      <text x="0" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">20</text>
      <text x="17" y="110" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">B</text>
      
      <circle cx="30" cy="110" r="12" fill="#1f2937" stroke="#374151" stroke-width="2"/>
      <text x="30" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">40</text>
      <text x="47" y="110" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">B</text>
      
      <circle cx="60" cy="110" r="12" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="60" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">60</text>
      <text x="77" y="110" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">R</text>
      
      <circle cx="90" cy="110" r="12" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="90" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">80</text>
      <text x="107" y="110" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">R</text>
      
      <!-- Connections -->
      <path d="M 35 35 L 22 55" stroke="#94a3b8" stroke-width="2"/>
      <path d="M 55 35 L 68 55" stroke="#94a3b8" stroke-width="2"/>
      <path d="M 10 83 L 5 98" stroke="#94a3b8" stroke-width="2"/>
      <path d="M 20 83 L 25 98" stroke="#94a3b8" stroke-width="2"/>
      <path d="M 70 83 L 65 98" stroke="#94a3b8" stroke-width="2"/>
      <path d="M 80 83 L 85 98" stroke="#94a3b8" stroke-width="2"/>
    </g>
    
    <!-- Properties -->
    <g transform="translate(30, 220)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#dc2626">
        Properties:
      </text>
      
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✓ No red node has red child
      </text>
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✓ Equal black nodes on all paths
      </text>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✓ Height ≤ 2 * log(n)
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        ✓ Fewer rotations needed
      </text>
    </g>
    
    <!-- Performance -->
    <g transform="translate(30, 330)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#dc2626">
        Performance:
      </text>
      
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        Search: O(log n) - Fast
      </text>
      <rect x="150" y="12" width="110" height="15" fill="#34d399" stroke="#10b981" stroke-width="1"/>
      
      <text x="0" y="50" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        Insert: O(log n) - Faster
      </text>
      <rect x="150" y="37" width="120" height="15" fill="#10b981" stroke="#047857" stroke-width="1"/>
      
      <text x="0" y="75" font-family="Arial, sans-serif" font-size="13" fill="#374151">
        Delete: O(log n) - Faster
      </text>
      <rect x="150" y="62" width="120" height="15" fill="#10b981" stroke="#047857" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Bottom: When to Use -->
  <g transform="translate(100, 550)">
    <text x="500" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
      Use AVL for read-heavy workloads • Use Red-Black for mixed or write-heavy workloads
    </text>
  </g>
</svg>

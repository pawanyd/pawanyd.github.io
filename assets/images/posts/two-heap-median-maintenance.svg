<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" role="img" aria-labelledby="median-title median-desc">
  <title id="median-title">Two Heap Median Maintenance</title>
  <desc id="median-desc">Using max heap and min heap together to efficiently maintain median of a stream</desc>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Finding Median with Two Heaps
  </text>
  
  <!-- Data stream visualization -->
  <g transform="translate(200, 80)">
    <text x="300" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle">
      Stream: [5, 15, 1, 3, 8, 7, 9, 10, 20, 12]
    </text>
  </g>
  
  <!-- Max Heap (smaller half) -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="400" height="320" rx="10" fill="#ef4444" opacity="0.05" stroke="#ef4444" stroke-width="2"/>
    
    <text x="200" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">
      Max Heap (Smaller Half)
    </text>
    <text x="200" y="52" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      Stores smaller 50% of numbers
    </text>
    
    <!-- Max heap tree -->
    <circle cx="200" cy="110" r="28" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="200" y="118" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">8</text>
    <text x="200" y="85" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">MAX</text>
    
    <line x1="200" y1="138" x2="150" y2="178" stroke="#9ca3af" stroke-width="2"/>
    <line x1="200" y1="138" x2="250" y2="178" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="150" cy="200" r="24" fill="#f87171" stroke="#ef4444" stroke-width="2"/>
    <text x="150" y="207" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">7</text>
    
    <circle cx="250" cy="200" r="24" fill="#f87171" stroke="#ef4444" stroke-width="2"/>
    <text x="250" y="207" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">5</text>
    
    <line x1="150" y1="224" x2="120" y2="264" stroke="#9ca3af" stroke-width="2"/>
    <line x1="150" y1="224" x2="180" y2="264" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="120" cy="285" r="20" fill="#fca5a5" stroke="#f87171" stroke-width="2"/>
    <text x="120" y="291" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">3</text>
    
    <circle cx="180" cy="285" r="20" fill="#fca5a5" stroke="#f87171" stroke-width="2"/>
    <text x="180" y="291" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">1</text>
  </g>
  
  <!-- Min Heap (larger half) -->
  <g transform="translate(550, 150)">
    <rect x="0" y="0" width="400" height="320" rx="10" fill="#10b981" opacity="0.05" stroke="#10b981" stroke-width="2"/>
    
    <text x="200" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">
      Min Heap (Larger Half)
    </text>
    <text x="200" y="52" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      Stores larger 50% of numbers
    </text>
    
    <!-- Min heap tree -->
    <circle cx="200" cy="110" r="28" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="200" y="118" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">9</text>
    <text x="200" y="85" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">MIN</text>
    
    <line x1="200" y1="138" x2="150" y2="178" stroke="#9ca3af" stroke-width="2"/>
    <line x1="200" y1="138" x2="250" y2="178" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="150" cy="200" r="24" fill="#34d399" stroke="#10b981" stroke-width="2"/>
    <text x="150" y="207" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">10</text>
    
    <circle cx="250" cy="200" r="24" fill="#34d399" stroke="#10b981" stroke-width="2"/>
    <text x="250" y="207" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">12</text>
    
    <line x1="150" y1="224" x2="120" y2="264" stroke="#9ca3af" stroke-width="2"/>
    <line x1="150" y1="224" x2="180" y2="264" stroke="#9ca3af" stroke-width="2"/>
    
    <circle cx="120" cy="285" r="20" fill="#6ee7b7" stroke="#34d399" stroke-width="2"/>
    <text x="120" y="291" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">15</text>
    
    <circle cx="180" cy="285" r="20" fill="#6ee7b7" stroke="#34d399" stroke-width="2"/>
    <text x="180" y="291" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">20</text>
  </g>
  
  <!-- Median indicator -->
  <g transform="translate(400, 280)">
    <path d="M 0 0 L 50 0" stroke="#8b5cf6" stroke-width="3" fill="none"/>
    <circle cx="100" cy="0" r="35" fill="#8b5cf6" stroke="#7c3aed" stroke-width="3"/>
    <text x="100" y="-25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6" text-anchor="middle">
      MEDIAN
    </text>
    <text x="100" y="8" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
      8.5
    </text>
    <path d="M 150 0 L 200 0" stroke="#8b5cf6" stroke-width="3" fill="none"/>
    
    <text x="100" y="50" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      (max of left + min of right) / 2
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      = (8 + 9) / 2 = 8.5
    </text>
  </g>
  
  <!-- Bottom explanation -->
  <rect x="50" y="490" width="900" height="50" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="500" y="512" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
    How It Works:
  </text>
  <text x="500" y="532" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">
    Max heap stores smaller half • Min heap stores larger half • Median is at the boundary (roots)
  </text>
</svg>

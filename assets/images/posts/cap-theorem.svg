<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937" text-anchor="middle">
    CAP Theorem: Pick Two
  </text>
  
  <!-- Triangle -->
  <path d="M 400 120 L 200 450 L 600 450 Z" fill="none" stroke="#1f2937" stroke-width="3"/>
  
  <!-- Vertices labels -->
  <g id="consistency">
    <circle cx="400" cy="120" r="50" fill="#3b82f6"/>
    <text x="400" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text>
    <text x="400" y="90" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">Consistency</text>
  </g>
  
  <g id="availability">
    <circle cx="200" cy="450" r="50" fill="#10b981"/>
    <text x="200" y="460" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">A</text>
    <text x="200" y="510" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">Availability</text>
  </g>
  
  <g id="partition">
    <circle cx="600" cy="450" r="50" fill="#f59e0b"/>
    <text x="600" y="460" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">P</text>
    <text x="600" y="510" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" text-anchor="middle">Partition Tolerance</text>
  </g>
  
  <!-- Edge labels (the choices) -->
  <g id="cp-choice">
    <rect x="450" y="250" width="80" height="60" rx="8" fill="#8b5cf6" opacity="0.9"/>
    <text x="490" y="275" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">CP</text>
    <text x="490" y="295" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Banks</text>
  </g>
  
  <g id="ap-choice">
    <rect x="360" y="400" width="80" height="60" rx="8" fill="#8b5cf6" opacity="0.9"/>
    <text x="400" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">AP</text>
    <text x="400" y="445" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">DynamoDB</text>
  </g>
  
  <g id="ca-choice">
    <rect x="260" y="250" width="80" height="60" rx="8" fill="#ef4444" opacity="0.9"/>
    <text x="300" y="275" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">CA</text>
    <text x="300" y="295" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Not Real</text>
  </g>
  
  <!-- Note -->
  <text x="400" y="560" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    Network partitions are inevitable, so you're really choosing between C and A
  </text>
</svg>

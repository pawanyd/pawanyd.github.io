<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="purpGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="120" r="250" fill="url(#blueGrad)" opacity="0.8"/>
  <circle cx="150" cy="530" r="180" fill="url(#blueGrad)" opacity="0.5"/>

  <!-- Grid lines for depth -->
  <g stroke="#1e1e4f" stroke-width="1" opacity="0.4">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Roadmap path visualization (right side decoration) -->
  <!-- Nodes on the roadmap tree -->
  <g opacity="0.7">
    <circle cx="720" cy="120" r="22" fill="#7c3aed" filter="url(#glow)"/>
    <text x="720" y="125" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Arrays</text>

    <line x1="720" y1="142" x2="720" y2="180" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4,3"/>

    <circle cx="720" cy="195" r="22" fill="#2563eb" filter="url(#softglow)"/>
    <text x="720" y="200" font-family="Arial" font-size="9" fill="white" text-anchor="middle">LinkedList</text>

    <line x1="720" y1="217" x2="680" y2="255" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="720" y1="217" x2="760" y2="255" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4,3"/>

    <circle cx="660" cy="268" r="20" fill="#0891b2" filter="url(#softglow)"/>
    <text x="660" y="272" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Stack</text>

    <circle cx="780" cy="268" r="20" fill="#0891b2" filter="url(#softglow)"/>
    <text x="780" y="272" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Queue</text>

    <line x1="660" y1="288" x2="700" y2="320" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="780" y1="288" x2="740" y2="320" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4,3"/>

    <circle cx="720" cy="335" r="22" fill="#059669" filter="url(#softglow)"/>
    <text x="720" y="340" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Trees</text>

    <line x1="700" y1="355" x2="670" y2="388" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="740" y1="355" x2="770" y2="388" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4,3"/>

    <circle cx="655" cy="400" r="20" fill="#d97706" filter="url(#softglow)"/>
    <text x="655" y="405" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Graphs</text>

    <circle cx="785" cy="400" r="20" fill="#dc2626" filter="url(#softglow)"/>
    <text x="785" y="405" font-family="Arial" font-size="9" fill="white" text-anchor="middle">DP</text>

    <line x1="720" y1="357" x2="720" y2="440" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="720" cy="455" r="22" fill="#7c3aed" filter="url(#glow)"/>
    <text x="720" y="452" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Advanced</text>
    <text x="720" y="464" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Algos</text>

    <!-- Additional nodes -->
    <circle cx="870" cy="195" r="18" fill="#0f766e" opacity="0.8"/>
    <text x="870" y="200" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Hashing</text>
    <line x1="742" y1="210" x2="852" y2="200" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

    <circle cx="870" cy="335" r="18" fill="#b45309" opacity="0.8"/>
    <text x="870" y="340" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Heaps</text>
    <line x1="742" y1="340" x2="852" y2="340" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

    <circle cx="870" cy="455" r="18" fill="#7c3aed" opacity="0.8"/>
    <text x="870" y="460" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Trie</text>
    <line x1="742" y1="455" x2="852" y2="455" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  </g>

  <!-- Main text block -->
  <text x="70" y="170" font-family="Arial" font-size="26" font-weight="bold" fill="#94a3b8">Master</text>
  <text x="70" y="240" font-family="Arial" font-size="72" font-weight="bold" fill="white" filter="url(#softglow)">DSA</text>
  <text x="70" y="315" font-family="Arial" font-size="30" font-weight="bold" fill="url(#purpGrad)">The Complete Roadmap</text>

  <text x="70" y="365" font-family="Arial" font-size="17" fill="#64748b">From Zero to Problem Solving Hero</text>
  <text x="70" y="390" font-family="Arial" font-size="15" fill="#475569">Data Structures · Algorithms · Interview Mastery</text>

  <!-- Tag pills -->
  <rect x="70" y="420" width="115" height="28" rx="14" fill="#7c3aed20" stroke="#7c3aed" stroke-width="1"/>
  <text x="128" y="439" font-family="Arial" font-size="11" fill="#a78bfa" text-anchor="middle">Data Structures</text>

  <rect x="200" y="420" width="110" height="28" rx="14" fill="#2563eb20" stroke="#2563eb" stroke-width="1"/>
  <text x="255" y="439" font-family="Arial" font-size="11" fill="#60a5fa" text-anchor="middle">Algorithms</text>

  <rect x="325" y="420" width="95" height="28" rx="14" fill="#05966920" stroke="#059669" stroke-width="1"/>
  <text x="373" y="439" font-family="Arial" font-size="11" fill="#34d399" text-anchor="middle">Interviews</text>

  <rect x="435" y="420" width="70" height="28" rx="14" fill="#d9770620" stroke="#d97706" stroke-width="1"/>
  <text x="470" y="439" font-family="Arial" font-size="11" fill="#fbbf24" text-anchor="middle">LeetCode</text>

  <!-- Quote/Tagline -->
  <rect x="70" y="460" width="500" height="50" rx="8" fill="#ffffff06" stroke="#ffffff10" stroke-width="1"/>
  <text x="90" y="480" font-family="Arial" font-size="13" fill="#94a3b8" font-style="italic">"The secret to cracking any coding interview is not memorizing</text>
  <text x="90" y="498" font-family="Arial" font-size="13" fill="#94a3b8" font-style="italic">solutions — it's building intuition for patterns."</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#0a0a1a" opacity="0.9"/>
  <text x="600" y="620" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">pawanyd.github.io · DSA &amp; Interview Preparation Series</text>
</svg>

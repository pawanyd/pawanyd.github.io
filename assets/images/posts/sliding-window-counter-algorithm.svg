<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#1f2937">Sliding Window Counter (Hybrid) Algorithm</text>
  
  <!-- Main visualization -->
  <g transform="translate(50, 80)">
    <text x="400" y="0" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">Combines Fixed Windows with Sliding Calculation</text>
    
    <!-- Previous Window -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="300" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" rx="6"/>
      <text x="150" y="25" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400e">Previous Window</text>
      <text x="150" y="43" font-size="11" text-anchor="middle" fill="#92400e">10:04:00 - 10:04:59</text>
      
      <!-- Request visualization -->
      <g transform="translate(20, 60)">
        <circle cx="20" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="45" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="70" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="95" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="120" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="145" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="170" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="195" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="220" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
        <circle cx="245" cy="10" r="6" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      </g>
      
      <text x="150" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#f59e0b">Count: 80 requests</text>
      <text x="150" y="120" font-size="10" text-anchor="middle" fill="#92400e">(Stored in Redis)</text>
    </g>
    
    <!-- Current Window -->
    <g transform="translate(320, 40)">
      <rect x="0" y="0" width="300" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="3" rx="6"/>
      <text x="150" y="25" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e40af">Current Window</text>
      <text x="150" y="43" font-size="11" text-anchor="middle" fill="#1e40af">10:05:00 - 10:05:59</text>
      
      <!-- Request visualization -->
      <g transform="translate(20, 60)">
        <circle cx="20" cy="10" r="6" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
        <circle cx="50" cy="10" r="6" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
        <circle cx="80" cy="10" r="6" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
        <circle cx="110" cy="10" r="6" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
        <circle cx="140" cy="10" r="6" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
      </g>
      
      <text x="150" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#3b82f6">Count: 30 requests</text>
      <text x="150" y="120" font-size="10" text-anchor="middle" fill="#1e40af">(Current counter)</text>
    </g>
    
    <!-- Current time marker -->
    <g transform="translate(470, 40)">
      <line x1="0" y1="0" x2="0" y2="140" stroke="#dc2626" stroke-width="4"/>
      <polygon points="-10,0 10,0 0,-15" fill="#dc2626"/>
      <text x="0" y="160" font-size="12" font-weight="bold" text-anchor="middle" fill="#dc2626">NOW: 10:05:30</text>
      <text x="0" y="175" font-size="10" text-anchor="middle" fill="#dc2626">(50% through window)</text>
    </g>
    
    <!-- Sliding window visualization -->
    <g transform="translate(0, 220)">
      <rect x="0" y="0" width="620" height="100" fill="#d1fae5" stroke="#10b981" stroke-width="3" rx="6"/>
      <text x="310" y="25" font-size="14" font-weight="bold" text-anchor="middle" fill="#065f46">Sliding Window (Last 60 seconds)</text>
      
      <!-- Overlap region -->
      <rect x="150" y="40" width="150" height="40" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
      <text x="225" y="63" font-size="11" font-weight="bold" text-anchor="middle" fill="#065f46">50% of Previous</text>
      
      <!-- Current region -->
      <rect x="320" y="40" width="150" height="40" fill="#60a5fa" stroke="#3b82f6" stroke-width="2" rx="4"/>
      <text x="395" y="63" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">100% of Current</text>
    </g>
    
    <!-- Calculation -->
    <g transform="translate(0, 350)">
      <rect x="0" y="0" width="620" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" rx="8"/>
      <text x="310" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#92400e">Rate Limit Calculation</text>
      
      <g transform="translate(40, 50)">
        <text x="0" y="0" font-size="13" fill="#1f2937">Overlap percentage = (60 - 30) / 60 = 50%</text>
        <text x="0" y="25" font-size="13" fill="#1f2937">Previous window contribution = 80 × 50% = 40 requests</text>
        <text x="0" y="50" font-size="13" fill="#1f2937">Current window contribution = 30 requests</text>
        
        <line x1="0" y1="65" x2="540" y2="65" stroke="#92400e" stroke-width="2"/>
        
        <text x="0" y="85" font-size="15" font-weight="bold" fill="#dc2626">Estimated requests in sliding window = 40 + 30 = 70</text>
      </g>
    </g>
  </g>
  
  <!-- Algorithm steps -->
  <g transform="translate(680, 80)">
    <rect x="0" y="0" width="200" height="410" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" rx="6"/>
    <text x="100" y="25" font-size="13" font-weight="bold" text-anchor="middle" fill="#1f2937">Algorithm Steps</text>
    
    <g transform="translate(15, 45)">
      <circle cx="0" cy="0" r="12" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
      <text x="0" y="5" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
      <text x="25" y="5" font-size="10" fill="#1f2937">Get current time</text>
      
      <circle cx="0" cy="40" r="12" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
      <text x="0" y="45" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
      <text x="25" y="40" font-size="10" fill="#1f2937">Calculate current</text>
      <text x="25" y="53" font-size="10" fill="#1f2937">window position</text>
      
      <circle cx="0" cy="90" r="12" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
      <text x="0" y="95" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
      <text x="25" y="90" font-size="10" fill="#1f2937">Get previous</text>
      <text x="25" y="103" font-size="10" fill="#1f2937">window count</text>
      
      <circle cx="0" cy="140" r="12" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
      <text x="0" y="145" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
      <text x="25" y="140" font-size="10" fill="#1f2937">Get current</text>
      <text x="25" y="153" font-size="10" fill="#1f2937">window count</text>
      
      <circle cx="0" cy="190" r="12" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
      <text x="0" y="195" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">5</text>
      <text x="25" y="185" font-size="10" fill="#1f2937">Calculate overlap</text>
      <text x="25" y="198" font-size="10" fill="#1f2937">percentage</text>
      
      <circle cx="0" cy="235" r="12" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
      <text x="0" y="240" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">6</text>
      <text x="25" y="230" font-size="10" fill="#1f2937">Weighted sum:</text>
      <text x="25" y="243" font-size="9" fill="#1f2937">prev × overlap%</text>
      <text x="25" y="254" font-size="9" fill="#1f2937">+ current</text>
      
      <circle cx="0" cy="285" r="12" fill="#10b981" stroke="#065f46" stroke-width="2"/>
      <text x="0" y="290" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">7</text>
      <text x="25" y="280" font-size="10" fill="#1f2937">If sum &lt; limit:</text>
      <text x="25" y="293" font-size="10" fill="#059669">Allow request</text>
      
      <circle cx="0" cy="325" r="12" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
      <text x="0" y="330" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">8</text>
      <text x="25" y="320" font-size="10" fill="#1f2937">If sum ≥ limit:</text>
      <text x="25" y="333" font-size="10" fill="#dc2626">Reject request</text>
    </g>
  </g>
  
  <!-- Pros and Cons -->
  <g transform="translate(50, 520)">
    <rect x="0" y="0" width="800" height="110" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" rx="8"/>
    
    <g transform="translate(20, 25)">
      <text x="0" y="0" font-size="13" font-weight="bold" fill="#1f2937">Pros:</text>
      <text x="0" y="18" font-size="10" fill="#059669">✓ More accurate than fixed window</text>
      <text x="0" y="33" font-size="10" fill="#059669">✓ Memory efficient (only 2 counters)</text>
      <text x="0" y="48" font-size="10" fill="#059669">✓ Smooth rate limiting</text>
      <text x="0" y="63" font-size="10" fill="#059669">✓ No boundary problem</text>
      <text x="0" y="78" font-size="10" fill="#059669">✓ Best balance of accuracy and efficiency</text>
    </g>
    
    <g transform="translate(420, 25)">
      <text x="0" y="0" font-size="13" font-weight="bold" fill="#1f2937">Cons:</text>
      <text x="0" y="18" font-size="10" fill="#dc2626">✗ Assumes even distribution in previous window</text>
      <text x="0" y="33" font-size="10" fill="#dc2626">✗ Slightly less accurate than sliding log</text>
      <text x="0" y="48" font-size="10" fill="#dc2626">✗ More complex than fixed window</text>
      <text x="0" y="63" font-size="10" fill="#f59e0b">⚠ Approximation (not exact count)</text>
    </g>
  </g>
</svg>

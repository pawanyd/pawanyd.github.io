<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Heaps &amp; Priority Queues</title>
  <desc id="hero-desc">Visual representation of a max heap data structure with priority queue operations</desc>
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Heaps &amp; Priority Queues
  </text>
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="24" fill="#93c5fd" text-anchor="middle">
    The Data Structure Behind Efficient Priority Management
  </text>
  
  <!-- Max Heap Tree Visualization -->
  <!-- Root node -->
  <circle cx="600" cy="220" r="40" fill="url(#nodeGradient)" stroke="#ffffff" stroke-width="3"/>
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">100</text>
  
  <!-- Level 2 -->
  <line x1="600" y1="260" x2="450" y2="320" stroke="#93c5fd" stroke-width="3"/>
  <line x1="600" y1="260" x2="750" y2="320" stroke="#93c5fd" stroke-width="3"/>
  
  <circle cx="450" cy="340" r="35" fill="url(#nodeGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="450" y="348" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">85</text>
  
  <circle cx="750" cy="340" r="35" fill="url(#nodeGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="750" y="348" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">90</text>
  
  <!-- Level 3 -->
  <line x1="450" y1="375" x2="350" y2="430" stroke="#93c5fd" stroke-width="2"/>
  <line x1="450" y1="375" x2="550" y2="430" stroke="#93c5fd" stroke-width="2"/>
  <line x1="750" y1="375" x2="650" y2="430" stroke="#93c5fd" stroke-width="2"/>
  <line x1="750" y1="375" x2="850" y2="430" stroke="#93c5fd" stroke-width="2"/>
  
  <circle cx="350" cy="450" r="30" fill="url(#nodeGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="350" y="457" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">70</text>
  
  <circle cx="550" cy="450" r="30" fill="url(#nodeGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="550" y="457" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">60</text>
  
  <circle cx="650" cy="450" r="30" fill="url(#nodeGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="650" y="457" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">75</text>
  
  <circle cx="850" cy="450" r="30" fill="url(#nodeGradient)" stroke="#ffffff" stroke-width="2"/>
  <text x="850" y="457" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">80</text>
  
  <!-- Operations labels -->
  <g transform="translate(150, 520)">
    <rect x="0" y="0" width="280" height="80" rx="10" fill="#1e40af" opacity="0.8"/>
    <text x="140" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Insert: O(log n)</text>
    <text x="140" y="55" font-family="Arial, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">Bubble up to maintain order</text>
  </g>
  
  <g transform="translate(460, 520)">
    <rect x="0" y="0" width="280" height="80" rx="10" fill="#1e40af" opacity="0.8"/>
    <text x="140" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Extract-Max: O(log n)</text>
    <text x="140" y="55" font-family="Arial, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">Remove root, heapify down</text>
  </g>
  
  <g transform="translate(770, 520)">
    <rect x="0" y="0" width="280" height="80" rx="10" fill="#1e40af" opacity="0.8"/>
    <text x="140" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Peek: O(1)</text>
    <text x="140" y="55" font-family="Arial, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">View max without removal</text>
  </g>
</svg>

      <text x="17" y="47" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">8</text>
      
      <rect x="40" y="30" width="35" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="57" y="47" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">9</text>
      

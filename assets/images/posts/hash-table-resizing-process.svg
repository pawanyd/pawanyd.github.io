      <text x="97" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">guest</text>
      
      <rect x="120" y="30" width="35" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="137" y="47" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">11</text>
      
      <rect x="160" y="30" width="35" height="25" fill="url(#newTableGradient)" stroke="#059669" stroke-width="1"/>
      <text x="177" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">root</text>
      
      <rect x="200" y="30" width="35" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="217" y="47" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">13</text>
      
      <rect x="240" y="30" width="35" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="257" y="47" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">14</text>
      
      <rect x="280" y="30" width="35" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="297" y="47" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">15</text>

      <text x="30" y="17" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">user1</text>
      
      <rect x="70" y="0" width="60" height="25" fill="url(#oldTableGradient)" stroke="#d97706" stroke-width="1"/>
      <text x="100" y="17" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">admin</text>
      
      <rect x="140" y="0" width="60" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>

  </defs>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Dynamic Resizing: Rehashing Process</text>
  
  <!-- Step 1: Original Table (75% full) -->
  <g transform="translate(50, 60)">

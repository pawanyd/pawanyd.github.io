      <rect x="210" y="0" width="60" height="25" fill="url(#oldTableGradient)" stroke="#d97706" stroke-width="1"/>
      <text x="240" y="17" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">guest</text>
      
      <!-- Row 2 -->

      <text x="30" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">test</text>
      
      <rect x="70" y="30" width="60" height="25" fill="url(#oldTableGradient)" stroke="#d97706" stroke-width="1"/>
      <text x="100" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">demo</text>
      

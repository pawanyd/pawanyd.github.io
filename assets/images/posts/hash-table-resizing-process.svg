    <text x="90" y="25" text-anchor="middle" fill="#0c4a6e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Key Points</text>
    
    <text x="15" y="45" fill="#0f172a" font-family="Arial, sans-serif" font-size="11">• Elements get new positions</text>
    <text x="15" y="60" fill="#0f172a" font-family="Arial, sans-serif" font-size="11">• Hash values recalculated</text>
    <text x="15" y="75" fill="#0f172a" font-family="Arial, sans-serif" font-size="11">• Load factor drops to ~37%</text>
    <text x="15" y="90" fill="#0f172a" font-family="Arial, sans-serif" font-size="11">• Better distribution</text>
    <text x="15" y="105" fill="#0f172a" font-family="Arial, sans-serif" font-size="11">• O(1) performance restored</text>

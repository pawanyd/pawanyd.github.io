      <text x="217" y="17" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">admin</text>
      
      <rect x="240" y="0" width="35" height="25" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="257" y="17" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">6</text>
      
      <rect x="280" y="0" width="35" height="25" fill="url(#newTableGradient)" stroke="#059669" stroke-width="1"/>
      <text x="297" y="17" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9" font-weight="bold">test</text>
      

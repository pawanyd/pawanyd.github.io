<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">Consistent Hashing: The Hash Ring</text>
  
  <!-- Main ring -->
  <g transform="translate(450, 380)">
    <!-- The ring itself -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#3b82f6" stroke-width="6"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
    
    <!-- Hash space labels -->
    <text x="0" y="-220" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">0</text>
    <text x="220" y="5" font-size="14" font-weight="bold" text-anchor="start" fill="#1f2937">2³¹</text>
    <text x="0" y="235" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">2³²/2</text>
    <text x="-220" y="5" font-size="14" font-weight="bold" text-anchor="end" fill="#1f2937">3×2³¹</text>
    
    <!-- Server nodes -->
    <g>
      <!-- Server A (top-right) -->
      <circle cx="141" cy="-141" r="25" fill="#10b981" stroke="#059669" stroke-width="3"/>
      <text x="141" y="-136" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">A</text>
      <text x="180" y="-135" font-size="13" font-weight="bold" text-anchor="start" fill="#10b981">Server A</text>
      <text x="180" y="-120" font-size="11" text-anchor="start" fill="#059669">hash(A) = 1234</text>
      
      <!-- Server B (bottom-right) -->
      <circle cx="141" cy="141" r="25" fill="#10b981" stroke="#059669" stroke-width="3"/>
      <text x="141" y="146" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">B</text>
      <text x="180" y="141" font-size="13" font-weight="bold" text-anchor="start" fill="#10b981">Server B</text>
      <text x="180" y="156" font-size="11" text-anchor="start" fill="#059669">hash(B) = 5678</text>
      
      <!-- Server C (left) -->
      <circle cx="-141" cy="0" r="25" fill="#10b981" stroke="#059669" stroke-width="3"/>
      <text x="-141" y="5" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">C</text>
      <text x="-180" y="0" font-size="13" font-weight="bold" text-anchor="end" fill="#10b981">Server C</text>
      <text x="-180" y="15" font-size="11" text-anchor="end" fill="#059669">hash(C) = 9012</text>
    </g>
    
    <!-- Data keys -->
    <g>
      <!-- Key 1 -->
      <circle cx="50" cy="-193" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="50" y="-172" font-size="11" font-weight="bold" text-anchor="middle" fill="#f59e0b">Key1</text>
      
      <!-- Key 2 -->
      <circle cx="193" cy="-50" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="220" y="-45" font-size="11" font-weight="bold" text-anchor="start" fill="#f59e0b">Key2</text>
      
      <!-- Key 3 -->
      <circle cx="50" cy="193" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="50" y="215" font-size="11" font-weight="bold" text-anchor="middle" fill="#f59e0b">Key3</text>
      
      <!-- Key 4 -->
      <circle cx="-193" cy="50" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="-220" y="55" font-size="11" font-weight="bold" text-anchor="end" fill="#f59e0b">Key4</text>
    </g>
    
    <!-- Arrows showing clockwise lookup -->
    <g>
      <!-- Arrow from Key1 to Server A -->
      <path d="M 60 -185 Q 100 -165 130 -150" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
      
      <!-- Arrow from Key2 to Server B -->
      <path d="M 185 -40 Q 165 50 150 120" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
      
      <!-- Arrow from Key3 to Server C -->
      <path d="M 40 185 Q -50 150 -120 50" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
      
      <!-- Arrow from Key4 to Server C -->
      <path d="M -185 40 Q -165 25 -155 15" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    </g>
    
    <!-- Clockwise indicator -->
    <g transform="translate(0, -50)">
      <path d="M 80 0 A 80 80 0 0 1 0 80" stroke="#8b5cf6" stroke-width="3" fill="none" marker-end="url(#arrowPurple)"/>
      <text x="100" y="5" font-size="12" font-weight="bold" fill="#8b5cf6">Clockwise</text>
      <text x="100" y="20" font-size="11" fill="#8b5cf6">lookup</text>
    </g>
  </g>
  
  <!-- How it works explanation -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="350" height="180" fill="#f0fdf4" stroke="#10b981" stroke-width="2" rx="8"/>
    <text x="175" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#065f46">How It Works</text>
    
    <g transform="translate(20, 50)">
      <circle cx="8" cy="0" r="6" fill="#10b981"/>
      <text x="25" y="5" font-size="13" fill="#1f2937">Hash servers onto the ring</text>
      
      <circle cx="8" cy="30" r="6" fill="#10b981"/>
      <text x="25" y="35" font-size="13" fill="#1f2937">Hash keys onto the same ring</text>
      
      <circle cx="8" cy="60" r="6" fill="#10b981"/>
      <text x="25" y="65" font-size="13" fill="#1f2937">Move clockwise from key to find</text>
      <text x="25" y="80" font-size="13" fill="#1f2937">the first server</text>
      
      <circle cx="8" cy="105" r="6" fill="#10b981"/>
      <text x="25" y="110" font-size="13" fill="#1f2937">That server stores the key</text>
    </g>
  </g>
  
  <!-- Example -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="400" height="180" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
    <text x="200" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#92400e">Example</text>
    
    <g transform="translate(20, 50)">
      <text x="0" y="0" font-size="13" font-weight="bold" fill="#1f2937">Key1 lookup:</text>
      <text x="0" y="20" font-size="12" fill="#4b5563">1. hash(Key1) = 500</text>
      <text x="0" y="38" font-size="12" fill="#4b5563">2. Position 500 on ring</text>
      <text x="0" y="56" font-size="12" fill="#4b5563">3. Move clockwise</text>
      <text x="0" y="74" font-size="12" fill="#4b5563">4. First server = Server A (at 1234)</text>
      <text x="0" y="92" font-size="12" font-weight="bold" fill="#10b981">5. Store Key1 on Server A ✓</text>
      
      <text x="0" y="115" font-size="11" font-style="italic" fill="#92400e">Key1 always maps to Server A unless A fails</text>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>

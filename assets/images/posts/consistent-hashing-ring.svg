<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Consistent Hashing Ring
  </text>
  
  <!-- Hash ring -->
  <circle cx="400" cy="320" r="200" fill="none" stroke="#3b82f6" stroke-width="4"/>
  
  <!-- Servers on the ring -->
  <g id="server0">
    <circle cx="400" cy="120" r="30" fill="#3b82f6"/>
    <text x="400" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S0</text>
    <text x="400" y="100" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">Server 0</text>
  </g>
  
  <g id="server1">
    <circle cx="600" cy="320" r="30" fill="#10b981"/>
    <text x="600" y="330" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S1</text>
    <text x="650" y="330" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="start">Server 1</text>
  </g>
  
  <g id="server2">
    <circle cx="400" cy="520" r="30" fill="#f59e0b"/>
    <text x="400" y="530" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S2</text>
    <text x="400" y="560" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">Server 2</text>
  </g>
  
  <g id="server3">
    <circle cx="200" cy="320" r="30" fill="#8b5cf6"/>
    <text x="200" y="330" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S3</text>
    <text x="150" y="330" font-family="Arial, sans-serif" font-size="14" fill="#1f2937" text-anchor="end">Server 3</text>
  </g>
  
  <!-- Keys on the ring -->
  <g id="key0">
    <circle cx="500" cy="180" r="15" fill="#ef4444"/>
    <text x="500" y="185" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">K0</text>
    <text x="540" y="170" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="start">key0</text>
  </g>
  
  <g id="key1">
    <circle cx="550" cy="400" r="15" fill="#ef4444"/>
    <text x="550" y="405" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">K1</text>
    <text x="580" y="410" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="start">key1</text>
  </g>
  
  <g id="key2">
    <circle cx="300" cy="460" r="15" fill="#ef4444"/>
    <text x="300" y="465" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">K2</text>
    <text x="260" y="480" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="end">key2</text>
  </g>
  
  <g id="key3">
    <circle cx="250" cy="240" r="15" fill="#ef4444"/>
    <text x="250" y="245" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">K3</text>
    <text x="210" y="230" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="end">key3</text>
  </g>
  
  <!-- Arrows showing clockwise direction -->
  <path d="M 500 140 Q 520 130 540 140" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="520" y="125" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">clockwise</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280" />
    </marker>
  </defs>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="50" y="50" width="200" height="100" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="150" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">Legend</text>
    <circle cx="70" cy="95" r="10" fill="#3b82f6"/>
    <text x="90" y="100" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="start">Servers</text>
    <circle cx="70" cy="120" r="10" fill="#ef4444"/>
    <text x="90" y="125" font-family="Arial, sans-serif" font-size="12" fill="#1f2937" text-anchor="start">Keys</text>
  </g>
  
  <!-- Note -->
  <text x="400" y="585" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
    Each key is stored on the first server encountered clockwise
  </text>
</svg>

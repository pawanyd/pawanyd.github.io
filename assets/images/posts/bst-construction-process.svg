<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="20" font-weight="bold">BST Construction: Inserting [8, 3, 10, 1, 6, 14, 4, 7]</text>
  
  <!-- Step 1: Insert 8 -->
  <g transform="translate(50, 60)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Step 1: Insert 8 (becomes root)</text>
    <circle cx="50" cy="40" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="50" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">8</text>
  </g>
  
  <!-- Step 2: Insert 3 -->
  <g transform="translate(200, 60)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Step 2: Insert 3 (3 < 8, go left)</text>
    <circle cx="50" cy="40" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="50" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">8</text>
    
    <line x1="35" y1="55" x2="20" y2="75" stroke="#64748b" stroke-width="2"/>
    <circle cx="20" cy="80" r="18" fill="#10b981" stroke="#1e293b" stroke-width="2"/>
    <text x="20" y="87" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">3</text>
  </g>
  
  <!-- Step 3: Insert 10 -->
  <g transform="translate(350, 60)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Step 3: Insert 10 (10 > 8, go right)</text>
    <circle cx="50" cy="40" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="50" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">8</text>
    
    <line x1="35" y1="55" x2="20" y2="75" stroke="#64748b" stroke-width="2"/>
    <circle cx="20" cy="80" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="20" y="87" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">3</text>
    
    <line x1="65" y1="55" x2="80" y2="75" stroke="#64748b" stroke-width="2"/>
    <circle cx="80" cy="80" r="18" fill="#10b981" stroke="#1e293b" stroke-width="2"/>
    <text x="80" y="87" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">10</text>
  </g>
  
  <!-- Step 4: Insert 1 -->
  <g transform="translate(500, 60)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Step 4: Insert 1 (1 < 8, 1 < 3)</text>
    <circle cx="50" cy="40" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="50" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">8</text>
    
    <line x1="35" y1="55" x2="20" y2="75" stroke="#64748b" stroke-width="2"/>
    <circle cx="20" cy="80" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="20" y="87" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">3</text>
    
    <line x1="65" y1="55" x2="80" y2="75" stroke="#64748b" stroke-width="2"/>
    <circle cx="80" cy="80" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="80" y="87" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">10</text>
    
    <line x1="8" y1="95" x2="0" y2="115" stroke="#64748b" stroke-width="2"/>
    <circle cx="0" cy="120" r="18" fill="#10b981" stroke="#1e293b" stroke-width="2"/>
    <text x="0" y="127" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">1</text>
  </g>
  
  <!-- Final Result -->
  <g transform="translate(300, 220)">
    <text x="150" y="15" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Final BST after all insertions</text>
    
    <!-- Complete tree -->
    <circle cx="150" cy="40" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="150" y="47" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">8</text>
    
    <!-- Level 2 -->
    <line x1="135" y1="55" x2="80" y2="85" stroke="#64748b" stroke-width="2"/>
    <circle cx="80" cy="90" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="80" y="97" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">3</text>
    
    <line x1="165" y1="55" x2="220" y2="85" stroke="#64748b" stroke-width="2"/>
    <circle cx="220" cy="90" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="220" y="97" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">10</text>
    
    <!-- Level 3 -->
    <line x1="65" y1="105" x2="40" y2="135" stroke="#64748b" stroke-width="2"/>
    <circle cx="40" cy="140" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="40" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">1</text>
    
    <line x1="95" y1="105" x2="120" y2="135" stroke="#64748b" stroke-width="2"/>
    <circle cx="120" cy="140" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="120" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">6</text>
    
    <line x1="235" y1="105" x2="260" y2="135" stroke="#64748b" stroke-width="2"/>
    <circle cx="260" cy="140" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="260" y="147" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">14</text>
    
    <!-- Level 4 -->
    <line x1="105" y1="155" x2="90" y2="185" stroke="#64748b" stroke-width="2"/>
    <circle cx="90" cy="190" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="90" y="197" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">4</text>
    
    <line x1="135" y1="155" x2="150" y2="185" stroke="#64748b" stroke-width="2"/>
    <circle cx="150" cy="190" r="18" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
    <text x="150" y="197" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">7</text>
  </g>
  
  <!-- BST Property Note -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="800" height="40" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
    <text x="400" y="15" text-anchor="middle" fill="#0c4a6e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">BST Property: Left subtree < Node < Right subtree</text>
    <text x="400" y="30" text-anchor="middle" fill="#0369a1" font-family="Arial, sans-serif" font-size="12">Every node follows this rule, enabling O(log n) search by eliminating half the tree at each step</text>
  </g>
</svg>
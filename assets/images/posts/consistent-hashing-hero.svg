<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="157.5" x2="1200" y2="157.5" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="472.5" x2="1200" y2="472.5" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="80" font-size="52" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif">
    Consistent Hashing
  </text>
  <text x="600" y="125" font-size="22" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif">
    The Secret Behind Scalable Distributed Systems
  </text>
  
  <!-- Decorative line -->
  <rect x="400" y="145" width="400" height="3" fill="url(#ringGradient)" rx="1.5"/>
  
  <!-- Main visual: Hash Ring -->
  <g transform="translate(280, 350)">
    <!-- The Ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#ringGradient)" stroke-width="8" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
    
    <!-- Server nodes on ring -->
    <g>
      <!-- Server 1 (top) -->
      <circle cx="0" cy="-140" r="20" fill="#10b981" stroke="#059669" stroke-width="3" filter="url(#glow)"/>
      <text x="0" y="-145" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">S1</text>
      <text x="0" y="-170" font-size="11" text-anchor="middle" fill="#10b981">Server 1</text>
      
      <!-- Server 2 (right) -->
      <circle cx="140" cy="0" r="20" fill="#10b981" stroke="#059669" stroke-width="3" filter="url(#glow)"/>
      <text x="140" y="5" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">S2</text>
      <text x="170" y="5" font-size="11" text-anchor="start" fill="#10b981">Server 2</text>
      
      <!-- Server 3 (bottom) -->
      <circle cx="0" cy="140" r="20" fill="#10b981" stroke="#059669" stroke-width="3" filter="url(#glow)"/>
      <text x="0" y="145" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">S3</text>
      <text x="0" y="170" font-size="11" text-anchor="middle" fill="#10b981">Server 3</text>
      
      <!-- Server 4 (left) -->
      <circle cx="-140" cy="0" r="20" fill="#10b981" stroke="#059669" stroke-width="3" filter="url(#glow)"/>
      <text x="-140" y="5" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">S4</text>
      <text x="-170" y="5" font-size="11" text-anchor="end" fill="#10b981">Server 4</text>
    </g>
    
    <!-- Data keys on ring -->
    <g>
      <!-- Key 1 -->
      <circle cx="99" cy="-99" r="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="99" y="-85" font-size="9" text-anchor="middle" fill="#fbbf24">Key A</text>
      
      <!-- Key 2 -->
      <circle cx="99" cy="99" r="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="99" y="115" font-size="9" text-anchor="middle" fill="#fbbf24">Key B</text>
      
      <!-- Key 3 -->
      <circle cx="-99" cy="99" r="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="-99" y="115" font-size="9" text-anchor="middle" fill="#fbbf24">Key C</text>
      
      <!-- Key 4 -->
      <circle cx="-99" cy="-99" r="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <text x="-99" y="-85" font-size="9" text-anchor="middle" fill="#fbbf24">Key D</text>
    </g>
    
    <!-- Center label -->
    <text x="0" y="-10" font-size="14" font-weight="bold" text-anchor="middle" fill="#94a3b8">Hash Ring</text>
    <text x="0" y="10" font-size="11" text-anchor="middle" fill="#64748b">0 to 2³²-1</text>
  </g>
  
  <!-- Key benefits -->
  <g transform="translate(620, 220)">
    <rect x="0" y="0" width="520" height="340" fill="#1e293b" stroke="#334155" stroke-width="2" rx="12" opacity="0.9"/>
    <text x="260" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">Why Consistent Hashing?</text>
    
    <!-- Benefit 1 -->
    <g transform="translate(30, 60)">
      <circle cx="15" cy="15" r="12" fill="#10b981" opacity="0.2"/>
      <text x="15" y="20" font-size="16" font-weight="bold" text-anchor="middle" fill="#10b981">✓</text>
      <text x="45" y="12" font-size="15" font-weight="bold" fill="#ffffff">Minimal Redistribution</text>
      <text x="45" y="30" font-size="13" fill="#cbd5e1">Only K/N keys move when adding/removing servers</text>
    </g>
    
    <!-- Benefit 2 -->
    <g transform="translate(30, 120)">
      <circle cx="15" cy="15" r="12" fill="#10b981" opacity="0.2"/>
      <text x="15" y="20" font-size="16" font-weight="bold" text-anchor="middle" fill="#10b981">✓</text>
      <text x="45" y="12" font-size="15" font-weight="bold" fill="#ffffff">Horizontal Scalability</text>
      <text x="45" y="30" font-size="13" fill="#cbd5e1">Add servers without disrupting the entire system</text>
    </g>
    
    <!-- Benefit 3 -->
    <g transform="translate(30, 180)">
      <circle cx="15" cy="15" r="12" fill="#10b981" opacity="0.2"/>
      <text x="15" y="20" font-size="16" font-weight="bold" text-anchor="middle" fill="#10b981">✓</text>
      <text x="45" y="12" font-size="15" font-weight="bold" fill="#ffffff">Load Balancing</text>
      <text x="45" y="30" font-size="13" fill="#cbd5e1">Virtual nodes ensure even distribution</text>
    </g>
    
    <!-- Benefit 4 -->
    <g transform="translate(30, 240)">
      <circle cx="15" cy="15" r="12" fill="#10b981" opacity="0.2"/>
      <text x="15" y="20" font-size="16" font-weight="bold" text-anchor="middle" fill="#10b981">✓</text>
      <text x="45" y="12" font-size="15" font-weight="bold" fill="#ffffff">Fault Tolerance</text>
      <text x="45" y="30" font-size="13" fill="#cbd5e1">Graceful degradation when servers fail</text>
    </g>
    
    <!-- Used by -->
    <g transform="translate(30, 295)">
      <text x="0" y="0" font-size="13" font-weight="bold" fill="#94a3b8">Used by:</text>
      <text x="0" y="20" font-size="12" fill="#64748b">Amazon DynamoDB • Apache Cassandra • Discord • Akamai CDN</text>
    </g>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#ringGradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="120" r="50" fill="#3b82f6" opacity="0.08"/>
  <circle cx="1080" cy="510" r="70" fill="#8b5cf6" opacity="0.08"/>
</svg>

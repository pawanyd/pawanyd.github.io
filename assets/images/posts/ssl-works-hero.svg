<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Browser Window -->
  <rect x="100" y="150" width="400" height="280" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <rect x="100" y="150" width="400" height="40" rx="8" fill="#e5e7eb"/>
  <circle cx="125" cy="170" r="6" fill="#ef4444"/>
  <circle cx="145" cy="170" r="6" fill="#f59e0b"/>
  <circle cx="165" cy="170" r="6" fill="#10b981"/>
  
  <!-- Address Bar -->
  <rect x="200" y="160" width="280" height="20" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <rect x="210" y="165" width="16" height="10" rx="2" fill="url(#lockGradient)"/>
  <text x="235" y="174" font-family="Arial, sans-serif" font-size="12" fill="#374151">https://secure-bank.com</text>
  
  <!-- Server -->
  <rect x="700" y="200" width="400" height="200" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <rect x="720" y="220" width="60" height="40" rx="4" fill="#3b82f6"/>
  <rect x="720" y="270" width="60" height="40" rx="4" fill="#3b82f6"/>
  <rect x="720" y="320" width="60" height="40" rx="4" fill="#3b82f6"/>
  <text x="820" y="250" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Secure Server</text>
  <text x="820" y="270" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">SSL Certificate</text>
  <text x="820" y="285" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Private Key</text>
  <text x="820" y="300" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">TLS 1.3 Enabled</text>
  
  <!-- Encrypted Connection -->
  <path d="M 500 290 Q 600 250 700 290" stroke="#10b981" stroke-width="4" fill="none" stroke-dasharray="10,5"/>
  <path d="M 700 310 Q 600 350 500 310" stroke="#10b981" stroke-width="4" fill="none" stroke-dasharray="10,5"/>
  
  <!-- Lock Icons on Connection -->
  <g transform="translate(580,270)">
    <rect x="0" y="0" width="20" height="15" rx="3" fill="url(#lockGradient)"/>
    <path d="M 5 0 Q 5 -5 10 -5 Q 15 -5 15 0" stroke="#10b981" stroke-width="2" fill="none"/>
  </g>
  
  <g transform="translate(580,320)">
    <rect x="0" y="0" width="20" height="15" rx="3" fill="url(#lockGradient)"/>
    <path d="M 5 0 Q 5 -5 10 -5 Q 15 -5 15 0" stroke="#10b981" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Data Packets -->
  <rect x="520" y="265" width="40" height="15" rx="3" fill="#8b5cf6" opacity="0.8"/>
  <text x="525" y="275" font-family="Arial, sans-serif" font-size="8" fill="white">DATA</text>
  
  <rect x="640" y="335" width="40" height="15" rx="3" fill="#8b5cf6" opacity="0.8"/>
  <text x="645" y="345" font-family="Arial, sans-serif" font-size="8" fill="white">DATA</text>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">How SSL Works</text>
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="18" fill="#d1d5db" text-anchor="middle">Secure Communication Between Browser &amp; Server</text>
  
  <!-- Handshake Steps -->
  <g transform="translate(200,480)">
    <rect x="0" y="0" width="800" height="100" rx="8" fill="#374151" opacity="0.8"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">SSL Handshake Process:</text>
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="12" fill="#d1d5db">1. Client Hello → 2. Server Certificate → 3. Key Exchange → 4. Secure Connection</text>
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="12" fill="#d1d5db">Asymmetric encryption for handshake, symmetric encryption for data transfer</text>
  </g>
  
  <!-- Threat Indicators -->
  <g transform="translate(50,50)">
    <circle cx="0" cy="0" r="25" fill="#ef4444" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">⚠</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Threats</text>
  </g>
  
  <g transform="translate(1150,50)">
    <circle cx="0" cy="0" r="25" fill="#10b981" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" fill="#10b981" text-anchor="middle">🛡</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Protected</text>
  </g>
</svg>
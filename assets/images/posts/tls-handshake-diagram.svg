<svg role="img" aria-labelledby="tls-title tls-desc" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <title id="tls-title">TLS/SSL Handshake Process</title>
  <desc id="tls-desc">Diagram showing how TLS establishes a secure encrypted connection</desc>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="28" fill="#1f2937" text-anchor="middle" font-weight="bold">TLS/SSL Handshake (HTTPS)</text>
  
  <!-- Client -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="140" height="90" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">Client</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="14" fill="#dbeafe" text-anchor="middle">(Your Browser)</text>
    <text x="70" y="78" font-family="Arial, sans-serif" font-size="12" fill="#dbeafe" text-anchor="middle">🔓 Unencrypted</text>
  </g>
  
  <!-- Server -->
  <g transform="translate(680, 100)">
    <rect x="0" y="0" width="140" height="90" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">Server</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="14" fill="#d1fae5" text-anchor="middle">(netflix.com)</text>
    <text x="70" y="78" font-family="Arial, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">🔒 Has Certificate</text>
  </g>
  
  <!-- Timeline lines -->
  <line x1="150" y1="190" x2="150" y2="600" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="750" y1="190" x2="750" y2="600" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Step 1: Client Hello -->
  <g>
    <path d="M 150 220 L 750 250" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>
    <rect x="350" y="210" width="200" height="70" rx="6" fill="#3b82f6"/>
    <text x="450" y="232" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">1. Client Hello</text>
    <text x="450" y="252" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">TLS version: 1.3</text>
    <text x="450" y="270" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">Cipher suites supported</text>
  </g>
  
  <!-- Step 2: Server Hello + Certificate -->
  <g>
    <path d="M 750 310 L 150 350" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
    <rect x="300" y="300" width="300" height="90" rx="6" fill="#10b981"/>
    <text x="450" y="322" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">2. Server Hello + Certificate</text>
    <text x="450" y="342" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">TLS 1.3, AES-256 chosen</text>
    <text x="450" y="360" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">SSL Certificate sent</text>
    <text x="450" y="378" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">Public key included</text>
  </g>
  
  <!-- Step 3: Certificate Verification -->
  <g transform="translate(50, 410)">
    <rect x="0" y="0" width="200" height="90" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">3. Browser Verifies:</text>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="13" fill="#fef3c7" text-anchor="middle">✓ Trusted CA?</text>
    <text x="100" y="62" font-family="Arial, sans-serif" font-size="13" fill="#fef3c7" text-anchor="middle">✓ Not expired?</text>
    <text x="100" y="79" font-family="Arial, sans-serif" font-size="13" fill="#fef3c7" text-anchor="middle">✓ Domain matches?</text>
  </g>
  
  <!-- Step 4: Key Exchange -->
  <g>
    <path d="M 150 520 L 750 550" stroke="#8b5cf6" stroke-width="3" fill="none" marker-end="url(#arrow3)"/>
    <rect x="320" y="510" width="260" height="70" rx="6" fill="#8b5cf6"/>
    <text x="450" y="532" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">4. Key Exchange</text>
    <text x="450" y="552" font-family="Arial, sans-serif" font-size="13" fill="#ede9fe" text-anchor="middle">Encrypted with server's public key</text>
    <text x="450" y="570" font-family="Arial, sans-serif" font-size="13" fill="#ede9fe" text-anchor="middle">Symmetric key generated</text>
  </g>
  
  <!-- Encrypted connection -->
  <rect x="150" y="600" width="600" height="50" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="630" font-family="Arial, sans-serif" font-size="20" fill="#059669" text-anchor="middle" font-weight="bold">🔒 Secure Encrypted Connection Established</text>
  
  <!-- Time and info box -->
  <g transform="translate(50, 665)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#1f2937" font-weight="bold">⏱️ Time: 100-300ms</text>
    <text x="300" y="0" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">All future data encrypted with symmetric key</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>

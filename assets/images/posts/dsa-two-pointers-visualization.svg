<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="two-pointers-title two-pointers-desc">
  <title id="two-pointers-title">Two Pointers Pattern Visualization</title>
  <desc id="two-pointers-desc">Step-by-step visualization of the two pointers technique on a sorted array to find two numbers that sum to a target</desc>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    Two Pointers Pattern: Find Two Numbers That Sum to Target
  </text>
  
  <!-- Problem statement -->
  <g transform="translate(100, 70)">
    <rect x="0" y="0" width="800" height="60" fill="#eff6ff" rx="8" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Problem: Given sorted array [1, 3, 5, 7, 9, 11], find two numbers that sum to 12
    </text>
    <text x="400" y="45" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="12">
      Naive approach: O(n²) with nested loops | Two Pointers: O(n) with single pass
    </text>
  </g>
  
  <!-- Step 1 -->
  <g transform="translate(100, 160)">
    <text x="300" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Step 1: Start with pointers at both ends
    </text>
    
    <g transform="translate(50, 20)">
      <rect x="0" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="35" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">1</text>
      
      <rect x="80" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="115" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">3</text>
      
      <rect x="160" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="195" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">5</text>
      
      <rect x="240" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="275" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">7</text>
      
      <rect x="320" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="355" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">9</text>
      
      <rect x="400" y="0" width="70" height="60" fill="#10b981" rx="5" stroke="#059669" stroke-width="2"/>
      <text x="435" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">11</text>
      
      <!-- Pointers -->
      <path d="M 35 -10 L 35 -5" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowred)"/>
      <text x="35" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LEFT</text>
      
      <path d="M 435 70 L 435 65" stroke="#10b981" stroke-width="3" marker-end="url(#arrowgreen)"/>
      <text x="435" y="90" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">RIGHT</text>
    </g>
    
    <text x="300" y="120" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="13">
      Sum = 1 + 11 = 12 ✓ Found! Return [1, 11]
    </text>
  </g>
  
  <!-- Step 2 (Alternative scenario) -->
  <g transform="translate(100, 320)">
    <text x="300" y="0" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Example 2: Target = 16 (Sum too small, move left pointer)
    </text>
    
    <g transform="translate(50, 20)">
      <rect x="0" y="0" width="70" height="60" fill="#fca5a5" rx="5" stroke="#dc2626" stroke-width="2" opacity="0.4"/>
      <text x="35" y="38" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="20" opacity="0.6">1</text>
      
      <rect x="80" y="0" width="70" height="60" fill="#3b82f6" rx="5" stroke="#1e40af" stroke-width="2"/>
      <text x="115" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">3</text>
      
      <rect x="160" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="195" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">5</text>
      
      <rect x="240" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="275" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">7</text>
      
      <rect x="320" y="0" width="70" height="60" fill="#e5e7eb" rx="5" stroke="#9ca3af" stroke-width="2"/>
      <text x="355" y="38" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="20" font-weight="bold">9</text>
      
      <rect x="400" y="0" width="70" height="60" fill="#10b981" rx="5" stroke="#059669" stroke-width="2"/>
      <text x="435" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">11</text>
      
      <!-- Pointers -->
      <path d="M 115 -10 L 115 -5" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowred)"/>
      <text x="115" y="-15" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LEFT</text>
      
      <path d="M 435 70 L 435 65" stroke="#10b981" stroke-width="3" marker-end="url(#arrowgreen)"/>
      <text x="435" y="90" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">RIGHT</text>
      
      <!-- Arrow showing movement -->
      <path d="M 50 30 L 70 30" stroke="#f59e0b" stroke-width="3" marker-end="url(#arroworange)"/>
      <text x="30" y="25" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Move</text>
      <text x="30" y="38" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">right</text>
    </g>
    
    <text x="300" y="120" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="13">
      Sum = 3 + 11 = 14 &lt; 16 (too small) → Move LEFT pointer right to increase sum
    </text>
  </g>
  
  <!-- Algorithm box -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="800" height="100" fill="#fef3c7" rx="10" stroke="#f59e0b" stroke-width="2"/>
    
    <text x="400" y="28" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Two Pointers Algorithm
    </text>
    
    <text x="30" y="52" fill="#374151" font-family="Arial, sans-serif" font-size="13">
      1. Start: left = 0, right = array.length - 1
    </text>
    
    <text x="30" y="72" fill="#374151" font-family="Arial, sans-serif" font-size="13">
      2. Calculate sum = array[left] + array[right]
    </text>
    
    <text x="450" y="52" fill="#374151" font-family="Arial, sans-serif" font-size="13">
      3. If sum == target: Found! Return pair
    </text>
    
    <text x="450" y="72" fill="#374151" font-family="Arial, sans-serif" font-size="13">
      4. If sum &lt; target: left++  |  If sum &gt; target: right--
    </text>
    
    <text x="400" y="92" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" font-style="italic">
      Time: O(n) | Space: O(1) | Works only on sorted arrays
    </text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
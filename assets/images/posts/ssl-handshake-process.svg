<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f9fafb"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">SSL/TLS Handshake Process</text>
  
  <!-- Client Browser -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="url(#clientGradient)"/>
  <text x="110" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Client</text>
  <text x="110" y="130" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">(Browser)</text>
  
  <!-- Server -->
  <rect x="630" y="80" width="120" height="80" rx="8" fill="url(#serverGradient)"/>
  <text x="690" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Server</text>
  <text x="690" y="130" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">(Website)</text>
  
  <!-- Vertical Timeline -->
  <line x1="110" y1="180" x2="110" y2="550" stroke="#d1d5db" stroke-width="2"/>
  <line x1="690" y1="180" x2="690" y2="550" stroke="#d1d5db" stroke-width="2"/>
  
  <!-- Step 1: Client Hello -->
  <line x1="110" y1="200" x2="690" y2="220" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowhead)"/>
  <rect x="300" y="190" width="200" height="40" rx="4" fill="#3b82f6" opacity="0.1"/>
  <text x="400" y="205" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle">1. Client Hello</text>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">TLS versions, cipher suites, random</text>
  
  <!-- Step 2: Server Hello + Certificate -->
  <line x1="690" y1="260" x2="110" y2="280" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)"/>
  <rect x="300" y="250" width="200" height="40" rx="4" fill="#10b981" opacity="0.1"/>
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">2. Server Hello + Certificate</text>
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Chosen cipher, certificate, random</text>
  
  <!-- Step 3: Certificate Verification -->
  <rect x="50" y="310" width="120" height="40" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="110" y="325" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">3. Verify Certificate</text>
  <text x="110" y="340" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Check CA, expiry, domain</text>
  
  <!-- Step 4: Key Exchange -->
  <line x1="110" y1="380" x2="690" y2="400" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowhead)"/>
  <rect x="300" y="370" width="200" height="40" rx="4" fill="#8b5cf6" opacity="0.1"/>
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle">4. Key Exchange</text>
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle">Pre-master secret (encrypted)</text>
  
  <!-- Step 5: Generate Session Keys -->
  <rect x="50" y="430" width="120" height="30" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="110" y="450" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">5a. Generate Keys</text>
  
  <rect x="630" y="430" width="120" height="30" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="690" y="450" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">5b. Generate Keys</text>
  
  <!-- Step 6: Finished Messages -->
  <line x1="110" y1="480" x2="690" y2="490" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <line x1="690" y1="510" x2="110" y2="520" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="400" y="485" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">6. Finished (encrypted)</text>
  <text x="400" y="525" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">Finished (encrypted)</text>
  
  <!-- Secure Connection Established -->
  <rect x="200" y="540" width="400" height="30" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="400" y="560" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">🔒 Secure Connection Established</text>
  
  <!-- Legend -->
  <rect x="20" y="20" width="200" height="50" rx="4" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="30" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1f2937">Handshake Duration:</text>
  <text x="30" y="50" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">~2-3 round trips (100-300ms)</text>
  <text x="30" y="62" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">TLS 1.3: Only 1 round trip</text>
</svg>
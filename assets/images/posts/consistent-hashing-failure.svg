<svg viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">Handling Server Failures Gracefully</text>
  
  <!-- Before failure -->
  <g transform="translate(200, 150)">
    <text x="0" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">Normal Operation</text>
    
    <!-- Ring -->
    <circle cx="0" cy="150" r="100" fill="none" stroke="#3b82f6" stroke-width="4"/>
    
    <!-- Servers -->
    <circle cx="0" cy="50" r="18" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="0" y="55" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">A</text>
    
    <circle cx="87" cy="150" r="18" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="87" y="155" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">B</text>
    
    <circle cx="0" cy="250" r="18" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="0" y="255" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">C</text>
    
    <circle cx="-87" cy="150" r="18" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="-87" y="155" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">D</text>
    
    <!-- Keys assigned to B -->
    <circle cx="70" cy="100" r="8" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <text x="95" y="95" font-size="10" fill="#f59e0b">K1</text>
    
    <circle cx="90" cy="180" r="8" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <text x="115" y="185" font-size="10" fill="#f59e0b">K2</text>
    
    <!-- Arrow showing assignment -->
    <path d="M 75 105 L 82 140" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>
    <path d="M 88 175 L 87 160" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>
    
    <text x="0" y="300" font-size="12" text-anchor="middle" fill="#059669">Keys K1, K2 served by B</text>
  </g>
  
  <!-- Failure indicator -->
  <g transform="translate(400, 300)">
    <path d="M 0 0 L 100 0" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowRed)"/>
    <text x="50" y="-10" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef4444">Server B</text>
    <text x="50" y="5" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef4444">Fails!</text>
  </g>
  
  <!-- After failure -->
  <g transform="translate(750, 150)">
    <text x="0" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">After Failure</text>
    
    <!-- Ring -->
    <circle cx="0" cy="150" r="100" fill="none" stroke="#3b82f6" stroke-width="4"/>
    
    <!-- Servers -->
    <circle cx="0" cy="50" r="18" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="0" y="55" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">A</text>
    
    <!-- Server B failed -->
    <g opacity="0.3">
      <circle cx="87" cy="150" r="18" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <text x="87" y="155" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">B</text>
      <line x1="77" y1="140" x2="97" y2="160" stroke="#dc2626" stroke-width="3"/>
      <line x1="97" y1="140" x2="77" y2="160" stroke="#dc2626" stroke-width="3"/>
    </g>
    
    <circle cx="0" cy="250" r="18" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="0" y="255" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">C</text>
    
    <circle cx="-87" cy="150" r="18" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="-87" y="155" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">D</text>
    
    <!-- Keys now assigned to C (next clockwise) -->
    <circle cx="70" cy="100" r="8" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="95" y="95" font-size="10" fill="#8b5cf6">K1</text>
    
    <circle cx="90" cy="180" r="8" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="115" y="185" font-size="10" fill="#8b5cf6">K2</text>
    
    <!-- Arrows showing new assignment to C -->
    <path d="M 70 108 Q 40 180 10 240" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <path d="M 85 185 Q 50 210 10 240" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
    
    <text x="0" y="300" font-size="12" text-anchor="middle" fill="#7c3aed">Keys K1, K2 now served by C</text>
  </g>
  
  <!-- Explanation box -->
  <g transform="translate(100, 450)">
    <rect x="0" y="0" width="800" height="80" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
    <text x="400" y="28" font-size="16" font-weight="bold" text-anchor="middle" fill="#065f46">Automatic Failover</text>
    <text x="400" y="50" font-size="13" text-anchor="middle" fill="#1f2937">When Server B fails, its keys automatically move to the next server clockwise (Server C)</text>
    <text x="400" y="68" font-size="13" text-anchor="middle" fill="#059669">No reconfiguration needed • Self-healing • Graceful degradation</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>

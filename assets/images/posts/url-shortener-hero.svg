<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#1f2937"/>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    URL Shortener Design
  </text>
  
  <!-- Long URL -->
  <rect x="100" y="180" width="500" height="80" rx="8" fill="#374151"/>
  <text x="350" y="210" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">
    Long URL
  </text>
  <text x="350" y="235" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
    https://example.com/very/long/url/
  </text>
  <text x="350" y="250" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">
    with/many/parameters?id=123&amp;ref=abc
  </text>
  
  <!-- Arrow -->
  <path d="M 620 220 L 680 220" stroke="url(#heroGrad)" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="650" y="210" font-family="Arial, sans-serif" font-size="14" fill="#10b981" text-anchor="middle">
    Shorten
  </text>
  
  <!-- Short URL -->
  <rect x="700" y="180" width="400" height="80" rx="8" fill="#10b981"/>
  <text x="900" y="210" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">
    Short URL
  </text>
  <text x="900" y="240" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    short.url/aB3xY9
  </text>
  
  <!-- Features -->
  <g id="features">
    <rect x="150" y="350" width="250" height="200" rx="8" fill="#374151"/>
    <text x="275" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Key Features
    </text>
    <text x="170" y="420" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="start">
      ✓ Instant redirects
    </text>
    <text x="170" y="450" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="start">
      ✓ Click analytics
    </text>
    <text x="170" y="480" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="start">
      ✓ Custom aliases
    </text>
    <text x="170" y="510" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="start">
      ✓ Billions of URLs
    </text>
    <text x="170" y="540" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="start">
      ✓ High availability
    </text>
  </g>
  
  <g id="stats">
    <rect x="450" y="350" width="300" height="200" rx="8" fill="#374151"/>
    <text x="600" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Scale
    </text>
    <text x="600" y="425" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">
      20K requests/sec
    </text>
    <text x="600" y="465" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle">
      Billions of URLs
    </text>
    <text x="600" y="505" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">
      Sub-100ms latency
    </text>
  </g>
  
  <g id="tech">
    <rect x="800" y="350" width="250" height="200" rx="8" fill="#374151"/>
    <text x="925" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Technologies
    </text>
    <text x="820" y="420" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="start">
      • Base62 encoding
    </text>
    <text x="820" y="450" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="start">
      • Redis caching
    </text>
    <text x="820" y="480" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="start">
      • Database sharding
    </text>
    <text x="820" y="510" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="start">
      • CDN distribution
    </text>
    <text x="820" y="540" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="start">
      • Analytics pipeline
    </text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
  </defs>
  
  <!-- Subtitle -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">
    Fast • Scalable • Reliable
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1f2937"/>
  
  <!-- Decorative Grid -->
  <g stroke="#374151" stroke-width="1" opacity="0.5">
    <!-- Vertical lines -->
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630" />
    <!-- Horizontal lines -->
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200" />
  </g>

  <!-- URL Transformation Graphic -->
  <g transform="translate(150, 200)">
    <!-- Long URL Box -->
    <rect x="0" y="0" width="400" height="80" rx="12" fill="#3b82f6" opacity="0.9"/>
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="bold">https://example.com/very/long/url/path...</text>
    
    <!-- Arrow -->
    <path d="M 430 40 L 480 40 L 465 25 M 480 40 L 465 55" stroke="#10b981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Short URL Box -->
    <rect x="510" y="0" width="220" height="80" rx="12" fill="#10b981" opacity="0.9"/>
    <text x="540" y="48" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="bold">tiny.url/7xZ2</text>
  </g>

  <!-- Title Text -->
  <g transform="translate(600, 420)" text-anchor="middle">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" fill="#ffffff" font-weight="bold">Design A URL Shortener</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="32" fill="#10b981" font-weight="normal">System Design &amp; Architecture</text>
  </g>

  <!-- Decorative Sparkles -->
  <g fill="#f59e0b">
    <circle cx="150" cy="150" r="8"/>
    <circle cx="200" cy="450" r="5"/>
    <circle cx="1000" cy="200" r="12"/>
    <circle cx="1050" cy="500" r="6"/>
  </g>
</svg>

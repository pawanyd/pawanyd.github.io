<svg role="img" aria-labelledby="advanced-trees-concept-title advanced-trees-concept-desc" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <title id="advanced-trees-concept-title">Advanced Trees Core Concepts</title>
  <desc id="advanced-trees-concept-desc">Diagram showing the fundamental concepts of self-balancing trees including balance factors, rotations, and invariants</desc>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Self-Balancing: The Core Concept
  </text>
  
  <!-- Left: Unbalanced BST Problem -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="300" height="220" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">
      Problem: Unbalanced BST
    </text>
    
    <!-- Degenerate tree (linked list) -->
    <g transform="translate(120, 50)">
      <circle cx="30" cy="20" r="15" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
      <text x="30" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">10</text>
      
      <circle cx="30" cy="60" r="15" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
      <text x="30" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">20</text>
      
      <circle cx="30" cy="100" r="15" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
      <text x="30" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">30</text>
      
      <circle cx="30" cy="140" r="15" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
      <text x="30" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">40</text>
      
      <!-- Connections -->
      <path d="M 30 35 L 30 45" stroke="#ef4444" stroke-width="2"/>
      <path d="M 30 75 L 30 85" stroke="#ef4444" stroke-width="2"/>
      <path d="M 30 115 L 30 125" stroke="#ef4444" stroke-width="2"/>
    </g>
    
    <!-- Performance indicator -->
    <text x="150" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">
      Height: O(n)
    </text>
    <text x="150" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      Search degrades to linear time
    </text>
  </g>
  
  <!-- Center: Rotation Operation -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="360" height="220" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    
    <text x="180" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">
      Solution: Tree Rotation
    </text>
    
    <!-- Before rotation -->
    <g transform="translate(40, 50)">
      <text x="50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Before</text>
      
      <circle cx="50" cy="30" r="15" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
      <text x="50" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">y</text>
      
      <circle cx="20" cy="70" r="12" fill="#bfdbfe" stroke="#60a5fa" stroke-width="2"/>
      <text x="20" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">x</text>
      
      <circle cx="80" cy="70" r="12" fill="#bfdbfe" stroke="#60a5fa" stroke-width="2"/>
      <text x="80" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">C</text>
      
      <circle cx="5" cy="105" r="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <text x="5" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">A</text>
      
      <circle cx="35" cy="105" r="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <text x="35" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">B</text>
      
      <!-- Connections -->
      <path d="M 42 42 L 27 58" stroke="#3b82f6" stroke-width="2"/>
      <path d="M 58 42 L 73 58" stroke="#3b82f6" stroke-width="2"/>
      <path d="M 15 80 L 10 95" stroke="#60a5fa" stroke-width="1.5"/>
      <path d="M 25 80 L 30 95" stroke="#60a5fa" stroke-width="1.5"/>
    </g>
    
    <!-- Rotation arrow -->
    <g transform="translate(140, 90)">
      <path d="M 0 0 Q 20 -10 40 0" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#rotateArrow)"/>
      <text x="20" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">
        Right Rotate
      </text>
    </g>
    
    <!-- After rotation -->
    <g transform="translate(220, 50)">
      <text x="50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">After</text>
      
      <circle cx="50" cy="30" r="15" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
      <text x="50" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">x</text>
      
      <circle cx="20" cy="70" r="12" fill="#bfdbfe" stroke="#60a5fa" stroke-width="2"/>
      <text x="20" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">A</text>
      
      <circle cx="80" cy="70" r="12" fill="#bfdbfe" stroke="#60a5fa" stroke-width="2"/>
      <text x="80" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">y</text>
      
      <circle cx="65" cy="105" r="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <text x="65" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">B</text>
      
      <circle cx="95" cy="105" r="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
      <text x="95" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">C</text>
      
      <!-- Connections -->
      <path d="M 42 42 L 27 58" stroke="#3b82f6" stroke-width="2"/>
      <path d="M 58 42 L 73 58" stroke="#3b82f6" stroke-width="2"/>
      <path d="M 75 80 L 70 95" stroke="#60a5fa" stroke-width="1.5"/>
      <path d="M 85 80 L 90 95" stroke="#60a5fa" stroke-width="1.5"/>
    </g>
    
    <text x="180" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">
      Local operation preserves BST property
    </text>
    <text x="180" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">
      Restores balance without global restructuring
    </text>
  </g>
  
  <!-- Right: Balanced Result -->
  <g transform="translate(820, 80)">
    <rect x="0" y="0" width="300" height="220" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#047857">
      Result: Balanced Tree
    </text>
    
    <!-- Balanced tree -->
    <g transform="translate(120, 50)">
      <circle cx="30" cy="20" r="15" fill="#6ee7b7" stroke="#10b981" stroke-width="2"/>
      <text x="30" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">20</text>
      
      <circle cx="0" cy="60" r="13" fill="#a7f3d0" stroke="#34d399" stroke-width="2"/>
      <text x="0" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">10</text>
      
      <circle cx="60" cy="60" r="13" fill="#a7f3d0" stroke="#34d399" stroke-width="2"/>
      <text x="60" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">30</text>
      
      <circle cx="45" cy="95" r="11" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
      <text x="45" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#047857">25</text>
      
      <circle cx="75" cy="95" r="11" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
      <text x="75" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#047857">40</text>
      
      <!-- Connections -->
      <path d="M 22 32 L 7 48" stroke="#10b981" stroke-width="2"/>
      <path d="M 38 32 L 53 48" stroke="#10b981" stroke-width="2"/>
      <path d="M 55 72 L 50 84" stroke="#34d399" stroke-width="1.5"/>
      <path d="M 65 72 L 70 84" stroke="#34d399" stroke-width="1.5"/>
    </g>
    
    <!-- Performance indicator -->
    <text x="150" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">
      Height: O(log n)
    </text>
    <text x="150" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065f46">
      Guaranteed logarithmic operations
    </text>
    <text x="150" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065f46">
      No worst-case degradation
    </text>
  </g>
  
  <!-- Bottom: Balance Invariants -->
  <g transform="translate(100, 340)">
    <rect x="0" y="0" width="1000" height="220" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    
    <text x="500" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#334155">
      Different Trees, Different Invariants
    </text>
    
    <!-- AVL Invariant -->
    <g transform="translate(50, 60)">
      <rect x="0" y="0" width="220" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
      <text x="110" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">
        AVL Trees
      </text>
      <text x="110" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e40af">
        Balance Factor Invariant
      </text>
      <text x="20" y="75" font-family="Arial, sans-serif" font-size="12" fill="#374151">|height(left) - height(right)| ≤ 1</text>
      <text x="20" y="95" font-family="Arial, sans-serif" font-size="11" fill="#64748b">✓ Strictest balance</text>
      <text x="20" y="110" font-family="Arial, sans-serif" font-size="11" fill="#64748b">✓ Best for read-heavy</text>
    </g>
    
    <!-- Red-Black Invariant -->
    <g transform="translate(300, 60)">
      <rect x="0" y="0" width="220" height="120" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
      <text x="110" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#dc2626">
        Red-Black Trees
      </text>
      <text x="110" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#dc2626">
        Color Property Invariant
      </text>
      <text x="20" y="75" font-family="Arial, sans-serif" font-size="11" fill="#374151">• No red node has red child</text>
      <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#374151">• Equal black nodes on paths</text>
      <text x="20" y="110" font-family="Arial, sans-serif" font-size="11" fill="#64748b">✓ Faster insertions</text>
    </g>
    
    <!-- B-Tree Invariant -->
    <g transform="translate(550, 60)">
      <rect x="0" y="0" width="200" height="120" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
      <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#7c3aed">
        B-Trees
      </text>
      <text x="100" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7c3aed">
        Node Occupancy Invariant
      </text>
      <text x="20" y="75" font-family="Arial, sans-serif" font-size="11" fill="#374151">• Min/max keys per node</text>
      <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#374151">• All leaves at same level</text>
      <text x="20" y="110" font-family="Arial, sans-serif" font-size="11" fill="#64748b">✓ Disk-optimized</text>
    </g>
    
    <!-- Trie Invariant -->
    <g transform="translate(780, 60)">
      <rect x="0" y="0" width="170" height="120" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
      <text x="85" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#047857">
        Tries
      </text>
      <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#047857">
        Prefix Invariant
      </text>
      <text x="20" y="75" font-family="Arial, sans-serif" font-size="11" fill="#374151">• Shared prefixes</text>
      <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#374151">• Character per edge</text>
      <text x="20" y="110" font-family="Arial, sans-serif" font-size="11" fill="#64748b">✓ Fast prefix match</text>
    </g>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="rotateArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>

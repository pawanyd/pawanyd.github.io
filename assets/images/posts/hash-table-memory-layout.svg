<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="memoryPattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#f1f5f9"/>
      <rect width="1" height="20" fill="#cbd5e1"/>
    </pattern>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Memory Layout: Hash Table vs Array vs Linked List</text>
  
  <!-- Hash Table with Chaining -->
  <g transform="translate(50, 60)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Hash Table (Chaining)</text>
    
    <!-- Main array -->
    <rect x="0" y="25" width="200" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="10">Main Array (Contiguous)</text>
    <text x="100" y="50" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="10">Cache-Friendly</text>
    
    <!-- Pointers to chains -->
    <g transform="translate(0, 70)">
      <rect x="20" y="0" width="30" height="15" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="35" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">ptr</text>
      
      <rect x="70" y="0" width="30" height="15" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="85" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">ptr</text>
      
      <rect x="120" y="0" width="30" height="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="135" y="12" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="8">null</text>
      
      <rect x="170" y="0" width="30" height="15" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="185" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8">ptr</text>
    </g>
    
    <!-- Linked chains (scattered in memory) -->
    <g transform="translate(220, 25)">
      <text x="0" y="15" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Chains (Scattered)</text>
      
      <!-- Chain 1 -->
      <rect x="0" y="20" width="60" height="15" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
      <text x="30" y="32" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="8">node1</text>
      
      <!-- Chain 2 -->
      <rect x="80" y="45" width="60" height="15" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
      <text x="110" y="57" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="8">node2</text>
      
      <!-- Chain 3 -->
      <rect x="20" y="70" width="60" height="15" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
      <text x="50" y="82" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="8">node3</text>
    </g>
    
    <text x="100" y="110" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✓ Fast array access</text>
    <text x="100" y="125" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✗ Poor cache locality for chains</text>
  </g>
  
  <!-- Array -->
  <g transform="translate(50, 200)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Array</text>
    
    <!-- Contiguous memory blocks -->
    <rect x="0" y="25" width="400" height="40" fill="url(#memoryPattern)" stroke="#64748b" stroke-width="2"/>
    
    <!-- Elements -->
    <g transform="translate(10, 35)">
      <rect x="0" y="0" width="60" height="20" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="30" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">elem[0]</text>
      
      <rect x="70" y="0" width="60" height="20" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="100" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">elem[1]</text>
      
      <rect x="140" y="0" width="60" height="20" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="170" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">elem[2]</text>
      
      <rect x="210" y="0" width="60" height="20" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="240" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">elem[3]</text>
      
      <rect x="280" y="0" width="60" height="20" fill="#10b981" stroke="#059669" stroke-width="1"/>
      <text x="310" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">elem[4]</text>
    </g>
    
    <text x="200" y="85" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✓ Perfect cache locality</text>
    <text x="200" y="100" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✓ Predictable memory access</text>
    <text x="200" y="115" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✗ O(n) search time</text>
  </g>
  
  <!-- Linked List -->
  <g transform="translate(50, 340)">
    <text x="0" y="15" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Linked List</text>
    
    <!-- Scattered nodes -->
    <rect x="0" y="25" width="80" height="30" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
    <text x="40" y="35" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">data</text>
    <text x="40" y="48" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">next ptr</text>
    
    <rect x="150" y="45" width="80" height="30" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
    <text x="190" y="55" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">data</text>
    <text x="190" y="68" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">next ptr</text>
    
    <rect x="300" y="25" width="80" height="30" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
    <text x="340" y="35" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">data</text>
    <text x="340" y="48" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">next ptr</text>
    
    <rect x="120" y="85" width="80" height="30" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
    <text x="160" y="95" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">data</text>
    <text x="160" y="108" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="9">null</text>
    
    <!-- Arrows showing pointer connections -->
    <path d="M 80 40 Q 115 30 150 55" stroke="#be185d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 230 60 Q 265 50 300 40" stroke="#be185d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 340 55 Q 280 70 200 100" stroke="#be185d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <text x="200" y="140" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✗ Poor cache locality</text>
    <text x="200" y="155" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✗ Random memory access</text>
    <text x="200" y="170" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="11" font-weight="bold">✓ Dynamic size</text>
  </g>
  
  <!-- Performance Comparison -->
  <g transform="translate(500, 60)">
    <rect x="0" y="0" width="250" height="400" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    
    <text x="125" y="25" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Cache Performance</text>
    
    <!-- Hash Table Performance -->
    <g transform="translate(20, 40)">
      <text x="0" y="15" fill="#3b82f6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Hash Table (Chaining)</text>
      <text x="0" y="35" fill="#475569" font-family="Arial, sans-serif" font-size="12">Array access: Excellent</text>
      <text x="0" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="12">Chain traversal: Poor</text>
      <text x="0" y="65" fill="#475569" font-family="Arial, sans-serif" font-size="12">Overall: Good</text>
      
      <!-- Performance bar -->
      <rect x="0" y="75" width="150" height="10" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
      <rect x="0" y="75" width="105" height="10" fill="#3b82f6"/>
      <text x="155" y="84" fill="#64748b" font-family="Arial, sans-serif" font-size="10">70%</text>
    </g>
    
    <!-- Array Performance -->
    <g transform="translate(20, 120)">
      <text x="0" y="15" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Array</text>
      <text x="0" y="35" fill="#475569" font-family="Arial, sans-serif" font-size="12">Sequential access: Perfect</text>
      <text x="0" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="12">Prefetching: Excellent</text>
      <text x="0" y="65" fill="#475569" font-family="Arial, sans-serif" font-size="12">Overall: Excellent</text>
      
      <!-- Performance bar -->
      <rect x="0" y="75" width="150" height="10" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
      <rect x="0" y="75" width="150" height="10" fill="#10b981"/>
      <text x="155" y="84" fill="#64748b" font-family="Arial, sans-serif" font-size="10">100%</text>
    </g>
    
    <!-- Linked List Performance -->
    <g transform="translate(20, 200)">
      <text x="0" y="15" fill="#ec4899" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Linked List</text>
      <text x="0" y="35" fill="#475569" font-family="Arial, sans-serif" font-size="12">Random access: Poor</text>
      <text x="0" y="50" fill="#475569" font-family="Arial, sans-serif" font-size="12">Cache misses: High</text>
      <text x="0" y="65" fill="#475569" font-family="Arial, sans-serif" font-size="12">Overall: Poor</text>
      
      <!-- Performance bar -->
      <rect x="0" y="75" width="150" height="10" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
      <rect x="0" y="75" width="45" height="10" fill="#ec4899"/>
      <text x="155" y="84" fill="#64748b" font-family="Arial, sans-serif" font-size="10">30%</text>
    </g>
    
    <!-- Key Insight -->
    <g transform="translate(20, 300)">
      <rect x="0" y="0" width="210" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="105" y="20" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Memory Insight</text>
      
      <text x="10" y="40" fill="#1e40af" font-family="Arial, sans-serif" font-size="11">Modern CPUs fetch 64-byte</text>
      <text x="10" y="55" fill="#1e40af" font-family="Arial, sans-serif" font-size="11">cache lines. Contiguous data</text>
      <text x="10" y="70" fill="#1e40af" font-family="Arial, sans-serif" font-size="11">= better performance!</text>
    </g>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#be185d"/>
    </marker>
  </defs>
</svg>
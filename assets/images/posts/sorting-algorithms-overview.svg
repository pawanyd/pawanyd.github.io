<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="overview-title overview-desc">
  <title id="overview-title">Sorting Algorithms Overview</title>
  <desc id="overview-desc">Classification and overview of different sorting algorithm categories</desc>
  
  <rect width="1000" height="600" fill="#f3f4f6"/>
  
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Sorting Algorithms Classification
  </text>
  
  <!-- Simple Sorts -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="280" height="170" rx="10" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2"/>
    <text x="140" y="28" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#ef4444" text-anchor="middle">
      Simple Sorts
    </text>
    <text x="140" y="50" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      O(n²) Time Complexity
    </text>
    <text x="20" y="78" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Bubble Sort</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Selection Sort</text>
    <text x="20" y="122" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Insertion Sort</text>
    <text x="140" y="155" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
      Good for: Small datasets
    </text>
  </g>
  
  <!-- Divide & Conquer -->
  <g transform="translate(360, 90)">
    <rect x="0" y="0" width="280" height="170" rx="10" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2"/>
    <text x="140" y="28" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#3b82f6" text-anchor="middle">
      Divide &amp; Conquer
    </text>
    <text x="140" y="50" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      O(n log n) Time
    </text>
    <text x="20" y="78" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Merge Sort</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Quick Sort</text>
    <text x="20" y="122" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Heap Sort</text>
    <text x="140" y="155" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
      Good for: General purpose
    </text>
  </g>
  
  <!-- Specialized Sorts -->
  <g transform="translate(670, 90)">
    <rect x="0" y="0" width="280" height="170" rx="10" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
    <text x="140" y="28" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#10b981" text-anchor="middle">
      Specialized Sorts
    </text>
    <text x="140" y="50" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      O(n) Possible
    </text>
    <text x="20" y="78" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Counting Sort</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Radix Sort</text>
    <text x="20" y="122" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">• Bucket Sort</text>
    <text x="140" y="155" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
      Good for: Specific data types
    </text>
  </g>
  
  <!-- Hybrid Sorts -->
  <g transform="translate(205, 300)">
    <rect x="0" y="0" width="590" height="170" rx="10" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="2"/>
    <text x="295" y="28" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#8b5cf6" text-anchor="middle">
      Hybrid Sorts (Production Ready)
    </text>
    <text x="295" y="50" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">
      Combine multiple algorithms for optimal performance
    </text>
    
    <g transform="translate(50, 65)">
      <rect x="0" y="0" width="220" height="75" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
      <text x="110" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#8b5cf6" text-anchor="middle">
        Timsort
      </text>
      <text x="110" y="43" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
        Merge + Insertion
      </text>
      <text x="110" y="61" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">
        Python, Java (objects)
      </text>
    </g>
    
    <g transform="translate(320, 65)">
      <rect x="0" y="0" width="220" height="75" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
      <text x="110" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#8b5cf6" text-anchor="middle">
        Introsort
      </text>
      <text x="110" y="43" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">
        Quick + Heap + Insertion
      </text>
      <text x="110" y="61" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">
        C++ std::sort()
      </text>
    </g>
  </g>
  
  <!-- Bottom note -->
  <rect x="100" y="510" width="800" height="50" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="500" y="540" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Modern languages use hybrid algorithms that adapt to data patterns
  </text>
</svg>

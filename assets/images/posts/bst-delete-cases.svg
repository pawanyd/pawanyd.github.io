<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deleteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="successorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="22" font-weight="bold">BST Delete Operation: Three Cases</text>
  
  <!-- Case 1: Delete Leaf Node -->
  <g transform="translate(50, 60)">
    <text x="100" y="20" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Case 1: Delete Leaf Node (7)</text>
    
    <!-- Before -->
    <text x="50" y="45" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Before</text>
    <g transform="translate(0, 50)">
      <circle cx="50" cy="20" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="50" y="26" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5</text>
      
      <line x1="38" y1="32" x2="25" y2="48" stroke="#64748b" stroke-width="2"/>
      <circle cx="25" cy="55" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="25" y="61" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
      
      <line x1="62" y1="32" x2="75" y2="48" stroke="#64748b" stroke-width="2"/>
      <circle cx="75" cy="55" r="15" fill="url(#deleteGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="75" y="61" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">7</text>
    </g>
    
    <!-- Arrow -->
    <text x="100" y="95" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">→</text>
    
    <!-- After -->
    <text x="150" y="45" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">After</text>
    <g transform="translate(100, 50)">
      <circle cx="50" cy="20" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="50" y="26" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5</text>
      
      <line x1="38" y1="32" x2="25" y2="48" stroke="#64748b" stroke-width="2"/>
      <circle cx="25" cy="55" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="25" y="61" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
    </g>
    
    <text x="100" y="140" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="11">Simply remove the leaf</text>
  </g>
  
  <!-- Case 2: Delete Node with One Child -->
  <g transform="translate(350, 60)">
    <text x="100" y="20" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Case 2: Delete Node with One Child (3)</text>
    
    <!-- Before -->
    <text x="50" y="45" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Before</text>
    <g transform="translate(0, 50)">
      <circle cx="50" cy="20" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="50" y="26" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5</text>
      
      <line x1="38" y1="32" x2="25" y2="48" stroke="#64748b" stroke-width="2"/>
      <circle cx="25" cy="55" r="15" fill="url(#deleteGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="25" y="61" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
      
      <line x1="13" y1="67" x2="5" y2="83" stroke="#64748b" stroke-width="2"/>
      <circle cx="5" cy="90" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="5" y="96" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
      
      <line x1="62" y1="32" x2="75" y2="48" stroke="#64748b" stroke-width="2"/>
      <circle cx="75" cy="55" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="75" y="61" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">7</text>
    </g>
    
    <!-- Arrow -->
    <text x="100" y="95" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">→</text>
    
    <!-- After -->
    <text x="150" y="45" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">After</text>
    <g transform="translate(100, 50)">
      <circle cx="50" cy="20" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="50" y="26" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5</text>
      
      <line x1="38" y1="32" x2="25" y2="48" stroke="#64748b" stroke-width="2"/>
      <circle cx="25" cy="55" r="15" fill="url(#successorGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="25" y="61" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
      
      <line x1="62" y1="32" x2="75" y2="48" stroke="#64748b" stroke-width="2"/>
      <circle cx="75" cy="55" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="75" y="61" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">7</text>
    </g>
    
    <text x="100" y="140" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="11">Replace with child</text>
  </g>
  
  <!-- Case 3: Delete Node with Two Children -->
  <g transform="translate(150, 200)">
    <text x="200" y="20" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Case 3: Delete Node with Two Children (5)</text>
    
    <!-- Before -->
    <text x="100" y="45" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Before</text>
    <g transform="translate(0, 50)">
      <circle cx="100" cy="30" r="15" fill="url(#deleteGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="100" y="36" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5</text>
      
      <line x1="88" y1="42" x2="60" y2="68" stroke="#64748b" stroke-width="2"/>
      <circle cx="60" cy="75" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="60" y="81" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
      
      <line x1="112" y1="42" x2="140" y2="68" stroke="#64748b" stroke-width="2"/>
      <circle cx="140" cy="75" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="140" y="81" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">8</text>
      
      <line x1="48" y1="87" x2="30" y2="113" stroke="#64748b" stroke-width="2"/>
      <circle cx="30" cy="120" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="30" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
      
      <line x1="72" y1="87" x2="90" y2="113" stroke="#64748b" stroke-width="2"/>
      <circle cx="90" cy="120" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="90" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4</text>
      
      <line x1="128" y1="87" x2="120" y2="113" stroke="#64748b" stroke-width="2"/>
      <circle cx="120" cy="120" r="15" fill="url(#successorGrad)" stroke="#1e293b" stroke-width="3"/>
      <text x="120" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">6</text>
      
      <line x1="152" y1="87" x2="160" y2="113" stroke="#64748b" stroke-width="2"/>
      <circle cx="160" cy="120" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="160" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">9</text>
    </g>
    
    <!-- Arrow -->
    <text x="200" y="105" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12">→</text>
    
    <!-- After -->
    <text x="300" y="45" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">After</text>
    <g transform="translate(200, 50)">
      <circle cx="100" cy="30" r="15" fill="url(#successorGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="100" y="36" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">6</text>
      
      <line x1="88" y1="42" x2="60" y2="68" stroke="#64748b" stroke-width="2"/>
      <circle cx="60" cy="75" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="60" y="81" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
      
      <line x1="112" y1="42" x2="140" y2="68" stroke="#64748b" stroke-width="2"/>
      <circle cx="140" cy="75" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="140" y="81" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">8</text>
      
      <line x1="48" y1="87" x2="30" y2="113" stroke="#64748b" stroke-width="2"/>
      <circle cx="30" cy="120" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="30" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
      
      <line x1="72" y1="87" x2="90" y2="113" stroke="#64748b" stroke-width="2"/>
      <circle cx="90" cy="120" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="90" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4</text>
      
      <line x1="152" y1="87" x2="160" y2="113" stroke="#64748b" stroke-width="2"/>
      <circle cx="160" cy="120" r="15" fill="url(#nodeGrad)" stroke="#1e293b" stroke-width="2"/>
      <text x="160" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">9</text>
    </g>
    
    <text x="200" y="190" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="11">Replace with inorder successor (6)</text>
  </g>
  
  <!-- Explanation Box -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="800" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Inorder Successor: The Key to Case 3</text>
    
    <g transform="translate(20, 40)">
      <text x="0" y="20" fill="#475569" font-family="Arial, sans-serif" font-size="14" font-weight="bold">What is the inorder successor?</text>
      <text x="0" y="40" fill="#64748b" font-family="Arial, sans-serif" font-size="13">• The smallest value in the right subtree</text>
      <text x="0" y="55" fill="#64748b" font-family="Arial, sans-serif" font-size="13">• Guaranteed to be larger than all nodes in left subtree</text>
      <text x="0" y="70" fill="#64748b" font-family="Arial, sans-serif" font-size="13">• Guaranteed to be smaller than all other nodes in right subtree</text>
      
      <text x="0" y="100" fill="#475569" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Why does this work?</text>
      <text x="0" y="120" fill="#64748b" font-family="Arial, sans-serif" font-size="13">• Maintains BST property: left < node < right</text>
      <text x="0" y="135" fill="#64748b" font-family="Arial, sans-serif" font-size="13">• Inorder successor has at most one child (right child only)</text>
      <text x="0" y="150" fill="#64748b" font-family="Arial, sans-serif" font-size="13">• Can be safely deleted using Case 1 or Case 2</text>
    </g>
    
    <!-- Visual indicator -->
    <g transform="translate(500, 40)">
      <rect x="0" y="0" width="260" height="120" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
      <text x="130" y="20" text-anchor="middle" fill="#15803d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Finding Inorder Successor</text>
      
      <text x="20" y="45" fill="#166534" font-family="Arial, sans-serif" font-size="12">1. Go to right subtree</text>
      <text x="20" y="60" fill="#166534" font-family="Arial, sans-serif" font-size="12">2. Keep going left until no left child</text>
      <text x="20" y="75" fill="#166534" font-family="Arial, sans-serif" font-size="12">3. That node is the successor</text>
      <text x="20" y="95" fill="#166534" font-family="Arial, sans-serif" font-size="12" font-style="italic">In our example: 8 → 6 (leftmost in right subtree)</text>
    </g>
  </g>
</svg>
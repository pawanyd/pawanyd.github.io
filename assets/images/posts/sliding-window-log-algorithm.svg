<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#1f2937">Sliding Window Log Algorithm</text>
  
  <!-- Main visualization -->
  <g transform="translate(50, 80)">
    <text x="400" y="0" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">Sliding 1-Minute Window (Limit: 5 requests)</text>
    
    <!-- Timeline -->
    <path d="M 0 80 L 800 80" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
    
    <!-- Time markers -->
    <line x1="100" y1="75" x2="100" y2="85" stroke="#6b7280" stroke-width="2"/>
    <text x="100" y="100" font-size="10" text-anchor="middle" fill="#6b7280">10:04:00</text>
    
    <line x1="300" y1="75" x2="300" y2="85" stroke="#6b7280" stroke-width="2"/>
    <text x="300" y="100" font-size="10" text-anchor="middle" fill="#6b7280">10:04:30</text>
    
    <line x1="500" y1="75" x2="500" y2="85" stroke="#6b7280" stroke-width="2"/>
    <text x="500" y="100" font-size="10" text-anchor="middle" fill="#6b7280">10:05:00</text>
    
    <line x1="700" y1="75" x2="700" y2="85" stroke="#6b7280" stroke-width="2"/>
    <text x="700" y="100" font-size="10" text-anchor="middle" fill="#6b7280">10:05:30</text>
    
    <!-- Old requests (outside window) -->
    <g transform="translate(0, 0)">
      <circle cx="120" cy="50" r="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" opacity="0.5"/>
      <text x="120" y="30" font-size="9" text-anchor="middle" fill="#9ca3af">10:04:05</text>
      
      <circle cx="180" cy="50" r="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" opacity="0.5"/>
      <text x="180" y="30" font-size="9" text-anchor="middle" fill="#9ca3af">10:04:15</text>
      
      <text x="150" y="130" font-size="10" text-anchor="middle" fill="#9ca3af">Expired (removed)</text>
    </g>
    
    <!-- Sliding window boundary -->
    <rect x="300" y="20" width="400" height="90" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4" rx="6"/>
    <text x="500" y="15" font-size="12" font-weight="bold" text-anchor="middle" fill="#3b82f6">Sliding Window (1 minute)</text>
    
    <!-- Current requests (inside window) -->
    <g transform="translate(0, 0)">
      <circle cx="350" cy="50" r="10" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <text x="350" y="30" font-size="9" text-anchor="middle" fill="#065f46">10:04:35</text>
      <line x1="350" y1="60" x2="350" y2="150" stroke="#10b981" stroke-width="1" stroke-dasharray="2,2"/>
      
      <circle cx="420" cy="50" r="10" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <text x="420" y="30" font-size="9" text-anchor="middle" fill="#065f46">10:04:45</text>
      <line x1="420" y1="60" x2="420" y2="150" stroke="#10b981" stroke-width="1" stroke-dasharray="2,2"/>
      
      <circle cx="520" cy="50" r="10" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <text x="520" y="30" font-size="9" text-anchor="middle" fill="#065f46">10:05:05</text>
      <line x1="520" y1="60" x2="520" y2="150" stroke="#10b981" stroke-width="1" stroke-dasharray="2,2"/>
      
      <circle cx="620" cy="50" r="10" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <text x="620" y="30" font-size="9" text-anchor="middle" fill="#065f46">10:05:20</text>
      <line x1="620" y1="60" x2="620" y2="150" stroke="#10b981" stroke-width="1" stroke-dasharray="2,2"/>
      
      <circle cx="680" cy="50" r="10" fill="#34d399" stroke="#10b981" stroke-width="2"/>
      <text x="680" y="30" font-size="9" text-anchor="middle" fill="#065f46">10:05:28</text>
      <line x1="680" y1="60" x2="680" y2="150" stroke="#10b981" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
    
    <!-- Current time marker -->
    <g transform="translate(700, 0)">
      <line x1="0" y1="20" x2="0" y2="110" stroke="#dc2626" stroke-width="3"/>
      <polygon points="-8,20 8,20 0,5" fill="#dc2626"/>
      <text x="0" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#dc2626">NOW</text>
      <text x="0" y="140" font-size="10" text-anchor="middle" fill="#dc2626">10:05:30</text>
    </g>
    
    <!-- Request log visualization -->
    <g transform="translate(0, 170)">
      <rect x="250" y="0" width="500" height="120" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" rx="6"/>
      <text x="500" y="25" font-size="13" font-weight="bold" text-anchor="middle" fill="#1f2937">Request Log (Sorted Set)</text>
      
      <!-- Log entries -->
      <g transform="translate(270, 45)">
        <rect x="0" y="0" width="90" height="30" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
        <text x="45" y="20" font-size="9" text-anchor="middle" fill="#065f46">10:04:35</text>
        
        <rect x="100" y="0" width="90" height="30" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
        <text x="145" y="20" font-size="9" text-anchor="middle" fill="#065f46">10:04:45</text>
        
        <rect x="200" y="0" width="90" height="30" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
        <text x="245" y="20" font-size="9" text-anchor="middle" fill="#065f46">10:05:05</text>
        
        <rect x="300" y="0" width="90" height="30" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
        <text x="345" y="20" font-size="9" text-anchor="middle" fill="#065f46">10:05:20</text>
        
        <rect x="400" y="0" width="90" height="30" fill="#34d399" stroke="#10b981" stroke-width="2" rx="4"/>
        <text x="445" y="20" font-size="9" text-anchor="middle" fill="#065f46">10:05:28</text>
      </g>
      
      <text x="500" y="90" font-size="12" font-weight="bold" text-anchor="middle" fill="#10b981">Count: 5/5</text>
      <text x="500" y="108" font-size="10" text-anchor="middle" fill="#1f2937">Window is full - next request will be rejected</text>
    </g>
  </g>
  
  <!-- How it works -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="800" height="130" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
    <text x="400" y="25" font-size="15" font-weight="bold" text-anchor="middle" fill="#1e40af">How It Works</text>
    
    <g transform="translate(20, 40)">
      <text x="0" y="0" font-size="12" fill="#1f2937">1. Store timestamp of every request in a sorted set (Redis ZADD)</text>
      <text x="0" y="20" font-size="12" fill="#1f2937">2. When new request arrives, remove timestamps older than window (Redis ZREMRANGEBYSCORE)</text>
      <text x="0" y="40" font-size="12" fill="#1f2937">3. Count remaining timestamps (Redis ZCARD)</text>
      <text x="0" y="60" font-size="12" fill="#1f2937">4. If count &lt; limit: Allow request and add timestamp</text>
      <text x="0" y="80" font-size="12" fill="#1f2937">5. If count ≥ limit: Reject request (429 Too Many Requests)</text>
    </g>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>
</svg>

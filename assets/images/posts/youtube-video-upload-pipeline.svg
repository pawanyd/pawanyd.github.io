<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Video Upload &amp; Transcoding Pipeline</text>

  <!-- Phase 1: Upload -->
  <rect x="20" y="60" width="155" height="280" rx="10" fill="#1e3a5f20" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="98" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">Phase 1: Upload</text>

  <rect x="35" y="95" width="125" height="45" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="98" y="117" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Creator</text>
  <text x="98" y="131" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Raw Video File</text>

  <line x1="98" y1="140" x2="98" y2="165" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="35" y="165" width="125" height="45" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="98" y="186" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Upload Service</text>
  <text x="98" y="199" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Resumable Upload API</text>

  <line x1="98" y1="210" x2="98" y2="235" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="35" y="235" width="125" height="45" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="98" y="256" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Raw Storage</text>
  <text x="98" y="269" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">GCS Bucket (temp)</text>

  <line x1="98" y1="280" x2="98" y2="305" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="35" y="305" width="125" height="35" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="98" y="322" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Kafka Event</text>
  <text x="98" y="334" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">video.uploaded topic</text>

  <!-- Phase 2: Processing -->
  <rect x="195" y="60" width="200" height="340" rx="10" fill="#14532d20" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="295" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Phase 2: Processing</text>

  <rect x="210" y="95" width="170" height="45" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
  <text x="295" y="117" font-family="Arial" font-size="11" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Video Processor</text>
  <text x="295" y="130" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Job Queue Consumer</text>

  <line x1="295" y1="140" x2="295" y2="165" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="210" y="165" width="170" height="45" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
  <text x="295" y="186" font-family="Arial" font-size="11" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Validation</text>
  <text x="295" y="199" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Format check, malware scan</text>

  <line x1="295" y1="210" x2="295" y2="235" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="210" y="235" width="170" height="45" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
  <text x="295" y="256" font-family="Arial" font-size="11" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Transcoding Workers</text>
  <text x="295" y="269" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Parallel FFmpeg jobs</text>

  <!-- Quality variants horizontal -->
  <line x1="295" y1="280" x2="295" y2="310" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="210" y="310" width="40" height="30" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
  <text x="230" y="329" font-family="Arial" font-size="9" fill="#6ee7b7" text-anchor="middle">360p</text>

  <rect x="258" y="310" width="40" height="30" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
  <text x="278" y="329" font-family="Arial" font-size="9" fill="#6ee7b7" text-anchor="middle">720p</text>

  <rect x="306" y="310" width="40" height="30" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
  <text x="326" y="329" font-family="Arial" font-size="9" fill="#6ee7b7" text-anchor="middle">1080p</text>

  <rect x="354" y="310" width="40" height="30" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
  <text x="374" y="329" font-family="Arial" font-size="9" fill="#6ee7b7" text-anchor="middle">4K</text>

  <!-- Thumbnails -->
  <line x1="295" y1="340" x2="295" y2="370" stroke="#10b981" stroke-width="1.5"/>
  <rect x="210" y="370" width="170" height="35" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="295" y="388" font-family="Arial" font-size="10" font-weight="bold" fill="#fcd34d" text-anchor="middle">Thumbnail Generation</text>
  <text x="295" y="399" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">AI auto + manual upload</text>

  <!-- Phase 3: Distribution -->
  <rect x="415" y="60" width="220" height="280" rx="10" fill="#581c8720" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="525" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Phase 3: Distribution</text>

  <rect x="430" y="95" width="185" height="50" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="523" y="118" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Processed Storage</text>
  <text x="523" y="131" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">GCS (All quality variants + HLS chunks)</text>

  <line x1="523" y1="145" x2="523" y2="170" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="430" y="170" width="185" height="50" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="523" y="193" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">CDN Upload</text>
  <text x="523" y="206" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Push to 200+ edge nodes worldwide</text>

  <line x1="523" y1="220" x2="523" y2="245" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="430" y="245" width="185" height="50" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="523" y="268" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Metadata DB Update</text>
  <text x="523" y="281" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Video ready, update index</text>

  <line x1="523" y1="295" x2="523" y2="320" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="430" y="320" width="185" height="40" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
  <text x="523" y="342" font-family="Arial" font-size="11" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Search Index Update</text>
  <text x="523" y="355" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Elasticsearch / video searchable</text>

  <!-- Phase 4: Streaming -->
  <rect x="655" y="60" width="220" height="200" rx="10" fill="#78350f20" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="765" y="82" font-family="Arial" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">Phase 4: Streaming</text>

  <rect x="670" y="95" width="185" height="50" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="763" y="118" font-family="Arial" font-size="11" font-weight="bold" fill="#fcd34d" text-anchor="middle">Adaptive Bitrate</text>
  <text x="763" y="131" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">HLS / DASH - switch quality dynamically</text>

  <line x1="763" y1="145" x2="763" y2="170" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="670" y="170" width="185" height="50" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="763" y="193" font-family="Arial" font-size="11" font-weight="bold" fill="#fcd34d" text-anchor="middle">CDN Edge Serve</text>
  <text x="763" y="206" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Nearest PoP, cached chunks</text>

  <line x1="763" y1="220" x2="763" y2="245" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="670" y="245" width="185" height="40" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="763" y="266" font-family="Arial" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">Viewer</text>
  <text x="763" y="279" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Sub-2s startup, smooth playback</text>

  <!-- Cross arrows between phases -->
  <line x1="160" y1="160" x2="195" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="395" y1="260" x2="415" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="635" y1="175" x2="655" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Timeline bar -->
  <rect x="20" y="430" width="855" height="35" rx="8" fill="#1f2937" stroke="#334155" stroke-width="1"/>
  <text x="50" y="452" font-family="Arial" font-size="11" fill="#94a3b8">Timeline:</text>
  <rect x="110" y="438" width="80" height="18" rx="4" fill="#3b82f640"/>
  <text x="150" y="451" font-family="Arial" font-size="9" fill="#93c5fd" text-anchor="middle">0-2 min upload</text>
  <rect x="200" y="438" width="150" height="18" rx="4" fill="#10b98140"/>
  <text x="275" y="451" font-family="Arial" font-size="9" fill="#6ee7b7" text-anchor="middle">2-20 min processing (async)</text>
  <rect x="360" y="438" width="130" height="18" rx="4" fill="#8b5cf640"/>
  <text x="425" y="451" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">CDN distribution fast</text>
  <rect x="500" y="438" width="170" height="18" rx="4" fill="#f59e0b40"/>
  <text x="585" y="451" font-family="Arial" font-size="9" fill="#fcd34d" text-anchor="middle">Live in feed within ~30 min</text>
  <text x="720" y="451" font-family="Arial" font-size="10" fill="#475569">4K: ~1-2 hours</text>
</svg>

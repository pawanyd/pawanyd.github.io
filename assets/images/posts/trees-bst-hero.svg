<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#heroGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="150" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="200" cy="500" r="40" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1000" cy="450" r="50" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Main BST Tree Structure -->
  <g transform="translate(600, 200)">
    <!-- Root Node -->
    <circle cx="0" cy="0" r="35" fill="url(#nodeGradient)" stroke="#3b82f6" stroke-width="3" filter="url(#shadow)"/>
    <text x="0" y="8" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="24" font-weight="bold">8</text>
    
    <!-- Level 2 Nodes -->
    <circle cx="-120" cy="80" r="30" fill="url(#nodeGradient)" stroke="#10b981" stroke-width="3" filter="url(#shadow)"/>
    <text x="-120" y="88" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif" font-size="20" font-weight="bold">3</text>
    
    <circle cx="120" cy="80" r="30" fill="url(#nodeGradient)" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
    <text x="120" y="88" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="20" font-weight="bold">10</text>
    
    <!-- Level 3 Nodes -->
    <circle cx="-180" cy="160" r="25" fill="url(#nodeGradient)" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="-180" y="168" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif" font-size="18" font-weight="bold">1</text>
    
    <circle cx="-60" cy="160" r="25" fill="url(#nodeGradient)" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="-60" y="168" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif" font-size="18" font-weight="bold">6</text>
    
    <circle cx="180" cy="160" r="25" fill="url(#nodeGradient)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="180" y="168" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="18" font-weight="bold">14</text>
    
    <!-- Level 4 Nodes -->
    <circle cx="-90" cy="240" r="20" fill="url(#nodeGradient)" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="-90" y="248" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif" font-size="16" font-weight="bold">4</text>
    
    <circle cx="-30" cy="240" r="20" fill="url(#nodeGradient)" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="-30" y="248" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif" font-size="16" font-weight="bold">7</text>
    
    <circle cx="150" cy="240" r="20" fill="url(#nodeGradient)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="248" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">13</text>
    
    <!-- Tree Connections -->
    <line x1="0" y1="35" x2="-120" y2="50" stroke="rgba(255,255,255,0.8)" stroke-width="4" filter="url(#glow)"/>
    <line x1="0" y1="35" x2="120" y2="50" stroke="rgba(255,255,255,0.8)" stroke-width="4" filter="url(#glow)"/>
    
    <line x1="-120" y1="110" x2="-180" y2="135" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
    <line x1="-120" y1="110" x2="-60" y2="135" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
    
    <line x1="120" y1="110" x2="180" y2="135" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
    
    <line x1="-60" y1="185" x2="-90" y2="220" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <line x1="-60" y1="185" x2="-30" y2="220" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    
    <line x1="180" y1="185" x2="150" y2="220" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  </g>
  
  <!-- Title Text -->
  <text x="600" y="80" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold" filter="url(#shadow)">
    Trees &amp; Binary Search Trees
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="120" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" font-size="24" font-weight="300">
    The Backbone of Efficient Data Organization
  </text>
  
  <!-- Key Features -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      O(log n) Operations
    </text>
    <text x="100" y="45" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">
      Search • Insert • Delete
    </text>
    <text x="100" y="65" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="11">
      Balanced trees guarantee performance
    </text>
  </g>
  
  <g transform="translate(350, 500)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Ordered Traversal
    </text>
    <text x="100" y="45" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">
      Inorder • Preorder • Postorder
    </text>
    <text x="100" y="65" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="11">
      Natural sorting and structure
    </text>
  </g>
  
  <g transform="translate(600, 500)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Range Queries
    </text>
    <text x="100" y="45" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">
      Find values in [x, y]
    </text>
    <text x="100" y="65" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="11">
      Efficient pruning with BST property
    </text>
  </g>
  
  <g transform="translate(850, 500)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Real-World Usage
    </text>
    <text x="100" y="45" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">
      Databases • File Systems
    </text>
    <text x="100" y="65" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="11">
      Powers modern computing systems
    </text>
  </g>
  
  <!-- Performance Indicator -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="150" height="100" rx="12" fill="rgba(16, 185, 129, 0.2)" stroke="rgba(16, 185, 129, 0.5)" stroke-width="2"/>
    <text x="75" y="25" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Performance
    </text>
    <text x="75" y="50" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
      log₂(n)
    </text>
    <text x="75" y="70" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">
      vs O(n) linear
    </text>
    <text x="75" y="85" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="11">
      1000x faster!
    </text>
  </g>
</svg>
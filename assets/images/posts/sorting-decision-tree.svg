<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img">
  <title>Sorting Algorithm Decision Tree</title>
  <rect width="1200" height="750" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Choosing the Right Sorting Algorithm
  </text>
  
  <!-- Root Question -->
  <g transform="translate(450, 80)">
    <rect width="300" height="60" rx="10" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="150" y="38" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
      What's your data like?
    </text>
  </g>
  
  <!-- Lines from root to level 1 -->
  <line x1="600" y1="140" x2="180" y2="200" stroke="#6b7280" stroke-width="2"/>
  <line x1="600" y1="140" x2="450" y2="200" stroke="#6b7280" stroke-width="2"/>
  <line x1="600" y1="140" x2="750" y2="200" stroke="#6b7280" stroke-width="2"/>
  <line x1="600" y1="140" x2="1020" y2="200" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Level 1: Data Type Options -->
  <g transform="translate(80, 200)">
    <rect width="200" height="50" rx="8" fill="#10b981" opacity="0.9"/>
    <text x="100" y="32" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Small (&lt;50 elements)</text>
  </g>
  
  <g transform="translate(350, 200)">
    <rect width="200" height="50" rx="8" fill="#f59e0b" opacity="0.9"/>
    <text x="100" y="32" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Nearly sorted</text>
  </g>
  
  <g transform="translate(650, 200)">
    <rect width="200" height="50" rx="8" fill="#8b5cf6" opacity="0.9"/>
    <text x="100" y="32" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Random/Large</text>
  </g>
  
  <g transform="translate(920, 200)">
    <rect width="200" height="50" rx="8" fill="#ef4444" opacity="0.9"/>
    <text x="100" y="32" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Limited memory?</text>
  </g>
  
  <!-- Lines from level 1 to level 2 -->
  <line x1="180" y1="250" x2="180" y2="310" stroke="#6b7280" stroke-width="2"/>
  <line x1="450" y1="250" x2="450" y2="310" stroke="#6b7280" stroke-width="2"/>
  <line x1="750" y1="250" x2="750" y2="310" stroke="#6b7280" stroke-width="2"/>
  <line x1="1020" y1="250" x2="1020" y2="310" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Level 2: Algorithm Results -->
  <g transform="translate(80, 310)">
    <rect width="200" height="90" rx="8" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="28" font-family="Arial" font-size="17" font-weight="bold" fill="#10b981" text-anchor="middle">Insertion Sort</text>
    <text x="100" y="52" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">Simple, fast</text>
    <text x="100" y="72" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">Low overhead</text>
  </g>
  
  <g transform="translate(350, 310)">
    <rect width="200" height="90" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="28" font-family="Arial" font-size="17" font-weight="bold" fill="#f59e0b" text-anchor="middle">Timsort</text>
    <text x="100" y="52" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">Adaptive O(n)</text>
    <text x="100" y="72" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">Exploits order</text>
  </g>
  
  <!-- Need stability question -->
  <g transform="translate(650, 310)">
    <rect width="200" height="50" rx="8" fill="#3b82f6" opacity="0.9"/>
    <text x="100" y="32" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Need stability?</text>
  </g>
  
  <g transform="translate(920, 310)">
    <rect width="200" height="90" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2"/>
    <text x="100" y="28" font-family="Arial" font-size="17" font-weight="bold" fill="#ef4444" text-anchor="middle">Heap Sort</text>
    <text x="100" y="52" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">O(1) space</text>
    <text x="100" y="72" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">O(n log n) guaranteed</text>
  </g>
  
  <!-- Lines from stability question -->
  <line x1="750" y1="360" x2="650" y2="430" stroke="#6b7280" stroke-width="2"/>
  <line x1="750" y1="360" x2="850" y2="430" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Level 3: Stability answers -->
  <g transform="translate(550, 430)">
    <rect width="200" height="90" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="28" font-family="Arial" font-size="17" font-weight="bold" fill="#3b82f6" text-anchor="middle">Merge Sort</text>
    <text x="100" y="52" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">Stable</text>
    <text x="100" y="72" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">O(n log n) guaranteed</text>
  </g>
  
  <g transform="translate(780, 430)">
    <rect width="200" height="90" rx="8" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="28" font-family="Arial" font-size="17" font-weight="bold" fill="#10b981" text-anchor="middle">Quick Sort</text>
    <text x="100" y="52" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">Fastest average</text>
    <text x="100" y="72" font-family="Arial" font-size="13" fill="#6b7280" text-anchor="middle">In-place</text>
  </g>
  
  <!-- Special Cases Box -->
  <g transform="translate(150, 570)">
    <rect width="900" height="150" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="450" y="32" font-family="Arial" font-size="20" font-weight="bold" fill="#8b5cf6" text-anchor="middle">
      Special Cases
    </text>
    <text x="30" y="65" font-family="Arial" font-size="15" fill="#1f2937">
      • Integers in limited range → Counting Sort O(n+k)
    </text>
    <text x="30" y="92" font-family="Arial" font-size="15" fill="#1f2937">
      • Fixed-length strings/keys → Radix Sort O(d(n+k))
    </text>
    <text x="30" y="119" font-family="Arial" font-size="15" fill="#1f2937">
      • Uniformly distributed floats → Bucket Sort O(n+k)
    </text>
    <text x="450" y="145" font-family="Arial" font-size="13" font-weight="bold" fill="#6b7280" text-anchor="middle">
      Production: Use built-in sorts (Timsort/Introsort) unless you have specific needs
    </text>
  </g>
</svg>

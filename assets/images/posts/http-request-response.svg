<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="33" font-family="Arial" font-size="17" font-weight="bold" fill="white" text-anchor="middle">HTTP Request-Response Cycle</text>
  <text x="450" y="52" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">What actually happens when you type a URL and press Enter</text>

  <!-- Client (Browser) -->
  <rect x="30" y="70" width="160" height="360" rx="10" fill="#0f2744" stroke="#0ea5e9" stroke-width="2"/>
  <text x="110" y="95" font-family="Arial" font-size="13" font-weight="bold" fill="#7dd3fc" text-anchor="middle">🌐 Client</text>
  <text x="110" y="111" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">(Browser / curl / app)</text>

  <!-- DNS step -->
  <rect x="40" y="120" width="140" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="110" y="137" font-family="Arial" font-size="9" fill="#94a3b8" text-anchor="middle">1. DNS Lookup</text>
  <text x="110" y="151" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">example.com → 93.184.216.34</text>

  <!-- TCP step -->
  <rect x="40" y="170" width="140" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="110" y="187" font-family="Arial" font-size="9" fill="#94a3b8" text-anchor="middle">2. TCP Connection</text>
  <text x="110" y="201" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">SYN → SYN-ACK → ACK</text>

  <!-- TLS step -->
  <rect x="40" y="220" width="140" height="40" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="110" y="237" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">3. TLS Handshake</text>
  <text x="110" y="251" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">(HTTPS only) Negotiate keys</text>

  <!-- HTTP Request -->
  <rect x="40" y="270" width="140" height="55" rx="6" fill="#0f2744" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="110" y="286" font-family="Arial" font-size="9" font-weight="bold" fill="#7dd3fc" text-anchor="middle">4. HTTP Request</text>
  <text x="110" y="300" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">GET /products HTTP/1.1</text>
  <text x="110" y="312" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Host: example.com</text>
  <text x="110" y="324" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Accept: application/json</text>

  <!-- HTTP Response -->
  <rect x="40" y="335" width="140" height="55" rx="6" fill="#0f2744" stroke="#10b981" stroke-width="1.5"/>
  <text x="110" y="351" font-family="Arial" font-size="9" font-weight="bold" fill="#6ee7b7" text-anchor="middle">7. HTTP Response</text>
  <text x="110" y="365" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">HTTP/1.1 200 OK</text>
  <text x="110" y="377" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Content-Type: json</text>
  <text x="110" y="389" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Content-Length: 1024</text>

  <!-- Middle: request/response arrows with timing -->
  <!-- Arrow: request going right -->
  <line x1="195" y1="297" x2="395" y2="185" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="295" y="230" font-family="Arial" font-size="9" fill="#0ea5e9" text-anchor="middle" transform="rotate(-25, 295, 230)">HTTP Request →</text>

  <!-- Arrow: response going left -->
  <line x1="395" y1="305" x2="195" y2="395" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="310" y="375" font-family="Arial" font-size="9" fill="#10b981" text-anchor="middle" transform="rotate(-25, 310, 375)">← HTTP Response</text>

  <!-- Timing box -->
  <rect x="225" y="390" width="165" height="75" rx="8" fill="#1f2937" stroke="#334155" stroke-width="1"/>
  <text x="308" y="408" font-family="Arial" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle">Typical Timings</text>
  <text x="235" y="424" font-family="Arial" font-size="8" fill="#64748b">DNS lookup:     ~20-60ms</text>
  <text x="235" y="438" font-family="Arial" font-size="8" fill="#64748b">TCP handshake:  ~1 RTT (~50ms)</text>
  <text x="235" y="452" font-family="Arial" font-size="8" fill="#64748b">TLS handshake:  ~1-2 RTT</text>
  <text x="235" y="466" font-family="Arial" font-size="8" fill="#fcd34d">Total (cold):   ~200-400ms</text>

  <!-- Server side -->
  <rect x="415" y="70" width="460" height="360" rx="10" fill="#1f2937" stroke="#334155" stroke-width="1.5"/>
  <text x="645" y="95" font-family="Arial" font-size="13" font-weight="bold" fill="#94a3b8" text-anchor="middle">🖥️ Server Processing</text>

  <!-- Parse request -->
  <rect x="428" y="108" width="200" height="45" rx="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="1"/>
  <text x="528" y="127" font-family="Arial" font-size="10" font-weight="bold" fill="#7dd3fc" text-anchor="middle">5. Parse Request</text>
  <text x="528" y="143" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Method, path, headers, body</text>

  <!-- Route to handler -->
  <rect x="638" y="108" width="220" height="45" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="748" y="127" font-family="Arial" font-size="10" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Route Matching</text>
  <text x="748" y="143" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Find handler for GET /products</text>

  <!-- Auth -->
  <rect x="428" y="168" width="200" height="45" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="528" y="187" font-family="Arial" font-size="10" font-weight="bold" fill="#fcd34d" text-anchor="middle">Auth / Middleware</text>
  <text x="528" y="203" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Validate JWT, rate limits...</text>

  <!-- Business logic -->
  <rect x="638" y="168" width="220" height="45" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <text x="748" y="187" font-family="Arial" font-size="10" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Business Logic</text>
  <text x="748" y="203" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Fetch data, apply rules...</text>

  <!-- Database -->
  <rect x="428" y="228" width="200" height="45" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="528" y="247" font-family="Arial" font-size="10" font-weight="bold" fill="#fca5a5" text-anchor="middle">Database / Cache</text>
  <text x="528" y="263" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">SELECT * FROM products...</text>

  <!-- Serialize -->
  <rect x="638" y="228" width="220" height="45" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="748" y="247" font-family="Arial" font-size="10" font-weight="bold" fill="#93c5fd" text-anchor="middle">6. Serialize Response</text>
  <text x="748" y="263" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">JSON encode + set headers</text>

  <!-- Response object -->
  <rect x="428" y="300" width="430" height="120" rx="8" fill="#0f2744" stroke="#10b981" stroke-width="1.5"/>
  <text x="643" y="320" font-family="Arial" font-size="11" font-weight="bold" fill="#6ee7b7" text-anchor="middle">HTTP Response Structure</text>

  <!-- Status line -->
  <rect x="436" y="328" width="412" height="22" rx="4" fill="#14532d"/>
  <text x="642" y="343" font-family="Arial" font-size="10" fill="#6ee7b7" text-anchor="middle">Status Line: HTTP/1.1 200 OK</text>

  <!-- Headers -->
  <rect x="436" y="354" width="412" height="22" rx="4" fill="#1e3a5f"/>
  <text x="642" y="369" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">Headers: Content-Type · Content-Length · Cache-Control · Set-Cookie</text>

  <!-- Body -->
  <rect x="436" y="380" width="412" height="22" rx="4" fill="#2e1065"/>
  <text x="642" y="395" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">Body: {&quot;products&quot;: [...], &quot;total&quot;: 42}</text>

  <!-- Arrows inside server -->
  <line x1="528" y1="153" x2="528" y2="168" stroke="#334155" stroke-width="1.5"/>
  <line x1="748" y1="153" x2="748" y2="168" stroke="#334155" stroke-width="1.5"/>
  <line x1="528" y1="213" x2="528" y2="228" stroke="#334155" stroke-width="1.5"/>
  <line x1="748" y1="213" x2="748" y2="228" stroke="#334155" stroke-width="1.5"/>
  <line x1="628" y1="130" x2="638" y2="130" stroke="#334155" stroke-width="1.5"/>
  <line x1="628" y1="190" x2="638" y2="190" stroke="#334155" stroke-width="1.5"/>
  <line x1="628" y1="250" x2="638" y2="250" stroke="#334155" stroke-width="1.5"/>
  <line x1="748" y1="273" x2="748" y2="300" stroke="#334155" stroke-width="1.5"/>
  <line x1="528" y1="273" x2="528" y2="300" stroke="#334155" stroke-width="1.5"/>
</svg>

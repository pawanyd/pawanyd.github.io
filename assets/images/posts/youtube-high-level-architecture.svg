<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">YouTube - High Level Architecture</text>

  <!-- Users -->
  <g transform="translate(30, 80)">
    <rect width="100" height="50" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="20" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">📱 Mobile</text>
    <text x="50" y="36" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">Users</text>
    <text x="50" y="72" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Viewers</text>
  </g>

  <g transform="translate(30, 200)">
    <rect width="100" height="50" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
    <text x="50" y="20" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">🎬 Content</text>
    <text x="50" y="36" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">Creators</text>
    <text x="50" y="72" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Uploaders</text>
  </g>

  <!-- CDN -->
  <g transform="translate(190, 80)">
    <rect width="120" height="50" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
    <text x="60" y="22" font-family="Arial" font-size="11" font-weight="bold" fill="#fcd34d" text-anchor="middle">CDN</text>
    <text x="60" y="38" font-family="Arial" font-size="9" fill="#fcd34d" text-anchor="middle">Edge Network</text>
    <text x="60" y="72" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Akamai / CloudFront</text>
  </g>

  <!-- API Gateway -->
  <g transform="translate(370, 130)">
    <rect width="130" height="55" rx="8" fill="#1f2937" stroke="#8b5cf6" stroke-width="2"/>
    <text x="65" y="25" font-family="Arial" font-size="11" font-weight="bold" fill="#c4b5fd" text-anchor="middle">API Gateway</text>
    <text x="65" y="41" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">Auth / Rate Limit</text>
    <text x="65" y="57" font-family="Arial" font-size="9" fill="#c4b5fd" text-anchor="middle">Routing + LB</text>
  </g>

  <!-- Microservices Layer -->
  <text x="570" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">Microservices</text>

  <g transform="translate(510, 85)">
    <rect width="110" height="40" rx="6" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
    <text x="55" y="17" font-family="Arial" font-size="10" fill="#6ee7b7" text-anchor="middle">Video Service</text>
    <text x="55" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Upload / Transcode</text>
  </g>

  <g transform="translate(510, 140)">
    <rect width="110" height="40" rx="6" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="55" y="17" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">User Service</text>
    <text x="55" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Auth / Profiles</text>
  </g>

  <g transform="translate(510, 195)">
    <rect width="110" height="40" rx="6" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="55" y="17" font-family="Arial" font-size="10" fill="#fcd34d" text-anchor="middle">Search Service</text>
    <text x="55" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Elasticsearch</text>
  </g>

  <g transform="translate(510, 250)">
    <rect width="110" height="40" rx="6" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="55" y="17" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">Comment Svc</text>
    <text x="55" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">MySQL sharded</text>
  </g>

  <g transform="translate(510, 305)">
    <rect width="110" height="40" rx="6" fill="#1f2937" stroke="#ef4444" stroke-width="1.5"/>
    <text x="55" y="17" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">Recommend Svc</text>
    <text x="55" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">ML Pipeline</text>
  </g>

  <!-- Storage Layer -->
  <text x="750" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">Data Storage</text>

  <g transform="translate(690, 85)">
    <rect width="120" height="40" rx="6" fill="#1f2937" stroke="#ef4444" stroke-width="1.5"/>
    <text x="60" y="17" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">Object Storage</text>
    <text x="60" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">GCS / S3 (Videos)</text>
  </g>

  <g transform="translate(690, 140)">
    <rect width="120" height="40" rx="6" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="60" y="17" font-family="Arial" font-size="10" fill="#93c5fd" text-anchor="middle">User DB</text>
    <text x="60" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">MySQL / Spanner</text>
  </g>

  <g transform="translate(690, 195)">
    <rect width="120" height="40" rx="6" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
    <text x="60" y="17" font-family="Arial" font-size="10" fill="#6ee7b7" text-anchor="middle">Cache Layer</text>
    <text x="60" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Redis Cluster</text>
  </g>

  <g transform="translate(690, 250)">
    <rect width="120" height="40" rx="6" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="60" y="17" font-family="Arial" font-size="10" fill="#fcd34d" text-anchor="middle">Message Queue</text>
    <text x="60" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Kafka / Pub-Sub</text>
  </g>

  <g transform="translate(690, 305)">
    <rect width="120" height="40" rx="6" fill="#1f2937" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="60" y="17" font-family="Arial" font-size="10" fill="#c4b5fd" text-anchor="middle">Analytics Store</text>
    <text x="60" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">BigQuery / ClickHouse</text>
  </g>

  <!-- Upload Flow Arrow -->
  <text x="190" y="225" font-family="Arial" font-size="10" fill="#ef4444" text-anchor="middle">Upload</text>
  <g transform="translate(150, 200)">
    <rect width="110" height="40" rx="6" fill="#1f2937" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="55" y="17" font-family="Arial" font-size="10" fill="#fca5a5" text-anchor="middle">Transcoding</text>
    <text x="55" y="30" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Workers (Async)</text>
  </g>

  <!-- Arrows -->
  <!-- Users to CDN -->
  <line x1="130" y1="105" x2="190" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Creators to transcoding -->
  <line x1="130" y1="225" x2="150" y2="225" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- CDN to API Gateway -->
  <line x1="310" y1="105" x2="370" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- API Gateway to services -->
  <line x1="500" y1="158" x2="510" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="158" x2="510" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="158" x2="510" y2="215" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="158" x2="510" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="158" x2="510" y2="325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Services to storage -->
  <line x1="620" y1="105" x2="690" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="160" x2="690" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="215" x2="690" y2="215" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="270" x2="690" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="325" x2="690" y2="325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="30" y="420" width="840" height="120" rx="8" fill="#1f2937" stroke="#334155" stroke-width="1"/>
  <text x="450" y="445" font-family="Arial" font-size="13" font-weight="bold" fill="#94a3b8" text-anchor="middle">Scale Numbers</text>

  <circle cx="80" cy="465" r="5" fill="#3b82f6"/>
  <text x="95" y="469" font-family="Arial" font-size="11" fill="#94a3b8">2B+ monthly active users</text>
  <circle cx="280" cy="465" r="5" fill="#ef4444"/>
  <text x="295" y="469" font-family="Arial" font-size="11" fill="#94a3b8">500 hours of video uploaded/min</text>
  <circle cx="530" cy="465" r="5" fill="#10b981"/>
  <text x="545" y="469" font-family="Arial" font-size="11" fill="#94a3b8">1B hours watched daily</text>
  <circle cx="720" cy="465" r="5" fill="#f59e0b"/>
  <text x="735" y="469" font-family="Arial" font-size="11" fill="#94a3b8">Exabytes of storage</text>

  <circle cx="80" cy="495" r="5" fill="#8b5cf6"/>
  <text x="95" y="499" font-family="Arial" font-size="11" fill="#94a3b8">120M videos served per day</text>
  <circle cx="280" cy="495" r="5" fill="#f59e0b"/>
  <text x="295" y="499" font-family="Arial" font-size="11" fill="#94a3b8">~79% global internet traffic (video)</text>
  <circle cx="530" cy="495" r="5" fill="#ef4444"/>
  <text x="545" y="499" font-family="Arial" font-size="11" fill="#94a3b8">99.9%+ availability SLA</text>
  <circle cx="720" cy="495" r="5" fill="#3b82f6"/>
  <text x="735" y="499" font-family="Arial" font-size="11" fill="#94a3b8">0-2s startup latency target</text>

  <text x="450" y="525" font-family="Arial" font-size="10" fill="#475569" text-anchor="middle">Peak write: ~5,000 video uploads/min | Read-write ratio: ~200:1 | Global CDN: 200+ PoPs worldwide</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f3f4f6"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Merkle Tree for Inconsistency Detection
  </text>
  
  <!-- Root node -->
  <g id="root">
    <rect x="350" y="80" width="100" height="50" rx="8" fill="#ef4444"/>
    <text x="400" y="100" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Root</text>
    <text x="400" y="118" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">hash: a3f2</text>
  </g>
  
  <!-- Level 1 nodes -->
  <g id="left-branch">
    <rect x="200" y="180" width="100" height="50" rx="8" fill="#10b981"/>
    <text x="250" y="200" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Branch 1</text>
    <text x="250" y="218" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">hash: 7b4e</text>
  </g>
  
  <g id="right-branch">
    <rect x="500" y="180" width="100" height="50" rx="8" fill="#ef4444"/>
    <text x="550" y="200" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Branch 2</text>
    <text x="550" y="218" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">hash: 9c1a</text>
  </g>
  
  <!-- Level 2 nodes (buckets) -->
  <g id="bucket1">
    <rect x="100" y="280" width="100" height="50" rx="8" fill="#10b981"/>
    <text x="150" y="300" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Bucket 1</text>
    <text x="150" y="318" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">hash: 3d2f</text>
  </g>
  
  <g id="bucket2">
    <rect x="250" y="280" width="100" height="50" rx="8" fill="#10b981"/>
    <text x="300" y="300" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Bucket 2</text>
    <text x="300" y="318" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">hash: 4a1c</text>
  </g>
  
  <g id="bucket3">
    <rect x="450" y="280" width="100" height="50" rx="8" fill="#f59e0b"/>
    <text x="500" y="300" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Bucket 3</text>
    <text x="500" y="318" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">hash: 8e7b</text>
  </g>
  
  <g id="bucket4">
    <rect x="600" y="280" width="100" height="50" rx="8" fill="#10b981"/>
    <text x="650" y="300" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Bucket 4</text>
    <text x="650" y="318" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">hash: 2f9d</text>
  </g>
  
  <!-- Keys in buckets -->
  <g id="keys-bucket1">
    <text x="150" y="360" font-family="Arial, sans-serif" font-size="10" fill="#1f2937" text-anchor="middle">keys: 1-250</text>
  </g>
  
  <g id="keys-bucket2">
    <text x="300" y="360" font-family="Arial, sans-serif" font-size="10" fill="#1f2937" text-anchor="middle">keys: 251-500</text>
  </g>
  
  <g id="keys-bucket3">
    <text x="500" y="360" font-family="Arial, sans-serif" font-size="10" fill="#1f2937" text-anchor="middle">keys: 501-750</text>
    <text x="500" y="375" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f59e0b" text-anchor="middle">⚠ Different!</text>
  </g>
  
  <g id="keys-bucket4">
    <text x="650" y="360" font-family="Arial, sans-serif" font-size="10" fill="#1f2937" text-anchor="middle">keys: 751-1000</text>
  </g>
  
  <!-- Connecting lines -->
  <line x1="400" y1="130" x2="250" y2="180" stroke="#1f2937" stroke-width="2"/>
  <line x1="400" y1="130" x2="550" y2="180" stroke="#1f2937" stroke-width="2"/>
  
  <line x1="250" y1="230" x2="150" y2="280" stroke="#1f2937" stroke-width="2"/>
  <line x1="250" y1="230" x2="300" y2="280" stroke="#1f2937" stroke-width="2"/>
  
  <line x1="550" y1="230" x2="500" y2="280" stroke="#1f2937" stroke-width="2"/>
  <line x1="550" y1="230" x2="650" y2="280" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Comparison process -->
  <g id="comparison">
    <rect x="50" y="420" width="700" height="140" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="400" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937" text-anchor="middle">
      Comparison Process
    </text>
    <text x="400" y="480" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="middle">
      1. Compare root hashes → Different (a3f2 vs a3f1)
    </text>
    <text x="400" y="505" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="middle">
      2. Compare branch hashes → Branch 1 matches ✓, Branch 2 differs ✗
    </text>
    <text x="400" y="530" font-family="Arial, sans-serif" font-size="13" fill="#1f2937" text-anchor="middle">
      3. Compare buckets in Branch 2 → Bucket 3 differs ✗, Bucket 4 matches ✓
    </text>
    <text x="400" y="550" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b" text-anchor="middle">
      Result: Only sync keys 501-750 (Bucket 3)
    </text>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="620" y="50" width="150" height="80" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="695" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Legend</text>
    <rect x="635" y="80" width="20" height="15" fill="#10b981"/>
    <text x="665" y="92" font-family="Arial, sans-serif" font-size="11" fill="#1f2937" text-anchor="start">Match</text>
    <rect x="635" y="105" width="20" height="15" fill="#ef4444"/>
    <text x="665" y="117" font-family="Arial, sans-serif" font-size="11" fill="#1f2937" text-anchor="start">Differ</text>
  </g>
</svg>

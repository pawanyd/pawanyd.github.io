          root.right = deleteNode(root.right, val);
        } else {
          // Node to delete found
          if (!root.left) {
            return root.right;
          } else if (!root.right) {
            return root.left;
          }
          
          // Node has two children
          const minNode = findMin(root.right);
          root.val = minNode.val;
          root.right = deleteNode(root.right, minNode.val);

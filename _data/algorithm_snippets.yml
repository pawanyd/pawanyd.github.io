hash_table_basic:
  name: "Basic Hash Table Implementation"
  description: "Simple hash table with chaining collision resolution"
  time_complexity: "O(1) average, O(n) worst case"
  space_complexity: "O(n)"
  languages:
    python: |
      class HashTable:
          def __init__(self, size=10):
              self.size = size
              self.table = [[] for _ in range(size)]
          
          def _hash(self, key):
              """Simple hash function using built-in hash()"""
              return hash(key) % self.size
          
          def put(self, key, value):
              """Insert or update key-value pair"""
              index = self._hash(key)
              bucket = self.table[index]
              
              # Update existing key
              for i, (k, v) in enumerate(bucket):
                  if k == key:
                      bucket[i] = (key, value)
                      return
              
              # Add new key-value pair
              bucket.append((key, value))
          
          def get(self, key):
              """Retrieve value by key"""
              index = self._hash(key)
              bucket = self.table[index]
              
              for k, v in bucket:
                  if k == key:
                      return v
              
              raise KeyError(key)
    

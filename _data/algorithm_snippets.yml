      function binarySearch($arr, $target) {
          // Search for target in sorted array
          $left = 0;
          $right = count($arr) - 1;
          
          while ($left <= $right) {
              $mid = $left + intval(($right - $left) / 2);
              
              if ($arr[$mid] == $target) {
                  return $mid;
              } elseif ($arr[$mid] < $target) {

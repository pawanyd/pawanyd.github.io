sudoku_solver:
  name: "Sudoku Solver"
  description: "Solve 9x9 Sudoku puzzle using backtracking with constraint checking"
  time_complexity: "O(9^(n*n)) worst case, much better with pruning"
  space_complexity: "O(n*n)"
  languages:
    python: |
      def solve_sudoku(board):
          """Solve Sudoku puzzle using backtracking"""
          def is_valid(board, row, col, num):
              # Check row
              for j in range(9):
                  if board[row][j] == num:
                      return False
              
              # Check column
              for i in range(9):
                  if board[i][col] == num:
                      return False
              
              # Check 3x3 box
              start_row, start_col = 3 * (row // 3), 3 * (col // 3)
              for i in range(start_row, start_row + 3):
                  for j in range(start_col, start_col + 3):
                      if board[i][j] == num:
                          return False
              
              return True
          
          def backtrack():
              for i in range(9):
                  for j in range(9):
                      if board[i][j] == 0:  # Empty cell
                          for num in range(1, 10):
                              if is_valid(board, i, j, num):
                                  board[i][j] = num
                                  
                                  if backtrack():
                                      return True
                                  
                                  board[i][j] = 0  # Backtrack
                          
                          return False  # No valid number found
              
              return True  # All cells filled
          
          return backtrack()
    

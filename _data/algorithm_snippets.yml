      #include <unordered_map>
      using namespace std;
      
      class LRUCache {
      private:
          struct Node {
              int key, value;
              Node* prev;
              Node* next;
              
              Node(int k, int v) : key(k), value(v), prev(nullptr), next(nullptr) {}
          };
          
          int capacity;
          unordered_map<int, Node*> cache;
          Node* head;
          Node* tail;
          
          void remove(Node* node) {
              node->prev->next = node->next;
              node->next->prev = node->prev;
          }
          
          void addToHead(Node* node) {
              node->prev = head;
              node->next = head->next;
              head->next->prev = node;
              head->next = node;
          }
          
      public:
          LRUCache(int capacity) : capacity(capacity) {
              // Create dummy head and tail
              head = new Node(0, 0);
              tail = new Node(0, 0);
              head->next = tail;
              tail->prev = head;
          }
          
          ~LRUCache() {
              Node* current = head;
              while (current) {
                  Node* next = current->next;
                  delete current;
                  current = next;
              }
          }
          
          int get(int key) {
              if (cache.find(key) != cache.end()) {
                  Node* node = cache[key];
                  // Move to head (mark as recently used)
                  remove(node);
                  addToHead(node);
                  return node->value;
              }
              return -1;
          }
          
          void put(int key, int value) {
              if (cache.find(key) != cache.end()) {
                  // Update existing key
                  Node* node = cache[key];
                  node->value = value;
                  remove(node);
                  addToHead(node);
              } else {
                  // Add new key
                  if (cache.size() >= capacity) {
                      // Remove LRU (tail)
                      Node* lru = tail->prev;
                      remove(lru);
                      cache.erase(lru->key);
                      delete lru;
                  }
                  
                  // Add new node to head
                  Node* newNode = new Node(key, value);
                  addToHead(newNode);
                  cache[key] = newNode;
              }
          }
      };
    

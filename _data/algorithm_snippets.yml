trie_autocomplete:
  name: "Trie Autocomplete"
  description: "Build autocomplete system using Trie (Prefix Tree)"
  time_complexity: "O(m) insert, O(m + k) search where m is word length, k is results"
  space_complexity: "O(ALPHABET_SIZE * N * M) where N is number of words"
  languages:
    python: |
      class TrieNode:
          def __init__(self):
              self.children = {}
              self.is_end_word = False
              self.suggestions = []
      
      class Trie:
          def __init__(self):
              self.root = TrieNode()
          
          def insert(self, word):
              node = self.root
              for char in word:
                  if char not in node.children:
                      node.children[char] = TrieNode()
                  node = node.children[char]
                  node.suggestions.append(word)
                  node.suggestions.sort()
                  if len(node.suggestions) > 3:  # Keep top 3
                      node.suggestions.pop()
              node.is_end_word = True
          
          def autocomplete(self, prefix):
              node = self.root
              for char in prefix:
                  if char not in node.children:
                      return []
                  node = node.children[char]
              return node.suggestions
    

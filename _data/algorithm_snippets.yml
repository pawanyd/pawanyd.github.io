trie:
  name: "Trie (Prefix Tree)"
  description: "Efficient string prefix search data structure"
  time_complexity: "O(m) insert/search, m = word length"
  space_complexity: "O(ALPHABET_SIZE × N × M)"
  languages:
    python: |
      class TrieNode:
          def __init__(self):
              self.children = {}
              self.is_end = False
      
      class Trie:
          def __init__(self):
              self.root = TrieNode()
          
          def insert(self, word):
              node = self.root
              for char in word:
                  if char not in node.children:
                      node.children[char] = TrieNode()
                  node = node.children[char]
              node.is_end = True
          
          def search(self, word):
              node = self.root
              for char in word:
                  if char not in node.children:
                      return False
                  node = node.children[char]
              return node.is_end
          
          def starts_with(self, prefix):
              node = self.root
              for char in prefix:
                  if char not in node.children:
                      return False
                  node = node.children[char]
              return True
    

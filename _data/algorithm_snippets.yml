fibonacci_memoization:
  name: "Fibonacci with Memoization"
  description: "Top-down DP approach using recursion with memoization"
  time_complexity: "O(n)"
  space_complexity: "O(n)"
  languages:
    python: |
      def fibonacci_memo(n, memo={}):
          """Fibonacci with memoization - top-down DP"""
          if n in memo:
              return memo[n]
          
          if n <= 1:
              return n
          
          memo[n] = fibonacci_memo(n-1, memo) + fibonacci_memo(n-2, memo)
          return memo[n]
    

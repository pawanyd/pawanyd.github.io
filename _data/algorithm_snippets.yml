reverse_linked_list:
  name: "Reverse Linked List"
  description: "Reverse a singly linked list in-place"
  time_complexity: "O(n)"
  space_complexity: "O(1)"
  languages:
    python: |
      class ListNode:
          def __init__(self, val=0, next=None):
              self.val = val
              self.next = next
      
      def reverse_list(head):
          """Reverse a singly linked list"""
          prev = None
          current = head
          
          while current:
              next_node = current.next
              current.next = prev
              prev = current
              current = next_node
          
          return prev
    
    javascript: |
      class ListNode {
        constructor(val = 0, next = null) {
          this.val = val;
          this.next = next;
        }
      }
      
      function reverseList(head) {
        let prev = null;
        let current = head;
        
        while (current !== null) {
          const nextNode = current.next;
          current.next = prev;
          prev = current;
          current = nextNode;
        }
        
        return prev;
      }
    
    typescript: |
      class ListNode {
        val: number;
        next: ListNode | null;
        
        constructor(val: number = 0, next: ListNode | null = null) {
          this.val = val;
          this.next = next;
        }
      }
      
      function reverseList(head: ListNode | null): ListNode | null {
        let prev: ListNode | null = null;
        let current: ListNode | null = head;
        
        while (current !== null) {
          const nextNode: ListNode | null = current.next;
          current.next = prev;
          prev = current;
          current = nextNode;
        }
        
        return prev;
      }
    
    java: |
      class ListNode {
          int val;
          ListNode next;
          ListNode(int val) { this.val = val; }
      }
      
      public class ReverseLinkedList {
          public static ListNode reverseList(ListNode head) {
              ListNode prev = null;
              ListNode current = head;
              
              while (current != null) {
                  ListNode nextNode = current.next;
                  current.next = prev;
                  prev = current;
                  current = nextNode;
              }
              
              return prev;
          }
      }
    
    cpp: |
      struct ListNode {
          int val;
          ListNode* next;
          ListNode(int x) : val(x), next(nullptr) {}
      };
      
      ListNode* reverseList(ListNode* head) {
          ListNode* prev = nullptr;
          ListNode* current = head;
          
          while (current != nullptr) {
              ListNode* nextNode = current->next;
              current->next = prev;
              prev = current;
              current = nextNode;
          }
          
          return prev;
      }
    
    php: |

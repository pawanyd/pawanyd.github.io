b_tree_search:
  name: "B-Tree Search"
  description: "Search for a key in a B-tree optimized for disk access"
  complexity:
    time: "O(log n)"
    space: "O(1)"
  implementations:
    python: |
      class BTreeNode:
          def __init__(self, leaf=True):
              self.keys = []
              self.children = []
              self.leaf = leaf
      
      def search(node, key):
          """Search for key in B-tree"""
          i = 0
          # Find the first key greater than or equal to key
          while i < len(node.keys) and key > node.keys[i]:
              i += 1
          
          # If key found
          if i < len(node.keys) and key == node.keys[i]:
              return (node, i)
          
          # If leaf node, key not found
          if node.leaf:
              return None
          
          # Recursively search in appropriate child
          return search(node.children[i], key)
    javascript: |
      class BTreeNode {
          constructor(leaf = true) {
              this.keys = [];
              this.children = [];
              this.leaf = leaf;
          }
      }
      
      function search(node, key) {
          let i = 0;
          while (i < node.keys.length && key > node.keys[i]) {
              i++;
          }
          
          if (i < node.keys.length && key === node.keys[i]) {
              return { node, index: i };
          }
          
          if (node.leaf) {
              return null;
          }
          
          return search(node.children[i], key);
      }

segment_tree_query:
  name: "Segment Tree Range Query"
  description: "Query sum/min/max over a range in O(log n) time"
  complexity:
    time: "O(log n)"
    space: "O(n)"
  implementations:
    python: |
      class SegmentTree:
          def __init__(self, arr):
              self.n = len(arr)
              self.tree = [0] * (4 * self.n)
              self.build(arr, 0, 0, self.n - 1)
          
          def build(self, arr, node, start, end):
              if start == end:
                  self.tree[node] = arr[start]
              else:
                  mid = (start + end) // 2
                  self.build(arr, 2*node+1, start, mid)
                  self.build(arr, 2*node+2, mid+1, end)
                  self.tree[node] = self.tree[2*node+1] + self.tree[2*node+2]
          
          def query(self, node, start, end, l, r):
              """Query sum in range [l, r]"""
              if r < start or end < l:
                  return 0
              
              if l <= start and end <= r:
                  return self.tree[node]
              
              mid = (start + end) // 2
              left_sum = self.query(2*node+1, start, mid, l, r)
              right_sum = self.query(2*node+2, mid+1, end, l, r)
              return left_sum + right_sum
          
          def range_query(self, l, r):
              return self.query(0, 0, self.n-1, l, r)

dijkstra:
  name: "Dijkstra's Algorithm"
  description: "Shortest path in weighted graph with non-negative weights"
  time_complexity: "O((V + E) log V)"
  space_complexity: "O(V)"
  languages:
    python: |
      import heapq
      
      def dijkstra(graph, start):
          """Dijkstra's shortest path - O((V+E) log V)"""
          distances = {node: float('inf') for node in graph}
          distances[start] = 0
          pq = [(0, start)]
          
          while pq:
              current_dist, current = heapq.heappop(pq)
              
              if current_dist > distances[current]:
                  continue
              
              for neighbor, weight in graph[current]:
                  distance = current_dist + weight
                  
                  if distance < distances[neighbor]:
                      distances[neighbor] = distance
                      heapq.heappush(pq, (distance, neighbor))
          
          return distances
    
    javascript: |
      function dijkstra(graph, start) {
        const distances = {};
        const pq = [[0, start]];
        
        for (const node in graph) {
          distances[node] = Infinity;
        }
        distances[start] = 0;
        
        while (pq.length > 0) {
          pq.sort((a, b) => a[0] - b[0]);
          const [currentDist, current] = pq.shift();
          
          if (currentDist > distances[current]) continue;
          
          for (const [neighbor, weight] of graph[current]) {
            const distance = currentDist + weight;
            
            if (distance < distances[neighbor]) {
              distances[neighbor] = distance;
              pq.push([distance, neighbor]);
            }
          }
        }
        
        return distances;
      }
    
    typescript: |
      function dijkstra(graph: Map<string, [string, number][]>, start: string): Map<string, number> {
        const distances = new Map<string, number>();
        const pq: [number, string][] = [[0, start]];
        
        for (const node of graph.keys()) {
          distances.set(node, Infinity);
        }
        distances.set(start, 0);
        
        while (pq.length > 0) {
          pq.sort((a, b) => a[0] - b[0]);
          const [currentDist, current] = pq.shift()!;
          
          if (currentDist > distances.get(current)!) continue;
          
          for (const [neighbor, weight] of graph.get(current) || []) {
            const distance = currentDist + weight;
            
            if (distance < distances.get(neighbor)!) {
              distances.set(neighbor, distance);
              pq.push([distance, neighbor]);
            }
          }
        }
        
        return distances;
      }
    
    java: |
      import java.util.*;
      
      public class Dijkstra {
          public static Map<String, Integer> dijkstra(Map<String, List<int[]>> graph, String start) {
              Map<String, Integer> distances = new HashMap<>();
              PriorityQueue<int[]> pq = new PriorityQueue<>((a, b) -> a[0] - b[0]);
              
              for (String node : graph.keySet()) {
                  distances.put(node, Integer.MAX_VALUE);
              }
              distances.put(start, 0);
              pq.offer(new int[]{0, start.hashCode()});
              
              while (!pq.isEmpty()) {
                  int[] current = pq.poll();
                  int currentDist = current[0];
                  String currentNode = start; // Simplified
                  
                  if (currentDist > distances.get(currentNode)) continue;
                  
                  for (int[] edge : graph.get(currentNode)) {
                      String neighbor = start; // Simplified
                      int weight = edge[1];
                      int distance = currentDist + weight;
                      
                      if (distance < distances.get(neighbor)) {
                          distances.put(neighbor, distance);
                          pq.offer(new int[]{distance, neighbor.hashCode()});
                      }
                  }
              }
              
              return distances;
          }
      }
    

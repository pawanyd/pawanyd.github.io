          $pivot = $arr[floor(count($arr) / 2)];
          $left = array_filter($arr, fn($x) => $x < $pivot);
          $middle = array_filter($arr, fn($x) => $x === $pivot);
          $right = array_filter($arr, fn($x) => $x > $pivot);
          
          return array_merge(quickSort($left), $middle, quickSort($right));
      }

heap_sort:
  name: "Heap Sort"
  description: "Sort using heap data structure for guaranteed O(n log n)"
  time_complexity: "O(n log n)"
  space_complexity: "O(1)"
  languages:
    python: |
      def heap_sort(arr):
          """Sort array using heap sort"""
          n = len(arr)
          
          # Build max heap
          for i in range(n // 2 - 1, -1, -1):
              heapify(arr, n, i)
          
          # Extract elements from heap
          for i in range(n - 1, 0, -1):
              arr[0], arr[i] = arr[i], arr[0]
              heapify(arr, i, 0)
          
          return arr
      
      def heapify(arr, n, i):
          largest = i
          left = 2 * i + 1
          right = 2 * i + 2
          
          if left < n and arr[left] > arr[largest]:
              largest = left
          if right < n and arr[right] > arr[largest]:
              largest = right
          
          if largest != i:
              arr[i], arr[largest] = arr[largest], arr[i]
              heapify(arr, n, largest)

trie_insert:
  name: "Trie Insertion and Search"
  description: "Insert and search strings in a trie for prefix matching"
  complexity:
    time: "O(m) where m is string length"
    space: "O(m * n) where n is number of strings"
  implementations:
    python: |
      class TrieNode:
          def __init__(self):
              self.children = {}
              self.is_end_of_word = False
      
      class Trie:
          def __init__(self):
              self.root = TrieNode()
          
          def insert(self, word):
              """Insert a word into the trie"""
              node = self.root
              for char in word:
                  if char not in node.children:
                      node.children[char] = TrieNode()
                  node = node.children[char]
              node.is_end_of_word = True
          
          def search(self, word):
              """Search for exact word match"""
              node = self.root
              for char in word:
                  if char not in node.children:
                      return False
                  node = node.children[char]
              return node.is_end_of_word
          
          def starts_with(self, prefix):
              """Check if any word starts with prefix"""
              node = self.root
              for char in prefix:
                  if char not in node.children:
                      return False
                  node = node.children[char]
              return True

      def heap_extract_max(heap):
          """Extract maximum from max heap"""
          if not heap:
              return None
          
          max_val = heap[0]
          heap[0] = heap[-1]
          heap.pop()
          
          if heap:
              heapify_down(heap, 0)
          
          return max_val
      
      def heapify_down(heap, index):
          n = len(heap)
          while True:
              largest = index
              left = 2 * index + 1
              right = 2 * index + 2
              
              if left < n and heap[left] > heap[largest]:
                  largest = left
              if right < n and heap[right] > heap[largest]:
                  largest = right
              
              if largest != index:
                  heap[index], heap[largest] = heap[largest], heap[index]
                  index = largest
              else:
                  break

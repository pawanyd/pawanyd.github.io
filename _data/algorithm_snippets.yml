two_pointers_palindrome:
  name: "Two Pointers Palindrome Check"
  description: "Check if a string is a palindrome using two pointers"
  time_complexity: "O(n)"
  space_complexity: "O(1)"
  languages:
    python: |
      def is_palindrome(s):
          """Check if string is palindrome using two pointers"""
          left, right = 0, len(s) - 1
          
          while left < right:
              if s[left] != s[right]:
                  return False
              left += 1
              right -= 1
          
          return True
    

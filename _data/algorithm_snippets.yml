          if (empty($arr)) return 0;
          
          $maxSum = $arr[0];
          $currentSum = $arr[0];
          
          for ($i = 1; $i < count($arr); $i++) {
              $currentSum = max($arr[$i], $currentSum + $arr[$i]);
              $maxSum = max($maxSum, $currentSum);
          }
          
          return $maxSum;
      }
      ?>

prefix_sum:
  name: "Prefix Sum"
  description: "Precompute cumulative sums for O(1) range queries"
  time_complexity: "O(n) build, O(1) query"
  space_complexity: "O(n)"
  languages:
    python: |
      def build_prefix_sum(arr):
          """Build prefix sum array for range sum queries"""
          prefix = [0]
          for num in arr:
              prefix.append(prefix[-1] + num)
          return prefix
      
      def range_sum(prefix, left, right):
          """Get sum of elements from index left to right (inclusive)"""
          return prefix[right + 1] - prefix[left]
    
    javascript: |
      function buildPrefixSum(arr) {
        // Build prefix sum array for range sum queries
        const prefix = [0];
        for (const num of arr) {
          prefix.push(prefix[prefix.length - 1] + num);
        }
        return prefix;
      }
      
      function rangeSum(prefix, left, right) {
        // Get sum of elements from index left to right (inclusive)
        return prefix[right + 1] - prefix[left];
      }
    
    typescript: |
      function buildPrefixSum(arr: number[]): number[] {
        // Build prefix sum array for range sum queries
        const prefix: number[] = [0];
        for (const num of arr) {
          prefix.push(prefix[prefix.length - 1] + num);
        }
        return prefix;
      }
      
      function rangeSum(prefix: number[], left: number, right: number): number {
        // Get sum of elements from index left to right (inclusive)
        return prefix[right + 1] - prefix[left];
      }
    
    java: |
      public class PrefixSum {
          public static int[] buildPrefixSum(int[] arr) {
              int[] prefix = new int[arr.length + 1];
              for (int i = 0; i < arr.length; i++) {
                  prefix[i + 1] = prefix[i] + arr[i];
              }
              return prefix;
          }
          
          public static int rangeSum(int[] prefix, int left, int right) {
              return prefix[right + 1] - prefix[left];
          }
      }
    
    cpp: |
      #include <vector>
      using namespace std;
      
      vector<int> buildPrefixSum(vector<int>& arr) {
          vector<int> prefix(arr.size() + 1, 0);
          for (int i = 0; i < arr.size(); i++) {
              prefix[i + 1] = prefix[i] + arr[i];
          }
          return prefix;
      }
      
      int rangeSum(vector<int>& prefix, int left, int right) {
          return prefix[right + 1] - prefix[left];
      }
    
    php: |
      <?php
      function buildPrefixSum($arr) {
          $prefix = [0];
          foreach ($arr as $num) {
              $prefix[] = end($prefix) + $num;
          }
          return $prefix;
      }
      
      function rangeSum($prefix, $left, $right) {
          return $prefix[$right + 1] - $prefix[$left];
      }
      ?>



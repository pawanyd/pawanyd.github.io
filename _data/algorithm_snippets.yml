    java: |
      import java.util.*;
      import java.util.function.Function;
      import java.util.function.Predicate;
      
      public class IterativeDeepeningBacktracking {
          public static <T> List<T> iterativeDeepeningBacktracking(
              T initialState,
              Predicate<T> goalTest,
              Function<T, List<T>> getSuccessors) {
              
              // Iteratively increase depth limit
              for (int depth = 1; depth <= 100; depth++) {
                  List<T> result = depthLimitedSearch(initialState, new ArrayList<>(), depth, goalTest, getSuccessors);
                  if (result != null) {
                      return result;
                  }
              }
              
              return null; // No solution found
          }
          
          private static <T> List<T> depthLimitedSearch(
              T state,
              List<T> path,
              int depthLimit,
              Predicate<T> goalTest,
              Function<T, List<T>> getSuccessors) {
              
              if (goalTest.test(state)) {
                  List<T> result = new ArrayList<>(path);
                  result.add(state);
                  return result;
              }
              
              if (depthLimit <= 0) {
                  return null;
              }
              
              for (T successor : getSuccessors.apply(state)) {
                  if (!path.contains(successor)) { // Avoid cycles
                      List<T> newPath = new ArrayList<>(path);
                      newPath.add(state);
                      List<T> result = depthLimitedSearch(successor, newPath, depthLimit - 1, goalTest, getSuccessors);
                      if (result != null) {
                          return result;
                      }
                  }
              }
              
              return null;
          }
      }
    
    cpp: |
      #include <vector>
      #include <functional>
      #include <algorithm>
      using namespace std;
      
      template<typename T>
      class IterativeDeepeningBacktracking {
      public:
          vector<T> iterativeDeepeningBacktracking(
              const T& initialState,
              function<bool(const T&)> goalTest,
              function<vector<T>(const T&)> getSuccessors) {
              
              // Iteratively increase depth limit
              for (int depth = 1; depth <= 100; depth++) {
                  vector<T> path;
                  vector<T> result = depthLimitedSearch(initialState, path, depth, goalTest, getSuccessors);
                  if (!result.empty()) {
                      return result;
                  }
              }
              
              return {}; // No solution found
          }
          
      private:
          vector<T> depthLimitedSearch(
              const T& state,
              vector<T>& path,
              int depthLimit,
              function<bool(const T&)> goalTest,
              function<vector<T>(const T&)> getSuccessors) {
              
              if (goalTest(state)) {
                  vector<T> result = path;
                  result.push_back(state);
                  return result;
              }
              
              if (depthLimit <= 0) {
                  return {};
              }
              
              for (const T& successor : getSuccessors(state)) {
                  if (find(path.begin(), path.end(), successor) == path.end()) { // Avoid cycles
                      path.push_back(state);
                      vector<T> result = depthLimitedSearch(successor, path, depthLimit - 1, goalTest, getSuccessors);
                      if (!result.empty()) {
                          return result;
                      }
                      path.pop_back();
                  }
              }
              
              return {};
          }
      };
    

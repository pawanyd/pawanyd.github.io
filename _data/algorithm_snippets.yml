      function solveNQueens(n) {
        function isSafe(board, row, col) {
          // Check column
          for (let i = 0; i < row; i++) {
            if (board[i] === col) return false;
          }
          
          // Check diagonal
          for (let i = 0; i < row; i++) {
            if (Math.abs(board[i] - col) === Math.abs(i - row)) {
              return false;
            }
          }
          
          return true;
        }
        
        function backtrack(board, row) {
          if (row === n) {
            return [board.slice()]; // Found solution
          }
          
          const solutions = [];
          for (let col = 0; col < n; col++) {
            if (isSafe(board, row, col)) {
              board[row] = col;
              solutions.push(...backtrack(board, row + 1));
            }
          }
          
          return solutions;
        }
        
        return backtrack(new Array(n).fill(-1), 0);
      }
    

    java: |
      import java.util.*;
      
      public class Permutations {
          public static List<List<Integer>> permute(int[] nums) {
              List<List<Integer>> result = new ArrayList<>();
              backtrack(result, new ArrayList<>(), nums);
              return result;
          }
          
          private static void backtrack(List<List<Integer>> result, List<Integer> path, int[] nums) {
              if (path.size() == nums.length) {
                  result.add(new ArrayList<>(path));
                  return;
              }
              
              for (int num : nums) {
                  if (path.contains(num)) continue;
                  path.add(num);
                  backtrack(result, path, nums);
                  path.remove(path.size() - 1);
              }
          }
      }
    
    cpp: |
      #include <vector>
      using namespace std;
      
      void backtrack(vector<vector<int>>& result, vector<int>& path, vector<int>& nums, vector<bool>& used) {
          if (path.size() == nums.size()) {
              result.push_back(path);
              return;
          }
          
          for (int i = 0; i < nums.size(); i++) {
              if (used[i]) continue;
              
              path.push_back(nums[i]);
              used[i] = true;
              backtrack(result, path, nums, used);
              path.pop_back();
              used[i] = false;
          }
      }
      
      vector<vector<int>> permute(vector<int>& nums) {
          vector<vector<int>> result;
          vector<int> path;
          vector<bool> used(nums.size(), false);
          backtrack(result, path, nums, used);
          return result;
      }
    
    php: |
      <?php
      function permute($nums) {
          $result = [];
          
          function backtrack(&$result, $path, $remaining) {
              if (empty($remaining)) {
                  $result[] = $path;
                  return;
              }
              
              for ($i = 0; $i < count($remaining); $i++) {
                  $newPath = $path;
                  $newPath[] = $remaining[$i];
                  $newRemaining = array_merge(
                      array_slice($remaining, 0, $i),
                      array_slice($remaining, $i + 1)
                  );
                  backtrack($result, $newPath, $newRemaining);
              }
          }
          
          backtrack($result, [], $nums);
          return $result;
      }
      ?>



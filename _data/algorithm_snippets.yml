          }
          
          for (int i = 0; i <= m; i++) {
              for (int k = 0; k <= p; k++) {
                  dp[i][0][k] = i + k;
              }
          }
          
          for (int j = 0; j <= n; j++) {
              for (int k = 0; k <= p; k++) {
                  dp[0][j][k] = j + k;
              }
          }
          
          // Fill DP table
          for (int i = 1; i <= m; i++) {
              for (int j = 1; j <= n; j++) {
                  for (int k = 1; k <= p; k++) {
                      if (s1[i-1] == s2[j-1] && s2[j-1] == s3[k-1]) {
                          dp[i][j][k] = dp[i-1][j-1][k-1];
                      } else {
                          dp[i][j][k] = 1 + min({
                              dp[i-1][j][k],    // delete from s1
                              dp[i][j-1][k],    // delete from s2
                              dp[i][j][k-1],    // delete from s3
                              dp[i-1][j-1][k],  // substitute s1,s2
                              dp[i-1][j][k-1],  // substitute s1,s3
                              dp[i][j-1][k-1]   // substitute s2,s3
                          });
                      }
                  }
              }
          }
          
          return dp[m][n][p];
      }
    

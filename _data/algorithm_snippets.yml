              $prev = $current;
              $current = $nextNode;
          }
          
          return $prev;
      }
      ?>

floyd_cycle_detection:
  name: "Floyd's Cycle Detection"
  description: "Detect cycle in linked list using fast and slow pointers"
  time_complexity: "O(n)"
  space_complexity: "O(1)"
  languages:
    python: |
      def has_cycle(head):
          """Detect if linked list has a cycle"""
          if not head or not head.next:
              return False
          
          slow = head
          fast = head
          
          while fast and fast.next:
              slow = slow.next
              fast = fast.next.next
              
              if slow == fast:
                  return True
          
          return False
    
    javascript: |
      function hasCycle(head) {
        if (!head || !head.next) return false;
        
        let slow = head;
        let fast = head;
        
        while (fast && fast.next) {
          slow = slow.next;
          fast = fast.next.next;
          
          if (slow === fast) return true;
        }
        
        return false;
      }
    
    typescript: |
      function hasCycle(head: ListNode | null): boolean {
        if (!head || !head.next) return false;
        
        let slow: ListNode | null = head;
        let fast: ListNode | null = head;
        
        while (fast && fast.next) {
          slow = slow!.next;
          fast = fast.next.next;
          
          if (slow === fast) return true;
        }
        
        return false;
      }
    
    java: |
      public class FloydCycleDetection {
          public static boolean hasCycle(ListNode head) {
              if (head == null || head.next == null) return false;
              
              ListNode slow = head;
              ListNode fast = head;
              
              while (fast != null && fast.next != null) {
                  slow = slow.next;
                  fast = fast.next.next;
                  
                  if (slow == fast) return true;
              }
              
              return false;
          }
      }
    
    cpp: |
      bool hasCycle(ListNode* head) {
          if (!head || !head->next) return false;
          
          ListNode* slow = head;
          ListNode* fast = head;
          
          while (fast && fast->next) {
              slow = slow->next;
              fast = fast->next->next;
              
              if (slow == fast) return true;
          }
          
          return false;
      }
    
    php: |
      <?php
      function hasCycle($head) {
          if ($head === null || $head->next === null) return false;
          
          $slow = $head;
          $fast = $head;
          
          while ($fast !== null && $fast->next !== null) {
              $slow = $slow->next;
              $fast = $fast->next->next;
              
              if ($slow === $fast) return true;
          }
          
          return false;
      }
      ?>



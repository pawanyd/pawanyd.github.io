bubble_sort:
  name: "Bubble Sort"
  description: "Simple sorting by repeatedly swapping adjacent elements"
  time_complexity: "O(n²)"
  space_complexity: "O(1)"
  languages:
    python: |
      def bubble_sort(arr):
          """Sort array using bubble sort"""
          n = len(arr)
          for i in range(n):
              swapped = False
              for j in range(0, n - i - 1):
                  if arr[j] > arr[j + 1]:
                      arr[j], arr[j + 1] = arr[j + 1], arr[j]
                      swapped = True
              if not swapped:
                  break
          return arr
    javascript: |
      function bubbleSort(arr) {
        const n = arr.length;
        for (let i = 0; i < n; i++) {
          let swapped = false;
          for (let j = 0; j < n - i - 1; j++) {
            if (arr[j] > arr[j + 1]) {
              [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
              swapped = true;
            }
          }
          if (!swapped) break;
        }
        return arr;
      }
    typescript: |

      function solveWithPropagation(variables, domains, constraints) {
        function propagateConstraints(variable, value, domains) {
          const newDomains = {};
          for (const [v, domain] of Object.entries(domains)) {
            newDomains[v] = [...domain];
          }
          
          // Remove value from variable's domain
          newDomains[variable] = [value];
          
          // Apply constraints to reduce other domains
          for (const constraint of constraints) {
            if (constraint.variables.includes(variable)) {
              for (const otherVar of constraint.variables) {
                if (otherVar !== variable) {
                  newDomains[otherVar] = newDomains[otherVar].filter(v =>
                    constraint.check(variable, value, otherVar, v)
                  );
                  
                  if (newDomains[otherVar].length === 0) {
                    return null; // Failure
                  }
                }
              }
            }
          }
          
          return newDomains;
        }
        
        function backtrack(assignment, domains) {
          if (Object.keys(assignment).length === variables.length) {
            return assignment;
          }
          
          // Choose unassigned variable (MRV heuristic)
          const unassigned = variables.filter(v => !(v in assignment));
          const variable = unassigned.reduce((min, v) =>
            domains[v].length < domains[min].length ? v : min
          );
          
          // Try each value in domain
          for (const value of domains[variable]) {
            const newDomains = propagateConstraints(variable, value, domains);
            if (newDomains !== null) {
              assignment[variable] = value;
              const result = backtrack(assignment, newDomains);
              if (result !== null) return result;
              delete assignment[variable];
            }
          }
          
          return null;
        }
        
        return backtrack({}, domains);
      }
    

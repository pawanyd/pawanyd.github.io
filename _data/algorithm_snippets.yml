constraint_propagation:
  name: "Constraint Propagation"
  description: "Backtracking with constraint propagation for improved pruning"
  time_complexity: "Better than basic backtracking due to early pruning"
  space_complexity: "O(n) for constraint tracking"
  languages:
    python: |
      def solve_with_propagation(variables, domains, constraints):
          """Backtracking with constraint propagation"""
          def propagate_constraints(var, value, domains):
              """Propagate constraints after assigning value to var"""
              new_domains = {v: domain[:] for v, domain in domains.items()}
              
              # Remove value from variable's domain
              new_domains[var] = [value]
              
              # Apply constraints to reduce other domains
              for constraint in constraints:
                  if var in constraint['variables']:
                      # Apply constraint-specific propagation
                      for other_var in constraint['variables']:
                          if other_var != var:
                              # Remove conflicting values
                              new_domains[other_var] = [
                                  v for v in new_domains[other_var]
                                  if constraint['check'](var, value, other_var, v)
                              ]
                              
                              # Check for empty domain (failure)
                              if not new_domains[other_var]:
                                  return None
              
              return new_domains
          
          def backtrack(assignment, domains):
              if len(assignment) == len(variables):
                  return assignment
              
              # Choose unassigned variable (MRV heuristic)
              unassigned = [v for v in variables if v not in assignment]
              var = min(unassigned, key=lambda v: len(domains[v]))
              
              # Try each value in domain
              for value in domains[var]:
                  # Propagate constraints
                  new_domains = propagate_constraints(var, value, domains)
                  if new_domains is not None:
                      assignment[var] = value
                      result = backtrack(assignment, new_domains)
                      if result is not None:
                          return result
                      del assignment[var]
              
              return None
          
          return backtrack({}, domains)
    

              }
              node.isEndOfWord = true;
          }
          
          search(word) {
              let node = this.root;
              for (const char of word) {
                  if (!node.children.has(char)) {
                      return false;
                  }
                  node = node.children.get(char);
              }
              return node.isEndOfWord;
          }
          
          startsWith(prefix) {
              let node = this.root;
              for (const char of prefix) {
                  if (!node.children.has(char)) {
                      return false;
                  }
                  node = node.children.get(char);
              }
              return true;
          }
      }

tree_rotation:
  name: "Tree Rotation Operations"
  description: "Left and right rotations for self-balancing trees"
  complexity:
    time: "O(1)"
    space: "O(1)"
  implementations:
    python: |
      class TreeNode:
          def __init__(self, key):
              self.key = key
              self.left = None
              self.right = None
      
      def right_rotate(y):
          """
          Right rotation:
              y                x
             / \              / \
            x   C    =>      A   y
           / \                  / \
          A   B                B   C
          """
          x = y.left
          B = x.right
          
          # Perform rotation
          x.right = y
          y.left = B
          
          return x  # New root
      
      def left_rotate(x):
          """
          Left rotation:
            x                  y
           / \                / \
          A   y      =>      x   C
             / \            / \
            B   C          A   B
          """
          y = x.right
          B = y.left
          
          # Perform rotation
          y.left = x
          x.right = B
          
          return y  # New root

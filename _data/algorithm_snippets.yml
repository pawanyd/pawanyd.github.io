      import java.util.*;
      
      public class ConstraintPropagation {
          interface Constraint {
              boolean check(String var1, Object val1, String var2, Object val2);
              List<String> getVariables();
          }
          
          public static Map<String, Object> solveWithPropagation(
              List<String> variables,
              Map<String, List<Object>> domains,
              List<Constraint> constraints) {
              
              return backtrack(new HashMap<>(), new HashMap<>(domains), variables, constraints);
          }
          
          private static Map<String, List<Object>> propagateConstraints(
              String variable, Object value,
              Map<String, List<Object>> domains,
              List<Constraint> constraints) {
              
              Map<String, List<Object>> newDomains = new HashMap<>();
              for (Map.Entry<String, List<Object>> entry : domains.entrySet()) {
                  newDomains.put(entry.getKey(), new ArrayList<>(entry.getValue()));
              }
              
              newDomains.put(variable, Arrays.asList(value));
              
              for (Constraint constraint : constraints) {
                  if (constraint.getVariables().contains(variable)) {
                      for (String otherVar : constraint.getVariables()) {
                          if (!otherVar.equals(variable)) {
                              List<Object> filteredDomain = new ArrayList<>();
                              for (Object v : newDomains.get(otherVar)) {
                                  if (constraint.check(variable, value, otherVar, v)) {
                                      filteredDomain.add(v);
                                  }
                              }
                              newDomains.put(otherVar, filteredDomain);
                              
                              if (filteredDomain.isEmpty()) {
                                  return null;
                              }
                          }
                      }
                  }
              }
              
              return newDomains;
          }
          
          private static Map<String, Object> backtrack(
              Map<String, Object> assignment,
              Map<String, List<Object>> domains,
              List<String> variables,
              List<Constraint> constraints) {
              
              if (assignment.size() == variables.size()) {
                  return assignment;
              }
              
              // Choose variable with smallest domain (MRV)
              String variable = variables.stream()
                  .filter(v -> !assignment.containsKey(v))
                  .min(Comparator.comparing(v -> domains.get(v).size()))
                  .orElse(null);
              
              for (Object value : domains.get(variable)) {
                  Map<String, List<Object>> newDomains = propagateConstraints(variable, value, domains, constraints);
                  if (newDomains != null) {
                      assignment.put(variable, value);
                      Map<String, Object> result = backtrack(assignment, newDomains, variables, constraints);
                      if (result != null) return result;
                      assignment.remove(variable);
                  }
              }
              
              return null;
          }
      }
    

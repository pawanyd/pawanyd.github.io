          while (true) {
              int largest = index;
              int left = 2 * index + 1;
              int right = 2 * index + 2;
              
              if (left < n && heap[left] > heap[largest]) largest = left;
              if (right < n && heap[right] > heap[largest]) largest = right;
              
              if (largest != index) {
                  swap(heap[index], heap[largest]);
                  index = largest;
              } else {
                  break;
              }
          }
      }
    php: |
      function heapExtractMax(&$heap) {
          if (empty($heap)) return null;
          
          $maxVal = $heap[0];
          $heap[0] = $heap[count($heap) - 1];
          array_pop($heap);
          
          if (!empty($heap)) {
              heapifyDown($heap, 0);
          }
          
          return $maxVal;
      }
      
      function heapifyDown(&$heap, $index) {
          $n = count($heap);
          while (true) {
              $largest = $index;
              $left = 2 * $index + 1;
              $right = 2 * $index + 2;
              
              if ($left < $n && $heap[$left] > $heap[$largest]) $largest = $left;
              if ($right < $n && $heap[$right] > $heap[$largest]) $largest = $right;
              
              if ($largest != $index) {
                  $temp = $heap[$index];
                  $heap[$index] = $heap[$largest];
                  $heap[$largest] = $temp;
                  $index = $largest;
              } else {
                  break;
              }
          }
      }



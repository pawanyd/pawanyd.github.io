    java: |
      public class SlidingWindow {
          public static Integer slidingWindow(int[] arr, int k) {
              // Find maximum sum of any subarray of size k
              if (arr.length < k) return null;
              
              // Calculate sum of first window
              int windowSum = 0;
              for (int i = 0; i < k; i++) {
                  windowSum += arr[i];
              }
              int maxSum = windowSum;
              
              // Slide the window
              for (int i = k; i < arr.length; i++) {
                  windowSum = windowSum - arr[i - k] + arr[i];
                  maxSum = Math.max(maxSum, windowSum);
              }
              
              return maxSum;
          }
      }
    
    cpp: |
      #include <vector>
      #include <algorithm>
      using namespace std;
      
      int slidingWindow(vector<int>& arr, int k) {
          // Find maximum sum of any subarray of size k
          if (arr.size() < k) return -1;
          
          // Calculate sum of first window
          int windowSum = 0;
          for (int i = 0; i < k; i++) {
              windowSum += arr[i];
          }
          int maxSum = windowSum;
          
          // Slide the window
          for (int i = k; i < arr.size(); i++) {
              windowSum = windowSum - arr[i - k] + arr[i];
              maxSum = max(maxSum, windowSum);
          }
          
          return maxSum;
      }
    
    php: |
      <?php
      function slidingWindow($arr, $k) {
          // Find maximum sum of any subarray of size k
          if (count($arr) < $k) return null;
          
          // Calculate sum of first window
          $windowSum = array_sum(array_slice($arr, 0, $k));
          $maxSum = $windowSum;
          
          // Slide the window
          for ($i = $k; $i < count($arr); $i++) {
              $windowSum = $windowSum - $arr[$i - $k] + $arr[$i];
              $maxSum = max($maxSum, $windowSum);
          }
          
          return $maxSum;
      }
      ?>

two_pointers:
  name: "Two Pointers"
  description: "Find two numbers that sum to target in sorted array"
  languages:
    python: |
      def two_sum_sorted(arr, target):
          """Find two numbers that sum to target in sorted array"""
          left, right = 0, len(arr) - 1
          
          while left < right:
              current_sum = arr[left] + arr[right]
              
              if current_sum == target:
                  return [arr[left], arr[right]]
              elif current_sum < target:
                  left += 1
              else:
                  right -= 1
          
          return None
    
    javascript: |
      function twoSumSorted(arr, target) {
        // Find two numbers that sum to target in sorted array
        let left = 0, right = arr.length - 1;
        
        while (left < right) {
          const currentSum = arr[left] + arr[right];
          
          if (currentSum === target) {
            return [arr[left], arr[right]];
          } else if (currentSum < target) {
            left++;
          } else {
            right--;
          }
        }
        
        return null;
      }
    

        for (let i = 1; i <= m; i++) {
          for (let j = 1; j <= n; j++) {
            if (text1[i-1] === text2[j-1]) {
              dp[i][j] = dp[i-1][j-1] + 1;
            } else {
              dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
            }
          }
        }
        
        return dp[m][n];
      }
    

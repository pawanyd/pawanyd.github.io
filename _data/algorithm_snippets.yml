tree_inorder_traversal:
  name: "Inorder Traversal"
  description: "Traverse binary tree in Left-Root-Right order"
  time_complexity: "O(n)"
  space_complexity: "O(h) where h is tree height"
  languages:
    python: |
      class TreeNode:
          def __init__(self, val=0, left=None, right=None):
              self.val = val
              self.left = left
              self.right = right
      
      def inorder_traversal(root):
          """Inorder traversal: Left -> Root -> Right"""
          result = []
          
          def traverse(node):
              if not node:
                  return
              traverse(node.left)
              result.append(node.val)
              traverse(node.right)
          
          traverse(root)
          return result
    
    javascript: |
      class TreeNode {
        constructor(val = 0, left = null, right = null) {
          this.val = val;
          this.left = left;
          this.right = right;
        }
      }
      
      function inorderTraversal(root) {
        const result = [];
        
        function traverse(node) {
          if (!node) return;
          traverse(node.left);
          result.push(node.val);
          traverse(node.right);
        }
        
        traverse(root);
        return result;
      }
    
    typescript: |
      class TreeNode {
        val: number;
        left: TreeNode | null;
        right: TreeNode | null;
        
        constructor(val: number = 0, left: TreeNode | null = null, right: TreeNode | null = null) {
          this.val = val;
          this.left = left;
          this.right = right;
        }
      }
      
      function inorderTraversal(root: TreeNode | null): number[] {
        const result: number[] = [];
        
        function traverse(node: TreeNode | null): void {
          if (!node) return;
          traverse(node.left);
          result.push(node.val);
          traverse(node.right);
        }
        
        traverse(root);
        return result;
      }
    
    java: |
      class TreeNode {
          int val;
          TreeNode left, right;
          TreeNode(int val) { this.val = val; }
      }
      
      public class InorderTraversal {
          public static List<Integer> inorderTraversal(TreeNode root) {
              List<Integer> result = new ArrayList<>();
              traverse(root, result);
              return result;
          }
          
          private static void traverse(TreeNode node, List<Integer> result) {
              if (node == null) return;
              traverse(node.left, result);
              result.add(node.val);
              traverse(node.right, result);
          }
      }
    
    cpp: |
      struct TreeNode {
          int val;
          TreeNode* left;
          TreeNode* right;
          TreeNode(int x) : val(x), left(nullptr), right(nullptr) {}
      };
      
      void traverse(TreeNode* node, vector<int>& result) {
          if (!node) return;
          traverse(node->left, result);
          result.push_back(node->val);
          traverse(node->right, result);
      }
      
      vector<int> inorderTraversal(TreeNode* root) {
          vector<int> result;
          traverse(root, result);
          return result;
      }
    
    php: |
      <?php
      class TreeNode {
          public $val;
          public $left;
          public $right;
          function __construct($val = 0, $left = null, $right = null) {
              $this->val = $val;
              $this->left = $left;
              $this->right = $right;
          }
      }
      
      function inorderTraversal($root) {
          $result = [];
          
          function traverse($node, &$result) {
              if ($node === null) return;
              traverse($node->left, $result);
              $result[] = $node->val;
              traverse($node->right, $result);
          }
          
          traverse($root, $result);
          return $result;
      }

  name: "Heuristic-Guided Backtracking"
  description: "Backtracking with MRV and LCV heuristics for better performance"
  time_complexity: "Much better than basic backtracking in practice"
  space_complexity: "O(n)"
  languages:
    python: |
      def heuristic_backtracking(variables, domains, constraints):
          """Backtracking with MRV and LCV heuristics"""
          def mrv_heuristic(assignment, domains):
              """Most Remaining Values - choose variable with smallest domain"""
              unassigned = [v for v in variables if v not in assignment]
              return min(unassigned, key=lambda v: len(domains[v]))
          
          def lcv_heuristic(var, domains, constraints):
              """Least Constraining Value - order values by impact on other domains"""
              def count_conflicts(value):
                  conflicts = 0
                  for constraint in constraints:
                      if var in constraint['variables']:
                          for other_var in constraint['variables']:
                              if other_var != var and other_var not in assignment:
                                  for other_val in domains[other_var]:
                                      if not constraint['check'](var, value, other_var, other_val):
                                          conflicts += 1
                  return conflicts
              
              return sorted(domains[var], key=count_conflicts)
          
          def backtrack(assignment):
              if len(assignment) == len(variables):
                  return assignment
              
              # Choose variable using MRV heuristic
              var = mrv_heuristic(assignment, domains)
              
              # Order values using LCV heuristic
              ordered_values = lcv_heuristic(var, domains, constraints)
              
              for value in ordered_values:
                  # Check if assignment is consistent
                  consistent = True
                  for constraint in constraints:
                      if var in constraint['variables']:
                          for other_var in constraint['variables']:
                              if other_var in assignment:
                                  if not constraint['check'](var, value, other_var, assignment[other_var]):
                                      consistent = False
                                      break
                          if not consistent:
                              break
                  
                  if consistent:
                      assignment[var] = value
                      result = backtrack(assignment)
                      if result is not None:
                          return result
                      del assignment[var]
              
              return None
          
          return backtrack({})
    

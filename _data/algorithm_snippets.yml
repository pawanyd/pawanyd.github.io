n_queens:
  name: "N-Queens Problem"
  description: "Place N queens on NxN chessboard so no two queens attack each other"
  time_complexity: "O(N!) worst case, much better with pruning"
  space_complexity: "O(N)"
  languages:
    python: |
      def solve_n_queens(n):
          """Solve N-Queens problem using backtracking"""
          def is_safe(board, row, col):
              # Check column
              for i in range(row):
                  if board[i] == col:
                      return False
              
              # Check diagonal
              for i in range(row):
                  if abs(board[i] - col) == abs(i - row):
                      return False
              
              return True
          
          def backtrack(board, row):
              if row == n:
                  return [board[:]]  # Found solution
              
              solutions = []
              for col in range(n):
                  if is_safe(board, row, col):
                      board[row] = col
                      solutions.extend(backtrack(board, row + 1))
                      # No need to explicitly backtrack for this implementation
              
              return solutions
          
          return backtrack([-1] * n, 0)
    

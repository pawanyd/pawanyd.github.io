      using namespace std;
      
      class ConstraintPropagation {
      public:
          struct Constraint {
              vector<string> variables;
              function<bool(const string&, int, const string&, int)> check;
          };
          
          unordered_map<string, int> solveWithPropagation(
              const vector<string>& variables,
              unordered_map<string, vector<int>> domains,
              const vector<Constraint>& constraints) {
              
              unordered_map<string, int> assignment;
              return backtrack(assignment, domains, variables, constraints) ? assignment : unordered_map<string, int>{};
          }
          
      private:
          unordered_map<string, vector<int>> propagateConstraints(
              const string& variable, int value,
              const unordered_map<string, vector<int>>& domains,
              const vector<Constraint>& constraints) {
              
              auto newDomains = domains;
              newDomains[variable] = {value};
              
              for (const auto& constraint : constraints) {
                  if (find(constraint.variables.begin(), constraint.variables.end(), variable) != constraint.variables.end()) {
                      for (const auto& otherVar : constraint.variables) {
                          if (otherVar != variable) {
                              vector<int> filteredDomain;
                              for (int v : newDomains[otherVar]) {
                                  if (constraint.check(variable, value, otherVar, v)) {
                                      filteredDomain.push_back(v);
                                  }
                              }
                              newDomains[otherVar] = filteredDomain;
                              
                              if (filteredDomain.empty()) {
                                  return {}; // Failure
                              }
                          }
                      }
                  }
              }
              
              return newDomains;
          }
          
          bool backtrack(unordered_map<string, int>& assignment,
                        const unordered_map<string, vector<int>>& domains,
                        const vector<string>& variables,
                        const vector<Constraint>& constraints) {
              
              if (assignment.size() == variables.size()) {
                  return true;
              }
              
              // Choose variable with smallest domain (MRV)
              string variable;
              int minDomainSize = INT_MAX;
              for (const auto& var : variables) {
                  if (assignment.find(var) == assignment.end()) {
                      if (domains.at(var).size() < minDomainSize) {
                          minDomainSize = domains.at(var).size();
                          variable = var;
                      }
                  }
              }
              
              for (int value : domains.at(variable)) {
                  auto newDomains = propagateConstraints(variable, value, domains, constraints);
                  if (!newDomains.empty()) {
                      assignment[variable] = value;
                      if (backtrack(assignment, newDomains, variables, constraints)) {
                          return true;
                      }
                      assignment.erase(variable);
                  }
              }
              
              return false;
          }
      };
    

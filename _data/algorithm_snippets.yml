subset_sum_backtracking:
  name: "Subset Sum with Backtracking"
  description: "Find if there exists a subset that sums to target using backtracking"
  time_complexity: "O(2^n) worst case"
  space_complexity: "O(n) recursion stack"
  languages:
    python: |
      def subset_sum(nums, target):
          """Find if subset exists that sums to target"""
          def backtrack(index, current_sum, subset):
              # Base case: found target sum
              if current_sum == target:
                  return subset[:]
              
              # Base case: exceeded target or no more numbers
              if current_sum > target or index >= len(nums):
                  return None
              
              # Choice 1: Include current number
              subset.append(nums[index])
              result = backtrack(index + 1, current_sum + nums[index], subset)
              if result is not None:
                  return result
              subset.pop()  # Backtrack
              
              # Choice 2: Exclude current number
              result = backtrack(index + 1, current_sum, subset)
              if result is not None:
                  return result
              
              return None
          
          return backtrack(0, 0, [])
    

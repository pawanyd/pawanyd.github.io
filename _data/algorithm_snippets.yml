      public class SubsetSum {
          public static List<Integer> subsetSum(int[] nums, int target) {
              List<Integer> result = new ArrayList<>();
              if (backtrack(nums, 0, 0, target, new ArrayList<>(), result)) {
                  return result;
              }
              return null;
          }
          
          private static boolean backtrack(int[] nums, int index, int currentSum, 
                                         int target, List<Integer> subset, List<Integer> result) {
              // Base case: found target sum
              if (currentSum == target) {
                  result.addAll(subset);
                  return true;
              }
              
              // Base case: exceeded target or no more numbers
              if (currentSum > target || index >= nums.length) {
                  return false;
              }
              
              // Choice 1: Include current number
              subset.add(nums[index]);
              if (backtrack(nums, index + 1, currentSum + nums[index], target, subset, result)) {
                  return true;
              }
              subset.remove(subset.size() - 1); // Backtrack
              
              // Choice 2: Exclude current number
              if (backtrack(nums, index + 1, currentSum, target, subset, result)) {
                  return true;
              }
              
              return false;
          }
      }
    

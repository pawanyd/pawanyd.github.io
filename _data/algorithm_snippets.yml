          private static String mrvHeuristic(Map<String, Object> assignment, 
                                           List<String> variables,
                                           Map<String, List<Object>> domains) {
              return variables.stream()
                  .filter(v -> !assignment.containsKey(v))
                  .min(Comparator.comparing(v -> domains.get(v).size()))
                  .orElse(null);
          }
          
          private static List<Object> lcvHeuristic(String variable,
                                                  Map<String, List<Object>> domains,
                                                  List<Constraint> constraints,
                                                  Map<String, Object> assignment) {
              return domains.get(variable).stream()
                  .sorted(Comparator.comparing(value -> countConflicts(variable, value, domains, constraints, assignment)))
                  .collect(Collectors.toList());
          }
          
          private static int countConflicts(String variable, Object value,
                                          Map<String, List<Object>> domains,
                                          List<Constraint> constraints,
                                          Map<String, Object> assignment) {
              int conflicts = 0;
              for (Constraint constraint : constraints) {
                  if (constraint.getVariables().contains(variable)) {
                      for (String otherVar : constraint.getVariables()) {
                          if (!otherVar.equals(variable) && !assignment.containsKey(otherVar)) {
                              for (Object otherVal : domains.get(otherVar)) {
                                  if (!constraint.check(variable, value, otherVar, otherVal)) {
                                      conflicts++;
                                  }
                              }
                          }
                      }
                  }
              }
              return conflicts;
          }
          
          private static Map<String, Object> backtrack(Map<String, Object> assignment,
                                                      List<String> variables,
                                                      Map<String, List<Object>> domains,
                                                      List<Constraint> constraints) {
              if (assignment.size() == variables.size()) {
                  return assignment;
              }
              
              String variable = mrvHeuristic(assignment, variables, domains);
              List<Object> orderedValues = lcvHeuristic(variable, domains, constraints, assignment);
              
              for (Object value : orderedValues) {
                  boolean consistent = true;
                  for (Constraint constraint : constraints) {
                      if (constraint.getVariables().contains(variable)) {
                          for (String otherVar : constraint.getVariables()) {
                              if (assignment.containsKey(otherVar)) {
                                  if (!constraint.check(variable, value, otherVar, assignment.get(otherVar))) {
                                      consistent = false;
                                      break;
                                  }
                              }
                          }
                          if (!consistent) break;
                      }
                  }
                  
                  if (consistent) {
                      assignment.put(variable, value);
                      Map<String, Object> result = backtrack(assignment, variables, domains, constraints);
                      if (result != null) return result;
                      assignment.remove(variable);
                  }
              }
              
              return null;
          }
      }
    
    cpp: |
      #include <vector>
      #include <unordered_map>
      #include <string>
      #include <algorithm>
      #include <functional>
      using namespace std;
      
      class HeuristicBacktracking {
      public:
          struct Constraint {
              vector<string> variables;
              function<bool(const string&, int, const string&, int)> check;
          };
          
          unordered_map<string, int> heuristicBacktracking(
              const vector<string>& variables,
              const unordered_map<string, vector<int>>& domains,
              const vector<Constraint>& constraints) {
              
              unordered_map<string, int> assignment;
              return backtrack(assignment, variables, domains, constraints) ? assignment : unordered_map<string, int>{};
          }
          
      private:
          string mrvHeuristic(const unordered_map<string, int>& assignment,
                             const vector<string>& variables,
                             const unordered_map<string, vector<int>>& domains) {
              string bestVar;
              int minDomainSize = INT_MAX;
              
              for (const auto& var : variables) {
                  if (assignment.find(var) == assignment.end()) {
                      int domainSize = domains.at(var).size();
                      if (domainSize < minDomainSize) {
                          minDomainSize = domainSize;
                          bestVar = var;
                      }
                  }
              }
              
              return bestVar;
          }
          
          vector<int> lcvHeuristic(const string& variable,
                                  const unordered_map<string, vector<int>>& domains,
                                  const vector<Constraint>& constraints,
                                  const unordered_map<string, int>& assignment) {
              auto values = domains.at(variable);
              
              sort(values.begin(), values.end(), [&](int a, int b) {
                  return countConflicts(variable, a, domains, constraints, assignment) <
                         countConflicts(variable, b, domains, constraints, assignment);
              });
              
              return values;
          }
          
          int countConflicts(const string& variable, int value,
                            const unordered_map<string, vector<int>>& domains,
                            const vector<Constraint>& constraints,
                            const unordered_map<string, int>& assignment) {
              int conflicts = 0;
              
              for (const auto& constraint : constraints) {
                  if (find(constraint.variables.begin(), constraint.variables.end(), variable) != constraint.variables.end()) {
                      for (const auto& otherVar : constraint.variables) {
                          if (otherVar != variable && assignment.find(otherVar) == assignment.end()) {
                              for (int otherVal : domains.at(otherVar)) {
                                  if (!constraint.check(variable, value, otherVar, otherVal)) {
                                      conflicts++;
                                  }
                              }
                          }
                      }
                  }
              }
              
              return conflicts;
          }
          
          bool backtrack(unordered_map<string, int>& assignment,
                        const vector<string>& variables,
                        const unordered_map<string, vector<int>>& domains,
                        const vector<Constraint>& constraints) {
              if (assignment.size() == variables.size()) {
                  return true;
              }
              
              string variable = mrvHeuristic(assignment, variables, domains);
              vector<int> orderedValues = lcvHeuristic(variable, domains, constraints, assignment);
              
              for (int value : orderedValues) {
                  bool consistent = true;
                  
                  for (const auto& constraint : constraints) {
                      if (find(constraint.variables.begin(), constraint.variables.end(), variable) != constraint.variables.end()) {
                          for (const auto& otherVar : constraint.variables) {
                              if (assignment.find(otherVar) != assignment.end()) {
                                  if (!constraint.check(variable, value, otherVar, assignment.at(otherVar))) {
                                      consistent = false;
                                      break;
                                  }
                              }
                          }
                          if (!consistent) break;
                      }
                  }
                  
                  if (consistent) {
                      assignment[variable] = value;
                      if (backtrack(assignment, variables, domains, constraints)) {
                          return true;
                      }
                      assignment.erase(variable);
                  }
              }
              
              return false;
          }
      };
    
    php: |
      <?php
      function heuristicBacktracking($variables, $domains, $constraints) {
          function mrvHeuristic($assignment, $variables, $domains) {
              $unassigned = array_filter($variables, function($v) use ($assignment) {
                  return !isset($assignment[$v]);
              });
              
              return array_reduce($unassigned, function($min, $v) use ($domains) {
                  return $min === null || count($domains[$v]) < count($domains[$min]) ? $v : $min;
              });
          }
          
          function lcvHeuristic($variable, $domains, $constraints, $assignment) {
              function countConflicts($variable, $value, $domains, $constraints, $assignment) {
                  $conflicts = 0;
                  foreach ($constraints as $constraint) {
                      if (in_array($variable, $constraint['variables'])) {
                          foreach ($constraint['variables'] as $otherVar) {
                              if ($otherVar !== $variable && !isset($assignment[$otherVar])) {
                                  foreach ($domains[$otherVar] as $otherVal) {
                                      if (!$constraint['check']($variable, $value, $otherVar, $otherVal)) {
                                          $conflicts++;
                                      }
                                  }
                              }
                          }
                      }
                  }
                  return $conflicts;
              }
              
              $values = $domains[$variable];
              usort($values, function($a, $b) use ($variable, $domains, $constraints, $assignment) {
                  return countConflicts($variable, $a, $domains, $constraints, $assignment) -
                         countConflicts($variable, $b, $domains, $constraints, $assignment);
              });
              
              return $values;
          }
          
          function backtrack($assignment, $variables, $domains, $constraints) {
              if (count($assignment) === count($variables)) {
                  return $assignment;
              }
              
              $variable = mrvHeuristic($assignment, $variables, $domains);
              $orderedValues = lcvHeuristic($variable, $domains, $constraints, $assignment);
              
              foreach ($orderedValues as $value) {
                  $consistent = true;
                  foreach ($constraints as $constraint) {
                      if (in_array($variable, $constraint['variables'])) {
                          foreach ($constraint['variables'] as $otherVar) {
                              if (isset($assignment[$otherVar])) {
                                  if (!$constraint['check']($variable, $value, $otherVar, $assignment[$otherVar])) {
                                      $consistent = false;
                                      break 2;
                                  }
                              }
                          }
                      }
                  }
                  
                  if ($consistent) {
                      $assignment[$variable] = $value;
                      $result = backtrack($assignment, $variables, $domains, $constraints);
                      if ($result !== null) return $result;
                      unset($assignment[$variable]);
                  }
              }
              
              return null;
          }
          
          return backtrack([], $variables, $domains, $constraints);
      }
      ?>

iterative_deepening_backtracking:
  name: "Iterative Deepening Backtracking"
  description: "Backtracking with iterative deepening for unknown solution depths"
  time_complexity: "O(b^d) where b is branching factor, d is solution depth"
  space_complexity: "O(d) instead of O(b^d)"
  languages:
    python: |
      def iterative_deepening_backtracking(initial_state, goal_test, get_successors):
          """Iterative deepening backtracking for memory efficiency"""
          def depth_limited_search(state, path, depth_limit):
              if goal_test(state):
                  return path + [state]
              
              if depth_limit <= 0:
                  return None
              
              for successor in get_successors(state):
                  if successor not in path:  # Avoid cycles
                      result = depth_limited_search(successor, path + [state], depth_limit - 1)
                      if result is not None:
                          return result
              
              return None
          
          # Iteratively increase depth limit
          depth = 1
          while depth <= 100:  # Reasonable upper bound
              result = depth_limited_search(initial_state, [], depth)
              if result is not None:
                  return result
              depth += 1
          
          return None  # No solution found within depth limit
    

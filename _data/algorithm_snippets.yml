                     unordered_set<int>& visited, vector<int>& result) {
          visited.insert(node);
          result.push_back(node);
          
          for (int neighbor : graph[node]) {
              if (visited.find(neighbor) == visited.end()) {
                  dfsHelper(graph, neighbor, visited, result);
              }
          }
      }
      

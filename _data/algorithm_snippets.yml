dp_space_optimized:
  name: "Space-Optimized DP"
  description: "Reduce space complexity from O(n²) to O(n) using rolling arrays"
  time_complexity: "O(m × n)"
  space_complexity: "O(n)"
  languages:
    python: |
      def lcs_space_optimized(text1, text2):
          """LCS with space optimization - only keep previous row"""
          m, n = len(text1), len(text2)
          prev = [0] * (n + 1)
          curr = [0] * (n + 1)
          
          for i in range(1, m + 1):
              for j in range(1, n + 1):
                  if text1[i-1] == text2[j-1]:
                      curr[j] = prev[j-1] + 1
                  else:
                      curr[j] = max(prev[j], curr[j-1])
              
              prev, curr = curr, prev
          
          return prev[n]
    
    javascript: |
      function lcsSpaceOptimized(text1, text2) {
        const m = text1.length, n = text2.length;
        let prev = Array(n + 1).fill(0);
        let curr = Array(n + 1).fill(0);
        
        for (let i = 1; i <= m; i++) {
          for (let j = 1; j <= n; j++) {
            if (text1[i-1] === text2[j-1]) {
              curr[j] = prev[j-1] + 1;
            } else {
              curr[j] = Math.max(prev[j], curr[j-1]);
            }
          }
          
          [prev, curr] = [curr, prev];
        }
        
        return prev[n];
      }
    

multidimensional_dp:
  name: "Multi-Dimensional DP"
  description: "DP with multiple state variables for complex constraints"
  time_complexity: "O(n × m × k)"
  space_complexity: "O(n × m × k)"
  languages:
    python: |
      def edit_distance_3d(s1, s2, s3):
          """3D DP for edit distance between three strings"""
          m, n, p = len(s1), len(s2), len(s3)
          dp = [[[0] * (p + 1) for _ in range(n + 1)] for _ in range(m + 1)]
          
          # Initialize base cases
          for i in range(m + 1):
              for j in range(n + 1):
                  dp[i][j][0] = i + j
          
          for i in range(m + 1):
              for k in range(p + 1):
                  dp[i][0][k] = i + k
          
          for j in range(n + 1):
              for k in range(p + 1):
                  dp[0][j][k] = j + k
          
          # Fill DP table
          for i in range(1, m + 1):
              for j in range(1, n + 1):
                  for k in range(1, p + 1):
                      if s1[i-1] == s2[j-1] == s3[k-1]:
                          dp[i][j][k] = dp[i-1][j-1][k-1]
                      else:
                          dp[i][j][k] = 1 + min(
                              dp[i-1][j][k],    # delete from s1
                              dp[i][j-1][k],    # delete from s2
                              dp[i][j][k-1],    # delete from s3
                              dp[i-1][j-1][k],  # substitute s1,s2
                              dp[i-1][j][k-1],  # substitute s1,s3
                              dp[i][j-1][k-1]   # substitute s2,s3
                          )
          
          return dp[m][n][p]
    

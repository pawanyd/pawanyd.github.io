  description: "Bottom-up DP approach building solutions iteratively"
  time_complexity: "O(n)"
  space_complexity: "O(1)"
  languages:
    python: |
      def fibonacci_tab(n):
          """Fibonacci with tabulation - bottom-up DP"""
          if n <= 1:
              return n
          
          prev, curr = 0, 1
          
          for i in range(2, n + 1):
              prev, curr = curr, prev + curr
          
          return curr
    

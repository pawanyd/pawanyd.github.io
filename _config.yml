# SEO Defaults
url: "https://pawanyd.github.io"
timezone: Asia/Kolkata # Your timezone
title: "Pawan Kumar - Principal Software Developer"
description: "Results-driven Principal Software Developer with 10+ years of experience in developing high-quality web applications"

author:
  name: "Pawan Kumar"
  twitter: "@pawanyd"
# Add these to existing config
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title.html

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-postcss
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

paginate: 4
paginate_path: "/blogs/page:num/"

postcss:
  cache: true

# Include important files that Jekyll might ignore
include:
  - _pages
  - .htaccess

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - package.json
  - package-lock.json
  - postcss.config.js
  - tailwind.config.js
  - README.md
  - SEO-CRAWLING-GUIDE.md
  - .code
  - .vscode
  - .kiro

# Keep important files
keep_files:
  - .git
  - .nojekyll
